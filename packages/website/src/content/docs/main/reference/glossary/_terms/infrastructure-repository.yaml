term: Infrastructure Repository
type: panfactum
summary: The version-controlled repository that contains all IaC, environment configurations, and DevShell definitions for a PNCF deployment.
description: |
  The *infrastructure repository* (often called the "infra repo") is your Git repository
  that houses all of the code and configuration needed to manage your Panfactum-based infrastructure.

  One of the primary purposes of PNCF is to provide tooling to help you manage this repository and make
  it your own. Everything about how PNCF infrastructure behaves is controlled in this single repository
  (i.e., there is no external PNCF management server outside your control).

  For more information about the standard layout of the infrastructure repository, see these 
  docs.
