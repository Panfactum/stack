# Changelog entry for edge release 24-08-22.
# Migrated from edge.24-08-22.mdx.
summary: "Improves Redis persistence strategy for faster recovery, adds disruption window controller for scheduling maintenance periods, introduces PostgreSQL synchronous replication, and enhances Velero backup reliability."
highlights:
  - "Redis AOF persistence removed in favor of RDB-only — faster recovery, `redis_appendfsync` input removed"
  - "`token_lifetime_seconds` renamed to `token_lifetime_hours` in [`vault_auth_oidc`](/docs/edge/reference/infrastructure-modules/direct/vault/vault_auth_oidc)"
  - "New [`kube_disruption_window_controller`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_disruption_window_controller) for time-based maintenance windows"
  - "New `pg_sync_replication_enabled` input for PostgreSQL synchronous replication"
changes:
  - type: breaking_change
    summary: >-
      [`kube_redis_sentinel`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_redis_sentinel) has been
      switched to use only RDB for persistence (previously used both AOF and RDB). The `redis_appendfsync` input has been
      removed. Using AOF with RDB prevents partial resynchronizations after restarts, greatly increasing recovery time.
    impacts:
      - type: iac-module
        component: kube_redis_sentinel
        summary: Switched to RDB-only persistence; redis_appendfsync removed
  - type: breaking_change
    summary: >-
      `token_lifetime_seconds` has been changed to `token_lifetime_hours` in
      [`vault_auth_oidc`](/docs/edge/reference/infrastructure-modules/direct/vault/vault_auth_oidc) to avoid a perpetual
      diff issue present in the Vault provider.
    impacts:
      - type: iac-module
        component: vault_auth_oidc
        summary: Token lifetime input changed from seconds to hours
  - type: breaking_change
    summary: >-
      Removed the daily backups from [`kube_velero`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_velero)
      as they were undocumented and had no realistic use case.
    impacts:
      - type: iac-module
        component: kube_velero
        summary: Undocumented daily backups removed
  - type: addition
    summary: >-
      Adds a new submodule,
      [`kube_disruption_window_controller`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_disruption_window_controller),
      for specifying time-based disruption windows for disruption-sensitive workloads such as databases. Disruption window
      capabilities have also been added to `kube_pg_cluster` and `kube_redis_sentinel`.
    impacts:
      - type: iac-module
        component: kube_disruption_window_controller
        summary: New submodule for time-based disruption windows
      - type: iac-module
        component: kube_pg_cluster
        summary: Disruption window capabilities added
      - type: iac-module
        component: kube_redis_sentinel
        summary: Disruption window capabilities added
  - type: addition
    summary: >-
      Adds synchronous replication support to
      [`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster)
      via `pg_sync_replication_enabled`.
    impacts:
      - type: iac-module
        component: kube_pg_cluster
        summary: Synchronous replication support added
  - type: fix
    summary: >-
      Addressed issue where `pg_smart_shutdown_timeout` cannot be set to `0` in
      [`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster)
      without CNPG resetting it to 180.
    impacts:
      - type: iac-module
        component: kube_pg_cluster
        summary: Fixed pg_smart_shutdown_timeout zero-value handling
  - type: fix
    summary: >-
      Fixed an issue in [`kube_velero`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_velero)
      where stale EBS snapshots were not being deleted.
    impacts:
      - type: iac-module
        component: kube_velero
        summary: Stale EBS snapshot cleanup fixed
