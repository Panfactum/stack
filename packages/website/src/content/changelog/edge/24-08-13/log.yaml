# Changelog entry for edge release 24-08-13.
# Migrated from edge.24-08-13.mdx.
summary: "Improves PostgreSQL storage configuration and memory tuning, simplifies Karpenter node pool management, adds support for custom PostgreSQL parameters and schemas, and fixes several bootstrapping and environment issues."
highlights:
  - "`pg_storage_increase_percent` renamed to `pg_storage_increase_gb` in [`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster)"
  - "`pg_storage_gb` renamed to `pg_initial_storage_gb` in [`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster)"
  - "Node pool inputs (`node_vpc_id`, `node_subnets`, `node_security_group_id`) moved from `kube_karpenter` to `kube_karpenter_node_pools`"
changes:
  - type: breaking_change
    summary: >-
      `pg_storage_increase_percent` has been changed to `pg_storage_increase_gb` in
      [`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster).
      This allows for more predictable storage autoscaling regardless of current scale.
    impacts:
      - type: iac-module
        component: kube_pg_cluster
        summary: Storage autoscaling input renamed to pg_storage_increase_gb
  - type: breaking_change
    summary: >-
      `pg_storage_gb` has been changed to `pg_initial_storage_gb` in
      [`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster)
      to better indicate that this value is only used during initial database provisioning.
    impacts:
      - type: iac-module
        component: kube_pg_cluster
        summary: Storage input renamed to pg_initial_storage_gb
  - type: breaking_change
    summary: >-
      `node_vpc_id`, `node_subnets`, and `node_security_group_id` have been moved from
      [`kube_karpenter`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_karpenter)
      to [`kube_karpenter_node_pools`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_karpenter_node_pools)
      to simplify subnet/VPC/security group assignment logic. Karpenter auto-discovery tags have also been removed.
    impacts:
      - type: iac-module
        component: kube_karpenter
        summary: Node pool inputs moved to kube_karpenter_node_pools
      - type: iac-module
        component: kube_karpenter_node_pools
        summary: Node pool inputs moved here from kube_karpenter
  - type: addition
    summary: >-
      Adds new enhancements to
      [`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster): better memory
      tuning defaults, ability to set arbitrary PostgreSQL parameters, custom backup schedule support, and additional
      schemas via `extra_schemas`.
    impacts:
      - type: iac-module
        component: kube_pg_cluster
        summary: Memory tuning, custom parameters, and extra schemas added
  - type: addition
    summary: >-
      Adds another local retry for Terragrunt when providers produce an inconsistent final plan.
  - type: addition
    summary: >-
      Adds check for updated `direnv` version to prevent issues when setting up the local devenv.
  - type: fix
    summary: >-
      Added deterministic ordering to additional resources in
      [`authentik_core_resources`](/docs/main/reference/infrastructure-modules/direct/authentik/authentik_core_resources).
    impacts:
      - type: iac-module
        component: authentik_core_resources
        summary: Deterministic ordering applied to additional resources
  - type: fix
    summary: >-
      Fixed multiple bugs in `pf-env-bootstrap`: incorrect AWS profile for `.sops.yaml` and missing platform checksums
      in `.terraform.lock.hcl` files.
    impacts:
      - type: devshell
        component: pf
        summary: Fixed pf-env-bootstrap AWS profile and checksum bugs
  - type: fix
    summary: >-
      Restores the `pf-db-tunnel` command to the devenv.
    impacts:
      - type: devshell
        component: pf
        summary: Restored pf-db-tunnel command to devenv
