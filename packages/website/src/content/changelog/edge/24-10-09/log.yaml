# Changelog entry for edge release 24-10-09.
# Migrated from edge.24-10-09.mdx.
summary: "Adds support for local Stack module development, loosens git provider requirements, makes environment bootstrapping idempotent, and fixes EKS bootstrap mode and installation issues."
highlights:
  - "New `pf_stack_local_path` Terragrunt variable for testing local Panfactum module changes"
  - "`pf-env-bootstrap` is now idempotent — safe to re-run if it fails midway"
changes:
  - type: addition
    summary: >-
      Adds a new [Terragrunt variable](/docs/edge/reference/configuration/terragrunt-variables), `pf_stack_local_path`,
      that can be used to deploy local copies of the Panfactum Stack modules for testing changes before submitting
      pull requests.
  - type: improvement
    summary: >-
      Loosened the requirements for the [repo variable](/docs/edge/reference/configuration/repo-variables) `repo_url`
      to support users on arbitrary git hosting providers (not just GitHub).
  - type: improvement
    summary: >-
      `pf-env-bootstrap` is now idempotent, allowing it to be re-run if it fails in the middle of initial execution.
  - type: fix
    summary: >-
      Fixes the AMI instance type mismatch when `bootstrap_mode_enabled` is enabled in the
      [`aws_eks`](/docs/main/reference/infrastructure-modules/direct/aws/aws_eks) module.
    references:
      - type: issue-report
        summary: "AMI instance type mismatch in EKS bootstrap mode"
        link: https://github.com/Panfactum/stack/issues/155
    impacts:
      - type: iac-module
        component: aws_eks
        summary: Fixed AMI instance type mismatch in bootstrap mode
  - type: fix
    summary: >-
      Fixes issues that prevented bootstrapping scripts from running with new `pf-tf-init` logic.
    references:
      - type: issue-report
        summary: "Bootstrapping scripts broken with new pf-tf-init logic"
        link: https://github.com/Panfactum/stack/issues/154
  - type: fix
    summary: >-
      Adjusts the defaults for
      [`kube_reflector`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_reflector) so that
      installation does not fail in the bootstrapping guide.
    references:
      - type: issue-report
        summary: "kube_reflector fails during bootstrapping"
        link: https://github.com/Panfactum/stack/issues/157
