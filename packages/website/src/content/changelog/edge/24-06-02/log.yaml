    type: improvement
    summary: >-
      Reduced controller node costs by ~40% by recommending `controller_node_count = 1` and
      `controller_node_instance_types = ["t3a.medium"]` after bootstrapping.
  - id: 49346523-4462-408e-bf3e-f0007900e550
    type: improvement
    summary: >-
      Added scheduling constraints to prevent critical workloads from scheduling all pods on the same instance type.
