    link: /docs/main/reference/infrastructure-modules/direct/aws/aws_organization
  impacts:
  - type: cli
    component: env add
    summary: Correctly imports an existing AWS organization instead of failing when one already exists
  - type: iac-module
    component: aws_organization
    summary: Adds `shouldImport` logic to detect and import an existing AWS Organization resource
- id: 3258d6e2-3425-443f-89ef-e61a185dbe41
  type: fix
  summary: >-
    Fixes install step nesting in `pf cluster add` by removing redundant parent tasks that
    caused incorrect progress display.
  description: >-
    Each setup phase (e.g., Autoscaling, Inbound Networking) was wrapped in an extra parent task
    that carried its own `skip` check and created an unnecessary nesting level in the Listr task
    runner. This caused subtasks to render at the wrong indentation depth and could lead to
    confusing progress output during cluster installation. The fix removes the redundant
    `completed` parameter from every setup function and flattens each phase's subtasks so they
    attach directly to the main task list.
  references:
  - type: internal-commit
    summary: 'fix: cluster install step nesting'
    link: 7c80f0a2d2fe0346cb7a1943baa97984d09ba851
  - type: internal-docs
    summary: Kubernetes cluster bootstrapping guide
    link: /docs/main/guides/bootstrapping/kubernetes-cluster
  impacts:
  - type: cli
    component: cluster add
    summary: Flattened task nesting in the install workflow to render steps at the correct depth
