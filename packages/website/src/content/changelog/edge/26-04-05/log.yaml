- id: 1208e7bc-37f7-4e37-8bb1-3d22f8e70dec
  type: fix
  summary: >-
    Fixes `pf cluster add` EKS setup where the superuser IAM principal ARN was not configured during cluster
    deployment.
  description: >-
    During initial cluster bootstrapping via `pf cluster add`, the `aws_eks` module was deployed without setting the
    caller's IAM ARN as a superuser principal. This caused subsequent install steps to fail because the deploying
    identity lacked the required EKS cluster access. The fix captures the caller's ARN from `sts:GetCallerIdentity`
    during the "Verify access" step and passes it to the `extra_superuser_principal_arns` input of the `aws_eks`
    module, ensuring the deployer has full cluster access for the remainder of the installation.
  references:
  - type: internal-commit
    summary: 'fix: initial cluster permissions'
