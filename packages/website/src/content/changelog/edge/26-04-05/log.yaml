    link: https://github.com/gruntwork-io/terragrunt/pull/4233
  - type: external-docs
    summary: 'Terragrunt PR #3964: Strict control for old deprecated env vars'
    link: https://github.com/gruntwork-io/terragrunt/pull/3964
  - type: internal-docs
    summary: '`wf_tf_deploy` module documentation'
    link: /docs/main/modules/wf_tf_deploy/overview
  impacts:
  - type: devshell
    component: enter-shell-local
    summary: >-
      `TERRAGRUNT_DOWNLOAD`, `TERRAGRUNT_FETCH_DEPENDENCY_OUTPUT_FROM_STATE`, and
      `TERRAGRUNT_FORWARD_TF_STDOUT` renamed to `TG_DOWNLOAD_DIR`,
      `TG_DEPENDENCY_FETCH_OUTPUT_FROM_STATE`, and `TG_TF_FORWARD_STDOUT` respectively
  - type: devshell
    component: pf-tf-init
    summary: >-
      `terragrunt run-all init` replaced with `terragrunt init --all --queue-exclude-external`;
      providers lock migrated to `terragrunt run --all -- providers lock`
  - type: iac-module
    component: wf_tf_deploy
    summary: >-
      `deploy.sh` now uses `terragrunt apply --all --queue-exclude-external` instead of the
      deprecated `terragrunt run-all apply --terragrunt-ignore-external-dependencies`
  description: |
    Terragrunt deprecated both the `TERRAGRUNT_*` environment variable prefix (replaced by `TG_*`) and the `run-all` subcommand (replaced by `--all` flags on native commands). This change updates all affected components to stay compatible with current and future Terragrunt releases:

    1. The DevShell entry-point and `loadEnv.sh` now export `TG_DOWNLOAD_DIR`, `TG_DEPENDENCY_FETCH_OUTPUT_FROM_STATE`, and `TG_TF_FORWARD_STDOUT` instead of their `TERRAGRUNT_*` predecessors.
    2. `pf-tf-init` calls `terragrunt init --all --queue-exclude-external` and `terragrunt run --all -- providers lock` instead of the legacy `run-all` variants.
    3. `wf_tf_deploy` `deploy.sh` calls `terragrunt apply --all --queue-exclude-external` instead of `terragrunt run-all apply --terragrunt-ignore-external-dependencies`.
  action_items:
  - Re-apply `wf_tf_deploy` to pick up the updated `deploy.sh` script.
  - Re-run `pf-tf-init` to regenerate provider lock files using the new Terragrunt syntax.
