    summary: Vault `token revoke` CLI reference
    link: https://developer.hashicorp.com/vault/docs/commands/token/revoke
  - type: internal-docs
    summary: Bootstrapping federated auth guide covering Vault SSO setup
    link: /docs/main/guides/bootstrapping/federated-auth
  impacts:
  - type: cli
    component: sso add
    summary: >-
      Vault root token revocation now wraps the command in `sh -c` so the `VAULT_TOKEN` environment variable
      is properly expanded inside the container.
  description: |
    Two iterative fixes to the Vault root-token revocation step during SSO setup:

    1. The token was changed from a positional argument (`vault token revoke <token>`) to the correct self-revocation approach using the `VAULT_TOKEN` environment variable and the `-self` flag.
    2. Because `kubectl exec` does not invoke a shell and therefore cannot evaluate environment variable assignments, the command was wrapped in `sh -c "VAULT_TOKEN=... vault token revoke -self"` so the shell properly expands the variable before invoking `vault`.

    Together these ensure the Vault root token is reliably revoked after SSO setup completes.
