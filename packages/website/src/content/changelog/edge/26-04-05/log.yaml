- id: 809a061f-5602-45f2-8ccc-a143b0d2ca60
  type: fix
  summary: >-
    Fixes multiple `pf cluster add` bugs — Vault secret paths, pod readiness scoping, EKS API server URL, and EC2
    termination.
  references:
  - type: internal-commit
    summary: 'fix(cli): cluster install fixes and improvements'
    link: 5de4d4dd0d508552d06d46cf763af56302d80721
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Corrects Vault `secrets.yaml` path for ingress and Linkerd steps, scopes Vault pod readiness check to
      the `vault` namespace with 60 retries, writes `kube_api_server` from module output, fixes EC2 instance
      termination to split on all whitespace, and kills background processes on step failure
  description: |
    Five fixes discovered during end-to-end cluster installation testing:

    1. The inbound networking and Linkerd setup steps were reading Vault `secrets.yaml` from their own module directories instead of the `kube_vault` module directory, causing resumability failures when the secret file did not exist at the expected path.
    2. The Vault pod readiness check was querying pods across all namespaces instead of scoping to the `vault` namespace, and the retry limit has been increased from 20 to 60 to allow more time for pods to become ready.
    3. The EKS setup step was writing `kube_api_server` as an empty string instead of reading the cluster URL from `terragrunt output`, breaking downstream steps that depend on the API server address.
    4. The cluster reset step split EC2 instance IDs only on newlines and checked the wrong variable length, silently skipping instance termination. The split now uses a whitespace regex and checks the raw string length.
    5. `pf cluster add` now calls `killAllBackgroundProcesses` when any setup step throws an error, ensuring long-lived processes like the Vault proxy are cleaned up on failure.
- id: c25f4353-e3c7-488e-8d62-b3b15e1f42f5
  type: improvement
  summary: >-
    `pf cluster add` now streams live `linkerd check` output in a rolling five-line window during
    the Linkerd control plane check.
  description: >-
    Previously, subprocess output was only surfaced to the Listr task renderer once after the subprocess
    finished. This made long-running checks like `linkerd check` appear to stall with no feedback. The
    `execute` utility now accepts an optional `task` parameter and updates `task.output` on each line
    received from stdout/stderr, giving every caller the ability to stream live output. The Linkerd check
    step uses `rendererOptions.outputBar: 5` to display the last five lines in a scrolling window.
  references:
  - type: internal-commit
    summary: 'fix(cluster install): stream linkerd check output line by line'
    link: 989fcf567fb8e3868435b678dd76609ee40b4fff
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      The Linkerd control plane check step now streams live `linkerd check` output to the terminal
      in a rolling five-line window instead of showing no output until the check completes
- id: 3ec606b8-32d6-4c70-b92d-8f0d75940c64
  type: fix
  summary: >-
    Fixes `pf cluster add` Vault domain lookup, hardcoded Terragrunt template values, and
    snapshotter/Velero deploy ordering.
  references:
  - type: internal-commit
    summary: 'fix(cli): inbound networking and support services fixes'
    link: 5440599fd7a771ef230de32ee6557731d7a14338
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Vault domain now read from `extra_inputs.vault_domain`; hardcoded `subnets`, `ingress_domains`,
      and `sla_level` removed from LB controller and nginx templates; `kube_external_snapshotter` and
      `kube_velero` deployed before `kube_descheduler`
  description: |
    Three `pf cluster add` fixes:

    1. The inbound networking step was reading the Vault domain from `vault_addr` at the YAML top level, but it is stored under `extra_inputs.vault_domain`, causing DNS propagation checks to use an undefined value.
    2. The `kube_aws_lb_controller` Terragrunt template hardcoded `subnets = ["PUBLIC_A", "PUBLIC_B"]` and the `kube_ingress_nginx` template hardcoded `ingress_domains` and `sla_level`, causing failures on real clusters. These values are now omitted or set programmatically.
    3. `kube_external_snapshotter` and `kube_velero` were deployed after `kube_descheduler`. They are now deployed together as a concurrent sub-group earlier in the maintenance controllers sequence.
- id: b48bbcc7-5f30-4aa8-9d46-7d4ce8bb9a5d
  type: fix
  summary: >-
    Fixes `pf env add` account alias bugs — wrong source field, inverted task condition, and static
    credentials not written correctly.
  references:
  - type: internal-commit
    summary: 'fix(env): use accountName instead of accountId for alias input update'
    link: 79b510609863bade8668dad6357fda3280eab11d
  - type: internal-commit
    summary: 'fix(env): correct enabled condition and expand error output for bootstrapEnvironment'
    link: 322d777893c39e78d00eb8b40e3b872a50e21d7b
  - type: internal-commit
    summary: 'fix: aws static creds update cli fx'
    link: c70f947891cc2dc96c6f8c330b8c70fb985f0c7c
  description: |
    Three related `pf env add` fixes:

    1. The `alias` input in the `aws_account` module deployment was reading from `ctx.accountId` instead of `ctx.accountName`, causing the AWS account alias to be set to the numeric account ID rather than the human-readable account name.
    2. The "Set AWS account alias" task's `enabled` condition was inverted — it ran when the account name was already known and was skipped when it was actually needed. Additionally, `collapseErrors: false` was added to the Listr renderer options so that full error details are visible on task failure.
    3. `addAWSProfileFromStaticCreds` checked whether the config file existed but assumed the credentials file also existed inside the same branch. The config and credentials files are now checked independently, and the function correctly merges new profile entries into existing files or creates new ones on first run.
  impacts:
  - type: cli
    component: env add
    summary: >-
      Account alias now correctly uses the account name; the alias setup task runs when needed;
      static credential profiles are written and updated reliably
- id: 9fcd8bee-ad2f-49d4-a1e6-1ce7e7cff2a3
  type: fix
  summary: >-
    Fixes `pf domain add` where the domain registration request was silently skipped because
    the submission task had `skip: true` hardcoded.
  references:
  - type: internal-commit
    summary: 'Remove `skip: true` from domain registration submission task'
    link: 9d9d9b14061f6be41d14551a7d3278d45bd52f17
  impacts:
  - type: cli
    component: domain add
    summary: Domain registration request is now actually submitted to AWS
  description: >-
    The "Submitting registration request to AWS" task in `registerDomain` had `skip: true`
    hardcoded, causing the wizard to complete successfully without ever calling the Route 53
    `RegisterDomain` API. Users who ran `pf domain add` would see the wizard finish with no
    errors, but the domain was never registered. Removing the `skip` flag restores the intended
    behavior so the registration request is sent to AWS.
- id: ac7d0142-b7a5-4dd0-9d79-640782b1319c
  type: fix
