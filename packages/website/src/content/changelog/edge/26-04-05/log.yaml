- id: cd9082c0-3a6c-48db-8311-40c7b7ff41c8
  type: fix
  summary: >-
    Fixes `pf` CLI `applyColors` incorrectly dedenting text after applying ANSI color codes,
    causing misaligned styled output.
  references:
  - type: internal-commit
    summary: 'fix: dedent order in applyColors'
    link: b695023a1701ff34709eeee49c64d2c9aaf79050
  impacts:
  - type: cli
    component: logging
    summary: >-
      Fixes operation order in `applyColors` so `dedent` runs on the raw string before color
      styling is applied, preventing ANSI escape sequences from interfering with indentation
      analysis.
  description: >-
    The `applyColors` method in the `pf` CLI logger accepted a `dedent: true` option, but
    previously applied dedentation after ANSI color codes had already been injected into the
    string. Because ANSI escape sequences contain non-whitespace characters, the dedent algorithm
    could not correctly identify common leading whitespace, resulting in misaligned or
    un-dedented output. The fix reorders the operations so that `dedent` runs on the raw
    string before any color styling is applied.
