- id: 74cb8a25-0018-4325-8390-0fcf62e31f0a
  type: breaking_change
  summary: >-
    The default Kubernetes version in `aws_eks` has been upgraded from 1.30 to 1.33 with updated addon charts.
  description: |
    The default Kubernetes version has been upgraded to 1.33 (from 1.30, incrementing through 1.31 and 1.32 in this release). Bottlerocket AMI, all addon Helm chart versions, and the `kubectl` Terraform provider have been updated to compatible releases. Three compatibility fixes are bundled:

    1. `aws-ebs-csi-driver` v2.46.0 cannot be installed on K8s 1.33; the chart is pinned to v2.45.1.
    2. Descheduler v0.35.x changed the `DefaultEvictor` API -- flat boolean flags were consolidated into a `podProtections.defaultDisabled` array.
    3. Ingress-nginx v4.12.x lowered the default `annotations-risk-level` from `Critical` to `High`, blocking `configuration-snippet` annotations; the setting is now explicitly pinned to `Critical`.

    No user action is required for the compatibility fixes.
  action_items:
  - >-
    Review the Kubernetes 1.33 release announcement for any deprecated APIs or behavior changes that affect your
    workloads.
  - >-
    If you pin `kube_version` explicitly in `aws_eks`, update it to `1.33`. Otherwise, re-apply `aws_eks` to trigger
    the upgrade.
  - >-
    Re-apply `kube_aws_ebs_csi`, `kube_descheduler`, and `kube_ingress_nginx` to pick up the bundled compatibility
    fixes.
  references:
  - type: internal-commit
    summary: 'feat(infrastructure): upgrade EKS default version to 1.33 with addon updates'
    link: b5455f09eb40dd2fac7a7fafc40fc6bbfbac5121
