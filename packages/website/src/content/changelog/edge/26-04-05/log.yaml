  description: |
    Several `pf env add` UX improvements:

    1. Contact information prompts pre-fill with existing AWS account data; the new account email prompt auto-suggests a plus-suffixed address.
    2. The account alias prompt includes an explainer that the name must be globally unique.
    3. The management bootstrap now deploys `aws_organization` directly.
    4. A finish message is displayed on successful completion with recommended next steps (`pf domain add` and `pf cluster add`).
    5. Setup instructions now include direct links, interactive confirmation prompts for account/IAM user creation, and guidance for generating access keys.
    6. `OrganizationsClient` and `STSClient` now explicitly use `us-east-1` as required for AWS Organizations/STS global endpoints.
- id: 746c467d-2217-4724-80ea-fb6c26086261
  type: fix
  summary: >-
    Fixes `pf env add` credential validation loop, misplaced `AdministratorAccess` error, and
    silent exit on unknown errors.
  references:
  - type: internal-commit
    summary: 'fix: AdministratorAccess credential validation loop'
    link: 1c7d2dd454ef5fa216abe3fabb12aa1bcdf76bfb
  - type: internal-commit
    summary: 'fix: env add default IAM username'
    link: 0886f756c32dabcfb9ee647b991a3cb4e247d225
  impacts:
  - type: cli
    component: env add
    summary: >-
      Credential validation loop restructured into nested loops; `AdministratorAccess` error shown
      in the correct branch; unknown errors re-prompt instead of exiting; root account credentials
      rejected with a clear error; suggested IAM username now defaults to `<environment>-superuser`
  description: |
    Several fixes to `pf env add` credential validation:

    1. The retry prompt looped without allowing the user to enter different credentials when the IAM user lacked `AdministratorAccess`. The validation was restructured into nested loops supporting both retrying with the same credentials and entering new ones.
    2. Root-user detection was added so that AWS account root credentials are rejected with a clear error directing the user to create a non-root IAM user.
    3. The `AdministratorAccess` error message was emitted after the `catch` block instead of inside the `if (!hasAdminAccess)` branch, causing it to display at the wrong time. It is now shown immediately when the policy check fails.
    4. A `break` on unknown errors caused the outer credentials loop to exit without re-prompting. Unknown errors now display a diagnostic message and loop back to the retry prompt.
    5. The suggested IAM username during account setup now defaults to `<environment>-superuser` (e.g., `production-superuser`) instead of the hardcoded `pf-bootstrap-user`.
- id: 9c2f8cad-d3d3-45da-9648-59e23efc0bb1
  type: fix
  summary: >-
    Fixes `pf domain add` to correctly skip environment subzone setup when no eligible environments exist.
  references:
  - type: internal-commit
    summary: 'fix: properly skip subzone setup if applicable'
    link: 6f47d8e6ee2cd4f2d409ccaf189293f919cdb027
  impacts:
  - type: cli
    component: domain add
    summary: Subzone setup now correctly exits early when no eligible environments are present
  description: >-
    A missing `return` statement in `createEnvironmentSubzones` caused execution to fall through to the
    subzone configuration prompts even when no candidate environments were available. This could lead to
    incorrect DNS delegations or confusing prompts. The fix adds the missing early return so the function
    exits cleanly after logging the skip message.
- id: 5aabfcd4-fe8d-4741-b16e-8be114e96db4
  type: fix
  summary: >-
    Fixes `pf cluster add` `setSLA` step to persist the selected SLA target in the correct numeric format
    to `region.yaml`.
  description: >-
    The `setSLA` step was migrated from raw `@inquirer/prompts` calls to the unified `context.logger` prompt API,
    and the domain selection flow was refactored to separate ancestor domain selection from subdomain input. During
    this migration the `sla_target` value written to `region.yaml` could be formatted incorrectly, causing
    downstream modules that depend on a numeric `sla_target` (1, 2, or 3) to receive unexpected input. This fix
    ensures the confirmed SLA level is persisted as a proper numeric value.
  references:
  - type: internal-commit
    summary: 'fix: set sla formatting for cluster install'
    link: d8976a0552a5a9f6e4d81b58269c96b219dcb392
  - type: internal-docs
    summary: '`sla_target` Terragrunt variable reference'
    link: /docs/main/reference/configuration/terragrunt-variables
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      The `setSLA` step now persists the selected SLA target as a numeric value in `region.yaml`, preventing
      formatting mismatches consumed by downstream IaC modules.
- id: e61e18ad-b43f-4555-8229-63d3af536ee2
  type: fix
  summary: >-
    Fixes `pf env add` to import an existing AWS organization instead of failing to create a duplicate.
  description: >-
    When running `pf env add` against an AWS account that already had an AWS Organization, the
    `aws_organization` module deployment would attempt to create a new organization and fail because
    one already existed. The fix adds a `shouldImport` check that calls `DescribeOrganization` via the
    AWS SDK. If an organization is found, its ID is used to import the existing resource into Terraform
    state instead of creating a duplicate, allowing management environment setup to complete
    successfully.
  references:
  - type: internal-commit
    summary: 'fix: import existing org in env add command'
    link: 0a0e3ca4e78569312fc7bb4763c120a92674bb5d
  - type: internal-docs
