- id: a48ee49b-823c-494f-980d-de0bf75bba7d
  type: breaking_change
  summary: >-
    The `kube_node_image_cache` and `kube_node_image_cache_controller` modules have been removed along with all related
    image caching input variables across workload modules.
  description: >-
    The node image cache system used Kyverno generate policies to pre-pull container images onto nodes, aiming to reduce
    pod startup latency. In practice, the generated policy resources caused Kyverno's background controller to consume
    excessive memory and CPU in production clusters, producing real stability issues that outweighed the latency benefit.
    Rather than investing in workarounds for an upstream Kyverno scalability limitation, the feature has been removed
    entirely. All image caching modules, variables, and container spec fields have been deleted.
  action_items:
  - Destroy any active `kube_node_image_cache` module deployments before upgrading.
  - Destroy any active `kube_node_image_cache_controller` module deployments before upgrading.
  - Remove the module directories for `kube_node_image_cache` and `kube_node_image_cache_controller` from your Terragrunt
    configuration.
  - Remove `node_image_cached_enabled` from any module configurations that set it (affected modules include `kube_airbyte`,
    `kube_alloy`, `kube_argo_event_bus`, `kube_authentik`, `kube_aws_ebs_csi`, `kube_cloudnative_pg`, `kube_gha_runners`,
    `kube_ingress_nginx`, `kube_linkerd`, `kube_monitoring`, `kube_nats`, `kube_opensearch`, `kube_pg_cluster`, `kube_redis_sentinel`,
    `kube_vault`).
  - Remove `node_image_cache_enabled` from any module configurations that set it.
  - Remove `image_prepull_enabled` and `image_pin_enabled` from all container spec blocks in `kube_pod`, `kube_deployment`,
    `kube_daemon_set`, `kube_stateful_set`, `kube_cron_job`, and `kube_job` module configurations.
  - Remove `panfactum_node_image_cache_enabled` from any `kube_policies` module configuration.
  references:
  - type: internal-commit
    summary: 'feat(infrastructure): remove node image cache system'
    link: 525cdf8407c293a329a91221c91cc4eb73e2007b
  - type: issue-report
    summary: Kyverno high memory usage when using generate policies
    link: https://github.com/kyverno/kyverno/issues/7278
