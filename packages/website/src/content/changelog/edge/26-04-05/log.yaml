    summary: Helm Provider v3.0.0 release notes
    link: https://github.com/hashicorp/terraform-provider-helm/releases/tag/v3.0.0
  impacts:
  - type: iac-provider
    component: aws
    summary: Upgraded from 5.80.0 to 6.38.0 (major); boolean-string literals in `aws_eks` launch template corrected for 6.x strict type requirements
  - type: iac-provider
    component: aws_global
    summary: Upgraded from 5.80.0 to 6.38.0 (major)
  - type: iac-provider
    component: aws_secondary
    summary: Upgraded from 5.80.0 to 6.38.0 (major)
  - type: iac-provider
    component: helm
    summary: Upgraded from 2.12.1 to 3.1.1 (major); `set_string` removed, automatic state migration from SDKv2 to Plugin Framework
  - type: iac-provider
    component: vault
    summary: Upgraded from 4.5.0 to 4.8.0; held at 4.x because 5.x drops support for Vault 1.14.x
  - type: iac-provider
    component: kubernetes
    summary: Upgraded from 2.34.0 to 2.35.0; held at 2.x because 3.x renames every resource type with a `_v1` suffix
  - type: iac-provider
    component: tls
    summary: Upgraded from 4.0.6 to 4.2.1
  - type: iac-provider
    component: random
    summary: Upgraded from 3.6.3 to 3.8.1
  - type: iac-provider
    component: time
    summary: Upgraded from 0.10.0 to 0.13.1
  description: |
    Provider versions across all Panfactum infrastructure modules were stale, accumulating security and compatibility debt. This upgrade brings every module to current provider releases in a single coordinated change across approximately 105 modules.

    Key upgrades:
    - **AWS** (`hashicorp/aws`): 5.80.0 to 6.38.0 (major). The 6.x release drops deprecated resources and attributes and enforces stricter typing. Boolean-string literals in the `aws_eks` launch template (`delete_on_termination`, `encrypted`) were corrected from quoted strings to native booleans to satisfy the new requirements. The `data.aws_region` output attribute was also renamed from `.name` to `.region`, and the Helm provider template syntax changed from block to assignment (`kubernetes = {`).
    - **Helm** (`hashicorp/helm`): 2.12.1 to 3.1.1 (major). The `set_string` attribute is removed in 3.x, and the provider includes an automatic state migration from SDKv2 to the Terraform Plugin Framework.
    - **Vault** (`hashicorp/vault`): 4.5.0 to 4.8.0. Held at 4.x because 5.x drops support for Vault 1.14.x, which is the last open-source release currently deployed.
    - **Kubernetes** (`hashicorp/kubernetes`): 2.34.0 to 2.35.0. Held at 2.x because 3.x renames every resource type with a `_v1` suffix and has no declarative state migration path.
    - **Minor/patch**: `tls` 4.0.6 to 4.2.1, `random` 3.6.3 to 3.8.1, `time` 0.10.0 to 0.13.1, `archive` 2.6.0 to 2.7.1.

    No user action is required. Provider pins are managed internally by Panfactum and are picked up automatically on the next `terragrunt init`.
- id: a6765460-0030-4d71-8213-68380f9f42ec
  type: addition
  summary: >-
    Adds optional `seccomp_profile_type` field to container specs in all `kube_*` workload modules, enabling
    per-container seccomp profile overrides.
  description: |
    Some workloads require a non-default seccomp profile to function correctly, but previously there was no way
    to override the cluster-level seccomp policy on a per-container basis. For example, BuildKit uses `rootlesskit`
    with `SYS_ADMIN` capabilities whose syscall surface exceeds what `RuntimeDefault` allows, causing silent
    failures or permission-denied errors at runtime.

    The new `seccomp_profile_type` field defaults to `null` (no explicit profile override), allowing callers to
    specify any valid Kubernetes seccomp profile type string such as `RuntimeDefault`, `Unconfined`, or
    `Localhost`. `kube_buildkit` uses this to set `Unconfined`, matching the existing AppArmor `unconfined`
    annotation already applied to its pod. No changes are required for existing modules that do not need a
    custom seccomp profile.
  references:
  - type: internal-commit
    summary: 'feat(infrastructure): add seccomp_profile_type to container specs'
    link: c6e79ec355572f2d89ada7ceaac8b1aab481cc23
  - type: external-docs
    summary: Kubernetes seccomp profiles documentation
    link: https://kubernetes.io/docs/tutorials/security/seccomp/
  - type: internal-docs
    summary: '`kube_pod` module documentation'
    link: /docs/main/modules/kube_pod
  - type: internal-docs
    summary: '`kube_buildkit` module documentation'
    link: /docs/main/modules/kube_buildkit
  impacts:
  - type: iac-module
    component: kube_pod
    summary: >-
      New optional `seccomp_profile_type` field (default `null`) on each container object; when set, applies a
      container-level `seccompProfile` override in the pod security context
  - type: iac-module
    component: kube_deployment
    summary: Exposes new optional `seccomp_profile_type` field on each container object, propagated to the underlying `kube_pod`
  - type: iac-module
    component: kube_daemon_set
    summary: Exposes new optional `seccomp_profile_type` field on each container object, propagated to the underlying `kube_pod`
  - type: iac-module
    component: kube_stateful_set
    summary: Exposes new optional `seccomp_profile_type` field on each container object, propagated to the underlying `kube_pod`
  - type: iac-module
    component: kube_cron_job
    summary: Exposes new optional `seccomp_profile_type` field on each container object, propagated to the underlying `kube_pod`
  - type: iac-module
    component: kube_job
    summary: Exposes new optional `seccomp_profile_type` field on each container object, propagated to the underlying `kube_pod`
  - type: iac-module
    component: kube_buildkit
    summary: Sets `seccomp_profile_type` to `Unconfined` to satisfy BuildKit's elevated syscall requirements
- id: 7006e65f-f90a-4988-82fb-e98ca68b1671
  type: fix
  summary: >-
    Panfactum Docker image now includes the CLI tools and `/usr/bin/env`, fixing broken script execution inside the
    container.
  description: |
    The `flake.nix` Docker image definition called `panfactumPackages` without the required `true` argument, which
    meant the Panfactum CLI tools were omitted from the built image. Additionally, `usrBinEnv` was not included in the
    image contents, so scripts using `#!/usr/bin/env` shebangs could not locate their interpreters.

    This fix passes `panfactumPackages true` to include the full CLI toolset and adds `usrBinEnv` to provide the
    `/usr/bin/env` symlink, restoring correct binary resolution inside the container.
  references:
  - type: internal-commit
    summary: 'build(flake): update Docker image root env path linking'
    link: 606d656bd5c1742eee0cb9ba9c4b940240328ddd
  impacts:
  - type: configuration
    component: flake.nix
    summary: >-
      `panfactumPackages` call corrected to `panfactumPackages true` and `usrBinEnv` added to image contents so
      `/usr/bin/env` is available inside the container
- id: e8a8d9e7-b78c-4e7a-b26c-ffefbb40bb3e
  type: update
  summary: >-
    The bastion host image is upgraded from `debian:bookworm` to `debian:trixie` for a newer OpenSSH
    version with up-to-date security patches.
  description: |
    Debian Trixie (Debian 13) ships a significantly newer OpenSSH release compared to Bookworm. Upgrading
    the bastion base image ensures the SSH daemon includes the latest security fixes and cryptographic
    improvements without requiring users to rebuild or customize the image themselves.

    The `Protocol 2` directive has also been removed from `sshd_config` because modern OpenSSH versions
    no longer support SSH Protocol 1, making the directive unnecessary.
  references:
  - type: internal-commit
    summary: 'feat(bastion): upgrade to debian trixie and harden sshd config'
    link: 1f80a81aa5c1be1437e4ec6bb00761500a0f4c8e
