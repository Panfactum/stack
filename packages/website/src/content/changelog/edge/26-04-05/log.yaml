    component: aws_ecr_repos
    summary: >-
      New optional `lifecycle_policy_json` field on each repository object; overrides built-in expiration rules when
      set
  description: >-
    The built-in expiration rules in `aws_ecr_repos` (`expire_all_images` and `expiration_rules`) cover common cases
    but are too rigid for teams that need fine-grained control — for example, keeping a minimum number of tagged
    images regardless of age, or applying complex multi-rule policies. The new `lifecycle_policy_json` field accepts a
    raw JSON string (matching the AWS ECR lifecycle policy format) and, when set, replaces the module-generated policy
    entirely. Existing repositories that do not set this field continue to behave exactly as before.
