  description: >-
    After `pf-check-ssh` was removed from the devshell, both `pf-tunnel` and `pf-db-tunnel` would fail
    immediately on launch because they still tried to call or source the now-nonexistent script. Additionally,
    `pf-tunnel` relied on `CONNECTION_INFO_FILE`, `CONFIG_FILE`, and `KNOWN_HOSTS_FILE` variables that
    `pf-check-ssh` previously defined, so even removing the calls alone was not sufficient. This fix removes
    the obsolete `pf-check-ssh` invocations and defines the three missing variables inline, restoring both
    commands to working order.
  references:
  - type: internal-commit
    summary: 'fix: remove obsolete `pf-check-ssh` call from `pf-db-tunnel`'
