- id: 9bb6797e-2a5f-4cbc-9bcf-82320833fa67
  type: addition
  summary: >-
    `kube_opensearch` now supports single-node deployments via `replica_count=1`.
  references:
  - type: internal-commit
    summary: 'feat: adds the ability to run opensearch in single-node mode'
    link: 14cb9e692705dfa5b13f113d9699abb6df58b97c
  - type: external-docs
    summary: OpenSearch discovery and cluster formation settings
    link: https://docs.opensearch.org/latest/tuning-your-cluster/discovery-cluster-formation/settings/
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: >-
      `replica_count` minimum of 3 removed; setting `replica_count=1` now configures
      `discovery.type=single-node` and omits multi-node seed hosts configuration
  description: |
    Previously, `kube_opensearch` required at least three replicas and would fail validation for smaller deployments. This change allows single-node deployments by:

    1. Removing the `replica_count >= 3` validation constraint
    2. Automatically setting `discovery.type` to `single-node` when `replica_count` is 1
    3. Omitting the `discovery.seed_hosts` and `cluster.initial_cluster_manager_nodes` settings that are only relevant for multi-node clusters

    This is useful for development environments and smaller workloads where high availability is not required.
- id: 7f0e874c-d9de-4b0a-81b0-a3119383d7a5
  type: fix
  summary: >-
    `kube_aws_creds` no longer conditionally omits the `aws_iam_user_policy` resource when
    `iam_policy_json` is null, preventing potential Terraform plan errors.
  description: |
    Previously, the `aws_iam_user_policy` resource in `kube_aws_creds` used a `count` conditional
    to skip creation when `iam_policy_json` was null. This could cause issues in certain
    configurations where downstream resources referenced the policy. The fix replaces the
    conditional `count` with `coalesce(var.iam_policy_json, "{}")`, ensuring the resource is
    always created with a valid (possibly empty) policy document. Existing deployments will see
    Terraform create the `aws_iam_user_policy` resource on the next apply if it was previously
    omitted.
  references:
  - type: internal-commit
    summary: Fix `kube_aws_creds` to always create IAM user policy with coalesce fallback
    link: 14cb9e692705dfa5b13f113d9699abb6df58b97c
  - type: internal-docs
    summary: '`kube_aws_creds` module documentation'
    link: /docs/main/modules/kube_aws_creds/overview
  impacts:
  - type: iac-module
    component: kube_aws_creds
    summary: >-
      `aws_iam_user_policy` is now always created using `coalesce(var.iam_policy_json, "{}")`
      instead of being conditionally omitted when `iam_policy_json` is null
- id: 3513552e-192b-4c06-8584-6ce87c9a8df2
  type: addition
  summary: >-
    `kube_pg_cluster` adds `pg_recovery_target_immediate` input for `targetImmediate` CNPG recovery mode.
  description: |
    The new `pg_recovery_target_immediate` input (default `null`) configures the CNPG cluster bootstrap recovery to use `targetImmediate: true`, stopping recovery at the earliest consistent point after the base backup completed. When set, the input value is used as the `backupID` in the CNPG `recoveryTarget` block.

    This provides a faster and simpler alternative to point-in-time recovery via `pg_recovery_target_time` when you only need to restore to the exact state at the end of a specific backup rather than replaying WAL to a precise timestamp. The two options are mutually exclusive.

    The input accepts a backup ID in `YYYYMMDDTHHmmss` format and requires `pg_recovery_mode_enabled` and `pg_recovery_directory` to be set. Existing deployments are unaffected since the input defaults to `null`.
  references:
  - type: internal-commit
    summary: 'feat(kube_pg_cluster): support targetImmediate recovery (#375)'
    link: aaa63ac02ce6adee3e990bc8c45c49a1ca2089c0
  - type: external-commit
    summary: 'PR #375: feat(kube_pg_cluster): support targetImmediate recovery'
    link: https://github.com/Panfactum/stack/pull/375
  - type: external-docs
    summary: CloudNativePG recovery documentation — recovery targets including `targetImmediate`
    link: https://cloudnative-pg.io/docs/1.29/recovery/
  - type: internal-docs
    summary: '`kube_pg_cluster` module reference documentation'
    link: /docs/main/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster
  impacts:
