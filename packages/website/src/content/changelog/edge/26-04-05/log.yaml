- id: bd4ca5e9-2d13-4a87-a6d7-dfe48ba14a24
  type: improvement
  summary: >-
    `pf cluster add` EKS deployment step now displays a 15-minute ETA warning in the task title
    during the apply phase.
  references:
  - type: internal-commit
