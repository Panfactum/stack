    link: 2bc2ae52e6ab29ef1def3f01474e11242058e09f
  - type: internal-docs
    summary: DNS bootstrapping guide
    link: /docs/main/guides/bootstrapping/dns
  - type: internal-docs
    summary: Subdomain delegation networking concept
    link: /docs/main/concepts/networking/subdomain-delegation
  impacts:
  - type: cli
    component: domain add
    summary: >-
      Manual DNS zone setup step now shows registrar-specific nameserver instructions for apex domains
      and DNS-host NS record instructions for subdomains
  description: |
    Previously, `pf domain add` showed the same registrar-targeted nameserver instructions for all domains regardless of whether they were apex or subdomain zones. This was misleading for subdomain users who needed to add NS records at their existing DNS host rather than change nameservers at their registrar.

    The fix passes an `isApex` flag through to the `manualZoneSetup` function so that the interactive prompt now branches:

    - **Apex domains**: directs users to update nameservers at their domain registrar, with an example link to Namecheap's nameserver configuration guide
    - **Non-apex subdomains**: directs users to add NS records at their DNS host, with an example link to Namecheap's host record setup guide
- id: e2ecc5ef-e611-46d7-a9c5-561afc0acbbd
  type: addition
  summary: >-
    Adds the `pf sso add` CLI command for guided Authentik and AWS federated SSO installation.
  description: |
    Setting up Authentik and AWS IAM Identity Center SSO previously required manually deploying
    and configuring multiple infrastructure modules in the correct order. The new `pf sso add`
    command automates this entire workflow with a guided wizard that handles:

    1. Deploying `aws_ses_domain` for email delivery
    2. Deploying `kube_authentik` with organization branding and email templates
    3. Deploying `authentik_core_resources` with user groups, admin accounts, and recovery flows
    4. Verifying the Authentik ingress is reachable
    5. Configuring AWS IAM Identity Center federation with `authentik_aws_sso`
    6. Setting up `aws_iam_identity_center_permissions` with role-based access per environment

    This reduces the SSO bootstrapping process from a multi-step manual procedure to a single
    interactive command with built-in resumability.
  references:
  - type: internal-commit
    summary: Authentik SSO in CLI installer (#359)
    link: a3febb0f7ea71f7eb58968aac0223e6360264465
  - type: external-docs
    summary: Authentik identity provider documentation
    link: https://docs.goauthentik.io/
  impacts:
  - type: cli
    component: sso add
    summary: New command that automates Authentik deployment and AWS federated SSO configuration
  - type: iac-module
    component: kube_authentik
    summary: Adds `organization_name` input and moves email template management into the module
  - type: iac-module
    component: authentik_core_resources
    summary: Removes email template resources (moved to `kube_authentik`) and adjusts branding
- id: 1e6bdd79-0818-4c38-a586-c716a8643e31
  type: addition
  summary: >-
    Adds `pf iac update-module-status` to track module `init_status` and `deploy_status` in `.pf.yaml`, enabling
    step resumability in `pf cluster add`.
  description: |
    Replaces the inline bash `echo` approach in `panfactum.hcl` hooks with a dedicated CLI command that records both in-progress and final status for `init` and `apply` phases. The `panfactum.hcl` Terragrunt hooks now invoke `pf iac update-module-status` at the start, completion, and failure of each phase, writing structured YAML status to `.pf.yaml`. This enables `pf cluster add` to accurately detect which modules have already been deployed and skip them on resume.

    Three iterative fixes were applied after the initial implementation:

    1. `panfactum.hcl` hooks were calling `pf update-module-status` instead of `pf iac update-module-status` -- all six hook invocations were corrected to use the proper subcommand path.
    2. The command wrote camelCase keys (`initStatus`, `deployStatus`) instead of the required snake_case (`init_status`, `deploy_status`).
    3. A broken object spread nested existing fields as a key instead of merging them. The status-merge logic was rewritten, and a `terragrunt.hcl` presence check was added to prevent accidental writes to non-module directories.
  references:
  - type: internal-commit
    summary: 'feat: enhances module status architecture'
    link: 00029f4e98aec9c1119bba2ff2a7fcb2d228620b
  - type: internal-commit
    summary: 'feat: misc cli improvements'
    link: e19f5da99390eed58ae797f556578af89d98532f
  - type: internal-commit
    summary: 'fix: module status update'
    link: eaa53405e53cf5eb0926a18daaa6561ea729030c
  - type: internal-commit
    summary: 'fix: module status update'
    link: 0ac254981c3829dc40dc6453e0bd355cd187747d
  impacts:
  - type: cli
    component: iac update-module-status
    summary: New command that writes `init_status` and `deploy_status` to a module's `.pf.yaml` file
  - type: configuration
    component: panfactum.hcl
    summary: Terragrunt hooks replaced inline `bash` status writes with `pf iac update-module-status` invocations for `init` and `apply` phases
  - type: cli
    component: cluster add
    summary: Module resume logic now reads `deploy_status` from `.pf.yaml` instead of the previous `status` field
- id: 3888baee-3716-43e0-8688-7cadb552f367
