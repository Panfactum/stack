- id: 132df601-d683-459d-803e-ea45e5498a39
  type: fix
  summary: >-
    Fixes `pf env add` failing on resume because the state bucket name was missing from the task context.
  references:
  - type: internal-commit
    summary: 'fix: bootstrap env resume'
    link: 6a17572cde08a016348a43d09b3e9c1ba014aabc
  impacts:
  - type: cli
    component: env add
    summary: State bucket and lock table names are now populated in context even when resuming an interrupted setup
  description: |
    The `Generate unique state bucket name` task previously used a `skip` condition to bypass execution entirely when `tf_state_bucket` was already set in the Panfactum config. While this avoided re-generating a new bucket name on resume, it also meant that `ctx.bucketName` and `ctx.locktableName` were never assigned, causing downstream tasks (such as deploying `tf_bootstrap_resources`) to receive `undefined` resource IDs and fail.

    The fix removes the `skip` condition and instead populates the context values from the existing config at the start of the task body, so the bucket name flows correctly to all subsequent steps whether this is a fresh run or a resumed one.
- id: 06b8e872-fa6c-4e9b-b571-416f37bc5e0f
  type: breaking_change
  summary: >-
    `aws_organization` now requires a new `alias` input to manage the IAM account alias for the
    management AWS account.
  action_items:
  - Add an `alias` input to your `aws_organization` module configuration with a human-readable string for the management
    account (e.g., `my-org-management`).
  - Run `terragrunt apply` on your `aws_organization` deployment after adding the new input.
  references:
  - type: internal-commit
    summary: 'fix: set account alias in aws_organization module'
    link: fd8d7b26d3cffcebc0b3d37491cb92a76dc7d016
  - type: internal-docs
    summary: '`aws_organization` module documentation'
    link: /docs/main/reference/infrastructure-modules/aws/aws_organization
  impacts:
  - type: iac-module
    component: aws_organization
    summary: New required `alias` string input — management account alias is now managed via `aws_iam_account_alias`
  - type: cli
    component: env add
    summary: Account alias collected during setup is now forwarded to the `aws_organization` module via `defineInputUpdate`
  description: |
    Previously, the IAM account alias was only set through `aws_account` for non-management environments. The management account had no equivalent mechanism, leaving it without a human-readable alias. This change brings the management account into alignment by:

    1. Adding a required `alias` variable to the `aws_organization` module that creates an `aws_iam_account_alias` resource.
    2. Updating `pf env add` to forward the alias collected during environment setup into the `aws_organization` deployment step for the management environment.
- id: 680b6e2a-958c-4379-b2b2-6a3b120178ca
  type: improvement
  summary: >-
    `pf env add` now supports resuming interrupted installations and fixes phone number formatting.
  references:
  - type: internal-commit
    summary: 'feat:cli: env add resumability'
    link: e463425f6558d3105371d21787b3a1884414109e
  - type: internal-docs
    summary: Bootstrapping guide for preparing AWS accounts
    link: /docs/main/guides/bootstrapping/preparing-aws
  impacts:
  - type: cli
    component: env add
    summary: >-
      Detects partially-deployed environments, skips completed provisioning steps, restores
      previously-selected regions, offers to copy region config from another environment,
      and creates AWS accounts directly via the SDK with email-retry support; also fixes
      phone number dash formatting
  description: |
    Two improvements to the `pf env add` command:

    1. **Resumability** -- `pf env add` can now resume an interrupted installation without repeating completed steps. The command detects whether an AWS account was already provisioned, restores previously-selected primary and secondary regions from config, and offers to copy region configuration from another existing environment. AWS account creation is now performed directly via the AWS SDK before the IaC module is applied, enabling retry with a different email on duplicate-email errors from AWS Organizations.
    2. **Phone number formatting** -- The phone number pre-fill fetched from the AWS Account API is now formatted with dashes (e.g., `555-555-5555`) instead of dots, matching the expected input format.
