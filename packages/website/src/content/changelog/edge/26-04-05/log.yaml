- id: 7e84edc5-4af2-41b9-969a-bd40fa4f91ef
  type: improvement
  summary: >-
    Improves cluster-deployed detection accuracy and filters undeployed environments from `pf cluster add` and `pf sso add` prompts.
  description: |
    Two related improvements to cluster deployment detection:

    1. The `getRegions` utility previously read `kube_domain` / `kube_api_server` from `region.yaml` to determine `clusterDeployed`. Both values can be set before the cluster is actually running, making the check unreliable. Detection now uses `isClusterDeployed`, which calls `getModuleStatus` to inspect the `.pf.yaml` deploy status of `kube_reloader` — a module that only reaches `success` state after the full cluster stack has been applied.
    2. `pf cluster add` and `pf sso add` selection prompts now pre-filter to only fully deployed environments, removing the confusing "(not deployed)" labels and preventing accidental selection of undeployed environments.
  references:
  - type: internal-commit
    summary: using kubeApiServer to mark clusterDeployed
    link: b4439e1bf5c8e329a58c8889fa8c29c58f4f25e7
  - type: internal-commit
    summary: 'refactor: improve cluster deployment detection to use actual deployment status'
    link: d34274c7b1d70d75c666734a4ca6cfb5cb9e7f0e
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Cluster-deployed detection now uses `kube_reloader` `.pf.yaml` status; selection prompts filter to deployed environments only
  - type: cli
    component: sso add
    summary: >-
      Environment and region selection now filters to deployed environments only
