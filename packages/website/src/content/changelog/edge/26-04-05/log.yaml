- id: 87680f8c-db77-4069-afb2-bebd0d5a3efe
  type: fix
  summary: >-
    Fixes `pf cluster add` Vault key storage to split root token and recovery keys into separate
    SOPS-encrypted files.
  references:
  - type: internal-commit
    summary: 'feat: better resumability (#351)'
    link: 70421c38fa9eb6f3238b5f1e7dfa9101f8a84f7e
  - type: internal-commit
    summary: 'fix: split vault recovery keys and root token'
    link: 62031a6aa8fe0352dd3ed1abd3062d9ff134f6b0
  - type: internal-commit
    summary: 'fix: reading from recovery.yaml'
    link: 3d7608ca62c6a10f0216f6bc4c9c2eb514fcf414
  - type: internal-docs
    summary: Vault bootstrapping guide
    link: /guides/bootstrapping/vault
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Recovery keys written to `kube_vault/recovery.yaml` and root token to `kube_vault/secrets.yaml` immediately
      after `vault operator init`; read paths updated to match the new split layout
  description: |
    Three Vault-related `pf cluster add` fixes:

    1. Recovery keys and the root token are now saved immediately after `vault operator init` completes, before the unseal step, so a CLI crash cannot lose the recovery material. The root token is written to `kube_vault/secrets.yaml` and recovery keys to `kube_vault/recovery.yaml`. A follow-on fix updated the read-side code to match — previously the setup step still read both from a single `kube_vault/secrets.yaml` file, failing on any cluster where the split had already occurred.
    2. The Vault `kubectl port-forward` proxy now passes `--context` to target the correct cluster when multiple Kubernetes contexts are present.
    3. The `Deploy Vault Core Resources` step now runs at the start of the autoscaling phase, ensuring the Vault ingress is healthy before the step executes.
- id: 4dbc4497-4dc0-4dbe-a981-d0a1633f6bff
  type: fix
  summary: >-
    Lowers Bun DNS cache TTL during `pf cluster add` Vault ingress verification to detect DNS propagation faster.
  references:
  - type: internal-commit
    summary: 'chore: lower bun dns cache ttl'
    link: c62f63d9eefb4549882e254f15041b7d50c2a3d2
  - type: external-docs
    summary: Bun DNS cache TTL configuration
    link: https://bun.com/docs/runtime/networking/dns
  description: |
    During `pf cluster add`, the Vault ingress verification step polls the Vault health endpoint while waiting for DNS
    to propagate. Previously, Bun's default DNS cache TTL caused the polling loop to re-use stale DNS responses for an
    extended period, adding unnecessary wait time even after DNS had already propagated.

    This fix sets `BUN_CONFIG_DNS_TIME_TO_LIVE_SECONDS` to `5` for the duration of the health check, ensuring the
    polling loop picks up fresh DNS records within seconds of propagation completing rather than waiting for the
    default cache TTL to expire.
  impacts:
  - type: cli
    component: cluster add
    summary: Vault ingress verification detects DNS propagation faster by using a 5-second DNS cache TTL
- id: 95cc8349-fa69-46c9-a126-7f08f47dadd0
  type: fix
  summary: >-
    Fixes `pf cluster add` autoscaling task ordering and `bootstrap_mode_enabled` schema path in the cluster extensions step.
  references:
  - type: internal-commit
    summary: 'fix: unneeded nesting & validation schema'
    link: 67f55056af01643193d3d24ddd70976932112642
  - type: internal-docs
    summary: Bootstrapping autoscaling guide
    link: /docs/main/guides/bootstrapping/autoscaling
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Autoscaling step task hierarchy flattened; `bootstrap_mode_enabled` now read from correct `extra_inputs` schema path
  description: |
    Two `pf cluster add` fixes from the same commit:

    1. The Metrics Server, VPA, Karpenter, Karpenter Node Pools, and Scheduler module deployments in the autoscaling step were wrapped in a redundant intermediate `newListr` group, which could cause steps to be hidden or run out of order. They are now direct items in the top-level task list.
    2. The cluster extensions step was reading the `bootstrap_mode_enabled` flag from the top level of `aws_eks/module.yaml` instead of the correct `extra_inputs` nested object. The incorrect schema caused the node pool adjustment skip-check to always fail to find the flag, potentially re-running EKS node pool adjustment on every install resume.
- id: b74c37ff-aeb3-4ab8-92b3-b9ee99255fb5
  type: fix
  summary: >-
    Fixes `pf cluster add` Vault setup where `.pf.yaml` error status writes failed silently if the file already
    existed.
  references:
  - type: internal-commit
    summary: Merge certificates modules (#353)
    link: 48d67a2721e3df5e482db5e975bc76722451dd2a
  - type: external-commit
    summary: "Merge certificates modules (PR #353)"
    link: https://github.com/Panfactum/stack/pull/353
  impacts:
  - type: cli
    component: cluster add
    summary: Vault init and unseal error status now correctly written to `.pf.yaml` on retry
  description: |
    During `pf cluster add`, the Vault operator init and Vault unseal tasks write an error status to `.pf.yaml` when
    they fail so the CLI can skip already-completed steps on retry. However, `writeYAMLFile` was called without
    `overwrite: true`, so if `.pf.yaml` already existed from a previous run the write would fail silently. This left
    stale status data in place and could cause the CLI to incorrectly skip or re-run steps on subsequent attempts.

    The `overwrite: true` flag is now passed in all three `writeYAMLFile` error-handling paths in `setupVault.ts`,
    ensuring the error status is always recorded correctly when retrying after a failure.
- id: 82b741d8-a599-41d0-b336-bbcb2fe04408
  type: fix
  summary: >-
    Fixes domain name interpolation bugs in `pf domain add` that displayed raw variable names instead of the actual domain.
  references:
  - type: internal-commit
    summary: 'fix:cli: domain interpolation issues'
    link: b0bfa5f7433a9abeaf680a361a8092fd257eea46
  impacts:
  - type: cli
    component: domain add
    summary: Domain name now correctly interpolated in NS record instructions and already-registered message
  description: |
    Two interpolation bugs in `pf domain add` caused raw variable references to appear instead of the resolved domain name:

    1. In the "already registered" flow within `command.ts`, a plain string used `${domain}` (referencing the raw CLI option) instead of `${newDomain}` (the resolved domain). Users saw the unresolved option variable in the subdomain suggestion message.
    2. In `manualZoneSetup.ts`, the NS record instruction block used a regular string instead of a template literal, causing the literal text `${domain}` to be displayed rather than the actual domain name.

    The fix also adds labeled fields (Record Type, Record Name, and Record Values) to the NS record output, making the registrar update instructions clearer.
- id: d3961452-f3da-4aca-888f-576d2f22a3f8
  type: fix
  summary: >-
    Fixes a circular dependency and apply-order race condition in `kube_certificates` by using direct resource
    attribute references in `aws_permissions`.
  references:
  - type: internal-commit
    summary: 'fix: permissions after service account is created'
    link: 463dcb5a14dd40263c0ee4ae0ec090382ddcc19d
  - type: internal-commit
    summary: 'fix: correct the circular dependency'
    link: cb8ec840f552abf60423394febdaaba48312714c
  - type: internal-docs
    summary: '`kube_certificates` module documentation'
    link: /docs/main/modules/kube_certificates
  impacts:
  - type: iac-module
    component: kube_certificates
    summary: >-
      `aws_permissions` module now reads `service_account` and `service_account_namespace` directly from the
      `kubernetes_service_account.cert_manager` resource instead of using input variables, creating an implicit
      dependency that eliminates the circular dependency and the need for an explicit `depends_on`.
  description: >-
    The `aws_permissions` submodule in `kube_certificates` previously received the cert-manager service account name
    and namespace through input variables (`var.service_account` and `var.namespace`). Because these values did not
    create a Terraform dependency on the actual `kubernetes_service_account.cert_manager` resource, the module could
    be applied before the service account existed, causing a race condition. An intermediate fix added an explicit
    `depends_on`, but this introduced a circular dependency. The final fix replaces both the input variable references
    and the `depends_on` with direct attribute references to `kubernetes_service_account.cert_manager.metadata[0].name`
    and `local.namespace`, which creates an implicit dependency graph that Terraform resolves correctly.
- id: 162dffd8-1294-483f-9da5-9ba26eab52d5
  type: fix
  summary: >-
    Fixes AWS SDK credential-loading failures in `pf env add` and `pf domain add`, and corrects
    `pf welcome` installer display.
  description: |
    Two fixes from the same commit:

    1. The AWS SDK v3 has a known bug where credential providers do not reload credentials written to the credentials file during the current process lifetime. Client construction is now centralized into dedicated factory functions (`getAccountClient`, `getIAMClient`, `getS3Client`, `getRoute53DomainsClient`, `getOrganizationsClient`, `getSTSClient`) that each read credentials from disk when available, bypassing the provider cache and resolving credential failures across `pf env add` and `pf domain add` workflows.
    2. `pf welcome` no longer displays onboarding content when invoked from `install.sh` before an `.envrc` file is present. Previously the command only checked for a missing `installation_id`; the screen is now suppressed when `.envrc` does not yet exist.
  references:
  - type: internal-commit
    summary: 'fix:cli: aws client fixes + welcome screen + org create success section'
    link: 572dddd507d8318b9ebd48dedc47f4351f73626d
  - type: internal-commit
    summary: 'fix: welcome screen on install'
    link: d5736a893be8a7c8245d73f075a8e4620d018a87
  - type: issue-report
    summary: AWS SDK JS v3 credential providers do not reload credentials from disk within the same process
    link: https://github.com/aws/aws-sdk-js-v3/issues/6872
  impacts:
  - type: cli
    component: env add
    summary: AWS SDK clients now use a centralized `createAWSClient` factory that reads credentials from disk on each call, bypassing the provider cache
  - type: cli
    component: domain add
    summary: >-
      `Route53DomainsClient` and `AccountClient` now use the centralized credentials-from-file
      factory, resolving authentication failures during domain registration
  - type: cli
    component: welcome
    summary: Welcome screen is suppressed when `.envrc` is absent, preventing onboarding content from displaying during initial `install.sh` execution
- id: cc5f5d14-0d27-40d6-9072-f5e778f87ace
