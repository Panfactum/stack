- id: 291aeaa5-62df-456c-ae43-20a074e4c34e
  type: addition
  summary: >-
    Adds the `kube_job` submodule for running one-off Kubernetes Jobs as part of module deployment processes
    (e.g., database migrations).
  description: >-
    Many deployment workflows require one-off tasks such as database migrations, data seeding, or cluster bootstrapping
    steps that must complete before the main workload starts. The `kube_job` submodule provides a production-hardened
    Kubernetes Job abstraction with the same security hardening, scheduling, autoscaling, and observability integrations
    as the other Panfactum workload modules. Use it in your custom IaC modules whenever you need a run-to-completion
    task as part of a deployment.
