- id: 1ccbab75-947d-48e7-99ce-1b8bff00b478
  type: addition
  summary: >-
    New `install.sh` script automates full Panfactum repository and DevShell setup from scratch.
  description: >-
    Getting started with Panfactum previously required manually installing prerequisites, cloning a repository,
    creating a `flake.nix`, and configuring `direnv` -- a multi-step process that was error-prone for new users.
    The new `install.sh` bootstrapper handles all of this in a single command. It validates that
    `git` >= 2.39, `nix` >= 2.23, and `direnv` >= 2.32 are present (installing `nix` and `direnv` automatically
    if missing), prompts for repository URL, name, and branch, generates `flake.nix` and `panfactum.yaml`,
    builds the DevShell via `pf devshell sync`, and activates `direnv`. The script reads user input from
    `/dev/tty` so it works when piped via `curl`, detects the user's shell (`bash` or `zsh`) to append the
    `direnv` hook to the appropriate config file, and converts SSH remote URLs to HTTPS automatically.
