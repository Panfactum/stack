    link: 5e4d6524bb7f8d283e86f3775fdd4067f0b1d7ac
  impacts:
  - type: cli
    component: cluster add
    summary: EKS deploy step now displays a time estimate warning in the task title while planning changes
  description: >-
    The EKS cluster provisioning step in `pf cluster add` can take up to 15 minutes, which previously
