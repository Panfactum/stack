- id: 545fed40-165b-49fb-bb05-815fa72c0065
  type: fix
  summary: >-
    Fixes `pf-cluster-add` cert issuers step to restart cert-manager after nginx ingress
    deployment, preventing certificates from staying not-ready.
  description: |
    After deploying the nginx ingress controller, cert-manager sometimes fails to issue certificates because it
    is unaware of the new ingress class. Previously, the cert issuers deployment and the first certificate deployment
    ran sequentially without any retry logic, so a stale cert-manager pod could block cluster bootstrapping indefinitely.

    The fix runs the cert issuers deployment and a new cert-manager restart loop concurrently:

    1. The restart loop checks every 90 seconds whether the certificate labeled `panfactum.com/root-module=kube_cert_issuers` has a `Ready` condition.
    2. If the certificate is not ready, it runs `kubectl rollout restart deployment -n cert-manager` to force cert-manager to pick up the new ingress configuration.
    3. After up to 10 attempts, the loop either succeeds or throws a `CLIError`.

    Once the certificate is confirmed ready, the "Deploy The First Certificate" step proceeds to disable self-generated certs on `kube_cert_manager`.
  references:
  - type: internal-commit
    summary: 'fix: reset cert manager on nginx ingress deploy (#350)'
    link: 74894a454a64f7cd6285257ef3bebda2ba19e601
  impacts:
  - type: cli
    component: cluster add
    summary: Cert issuers step now runs a concurrent retry loop that restarts the cert-manager deployment until the certificate reaches a ready state
- id: a4a37bfa-ad7b-4662-8ea1-17d072139c36
  type: fix
  summary: >-
    DevShell boot script now unsets `AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY` to prevent host
    credentials from overriding profile-based configuration.
  references:
  - type: internal-commit
    summary: 'fix: unload AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY env vars on devshell boot'
    link: 4ed4265aa34302f474654217144017cca60903a8
