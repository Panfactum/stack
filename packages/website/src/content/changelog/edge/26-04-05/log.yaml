- id: 4a33cb69-8730-46d2-8df9-91ea05653389
  type: addition
  summary: >-
    `pf cluster add` now checks the EC2 vCPU quota and warns if it is below 16.
  description: |
    Cluster installation requires a minimum of 16 on-demand EC2 vCPUs, but new AWS accounts often start with a lower default quota. Previously, `pf cluster add` would fail mid-install with an opaque capacity error if the quota was insufficient.

    The command now queries the AWS Service Quotas API for the running on-demand standard instance quota (`L-1216C47A`) before proceeding. If the quota is below 16, it emits a clear warning showing the current value. If the environment was created with `pf env add`, the quota increase was already requested automatically.

    A follow-on fix resolved credential failures in the quota check: the `ServiceQuotasClient` was being instantiated with a `profile` option, which triggers a known AWS SDK JS v3 bug ([aws-sdk-js-v3#6872](https://github.com/aws/aws-sdk-js-v3/issues/6872)) that prevents credentials from being loaded from file. The client now uses a factory function that explicitly reads credentials from disk, bypassing the SDK bug.
  references:
  - type: internal-commit
    summary: Add vCPU quota check to `pf cluster add`
    link: 5cd779112382e803f6b4e20ce35f7f76788ebff0
  - type: internal-commit
    summary: Use factory function for `ServiceQuotasClient` instantiation
    link: 1dc45f74fb324cf0a8cd35be642b2ef3f1a244b5
  - type: issue-report
    summary: "AWS SDK JS v3: `profile` option does not resolve credentials from file"
    link: https://github.com/aws/aws-sdk-js-v3/issues/6872
  impacts:
  - type: cli
    component: cluster add
    summary: Validates EC2 vCPU quota is at least 16 before starting cluster installation
- id: 260c75a6-6052-4f91-bb0e-23f869282f2d
  type: breaking_change
  summary: >-
    Removes `namespace` and `service_account` inputs from `kube_certificates` to fix a namespace race condition.
  description: |
    Multiple resources in `kube_certificates` (including `kubernetes_secret`, `kubernetes_service_account`,
    `kubernetes_role`, `kubernetes_role_binding`, `kubernetes_config_map`, and `kubectl_manifest`) were referencing
    `var.namespace` directly. Because Terraform evaluates variable references without creating an implicit dependency
    on the resource that creates the namespace, these resources could be scheduled before the namespace existed, causing
    intermittent apply failures.

    Switching to `local.namespace` creates the correct implicit dependency chain. The now-unused `namespace` and
    `service_account` input variables (which both defaulted to `cert-manager`) have been removed from the module
    interface, making this a breaking change for any deployment that was explicitly setting those inputs.
  action_items:
  - Remove any `namespace` or `service_account` input variable assignments from your `kube_certificates` module configuration. These variables no longer exist and will cause a Terraform error if present.
  references:
  - type: internal-commit
    summary: 'fix: namespace not existing race condition (#362)'
    link: 3903a9470f20e0be50e630af78cb0235304ff0ae
  - type: internal-docs
    summary: '`kube_certificates` module documentation'
    link: /docs/main/modules/kube_certificates
  impacts:
  - type: iac-module
    component: kube_certificates
    summary: >-
      All Kubernetes resources now reference `local.namespace` instead of `var.namespace`; the now-unused `namespace`
      and `service_account` input variables have been removed
- id: 214c7792-4629-4ddb-b895-0053a8674e13
  type: fix
  summary: >-
    Fixes `pf sso add` Vault root token revocation failing silently inside `kubectl exec`.
  references:
  - type: internal-commit
    summary: 'fix: vault token revocation'
    link: 33160da3a8492a06323de484697f4e50a31210c6
  - type: internal-commit
    summary: providing token to destroy and using -self
    link: 1c45d231c3b1f8b8d1ddac4fba751a0490dcffe9
