- id: 7eb61140-4687-4f1a-a213-28fccda34cc0
  type: improvement
  summary: >-
    `pf cluster add` now sources the Vault token automatically via `panfactum.hcl`
    instead of manually threading it through each setup step.
  references:
  - type: internal-commit
    summary: Moved `vault_token` to autoload in `panfactum.hcl`
    link: ed1a146dd4c4d3d92866ac369bb653ce9d9f0d19
  - type: internal-docs
    summary: Terragrunt variables reference documenting `panfactum.hcl` configuration
    link: /docs/main/reference/configuration/terragrunt-variables
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      The `config` field and `refreshConfig` helper have been removed from `InstallClusterStepOptions`.
      The Vault root token is no longer injected as a `VAULT_TOKEN` environment variable; Terragrunt
      reads it automatically from `region.secrets.yaml` via `panfactum.hcl`.
  - type: configuration
    component: panfactum.hcl
    summary: >-
      Now reads `vault_token` from `local.vars` (sourced from `region.secrets.yaml`) and supplies it
      to the Vault provider, eliminating the need for explicit `VAULT_TOKEN` environment variable injection.
  description: |
    Previously, `pf cluster add` read `vault_token` from an in-memory config object and injected it as a `VAULT_TOKEN` environment variable for every Terragrunt module deployment across all setup steps (autoscaling, certificates, cluster extensions, inbound networking, Linkerd, and Vault core resources). This required the CLI to:

    1. Carry a mutable `config` reference on `InstallClusterStepOptions`
    2. Call `refreshConfig` after Vault initialization so later steps could access the freshly-written token
    3. Explicitly set `VAULT_TOKEN` in the `env` block of every `buildDeployModuleTask` call

    This approach was fragile and created tight coupling between the CLI orchestration logic and Vault credential management. The `refreshConfig` helper and the `config` field on `InstallClusterStepOptions` have been removed. Instead, `panfactum.hcl` now reads `local.vars.vault_token` directly, so once the token is persisted to `region.secrets.yaml` it is picked up automatically by all subsequent Terragrunt invocations without any explicit environment variable injection.
