- id: 8fd16915-1e38-4c66-b974-73427354c243
  type: fix
  summary: >-
    Fixes six installer and configuration bugs affecting CLI commands, `panfactum.hcl`, and the `aws_organization` module.
  references:
  - type: internal-commit
    summary: 'fix: misc cli installer fixes'
    link: 7be6e52c65c27ddf9af94a0367a56b5d37b93035
  impacts:
  - type: cli
    component: env add
    summary: >-
      Contact info now written with the correct `primary_contact` key and matching field names;
      optional prompts for Organization Name and Street Address 2 accept empty input; IAM Identity
      Center step skipped when the `aws_iam_identity_center_permissions` module is not deployed
  - type: cli
    component: devshell sync
    summary: >-
      HCL files now overwritten on sync; `.envrc` update subtask correctly registered and executed
      instead of being silently dropped
  - type: configuration
    component: panfactum.hcl
    summary: >-
      `authentik_url` is now read with `lookup()` and a sentinel fallback so the file no longer
      fails when the variable is absent
  - type: iac-module
    component: aws_organization
    summary: >-
      `aws_organizations_features` now depends on `aws_organizations_organization` to prevent a
      race condition during initial organization creation
  description: |
    Six fixes from the same commit:

    1. `pf env add` contact info was written with the wrong key (`account_access_configuration` instead of `primary_contact`) and mismatched field names, so it was silently discarded.
    2. Optional contact info prompts for Organization Name and Street Address 2 incorrectly required non-empty input.
    3. The IAM Identity Center update step ran unconditionally even when the permissions module was not deployed; it now checks for the module directory first.
    4. `pf devshell sync` did not overwrite existing HCL files, and the `.envrc` update subtask was silently dropped due to a syntax error in the task registration.
    5. `panfactum.hcl` failed when `authentik_url` was absent; the value is now read with `lookup()` and a sentinel fallback.
    6. `aws_organization` had a race condition where `aws_organizations_features` could be enabled before the organization was fully created; an explicit `depends_on` is now in place.
- id: 4d244b70-9769-4eb7-8d2a-68af97c54de4
  type: improvement
  summary: >-
    `pf env add` UX improvements: pre-filled contact info, alias explainer, finish message, and
    clearer setup instructions.
  references:
  - type: internal-commit
    summary: 'fix: env add: misc cli improvements'
    link: e0bedc9006e289a7756917a08a9c34d0400ecae3
  - type: internal-commit
    summary: 'feat: adds finish message to ''pf env add'''
    link: 3747d0982bbff1e6ac4d2684a417dbd9c1f16d1e
  - type: internal-commit
