- id: acb80b21-ace8-44f3-88d0-1655a89b9f96
  type: fix
  summary: >-
    Fixes a bug in the `pf` CLI where Terragrunt resource imports failed during module deployment
    when `resourceId` resolved to `undefined`.
  description: >-
    The `deployModuleTask` utility accepted a `resourceId` that could be a static string or a
    function returning a string. When a function returned `undefined` (e.g., because the upstream
    resource had not been created yet), the import task would attempt to import a literal `undefined`
    value, causing the deployment to error out. The fix changes the `resourceId` type signature to
    explicitly allow `undefined` and adds an early guard that skips the import task gracefully when
    the resolved ID is absent.
  references:
  - type: internal-commit
    summary: 'fix: undefined import'
    link: 0d1327c722d578fbe23280fc0ff98efaa0f0c10e
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Import tasks in `deployModuleTask` now skip gracefully when `resourceId` resolves to
      `undefined`.
  - type: cli
    component: env add
    summary: >-
      Import tasks in `deployModuleTask` now skip gracefully when `resourceId` resolves to
      `undefined`.
  - type: cli
    component: domain add
    summary: >-
      Import tasks in `deployModuleTask` now skip gracefully when `resourceId` resolves to
      `undefined`.
