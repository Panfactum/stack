- id: 43ce5fc7-4f72-4b27-ad8a-cea0c8693091
  type: fix
  summary: >-
    Fixes the default value for `min_node_cpu` in `kube_karpenter_node_pools` so that Karpenter no longer
    excludes valid small instance types.
  description: >-
    The `min_node_cpu` variable was originally introduced with a default of `0.5`. Because
    `kube_karpenter_node_pools` uses a strict greater-than (`Gt`) requirement on `karpenter.k8s.aws/instance-cpu`,
    this effectively set a floor just below 1 vCPU. While 1-vCPU instances still qualified, the non-integer
    default was semantically incorrect and could cause confusion. The default is now `0`, which imposes no
    minimum CPU constraint and lets Karpenter consider the full range of instance types allowed by other
    NodePool requirements.
  action_items:
  - Re-apply `kube_karpenter_node_pools` to pick up the corrected default.
  - If you previously set `min_node_cpu` explicitly to work around this issue, you can remove the override.
  references:
  - type: internal-commit
    summary: "Fix `min_node_cpu` default for `kube_karpenter_node_pools`"
    link: 40f95e1a37803879a090c1bc1abb73994173ed07
  - type: internal-docs
    summary: "`kube_karpenter_node_pools` module documentation"
    link: /docs/main/reference/infrastructure-modules/direct/kubernetes/kube_karpenter_node_pools
  - type: external-docs
    summary: "Karpenter NodePools concept documentation"
    link: https://karpenter.sh/docs/concepts/nodepools/
  impacts:
  - type: iac-module
    component: kube_karpenter_node_pools
    summary: Changed `min_node_cpu` default from `0.5` to `0`
- id: 64f4d36f-9324-4308-9c48-f9fae50e773e
  type: fix
  summary: >-
    Increased kubelet `registry-qps` and `registry-burst` settings in `kube_node_settings` to
    eliminate self-imposed rate-limiting that slowed node bootstrap image pulls.
  description: >-
    The default Kubernetes kubelet settings for `registry-qps` (5) and `registry-burst` (10) throttle
    how quickly a node can pull container images from registries. On new nodes with many pods
    scheduled simultaneously, this caused a bottleneck during bootstrapping as images queued behind
    the rate limiter. This fix raises the limits to 50 QPS and 100 burst in the Bottlerocket
    user-data configuration, allowing nodes to pull images in parallel without artificial throttling.
    No action required beyond re-applying the `kube_karpenter_node_pools` module.
  references:
  - type: internal-commit
    summary: "Bump registry QPS and burst settings in node user-data"
    link: 27c0d4149e0d14d7f643b90194a5deee30b25e3e
  - type: issue-report
    summary: "Bottlerocket issue requesting `registry-burst` and `registry-qps` kubelet arguments"
    link: https://github.com/bottlerocket-os/bottlerocket/issues/1495
  - type: external-docs
    summary: "Bottlerocket Kubernetes settings documentation"
    link: https://bottlerocket.dev/en/os/1.54.x/api/settings/kubernetes/
  impacts:
  - type: iac-module
    component: kube_node_settings
    summary: Added `registry-qps` (50) and `registry-burst` (100) to Bottlerocket user-data
  - type: iac-module
    component: kube_karpenter_node_pools
    summary: Nodes provisioned by Karpenter inherit the faster image pull settings
- id: 0efd6aa3-cb9e-4b3f-8ad8-c27f1c1933d4
  type: fix
  summary: >-
    Fixes `wf_dockerfile_build` failing to authenticate when cloning private Git repositories.
  description: >-
    The `setup.sh` script in `wf_dockerfile_build` was not incorporating the `git_username` and
    `git_password` variables into the HTTPS URL used by `pf-get-commit-hash` to resolve the commit
    reference. As a result, workflows targeting private Git repositories would fail at the setup
    step with an authentication error. The fix constructs the authenticated URL
    (`https://<user>:<pass>@<repo>`) when `GIT_USERNAME` is provided, and also corrects a
    follow-up bug where the wrong shell variable names (`USERNAME`/`PASSWORD` instead of
    `GIT_USERNAME`/`GIT_PASSWORD`) were used.
  action_items:
  - Re-apply any modules that use `wf_dockerfile_build` with private repositories to pick up the corrected setup script.
  references:
  - type: internal-commit
    summary: Inject `git_username`/`git_password` into repo URL for private repo auth
    link: 36018714e101bc216537a8eb6dfc1854c60cfe01
  - type: internal-commit
    summary: Fix incorrect variable names (`USERNAME`/`PASSWORD` to `GIT_USERNAME`/`GIT_PASSWORD`)
    link: 8fe2e40a5f3174679470209208133a32698a2f66
  - type: internal-docs
    summary: "`wf_dockerfile_build` module documentation"
    link: /docs/main/reference/infrastructure-modules/submodule/workflow/wf_dockerfile_build
  impacts:
  - type: iac-module
    component: wf_dockerfile_build
    summary: >-
      Fixed setup script to inject `git_username` and `git_password` into the HTTPS clone URL
      so private repository workflows authenticate correctly
