- id: 748b9ad4-52f4-432c-8db2-f794b8177964
  type: improvement
  summary: >-
    `pf sso add` root email defaults to `authentik-root@sso.<domain>` and admin email prompt warns against reusing AWS root email.
  references:
  - type: internal-commit
    summary: 'feat: improve Authentik setup with default root email and better instructions'
    link: f9903b9bdafe6dd44f8aeea43a75ca9b0a0a1419
  - type: internal-docs
    summary: Identity Provider bootstrapping guide
    link: /docs/main/guides/bootstrapping/identity-provider
  impacts:
  - type: cli
    component: sso add
    summary: Root email prompt pre-filled with `authentik-root@sso.<domain>`; admin email explainer clarifies uniqueness requirement
  description: |
    Previously, the Authentik root user email prompt had no default value, requiring users to type a full email address. This change makes two improvements:

    1. The root email prompt now pre-populates with `authentik-root@sso.<domain>` (using the selected SSO subdomain) so users can press Enter to accept a sensible default.
    2. The admin user email explainer now clarifies that the email must be unique and must not be the AWS root account email address, preventing a common setup error where users accidentally reuse the account root email.
- id: 66a9facf-1f8d-4fb8-be04-5f39dfc86ae9
  type: fix
  summary: Fixes `pf cluster add` EKS setup where the default cluster name was not pre-formatted, allowing invalid characters.
  references:
  - type: internal-commit
    summary: 'fix: improve cluster name handling in EKS setup'
    link: 1aed9737fed298a33b7dbfae6cb4370a8f2b472d
  - type: internal-docs
    summary: '`aws_eks` module reference'
    link: /docs/main/modules/aws_eks
  impacts:
  - type: cli
    component: cluster add
    summary: Default cluster name is now passed through `clusterNameFormatter` before display, ensuring it contains only lowercase letters, digits, and hyphens
  description: >-
    The EKS cluster name prompt already applied `clusterNameFormatter` as a real-time transformer
    while the user typed, but the `default` value passed to the prompt was the raw
    `${environment}-${region}` string. If a user accepted the default without modification, the
    formatter was never invoked, so the saved cluster name could contain uppercase letters or
    underscores that violate the EKS naming constraint of lowercase alphanumeric characters and
    hyphens only. The default is now passed through `clusterNameFormatter` before being shown,
    ensuring the pre-filled value is always a valid, formatted cluster name.
- id: 32294577-c16f-49c5-90c1-0b2fb09f9145
  type: addition
  summary: Adds anonymous CLI usage telemetry via PostHog and a new `panfactum.user.yaml` per-user config file.
  references:
  - type: internal-commit
    summary: 'feat: add anonymous usage tracing'
    link: 5d6c7ee80a7966988687ca691f5080b28599c772
  - type: external-docs
    summary: PostHog product analytics platform
    link: https://posthog.com/
  - type: internal-docs
    summary: Panfactum repo variables reference
    link: /docs/main/reference/configuration/repo-variables
  impacts:
  - type: cli
    component: welcome
    summary: Generates a UUID `user_id` on first run, stores it in `panfactum.user.yaml`, and fires a `cli-welcome` PostHog event
  - type: configuration
    component: panfactum.user.yaml
    summary: New optional per-user config file whose values merge on top of `panfactum.yaml` and are gitignored automatically
  - type: cli
    component: devshell sync
    summary: '`*.user.yaml` files are now added to the root and environments `.gitignore` entries'
  description: |
    Two related additions for user-specific configuration and telemetry:

    1. The `pf` CLI now fires a `cli-start` PostHog telemetry event on each invocation when a `user_id` is present in the Panfactum repo variables. The `user_id` is a UUID generated by `pf welcome` on first DevShell setup. All telemetry is anonymous; no personally identifiable information is collected. This gives the Panfactum team visibility into adoption and usage patterns so they can prioritize improvements.
    2. `panfactum.user.yaml` is a new optional per-user configuration file alongside `panfactum.yaml`. Its values are merged on top of `panfactum.yaml` at read time, enabling user-specific settings (such as `user_id`) without modifying the shared repo config. The file is automatically gitignored by `pf devshell sync`.
- id: d3e867c6-a220-4d8a-be29-789893991087
  type: fix
  summary: Fixes `pf` CLI usage telemetry to fire after command parsing so that command path and flags are captured.
  references:
  - type: internal-commit
    summary: 'fix: move usage tracking from context to command execution'
    link: d7e596c735284934c4000156cdce6ede26dedf5f
  description: >-
    The `cli-start` PostHog event was previously fired inside `createPanfactumContext`, before
    the command had been fully parsed. At that point, `proc.path`, `proc.help`, and other
    command-level properties were not yet populated, so every telemetry event was sent without
    useful context. The tracking call now runs in `index.ts` after `cli.process()` completes,
    and the event records the command path, help flag, debug flag, and working directory alongside
    the `user_id`. This gives the team accurate per-command usage data to guide development
    priorities.
- id: c71df44a-91c3-4459-8077-9671352133b8
  type: fix
  summary: >-
    Fixes `kube_opensearch` dashboard superuser password containing special characters that
    caused authentication failures and security update job ignoring the `vpa_enabled` input.
  references:
  - type: internal-commit
    summary: 'fix: restrict opensearch dashboard password to alphanumeric characters only'
    link: 919e46249012e6623547cdbbb7da12b014314c8d
  - type: internal-commit
    summary: 'fix: pass `vpa_enabled` to `kube_opensearch` security update job'
    link: 6001eed85f76a8aaf53597846df50d66992e53d7
  - type: issue-report
    summary: Special characters not well supported in OpenSearch admin password
    link: https://github.com/opensearch-project/opensearch-k8s-operator/issues/955
  - type: internal-docs
    summary: '`kube_opensearch` module reference'
    link: /docs/main/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: >-
      Dashboard superuser password restricted to alphanumeric characters via `special = false`;
      security update job now correctly inherits `vpa_enabled` from the parent module
  description: |
    Two `kube_opensearch` fixes:

    1. The dashboard superuser password generated by `random_password` previously included special characters. Certain special characters cause authentication failures in the OpenSearch security plugin when used in internal user credentials. The password now sets `special = false` to restrict generation to alphanumeric characters only, preventing these failures.
    2. The security update job (a `kube_job` submodule invocation that runs `securityadmin.sh` to apply RBAC configuration) did not pass the `vpa_enabled` variable through to its underlying `kube_job` module. This meant VPA resource recommendations were always applied to the job pod regardless of the module-level setting. The variable is now forwarded correctly.
- id: d48d0fb0-0dfb-4a58-85e4-71825b0784b8
  type: improvement
  summary: >-
    Updates release scripts to use the structured YAML changelog format instead of the legacy MDX-based changelog.
  references:
  - type: internal-commit
    summary: 'feat(changelog): add structured YAML schema and validation tooling'
    link: 8d4b44e31d14a8c5ce25d04a0c0b4b535d2c0afc
  impacts:
  - type: devshell
    component: make-new-edge-release
    summary: >-
      Now copies `changelog/main/log.yaml` to a versioned `edge/<date>/log.yaml` directory on release and resets
      `main/log.yaml` to a clean template
  - type: devshell
    component: make-new-stable-release-channel
    summary: >-
      Now creates a `stable/<version>/log.yaml` entry directory instead of writing to the legacy `docs/changelog` MDX
      path
  description: |
    The release scripts have been updated to work with the new directory-based structured changelog system. Previously,
    both scripts wrote flat MDX files under `docs/changelog`. Now `make-new-edge-release` copies
    `changelog/main/log.yaml` to a versioned `edge/<date>/log.yaml` directory and resets `main/log.yaml` to a blank
    template, while `make-new-stable-release-channel` creates a `stable/<version>/log.yaml` entry directory. This
    aligns the release workflow with the validated YAML schema and enables richer changelog rendering on the website.
- id: 369b598b-9974-4693-b2e1-5a7f730c8452
  type: fix
  summary: >-
    Fixes `kube_policies` read-only ClusterRoles incorrectly granting full write access and restricts `pf:admins` from
    writing to security-sensitive Kubernetes resources.
  references:
  - type: internal-commit
    summary: 'feat: upgrades kubernetes to 1.31'
    link: 33d887c36fae56bc624511e72a8ac7f939db47f3
  - type: internal-docs
    summary: '`kube_policies` module documentation'
    link: /docs/main/modules/kube_policies
  impacts:
  - type: iac-module
    component: kube_policies
    summary: >-
      `read_verbs` corrected to `get`/`list`/`watch`; `pf:admins` restricted from writing RBAC resources, webhooks,
      CRDs, and Kyverno policies
  description: |
    Two `kube_policies` RBAC security fixes from the same commit:

    1. The `read_verbs` local variable was accidentally set to the same value as `all_verbs`, giving the `reader` and `restricted_reader` ClusterRoles full write access to non-secret resources. `read_verbs` is now corrected to `["get", "list", "watch"]`.

    2. The `pf:admins` ClusterRole previously granted full write access to all non-secret resources, including RBAC roles/bindings, admission webhooks, CRDs, and Kyverno policies. The role now defines a `sensitive_resources` list (`clusterroles`, `clusterrolebindings`, `roles`, `rolebindings`, `apiservices`, `validatingadmissionpolicies`, `mutatingwebhookconfigurations`, `validatingadmissionpolicybindings`, `validatingwebhookconfigurations`, `flowschemas`, `prioritylevelconfigurations`, `customresourcedefinitions`, `clustercleanuppolicies`, `clusterpolicies`, `policyexceptions`) and grants only `get`/`list`/`watch` access to them.

    These changes harden the default RBAC posture by ensuring read-only roles cannot modify resources and admin roles cannot escalate privileges or disrupt cluster-critical components.
  action_items:
  - Re-apply `kube_policies` via `terragrunt apply` to receive the corrected RBAC permissions.
