- id: 1953d9f8-29ef-46c8-b0f6-5e7031fb447f
  type: improvement
  summary: >-
    `pf cluster add` now interactively prompts for environment and region, removing the need to run from the correct
    directory.
  description: |
    Previously, `pf cluster add` read configuration from the current working directory, requiring users to manually `cd` into the correct region folder before running the command. This was a common source of error during cluster installation.

    The command now presents interactive prompts at startup to:

    1. Select the target environment (excluding the management environment)
    2. Select the target region (excluding global and regions that already have a cluster deployed)

    All file paths are derived from the selection, making the cluster installation workflow location-independent. Users can run `pf cluster add` from any directory in their repository.
  references:
