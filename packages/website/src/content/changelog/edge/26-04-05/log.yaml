- id: e240c03b-1971-40bc-b9c8-49a3a9a85332
  type: fix
  summary: >-
    Fixes `pf domain add` path resolution and CLI config file loading to handle missing files gracefully.
  references:
  - type: internal-commit
    summary: Fix `getDomains` environment path and `getConfigValuesFromFile` missing-file handling
    link: b7b790dd661af18039021d3352666f3ba3fc41c9
  impacts:
  - type: cli
    component: domain add
    summary: >-
      `getDomains` was using `environment_dir` (a short directory name) instead of the full absolute filesystem
      path, causing downstream file resolution to fail when resolving environment files.
  - type: cli
    component: config get
    summary: >-
      `getConfigValuesFromFile` now passes `throwOnMissing: false` and `throwOnEmpty: false` to the YAML
      reader and SOPS decryptor, returning `null` instead of throwing when optional config files are absent.
  description: |
    Two CLI infrastructure bugs were fixed:

    1. `getDomains` was assigning the `env.path` field from `environment_dir` (a short directory basename like `production`) instead of the full absolute filesystem path (e.g., `/repo/environments/production`). Downstream code that joined this path with filenames produced invalid paths, breaking `pf domain add` and any other command that relies on `getDomains`.
    2. `getConfigValuesFromFile` was calling `readYAMLFile` and `sopsDecrypt` without `throwOnMissing: false`, causing them to throw when an optional config file (e.g., `module.yaml`, `environment.secret.yaml`) did not exist. The function now returns `null` for missing files, matching its documented contract.
- id: 884600c0-ec49-400e-8b07-3a7372c379cc
  type: fix
  summary: >-
    Fixes CLI subprocess output capture where merged stdout/stderr was silently
    dropped, causing missing error diagnostics.
  references:
  - type: internal-commit
    summary: 'feat: adds unit tests to the CLI'
    link: dd36035b968faeb3c4f64406aea69e47353f968a
  impacts:
  - type: cli
    component: logging
    summary: >-
      Merged subprocess output stream now correctly captures both stdout and
      stderr instead of returning empty content.
  description: |
    The `execute` subprocess utility called `concatStreams` with a raw array instead of the expected `{ streams: [...] }` object signature. This caused the merged output stream to be empty on every subprocess invocation, affecting two areas:

    1. **Logging** -- CLI commands that depend on capturing combined stdout/stderr output (such as error messages from `terragrunt` or `kubectl`) would silently lose that diagnostic output.
    2. **Retry diagnostics** -- When a subprocess failed and the CLI attempted to log the combined output for troubleshooting, the output was always empty, making it difficult to diagnose transient failures.

    The call site in `execute.ts` has been corrected to pass `{ streams: [stdout, stderr] }` instead of a bare array, matching the `concatStreams` API signature.
- id: f09ebec3-500f-4b45-8988-96daa670be82
  type: addition
  summary: >-
    `kube_karpenter_node_pools` now creates dedicated workflow-only Karpenter node pools for each existing pool type.
  description: |
    Each existing Karpenter node pool now has a parallel workflow-only counterpart (prefixed with `wf-`). The workflow pools carry a `workflow: "true"` taint with `NoSchedule` effect and label nodes with `panfactum.com/workflow-only: "true"`. This isolates Argo Workflow pods (which tolerate the `workflow` taint) onto their own nodes, preventing long-running workflows from displacing regular workloads.

    The six new workflow-only pools mirror the existing pool types:

    - `wf-burstable` (amd64)
    - `wf-burstable-arm` (amd64/arm64)
    - `wf-spot` (amd64)
    - `wf-spot-arm` (amd64/arm64)
    - `wf-on-demand` (amd64)
    - `wf-on-demand-arm` (amd64/arm64)

    A new `default_termination_grace_period` variable (default `1h0m0s`) has also been introduced to control the termination grace period for on-demand node pools, replacing the previously hardcoded value.
  references:
  - type: internal-commit
    summary: 'feat: adds workflow-only node pools'
    link: 2702b0c70a3f8aed03ea6606ba291b6e2b380885
  - type: internal-docs
    summary: '`kube_karpenter_node_pools` module documentation'
    link: /docs/main/reference/infrastructure-modules/direct/kubernetes/kube_karpenter_node_pools
  - type: external-docs
    summary: Karpenter NodePool documentation
    link: https://karpenter.sh/docs/concepts/nodepools/
  impacts:
  - type: iac-module
    component: kube_karpenter_node_pools
    summary: >-
      Six new workflow-only `NodePool` resources added (one per existing pool type); each carries a
      `workflow=true:NoSchedule` taint, a `panfactum.com/workflow-only=true` label, and a new
      `default_termination_grace_period` variable for on-demand pools
- id: 4c93824e-83eb-469d-86ed-2e99252b05a9
  type: addition
  summary: >-
    Adds a `workflow_nodes_required` input to workflow and workload modules to schedule pods
    exclusively on dedicated workflow-only nodes.
  description: |
    When `workflow_nodes_required` is set to `true`, pods are constrained to nodes labeled
    `panfactum.com/workflow-only=true` (the workflow-only Karpenter pools introduced alongside
    this change) and are granted the `workflow=true:NoSchedule` taint toleration.

    This allows long-running, non-resumable Argo Workflows to run on dedicated nodes that regular
    workloads cannot be scheduled onto, preventing workflow disruption caused by bin-packing
    pressure from other services.
