- id: 06c32c67-a423-459a-aa8d-f68f44397a51
  type: breaking_change
  summary: >-
    `kube_domain` is now a required `region.yaml` field for every cluster, specifying a dedicated DNS zone for
    control-plane utilities.
  description: >-
    Panfactum clusters now require a dedicated DNS zone to host internal control-plane utilities (e.g., certificate
    issuers and internal service endpoints). This zone is configured via the new `kube_domain` field in `region.yaml`
    and must be a subdomain of a domain already managed within the environment. Separating cluster utilities onto their
    own DNS zone improves isolation and avoids polluting the primary domain with infrastructure-level records.
  action_items:
  - Add a `kube_domain` field to `region.yaml` for every region that contains a Kubernetes cluster. The value must be a subdomain
    of a domain already available in the environment (e.g., `kube.example.com` if `example.com` is managed).
  - Deploy the corresponding DNS zone via `aws_dns_zones` before applying cluster modules.
  references:
  - type: internal-docs
    summary: Terragrunt variables reference — region.yaml configuration fields
    link: /docs/main/reference/configuration/terragrunt-variables
  - type: internal-docs
    summary: aws_dns_zones module — create and manage Route 53 DNS zones
    link: /docs/main/modules/aws_dns_zones
  impacts:
  - type: configuration
    component: region.yaml
    summary: New required `kube_domain` field specifying the DNS zone for cluster control-plane utilities
  - type: iac-module
    component: kube_certificates
    summary: Reads `kube_domain` from `region.yaml` to register certificate issuer endpoints under the cluster DNS zone
  - type: iac-module
    component: kube_cert_issuers
    summary: Reads `kube_domain` from `region.yaml` to include the cluster DNS zone in wildcard certificate coverage
- id: aa942c95-ee99-4da9-af63-2251eda0cbd3
  type: breaking_change
  summary: >-
    `kube_authentik` now requires `organization_name` and creates the Authentik email template; update
    `authentik_core_resources` to consume this output.
  description: >-
    Email templates rendered by Authentik now embed the organization name for branding, so the
    `organization_name` input must be provided to `kube_authentik` at deploy time. The module creates
    the email template `ConfigMap` and exposes `organization_name` as an output so that
    `authentik_core_resources` can consume it via a Terragrunt `dependency` block. This establishes a
    clear ownership boundary: `kube_authentik` owns Authentik infrastructure and branding assets,
    while `authentik_core_resources` owns application-level configuration built on top of it.
  action_items:
  - Add the `organization_name` variable to your `kube_authentik` module configuration.
  - Wire the `organization_name` output from `kube_authentik` into the `authentik_core_resources` module as an input via a
    `dependency` block.
  references:
  - type: internal-docs
    summary: kube_authentik module reference
    link: /docs/main/modules/kube_authentik
  - type: internal-docs
    summary: authentik_core_resources module reference
    link: /docs/main/modules/authentik_core_resources
  impacts:
  - type: iac-module
    component: kube_authentik
    summary: New required `organization_name` input; now creates email template `ConfigMap` and exposes `organization_name` output
  - type: iac-module
    component: authentik_core_resources
    summary: Must receive `organization_name` wired from `kube_authentik` output via a `dependency` block
- id: 83b916af-9fd7-4378-8f6f-90ca50c0b090
  type: breaking_change
  summary: >-
    `kube_cert_manager` and `kube_cert_issuers` have been consolidated into a single `kube_certificates` module to
    address various race conditions on cluster installation.
  description: >-
    The separate `kube_cert_manager` and `kube_cert_issuers` modules created a race condition during cluster bootstrap
    where cert-manager would be ready before its issuers were configured, causing dependent modules to fail. Merging
    both into a single `kube_certificates` module eliminates this timing issue by ensuring cert-manager and its cluster
    issuers are deployed atomically in one apply. This also reduces the number of module directories users must manage
    and simplifies dependency wiring in downstream modules.
  action_items:
  - Create a new `kube_certificates` module directory and deploy it using the configuration shown in the upgrade instructions.
  - Run the state migration script from the upgrade instructions to merge Terraform state from both `kube_cert_manager` and `kube_cert_issuers` into `kube_certificates`.
  - Remove the `kube_cert_issuers` and `kube_cert_manager` directories after confirming the migration succeeds.
  - Replace any references to `kube_cert_issuers` or `kube_cert_manager` dependency paths in your `terragrunt.hcl` files with `kube_certificates`.
  references:
  - type: internal-commit
    summary: Merge certificates modules (#353)
    link: 48d67a2721e3df5e482db5e975bc76722451dd2a
  - type: internal-docs
    summary: kube_certificates module reference
    link: /docs/main/modules/kube_certificates
  - type: internal-docs
    summary: Certificate management bootstrapping guide
    link: /docs/main/guides/bootstrapping/certificate-management
  impacts:
  - type: iac-module
    component: kube_cert_manager
    summary: Deprecated and consolidated into `kube_certificates`; directory should be removed after state migration
  - type: iac-module
    component: kube_cert_issuers
    summary: Deprecated and consolidated into `kube_certificates`; directory should be removed after state migration
  - type: iac-module
    component: kube_certificates
    summary: New module replacing both `kube_cert_manager` and `kube_cert_issuers`; deploys cert-manager and cluster issuers atomically
- id: ff442e61-ff63-44c6-a53a-faf5c05895a3
  type: breaking_change
  summary: >-
    `kube_keda` is now required as part of the base Panfactum cluster installation, and other
    modules assume it is present.
  description: >-
    KEDA (Kubernetes Event-driven Autoscaling) extends the built-in Kubernetes Horizontal Pod
    Autoscaler with capabilities the HPA cannot provide: scaling to zero, combining horizontal
    and vertical autoscaling simultaneously, and reacting to hundreds of external event sources
    beyond CPU and memory. Making `kube_keda` a required base component unlocks these patterns
    for all Panfactum workloads and allows other platform modules to depend on KEDA CRDs being
    available. Clusters that do not have `kube_keda` deployed will fail to apply any module that
    now assumes its presence.
  action_items:
  - Deploy the `kube_keda` module in every cluster following the [installation guide](/docs/main/guides/bootstrapping/autoscaling#deploy-keda).
    This must be done before applying other modules that now depend on KEDA being present.
  references:
  - type: internal-commit
    summary: Add kube_keda module and integrate KEDA into base cluster setup
    link: 09bdf9841b6f58d66cb3768cc81a331eb6ce8631
  - type: external-docs
    summary: KEDA — Kubernetes Event-driven Autoscaling official site
    link: https://keda.sh/
  - type: internal-docs
    summary: "`kube_keda` module reference documentation"
    link: /docs/main/modules/kube_keda/overview
  - type: internal-docs
    summary: Bootstrapping guide — Deploy KEDA section
    link: /docs/main/guides/bootstrapping/autoscaling
  impacts:
  - type: iac-module
    component: kube_keda
    summary: Now a required part of base cluster installation; must be deployed before other modules that depend on KEDA
- id: a1c98be8-0d45-4a96-bc57-955149a655ad
  type: breaking_change
  summary: >-
    `burstable_nodes_enabled` now defaults to `true` for all workload modules, restoring the intended
    behavior that was broken in `edge.25-03-26`.
  description: >-
    In `edge.25-03-26`, the separation of `burstable_nodes_enabled` and `spot_nodes_enabled` inadvertently
    changed the default for `burstable_nodes_enabled` to `false`, preventing workloads from scheduling on
    cost-effective T-family instances unless explicitly opted in. This release restores the default to `true`
    so that burstable instances are available for scheduling by default, which better reflects the intended
    cost-optimization posture of the framework.
  action_items:
  - >-
    If you explicitly set `burstable_nodes_enabled = false` in any module, no action is needed.
  - >-
    If you rely on the previous `false` default and your workloads are not compatible with burstable
    (T-family) instances, explicitly set `burstable_nodes_enabled = false` in the affected module
    configurations before upgrading.
  - >-
    Review workloads with sustained CPU utilization above ~30% — burstable instances run in
    unlimited mode and may cost more than standard `M`-type instances for these workloads.
  references:
  - type: internal-docs
    summary: Deploying workloads guide — node scheduling options
    link: /docs/main/guides/deploying-workloads/basics
  - type: internal-docs
    summary: "`kube_workload_utility` module reference"
    link: /docs/main/modules/kube_workload_utility/overview
  - type: external-docs
    summary: AWS burstable performance instances documentation
    link: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/burstable-performance-instances.html
  impacts:
  - type: iac-module
    component: kube_workload_utility
    summary: "`burstable_nodes_enabled` default changed from `false` to `true`"
  - type: iac-module
    component: kube_pod
    summary: Inherits new `burstable_nodes_enabled` default from `kube_workload_utility`
  - type: iac-module
    component: kube_deployment
    summary: Inherits new `burstable_nodes_enabled` default from `kube_workload_utility`
  - type: iac-module
    component: kube_stateful_set
    summary: Inherits new `burstable_nodes_enabled` default from `kube_workload_utility`
  - type: iac-module
    component: kube_cron_job
    summary: Inherits new `burstable_nodes_enabled` default from `kube_workload_utility`
  - type: iac-module
    component: kube_daemon_set
    summary: Inherits new `burstable_nodes_enabled` default from `kube_workload_utility`
  - type: iac-module
    component: kube_job
    summary: Inherits new `burstable_nodes_enabled` default from `kube_workload_utility`
- id: 2be688f2-375c-451b-909a-71b2831f3bd2
  type: breaking_change
  summary: >-
    `aws_account` and `aws_registered_domains` contact information variables have been
    consolidated from individual fields into single object variables per contact type.
  description: >-
    Previously, each contact field (name, phone, address, etc.) was a separate top-level
    variable, making module calls verbose and error-prone. Both modules now accept a single
    typed object per contact role, grouping all related fields together. This reduces the
    number of variables, improves readability, and enables better validation at the object
    level. For `aws_account`, the individual `contact_*`, `security_*`, `operations_*`,
    and `billing_*` variables are replaced by `primary_contact`, `security_contact`,
    `operations_contact`, and `billing_contact` objects. For `aws_registered_domains`,
    the individual `admin_*`, `registrant_*`, and `tech_*` variables are replaced by
    `admin_contact`, `registrant_contact`, and `tech_contact` objects.
  action_items:
  - >-
    In `aws_account`, replace the individual `contact_*` variables (`contact_full_name`,
    `contact_phone_number`, `contact_address_line_1`, etc.) with a single `primary_contact`
    object. Similarly, replace `security_*`, `operations_*`, and `billing_*` variables
    with `security_contact`, `operations_contact`, and `billing_contact` objects respectively.
  - >-
    In `aws_registered_domains`, replace the individual `admin_*` variables (`admin_first_name`,
    `admin_last_name`, `admin_email_address`, etc.) with a single `admin_contact` object.
    Similarly, replace `registrant_*` and `tech_*` variables with `registrant_contact`
    and `tech_contact` objects respectively.
  - >-
    Run `terragrunt apply` for both modules after updating the variable definitions to
    reconcile the state.
  references:
  - type: internal-commit
    summary: Consolidate `aws_account` contact variables into typed objects
    link: 265d0a3fa27c15364fd814fd44d66aac4396bb88
  - type: internal-commit
    summary: Consolidate `aws_registered_domains` contact variables into typed objects
    link: b9257537a66620e8a531a64fc5f136739e3230d6
  - type: internal-docs
    summary: "`aws_account` module reference"
    link: /docs/main/reference/infrastructure-modules/direct/aws/aws_account
  - type: internal-docs
    summary: "`aws_registered_domains` module reference"
    link: /docs/main/reference/infrastructure-modules/direct/aws/aws_registered_domains
  impacts:
  - type: iac-module
    component: aws_account
    summary: >-
      Individual `contact_*`, `security_*`, `operations_*`, and `billing_*` variables
      replaced by `primary_contact`, `security_contact`, `operations_contact`, and
      `billing_contact` typed objects
  - type: iac-module
    component: aws_registered_domains
    summary: >-
      Individual `admin_*`, `registrant_*`, and `tech_*` variables replaced by
      `admin_contact`, `registrant_contact`, and `tech_contact` typed objects
- id: 2e4d9f33-5244-4e43-a80a-958942c69735
  type: breaking_change
  summary: >-
    `aws_dns_zones` inputs have been consolidated to a single `domains` object for better
    per-domain granular configuration.
  description: >-
    Previously, `aws_dns_zones` accepted separate list variables for domain names and their settings.
    These have been replaced with a single `domains` map where each key is a domain name and the value
    holds per-domain configuration such as `dnssec_enabled`. This makes it easier to configure
    individual domains independently without needing to keep parallel lists in sync.
  action_items:
  - Migrate your `aws_dns_zones` inputs from separate domain list variables to the new `domains` map.
    Each key in the map is a domain name, and the value is an object containing per-domain configuration
    (e.g., `dnssec_enabled`).
  - Review the updated module reference for the full `domains` input schema.
  references:
  - type: internal-docs
    summary: aws_dns_zones module reference
    link: /docs/main/reference/infrastructure-modules/direct/aws/aws_dns_zones
  impacts:
  - type: iac-module
    component: aws_dns_zones
    summary: All inputs replaced by a single `domains` map; existing configurations must be migrated
- id: 7c95855b-139a-4ed7-a5d8-c5a941403255
  type: breaking_change
  summary: >-
    `tf_bootstrap_resources` backup vault name now includes a unique suffix. Manually delete the existing
    `terraform-<env_name>` vault before applying.
  description: >-
    The backup vault created by `tf_bootstrap_resources` previously used a predictable name (`terraform-<env_name>`),
    which could not be re-created after deletion without manual intervention due to AWS Backup vault naming constraints.
    The vault name now includes a random hex suffix generated by a `random_id` resource, ensuring uniqueness and
    enabling clean re-creation. Because AWS Backup does not support in-place renames, the existing vault must be
    manually deleted before applying the updated module.
  action_items:
  - Delete the existing AWS Backup vault named `terraform-<env_name>` in each environment via the AWS console or `aws backup delete-backup-vault --backup-vault-name terraform-<env_name>`.
  - Re-apply the `tf_bootstrap_resources` module to create the replacement vault with the new uniquely-suffixed name.
  references:
  - type: internal-commit
    summary: Add unique suffix to backup vault name in `tf_bootstrap_resources`
    link: d07955d5d1f1de54783cd8baf5c8777f5c9588ed
  - type: internal-docs
    summary: '`tf_bootstrap_resources` module reference'
    link: /docs/main/reference/infrastructure-modules/direct/aws/tf_bootstrap_resources
  impacts:
  - type: iac-module
    component: tf_bootstrap_resources
    summary: Backup vault name now includes a random unique suffix; existing vault must be manually deleted before applying
- id: cb38cb96-5cf7-4eb9-9e30-f8879f4fb3e5
  type: breaking_change
  summary: >-
    Adds the `pf` CLI tool; run `pf devshell sync` and `terragrunt run-all apply` after upgrading.
  description: >-
    The `pf` CLI centralizes Panfactum's operational commands into a single, structured tool built on Clipanion.
    It replaces the collection of ad-hoc shell scripts previously scattered across the devshell with a unified
    command hierarchy (`pf devshell sync`, `pf db tunnel`, `pf vault get-token`, etc.). The `pf devshell sync`
    command synchronizes local configuration files, kubeconfigs, SSH settings, and AWS Identity Center profiles
    with live infrastructure state, ensuring local development environments stay consistent with deployed
    resources. Running `terragrunt run-all apply` afterward propagates any configuration changes introduced
    by the sync into your infrastructure modules.
  action_items:
  - Run `pf devshell sync` to synchronize local kubeconfigs, SSH settings, AWS profiles, and standard configuration files with live infrastructure.
  - Run `terragrunt run-all apply` across all modules to propagate the configuration changes introduced by the sync.
  references:
  - type: internal-commit
    summary: Initial implementation of the `pf` CLI tool
    link: aa49614d10a189ac5e6744b0949f8cf994e27009
  - type: internal-commit
    summary: Adds `pf devshell sync` tasks for infrastructure synchronization
    link: 7b1f505992598d12b16864c9ec33865c97232d9b
  impacts:
  - type: cli
    component: devshell sync
    summary: New command that synchronizes local devshell configuration with live infrastructure state
  - type: devshell
    component: pf
