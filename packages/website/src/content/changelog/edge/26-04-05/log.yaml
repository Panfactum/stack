- id: 672b8c19-8304-489d-bd14-12ac39527c6a
  type: addition
  summary: >-
    `kube_pg_cluster` adds a `pg_custom_image` input to support custom PostgreSQL container images with extensions.
  references:
  - type: internal-commit
    summary: 'feat(kube_pg_cluster): support custom_image (#376)'
    link: 5809f908864efcc93847361fabefc7abfa764d61
  - type: external-docs
    summary: 'CloudNativePG blog: building custom PostgreSQL images with Docker Bake'
    link: https://cloudnative-pg.io/blog/building-images-bake/
  - type: internal-docs
    summary: '`kube_pg_cluster` module documentation'
    link: /docs/main/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster
  impacts:
  - type: iac-module
    component: kube_pg_cluster
    summary: New optional `pg_custom_image` input overrides `pg_version` for image selection when set
  description: |
    The new `pg_custom_image` input (default `null`) allows deploying a custom PostgreSQL container image instead of the default CloudNativePG image selected by `pg_version`. This is useful when you need PostgreSQL extensions that are not included in the standard CNPG images.

    Supported use cases include:

    1. Pre-built CNPG extension images such as `ghcr.io/cloudnative-pg/postgis:17` for PostGIS support
    2. Custom-built images with arbitrary Debian-packaged extensions (e.g., `pgvector`, `pg_cron`, `TimescaleDB`) assembled via Docker Bake

