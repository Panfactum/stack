    component: enter-shell-local
    summary: '`CI` is now unset on shell entry instead of being set to `"false"`'
  description: >-
    Many tools (e.g., `npm`, Jest, CI platforms) check for the *presence* of the `CI` environment variable, not its
    value. Setting `CI="false"` still caused those tools to treat the DevShell as a CI environment, disabling
    interactivity and altering output formatting. Unsetting `CI` entirely ensures the DevShell is correctly recognized
    as a local, non-CI environment by all tooling.
