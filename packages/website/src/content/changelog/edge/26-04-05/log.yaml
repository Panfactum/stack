- id: 5cae977d-c96b-4581-833c-ee6b028c3dda
  type: fix
  summary: >-
    AWS SSO sessions now sync across all profiles, eliminating redundant login prompts.
  description: >-
    Previously, each AWS profile maintained its own independent SSO session, so users were prompted to
    re-authenticate when switching between profiles even though they had already completed SSO login.
    The generated AWS config now uses a shared `sso-session` block, ensuring a single SSO login is
    valid across all configured profiles.
