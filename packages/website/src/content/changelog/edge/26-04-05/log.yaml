  type: breaking_change
  summary: >-
    `vpa_enabled` now defaults to `false` in several ingress and infrastructure modules.
  description: >-
    VPA was previously enabled by default in these modules, which could cause issues when `kube_vpa`
    had not yet been deployed in the cluster. Disabling VPA by default ensures these modules work
    correctly out of the box without requiring a VPA installation, while still allowing users to
    opt in by setting `vpa_enabled = true` when VPA is available.
  action_items:
    - >-
      If you rely on VPA for autoscaling in `kube_aws_lb_controller`, `kube_external_dns`,
      `kube_ingress_nginx`, or `vault_core_resources`, add `vpa_enabled = true` to each
      module's configuration.
