    link: c7178d3ab8a857594c8c79bce7a4411176ca2244
  - type: internal-docs
    summary: '`kube_policies` module overview'
    link: /docs/main/modules/kube_policies/overview
  impacts:
  - type: iac-module
    component: kube_policies
    summary: >-
      `NODE_OPTIONS=--max-old-space-size` injected into all containers and init containers
      proportional to memory request; init-container Kyverno rule corrected to iterate
      `spec.initContainers` instead of `spec.containers`
