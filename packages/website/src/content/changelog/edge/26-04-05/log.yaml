  impacts:
  - type: iac-module
    component: kube_job
    summary: >-
      New submodule providing a production-hardened Kubernetes Job with pod security, VPA, PDB,
      bin-packing scheduling, and failure policy support
- id: 64d65505-8929-404e-8c16-1083e6f46ed8
  type: addition
  summary: >-
    Adds the `kube_keda` module for deploying KEDA (Kubernetes Event-Driven Autoscaling) as part
    of the base cluster installation.
  description: >-
    KEDA extends the built-in Kubernetes Horizontal Pod Autoscaler with capabilities the HPA cannot
    provide on its own: scaling to zero, combining horizontal and vertical autoscaling simultaneously,
    and reacting to hundreds of external event sources beyond CPU and memory. The new `kube_keda`
    module deploys KEDA via its official Helm chart with production-hardened defaults including
    cert-manager integration, VPA resources, pod disruption budgets, and SLA-aware replica counts.
    Adding KEDA as a base platform component enables all Panfactum workloads to leverage
    event-driven autoscaling without additional setup.
  action_items:
  - Deploy the `kube_keda` module as part of your cluster bootstrap process. See the related
    breaking change entry for installation order details.
