- id: 2d32917d-0fac-4b7b-ada2-fae810431ee9
  type: breaking_change
  summary: >-
    `pf sso add` now deploys Authentik at `sso.<domain>` instead of `authentik.<domain>`.
  action_items:
  - >-
    Update the `authentik_url` value in `global.yaml` from `https://authentik.<domain>` to
    `https://sso.<domain>`.
  - >-
    Update DNS records to point `sso.<domain>` to the Authentik ingress. Remove the old
    `authentik.<domain>` record after verifying the new one works.
  - >-
    Re-apply `kube_authentik` by running `terragrunt apply` in its module directory so it picks
    up the new domain.
  references:
  - type: internal-commit
    summary: 'refactor: standardize SSO subdomain configuration and update domain references'
    link: 07d42f09a43b367e79433147d0e9c46a083e95b9
  - type: external-docs
    summary: Authentik identity provider documentation
    link: https://docs.goauthentik.io/
  - type: internal-docs
    summary: '`kube_authentik` module reference'
    link: /docs/main/reference/infrastructure-modules/kubernetes/kube_authentik
  impacts:
  - type: cli
    component: sso add
    summary: Deploys Authentik at `sso.<domain>` instead of `authentik.<domain>`
  - type: configuration
    component: global.yaml
    summary: '`authentik_url` must be updated to use the new `sso.<domain>` subdomain'
  - type: iac-module
    component: kube_authentik
    summary: The `domain` input now receives `sso.<domain>` instead of `authentik.<domain>`
  description: |
    The Authentik subdomain has been standardized from `authentik.<domain>` to `sso.<domain>` across the entire SSO setup workflow. This change unifies four previously inconsistent domain references:

    1. The `domain` input passed to the `kube_authentik` module
    2. The Authentik API base path used during setup
    3. The `authentik_url` written to `global.yaml`
    4. The user-facing prompts shown during `pf sso add`

    A shared `SSO_SUBDOMAIN` constant now governs all domain construction, preventing drift between these references. The shorter `sso` prefix also better communicates the service's purpose to end users visiting the login page.
