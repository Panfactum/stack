  - type: cli
    component: kube get-token
    summary: No longer requires DevShell; `kubectl` credential plugins now work in CI environments
  - type: cli
    component: k8s velero snapshot-gc
    summary: No longer requires DevShell; snapshot garbage collection runs in non-DevShell containers
  - type: cli
    component: util get-module-hash
    summary: No longer requires DevShell; computes module hashes in CI change-detection scripts
  description: |
    Several `pf` CLI commands intended for use in CI/CD pipelines and automation containers were
    incorrectly requiring a full DevShell environment. When these commands ran outside the DevShell
    (e.g., inside Argo workflow containers or CI runners), the CLI called `git rev-parse --show-toplevel`
    to load DevShell configuration and failed immediately because no repository or DevShell context existed.

    The fix introduces a lighter initialization path that skips DevShell configuration loading for commands
    that do not need it. Each affected command now opts out of the full initialization, allowing it to run
    with only the base context (logger, analytics, process manager). The following commands are now
    DevShell-independent:

    - `pf wf git-checkout`
    - `pf wf sops-set-profile`
    - `pf util get-commit-hash`
    - `pf buildkit scale up`
    - `pf iac update-module-status`
    - `pf kube disable-disruptions`
    - `pf kube enable-disruptions`
    - `pf kube get-token`
    - `pf k8s velero snapshot-gc`
    - `pf util get-module-hash`
- id: 87822b32-4951-44b0-ab9a-bdcd211fe844
  type: improvement
  summary: >-
    The Nix image builder Argo workflow now skips redundant builds when the target image already exists in ECR.
  references:
  - type: internal-commit
    summary: 'feat(nix-image-builder): skip redundant builds if image already exists in ECR'
    link: 884e7e5056f7b72b8d07b94d8a7a3ca16cbc9efc
  impacts:
  - type: iac-module
    component: kube_constants
    summary: Internal image tag updated for the Nix image builder with idempotent ECR check
  description: |
    A new `check-image` pre-flight DAG step resolves the target Git ref to a commit SHA and queries ECR for existing per-architecture images and the multi-arch manifest before any build work begins.

    - The `build-and-push`, `build-and-push-arm`, and `merge-and-copy` tasks are now conditionally executed based on output flags from `check-image`.
    - Re-triggering a workflow for a SHA that was already built results in a no-op instead of re-building identical layers.

    This saves compute time and avoids unnecessary ECR pushes when workflows are re-triggered for commits that have already been built.
- id: de994766-1a79-4a61-b9cf-7a614666eef3
  type: fix
  summary: >-
    Fixes `pf` CLI error exit code and updates CI workflow scripts to use renamed CLI subcommands.
  references:
  - type: internal-commit
    summary: 'fix: correct error handling and CI workflow gaps'
    link: ddd7657e87f776df75cb102ec19447a732fff553
  - type: internal-docs
    summary: '`wf_dockerfile_build` module documentation'
    link: /docs/main/reference/infrastructure-modules/submodule/workflow/wf_dockerfile_build
  - type: internal-docs
    summary: '`wf_tf_deploy` module documentation'
    link: /docs/main/reference/infrastructure-modules/submodule/workflow/wf_tf_deploy
  description: |
    Three fixes from the same commit:

    1. The `pf` CLI now sets `process.exitCode = 1` in the top-level error handler so that callers and CI pipelines can detect failures reliably. Previously, unhandled errors were logged but the process exited with code 0, masking failures in automation.
    2. `wf_dockerfile_build` `scale-buildkit.sh` now calls `pf buildkit scale up` instead of the removed `pf buildkit resume` subcommand, which was renamed in an earlier release.
    3. `wf_tf_deploy` `deploy.sh` now calls `pf wf sops-set-profile` with positional arguments instead of the removed `--directory` and `--profile` flags, aligning with the updated CLI interface.
  impacts:
  - type: devshell
    component: pf
    summary: Top-level error handler now sets `process.exitCode = 1` so CLI failures propagate a non-zero exit code
  - type: iac-module
    component: wf_dockerfile_build
    summary: '`scale-buildkit.sh` now calls `pf buildkit scale up` instead of the removed `pf buildkit resume`'
  - type: iac-module
    component: wf_tf_deploy
    summary: '`deploy.sh` `sops-set-profile` call updated to positional argument syntax (removed `--directory` and `--profile` flags)'
- id: 3ddac59b-8f07-4b08-80c3-3d1366d1e6b9
  type: improvement
  summary: >-
    `pf wf sops-set-profile` now skips YAML parsing for non-SOPS files via a regex pre-check, reducing overhead in
    large directories.
  references:
  - type: internal-commit
    summary: 'perf(sops-set-profile): skip YAML parsing for non-SOPS files early'
    link: 81808b61f0e73ac032b9f27700f2facbc18a9061
  impacts:
  - type: cli
    component: wf sops-set-profile
    summary: Faster execution in repositories with many non-encrypted YAML files due to a regex pre-check that skips full YAML parsing
  description: >-
    When scanning directories, most files are not SOPS-encrypted. Previously, every YAML file was fully parsed to
    detect the `sops:` key before determining whether to skip it. A `fileContains` regex check now runs first and
    bails out immediately when no `sops:` line is found, avoiding the expensive YAML parse for the majority of
    files. This significantly reduces execution time for `pf wf sops-set-profile` in repositories with many
    non-encrypted YAML files.
- id: d25833a1-b552-4ae6-97bc-4c0332a59596
  type: fix
  summary: >-
    Fixes `wf_tf_deploy` Terragrunt flags and `pf wf sops-set-profile` non-KMS SOPS schema crash.
  description: |
    Two fixes from the same commit:

    1. `wf_tf_deploy` `deploy.sh` was using deprecated `--terragrunt-*` flags that newer Terragrunt versions no longer accept. All flags have been updated to their short-form equivalents (`--download-dir`, `--non-interactive`, `--dependency-fetch-output-from-state`, `--provider-cache`, `--provider-cache-dir`, `--parallelism`).
    2. `pf wf sops-set-profile` crashed on SOPS files encrypted with non-KMS backends (e.g., `age`) because the Zod schema for the inner `sops` object was strict and rejected extra fields. Adding `.passthrough()` tolerates unknown fields so non-KMS configurations no longer cause validation errors.
  references:
  - type: internal-commit
    summary: 'fix(wf): migrate terragrunt flags to new CLI format'
    link: cfb4c739cf687095795a2e2a8a0439ef408858fc
  - type: issue-report
    summary: Removal of legacy Terragrunt flags (all flags that start with `terragrunt-`)
    link: https://github.com/gruntwork-io/terragrunt/issues/4597
  - type: internal-docs
    summary: '`wf_tf_deploy` module reference'
    link: /docs/main/reference/infrastructure-modules/submodule/workflow/wf_tf_deploy
  impacts:
  - type: iac-module
    component: wf_tf_deploy
    summary: >-
      `deploy.sh` now uses short-form Terragrunt flags (`--download-dir`, `--non-interactive`, etc.)
      instead of deprecated `--terragrunt-*` equivalents
  - type: cli
    component: wf sops-set-profile
    summary: >-
      Inner `sops` Zod schema now uses `.passthrough()` to tolerate unknown fields from non-KMS SOPS
      configurations
  action_items:
  - Re-apply the `wf_tf_deploy` module to deploy the updated `deploy.sh` script with the correct Terragrunt flag format.
- id: fb8ff96f-fe3f-43d3-b667-4246f073341b
  type: fix
  summary: >-
    The DevShell `terragrunt` wrapper no longer runs the `GIT_PASSWORD` redaction pipeline in CI when
    `GIT_PASSWORD` is unset.
  description: >-
    Previously the custom `terragrunt` wrapper unconditionally piped all CI output through a `sed`
    substitution to redact `GIT_PASSWORD`. When `GIT_PASSWORD` was empty, this produced an empty `sed`
    pattern, which is a no-op at best and can cause unexpected pipe behavior at worst. The wrapper now
    checks that `GIT_PASSWORD` is non-empty before activating the redaction pipeline, and falls through
    to a plain `exec` path in CI when no password is present.
  references:
  - type: internal-commit
    summary: 'fix(terragrunt): skip secret redaction when GIT_PASSWORD is unset'
    link: 9e8754ede8059150ab93bd2f9515e9df2dc61f12
  impacts:
  - type: devshell
    component: terragrunt
    summary: Skips the `sed`-based `GIT_PASSWORD` redaction when `GIT_PASSWORD` is unset in CI
