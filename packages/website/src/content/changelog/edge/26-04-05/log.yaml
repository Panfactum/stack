    summary: >-
      Adds `s3.client.default.endpoint` to the OpenSearch configuration, pointing
      to the regional S3 endpoint so that snapshot operations authenticate and
      route correctly.
  description: >-
    Without an explicit `s3.client.default.endpoint`, the OpenSearch S3 repository
    plugin defaults to the global `s3.amazonaws.com` endpoint, which can return
    HTTP 307 redirects or authorization-header mismatches for buckets outside
    `us-east-1`. This caused snapshot registration and restore operations to fail
    silently under IRSA-based authentication. Setting the endpoint to
    `s3.<region>.amazonaws.com` ensures requests are routed directly to the
    correct regional endpoint, avoiding both redirect loops and credential-scope
    errors.
- id: 20552955-a5ee-4d9c-be5a-a6ac82c277a7
  type: improvement
  summary: >-
    Refactors `pf devshell sync` into reusable Listr task builders and fixes `pf env add` EC2 Spot role import.
  description: |
    Two related improvements from the same commit:

    1. `pf devshell sync` internal sync logic was refactored into composable Listr task builders (`buildSyncKubeClustersTask`, `buildSyncSSHTask`, `buildSyncAWSIdentityCenterTask`) shared across `pf devshell sync`, `pf env add`, and future CLI commands. This improves reliability and gives users real-time progress visibility via Listr's interactive task renderer.
    2. `pf env add` now conditionally skips importing the `AWSServiceRoleForEC2Spot` IAM service-linked role when it does not already exist in the account, fixing failures on accounts where spot instances have never been used.
  references:
  - type: internal-commit
    summary: Refactor devshell update to use Listr task builders and add AWS Identity Center sync
    link: 7b1f505992598d12b16864c9ec33865c97232d9b
  - type: external-docs
    summary: Listr2 — terminal task list library used for CLI progress rendering
    link: https://github.com/listr2/listr2
  impacts:
  - type: cli
    component: devshell sync
    summary: Internal sync logic refactored into composable Listr task builders with AWS Identity Center sync added
  - type: cli
    component: env add
    summary: Conditionally skips `AWSServiceRoleForEC2Spot` import when the role does not exist in the account
- id: 54efecd9-8b68-41d8-876e-c6c1a00d175a
  type: addition
  summary: >-
    Adds `pf domain add`, a guided wizard for adding a domain to a Panfactum environment.
  description: |
    The new `pf domain add` CLI command automates the entire domain onboarding workflow that was previously a multi-step manual process. The wizard handles:

    1. Purchasing new domains through AWS Route 53
    2. Importing already-owned domains from other registrars
    3. Creating environment-specific subdomains with automatic DNS delegation
    4. Deploying and configuring Route 53 hosted zones
    5. Linking subdomains across environments for security isolation

    Domains in Panfactum are scoped to environments so that workloads in one environment cannot alter DNS records belonging to another. The wizard detects whether a domain is already registered, whether it is an apex domain or a subdomain, and whether any ancestor domains are already configured, then guides the user through the appropriate setup path.
  references:
  - type: internal-commit
    summary: Add `pf domain add` CLI command for guided domain onboarding
    link: 7b1f505992598d12b16864c9ec33865c97232d9b
  - type: internal-docs
    summary: DNS bootstrapping guide
    link: /docs/main/guides/bootstrapping/dns
  - type: internal-docs
    summary: Subdomain delegation concept
    link: /docs/main/concepts/networking/subdomain-delegation
  impacts:
  - type: cli
    component: domain add
    summary: >-
      New guided wizard that automates domain registration, DNS zone deployment,
      and cross-environment subdomain delegation
- id: 978d75b9-1eb2-470c-b391-c5b158ddfa65
  type: improvement
  summary: '`pf config get` now returns `environment_dir`, `region_dir`, and `module_dir` derived fields.'
  references:
  - type: internal-commit
    summary: Add `environment_dir`, `region_dir`, and `module_dir` derived fields to `pf config get`
    link: 7b1f505992598d12b16864c9ec33865c97232d9b
  impacts:
  - type: cli
    component: config get
    summary: Now returns `environment_dir`, `region_dir`, and `module_dir` derived fields
  description: >-
    Directory names in the Panfactum environments tree can differ from the logical
    environment, region, and module names set in configuration files. Previously,
    `pf config get` only exposed the logical names, which made it difficult for
    scripts and CLI commands to resolve the actual filesystem paths. The three new
    derived fields — `environment_dir`, `region_dir`, and `module_dir` — provide
    the real directory names extracted from the current working directory's position
    in the environments tree, enabling reliable path construction without manual
    parsing.
- id: ff6dfb1b-d766-475d-94cc-5a7cf4594529
