- id: 782bf2e9-c7d9-4dd5-a6b6-2ea1c03ae1f4
  type: fix
  summary: >-
    Fixes `kube_pg_cluster` cross-account recovery — missing IAM permissions on
    remote bucket and `recoveryTarget` schema validation error.
  references:
  - type: internal-commit
    summary: 'fix: kube pg cluster recover from remote backups (#377)'
    link: b1168e61fb424a8e66a542c5c232721195300cfc
  - type: issue-report
    summary: Cross-account PG cluster recovery — missing IAM permissions on remote S3 bucket
    link: https://github.com/Panfactum/stack/issues/378
  - type: external-docs
    summary: CloudNativePG backup and recovery documentation
    link: https://cloudnative-pg.io/documentation/1.25/recovery/
  - type: internal-docs
    summary: '`kube_pg_cluster` module documentation'
    link: /docs/main/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster
  impacts:
  - type: iac-module
    component: kube_pg_cluster
    summary: >-
      IAM policy now grants `s3:*` on the `pg_recovery_bucket` when set;
      `recoveryTarget` block uses `merge()` with all fields explicitly declared;
      `backendID` corrected to `backupID` to match the CNPG CRD field name.
  description: |
    Two recovery fixes from the same commit:

    1. When using `pg_recovery_bucket` to restore from a remote S3 bucket, the cluster's IAM role lacked `s3:*` permissions on that bucket, causing authentication failures. The IAM policy now includes the remote bucket and its objects when `pg_recovery_bucket` is set.

    2. The `recoveryTarget` block conditionally set only some fields, triggering a `Manifest configuration incompatible with resource schema` planning error because the Terraform `kubernetes` provider requires all nested object fields to be explicitly declared (even as `null`). The fix uses `merge()` to provide all `recoveryTarget` fields and corrects `backendID` to `backupID` to match the actual CNPG CRD field name.
- id: 35fd07ac-6319-4f91-9c30-f72bb76e3aee
  type: addition
