- id: 4b30f388-7287-4c39-ac21-d50ab21fd0c8
  type: improvement
  summary: >-
    `pf cluster enable` ECR setup now runs `terragrunt run-all apply` after enabling pull-through cache.
  references:
  - type: internal-commit
    summary: Replace targeted `kube_policies` re-deploy with full `terragrunt run-all apply` after enabling ECR pull-through cache
    link: 34ee420cad0fd8bc0c5fd72674bf734b02771ca7
  - type: internal-docs
    summary: "`aws_ecr_pull_through_cache` module reference"
    link: /docs/main/modules/aws_ecr_pull_through_cache
  impacts:
  - type: cli
    component: cluster enable
    summary: ECR setup step replaces the single `kube_policies` re-deploy with a region-wide `terragrunt run-all apply`
  description: |
    Previously the ECR enable step in `pf cluster enable` only re-deployed `kube_policies` after setting `pull_through_cache_enabled: true` in the region config. This was insufficient because many other modules reference that flag and would remain out of date until the next manual apply.

    The step now runs `terragrunt run-all apply` across the entire region directory, ensuring every module that depends on pull-through cache settings is updated in a single operation. This eliminates a class of subtle post-enable failures where workloads would still attempt to pull images directly instead of through the ECR cache.
- id: 6ff7eec5-54f9-4fdc-9138-d43ae085ec39
  type: improvement
