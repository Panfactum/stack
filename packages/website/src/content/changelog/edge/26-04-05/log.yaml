- id: 3efa85f8-1dd7-4401-ae18-657f6919ae56
  type: fix
  summary: Fixes and hardens the Nix version check in the DevShell `.envrc` template.
  references:
  - type: internal-commit
    summary: 'fix: nix version check in envrc'
    link: ac01f734d88d02ebfbf26aeaefaf434f8be25df4
  - type: internal-commit
    summary: 'fix: refactor nix version check in .envrc to match install.sh'
    link: 3e06e130f943907d5409980df2333fbdc813a5bf
  - type: internal-docs
    summary: Guide for installing and booting the Panfactum DevShell
    link: /docs/main/guides/bootstrapping/installing-devshell
  description: |
    Two iterative fixes to the Nix version check in the `.envrc` template:

    1. The version field parse was corrected from `$3` to `$NF` to handle `nix --version` output with more than three whitespace-separated tokens.
    2. The entire version comparison was refactored to use a POSIX-compatible `sort -V` approach instead of a bash-specific array function, improving portability across shells.
    3. A missing-Nix prompt was added for when Nix is not on `PATH` at all, guiding the user to install it rather than failing silently.

    Additionally, the `install.sh` DevShell build time estimate was updated from 30 minutes to 15 minutes to reflect current build performance.
  impacts:
  - type: cli
    component: devshell sync
    summary: >-
      `.envrc` template updated with a POSIX-compatible Nix version check and a
      missing-Nix installation prompt
  - type: installer
    component: install.sh
    summary: DevShell build time estimate updated from 30 to 15 minutes
- id: bfc3b7c4-ba45-4623-96ff-0a185ea08536
  type: fix
  summary: >-
    Fixes `pf env add` credential loading failure for the management account profile during environment provisioning.
  references:
  - type: internal-commit
    summary: Fix AWS SDK credentials bug in `pf env add`
    link: db4b7e515ee1a16e6fdbd392a2adcbe00024d669
  - type: issue-report
    summary: AWS SDK credential provider cache does not pick up newly written credentials
    link: https://github.com/aws/aws-sdk-js-v3/issues/5829
  impacts:
  - type: cli
    component: env add
    summary: >-
      `OrganizationsClient` and `STSClient` now read credentials directly from disk instead of relying on the SDK provider cache.
  description: >-
    The AWS Node SDK caches credential-provider results in memory, so credentials written to
    `~/.aws/credentials` during the same process run are invisible to subsequent SDK clients that
    use the default provider chain. This caused `pf env add` to fail when provisioning new AWS
    accounts because the `OrganizationsClient` and `STSClient` could not find the management
    account credentials that an earlier step had just saved to disk. The fix explicitly reads
    credentials from the credentials file via `getCredsFromFile` and passes them directly to
    each client constructor, bypassing the SDK's provider cache entirely.
- id: ef6a3975-91f7-4fdd-82cf-e03f3bf402b9
  type: fix
  summary: >-
    `pf domain add` now uses a WHOIS fallback to fix false-negative domain registration detection
    for newly purchased domains.
  references:
  - type: internal-commit
    summary: Improve domain `isRegistered` check with WHOIS fallback
    link: 4156dcf072d3e93735c7f16361fcbcbe61c8b7cd
  impacts:
  - type: cli
    component: domain add
    summary: >-
      Domain registration detection now uses a two-step check: first querying DNS nameservers via `dig`,
      then falling back to a WHOIS database lookup when no nameservers are found.
  - type: devshell
    component: whois
    summary: Added `whois` to the DevShell to support the improved domain registration check.
  description: >-
    Previously, `pf domain add` determined whether a domain was registered solely by checking if it had
    DNS nameservers configured. A recently purchased domain with no nameservers would be incorrectly
    reported as unregistered, forcing users to work around the false negative. The registration check now
    uses a two-step approach: it first queries nameservers via `dig` and, if none are found, falls back to
    a WHOIS database lookup. Although the WHOIS database may be 24-72 hours out-of-date, it provides a
    reliable secondary signal for newly registered domains. The `whois` CLI tool has been added to the
    Panfactum DevShell as a dependency for this check.
- id: 0af75a20-e01a-4785-afe2-2a64f746b3c5
  type: fix
  summary: >-
    `pf env add` phone number prompt now includes a format example, clarifying that a country-code prefix is
    required.
