- id: 4c58208b-e9a1-48e0-8da4-f0f1d312fe27
  type: fix
  summary: >-
    Fixes `pf cluster add` EKS step to exclude SSO ARNs from `extra_superuser_principal_arns` and Vault pod readiness
    check to pass `--context`.
  references:
  - type: internal-commit
    summary: Fix sso cluster add (#357)
    link: ebbc5fa198626b320fcc6ef02d5f18a6d72932a5
  - type: external-commit
    summary: "Pull request: Fix sso cluster add (#357)"
    link: https://github.com/Panfactum/stack/pull/357
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      EKS setup excludes transient SSO assumed-role ARNs from `extra_superuser_principal_arns`; Vault pod readiness
      check now passes `--context` to `kubectl`
  description: |
    Two fixes for SSO-authenticated `pf cluster add` runs:

    1. The EKS setup step was including the caller's SSO assumed-role ARN in `extra_superuser_principal_arns`. These ARNs contain `AWSReservedSSO` and are transient, so they cannot be used as persistent EKS access entry principals — they are now excluded.
    2. The `kubectl get pods` command used to check Vault pod readiness was missing the `--context` flag, causing it to target the wrong cluster. The step now validates that `kubeConfigContext` is present and passes it explicitly.
