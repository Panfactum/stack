    link: edf631ddf4a14bff92aaea31b2a6ca08a55a7833
  - type: internal-docs
    summary: Terragrunt variables reference documenting `tf_state_region`
    link: /docs/main/reference/configuration/terragrunt-variables
  description: |
    The `getRegions` utility determines which region hosts the Terraform state bucket by matching each region's `aws_region` against the environment-level `tf_state_region` value. In environments that include a `global` pseudo-region directory, this comparison could incorrectly flag `global` as the primary region when its `aws_region` happened to match `tf_state_region`.

    The root cause involved two issues:

    1. The initial exclusion check compared the raw `region` config key against `GLOBAL_REGION`, but `region` can be `undefined` when `region.yaml` does not explicitly set a `region` key. An `undefined` value bypasses the exclusion entirely.
    2. The fix resolves this by computing the resolved region name (`region ?? basename(regionPath)`) first, then using that resolved name in the `GLOBAL_REGION` exclusion check. This ensures the `global` directory is always excluded regardless of whether its `region.yaml` explicitly sets the `region` key.

    All CLI commands that depend on primary region detection now correctly identify the primary region in environments containing a `global` region directory.
  impacts:
  - type: cli
    component: cluster add
    summary: No longer incorrectly identifies the `global` region as primary when adding a new cluster
  - type: cli
    component: cluster enable
    summary: No longer incorrectly identifies the `global` region as primary when enabling cluster features
  - type: cli
    component: env add
    summary: No longer incorrectly identifies the `global` region as primary when bootstrapping an environment
  - type: cli
    component: sso add
    summary: No longer incorrectly identifies the `global` region as primary when configuring SSO
- id: fb4cb81f-02f6-4d5f-a64f-be12dacfeda1
  type: fix
  summary: >-
    Fixes `pf env add` state bucket generation failing on new AWS accounts where S3 is not yet active.
  description: |
    On freshly created AWS accounts, the S3 service may not be immediately active, causing the `HeadBucketCommand` call during state bucket name generation to fail with a `not signed up` error. Two resilience measures were added:

    1. A new `Activate S3 service` step now runs before bucket name generation. It attempts to create and delete a dummy bucket, retrying with exponential backoff up to 30 times until S3 becomes available.
    2. The `Generate unique state bucket name` step now includes a retry loop (up to 3 attempts) around the `HeadBucketCommand` call to handle transient connectivity issues that are common immediately after account creation.
  references:
  - type: internal-commit
    summary: 'fix:cli: check if s3 service is active before generating state bucket name'
    link: 389632ed207eb8bbb26e48dac85f4661b7e119c8
  impacts:
  - type: cli
    component: env add
    summary: Adds an S3 activation check with retry logic before state bucket name generation on new AWS accounts
