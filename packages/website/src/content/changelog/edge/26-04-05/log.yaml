    summary: >-
      New module deploying KEDA via its official Helm chart with cert-manager TLS, VPA, PDBs,
      topology spread constraints, and SLA-aware replica configuration
- id: 769d03d6-ee6f-4401-8229-81a88ae024d5
  type: addition
  summary: >-
    Adds `sub_paths` option to `config_map_mounts` and `secret_mounts` inputs in all workload modules for mounting
    individual files instead of entire volumes.
  description: >-
    Previously, mounting a ConfigMap or Secret in a Panfactum workload module would always mount the entire volume at
    the specified path, replacing any existing files in that directory. This made it impossible to inject a single
    configuration file into a directory that already contained other files. The new `sub_paths` option uses the
    Kubernetes `subPath` mechanism to mount only the specified keys, each as an individual file at
    `<mount_path>/<sub_path>`, leaving the rest of the directory intact.
  references:
  - type: internal-commit
