- id: 38bd713e-571d-4337-a656-a632de3b993d
  type: fix
  summary: >-
    Fixes CLI commands failing to update existing SOPS-encrypted files when merging new secret values.
  references:
  - type: internal-commit
    summary: "fix: set overwrite to true for `sopsUpsert`"
    link: f33f0f128c2b05ca31e10fecf2d0be3dd05d1ac2
  impacts:
  - type: cli
    component: cluster add
    summary: SOPS secret upserts during Vault and inbound networking setup no longer fail on existing files
  - type: cli
    component: cluster enable
    summary: SOPS secret upserts during ECR setup no longer fail on existing files
  - type: cli
    component: sso add
    summary: SOPS secret upserts during federated auth and Authentik setup no longer fail on existing files
  description: |
    The internal `sopsUpsert` utility merges new key/value pairs into an existing SOPS-encrypted file by decrypting the current contents, spreading in the new values, and re-encrypting the result. However, the final `sopsWrite` call was missing `overwrite: true`, causing it to throw an error whenever the target file already existed on disk.

    This meant that any CLI command relying on `sopsUpsert` to update secrets -- including `pf cluster add`, `pf cluster enable`, and `pf sso add` -- would fail on the second run or whenever the secrets file had been previously created. The fix passes `overwrite: true` in the existing-file code path, ensuring the merged result is written back correctly on every invocation.
- id: 815fbc87-b244-4c09-ad52-67c1009a0aa2
  type: improvement
  summary: >-
    `panfactum.hcl` auto-injects `route53_zones` and `kube_domain` with safe defaults, and
    `kube_certificates` makes `vault_internal_url` optional.
  references:
  - type: internal-commit
    summary: 'fix: kube_certificates migration guide'
    link: 8dddf6bf63532b62b4cf55e7b598421a645b1643
  - type: internal-commit
    summary: 'fix: kube_domain default input'
    link: d14a548a5cd98b7e2bfee632bbe118459be04b6a
  - type: internal-docs
    summary: '`kube_certificates` module reference'
    link: /docs/main/reference/infrastructure-modules/kubernetes/kube_certificates
  impacts:
  - type: iac-module
    component: kube_certificates
    summary: >-
      `vault_internal_url` now defaults to `http://vault-active.vault.svc.cluster.local:8200`,
      making the input optional for standard Panfactum cluster layouts.
  - type: configuration
    component: panfactum.hcl
    summary: >-
      Injects `route53_zones` and `kube_domain` as global default module inputs using `lookup()`
      with safe defaults (`{}` and `null` respectively).
  description: |
    Two improvements that simplify migrating to `kube_certificates`:

    1. `panfactum.hcl` now injects `route53_zones` (from `local.vars.domains`) and `kube_domain` (from `local.vars.kube_domain`) as global default module inputs using `lookup()` with safe defaults (`{}` and `null` respectively). Modules receive these values automatically without manual wiring, and the template works in environments where these keys are absent from the configuration.
    2. `vault_internal_url` in `kube_certificates` defaults to `http://vault-active.vault.svc.cluster.local:8200`, making it optional for standard Panfactum layouts. Users no longer need to explicitly provide the Vault URL when deploying this module in a cluster that follows the default Panfactum conventions.
- id: 4285e484-36fe-4a55-acb7-454bcd6b45db
  type: improvement
  summary: >-
    `kube_opensearch` adds opt-in Dashboards, re-enables S3 remote storage, switches to static IAM credentials, and
    sizes JVM heap dynamically.
  references:
  - type: internal-commit
    summary: 'feat: adds opensearch dashboards, remote storage, and v3'
    link: 55a2cd5eea66664a7994f5841abda062d982fe1e
  - type: issue-report
    summary: 'OpenSearch issue #15902 (segment replication remote store)'
    link: https://github.com/opensearch-project/OpenSearch/issues/15902
  - type: issue-report
    summary: 'OpenSearch issue #16523 (IRSA web identity token not usable with S3 plugin)'
    link: https://github.com/opensearch-project/OpenSearch/issues/16523
  - type: internal-docs
    summary: '`kube_opensearch` module documentation'
    link: /docs/main/modules/kube_opensearch
  - type: external-docs
    summary: OpenSearch official documentation
    link: https://docs.opensearch.org/
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: >-
      Adds opt-in OpenSearch Dashboards via `dashboard_enabled`, re-enables S3 segment and translog remote storage,
      switches S3 plugin authentication to static IAM credentials via `kube_aws_creds`, and sizes JVM heap dynamically
      to 50% of the container memory request.
  description: |
    Four improvements to the `kube_opensearch` module:

    1. **OpenSearch Dashboards** can now be deployed alongside the cluster. Enable via `dashboard_enabled` (default `false`); when enabled, `dashboard_domain` configures the ingress hostname. New inputs `log_level`, `slow_request_log_thresholds`, and `extra_cluster_settings` provide additional cluster tuning.
    2. **S3 remote storage re-enabled.** `node.attr.remote_store.segment.repository` and `translog.repository` were previously disabled due to upstream bug [OpenSearch#15902](https://github.com/opensearch-project/OpenSearch/issues/15902). This is resolved in OpenSearch 3.x, so both are now re-enabled for S3-backed segment replication and recovery.
    3. **Static IAM credentials for the S3 plugin.** The S3 repository plugin cannot use the web identity token required by IRSA ([OpenSearch#16523](https://github.com/opensearch-project/OpenSearch/issues/16523)). The module now uses `kube_aws_creds` to provision short-lived static IAM access keys (rotated every 14 days) injected via the OpenSearch keystore.
    4. **Dynamic JVM heap sizing.** The JVM heap was previously hardcoded to `-Xmx512M -Xms512M`. The entrypoint script now reads `CONTAINER_MEMORY_REQUEST` and sets the heap to 50% of the request, keeping JVM memory proportional to the VPA-adjusted pod allocation.
- id: 07ae1274-c0e5-484f-be87-1b8ea0f4995b
  type: improvement
  summary: >-
    `pf cluster add` and `pf sso add` now skip `terragrunt init` for already-initialized modules, reducing
    redundant work during installation.
  references:
  - type: internal-commit
    summary: 'feat: intelligently skip init in deployModuleTask when possible'
    link: 084e5910a3bad7d214090c78cca30f8caf650036
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Module deploy tasks skip `terragrunt init` when the module's `init_status` is already `success` or
      `running`, speeding up resumed installs
  - type: cli
    component: sso add
    summary: >-
      Module deploy tasks skip `terragrunt init` when the module's `init_status` is already `success` or
      `running`, speeding up resumed installs
  description: |
    Previously, every module deployment task in `pf cluster add` and `pf sso add` ran `terragrunt init` unconditionally before applying, even on resumed installs where the module had already been initialized. This added unnecessary network round-trips and slowed down cluster setup, especially when resuming a partially completed installation.

    The `buildDeployModuleTask` utility now checks the module's `.pf.yaml` `init_status` field (written by the Panfactum terragrunt hooks) before deciding whether to run init. If `init_status` is `success` or `running`, the init step is skipped entirely. A new `forceInitModule` option can be set to override this behavior when a re-init is explicitly needed.

    The old `initModule` boolean parameter has been removed from the `buildDeployModuleTask` interface and replaced with the automatic `init_status` check, so callers no longer need to specify whether init should run.
- id: ec8f3272-b5cf-4657-a4e3-ff2a7082e712
  type: fix
  summary: >-
    Fixes `pf cluster add` Vault unseal skip check to query live seal status instead of a stale configuration flag.
  references:
  - type: internal-commit
    summary: 'fix: using vault status to check if unseal step should be skipped'
    link: a30fefc697ec9ecd01f72accdd2f83f6d3b7c413
  - type: internal-commit
    summary: 'lint: added schema validation on vault status'
    link: 0c1e3abe3ebb11f8985a37394060017c83e812ad
  - type: external-docs
    summary: Vault seal-status API reference
    link: https://developer.hashicorp.com/vault/api-docs/system/seal-status
  - type: internal-docs
    summary: Bootstrapping guide for Vault
    link: /docs/main/guides/bootstrapping/vault
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Vault unseal skip check now calls `vault status -format=json` directly instead of reading a stale
      `module.yaml` flag, and validates the response with a Zod schema
  description: |
    The `pf cluster add` Vault setup step previously decided whether to skip unsealing by reading the
    `extra_inputs.wait` flag from `kube_vault/module.yaml`, an indirect heuristic that could become stale
    if a prior run failed partway through. This caused the unseal step to be incorrectly skipped, leaving
    Vault sealed and blocking subsequent bootstrapping tasks.

    The fix replaces that heuristic with a direct query:

    1. The skip check now runs `vault status -format=json` via `kubectl exec` against the `vault-0` pod.
    2. Unsealing is skipped only when Vault reports `sealed: false`.
    3. The JSON response is parsed through a `parseJson` utility backed by a Zod schema, so malformed
       output produces a clear validation error instead of silently yielding `undefined`.
- id: 4456efe7-31d2-4f59-bc75-604e61248dfc
  type: fix
  summary: >-
    Fixes `pf domain add` poll title showing `undefined` and `kube_vault` KMS unseal key race condition.
  references:
  - type: internal-commit
    summary: 'fix:cli: initial domain register poll title'
    link: ccecb3270b0384feeaeaf62cf47124942071b121
  - type: internal-commit
    summary: 'fix: kube_vault depends_on unseal_key to prevent deploy race condition'
    link: ccecb3270b0384feeaeaf62cf47124942071b121
  - type: internal-docs
    summary: '`kube_vault` module documentation'
    link: /docs/main/reference/infrastructure-modules/kubernetes/kube_vault
  impacts:
  - type: cli
    component: domain add
    summary: Poll title no longer shows `undefined` before the first status response is received
  - type: iac-module
    component: kube_vault
    summary: >-
      Vault Helm release now explicitly depends on `module.unseal_key` to prevent a deploy race condition.
  description: |
    Two fixes from the same commit:

    1. The `pf domain add` registration poll title was displaying `undefined` as the initial status label before the first status response was received. The `lastStatus` variable was initialized as `undefined`, but the old check (`lastStatus !== ""`) evaluated to `true` for `undefined`, causing it to be interpolated into the title string. The fix changes the check to a truthy guard so the status is omitted until an actual value is available.
    2. The `helm_release.vault` resource only listed `module.aws_permissions` in its `depends_on`, meaning Terraform could attempt to deploy Vault before the KMS unseal key (`module.unseal_key`) was ready. Adding `module.unseal_key` to `depends_on` ensures the key exists before Vault starts, preventing initialization failures caused by a missing unseal key.
- id: 775eb8af-ed0a-4cc8-bb5d-64cfc7477989
  type: improvement
  summary: >-
    `pf cluster add` now reads the Vault root token from `region.secrets.yaml` via `getPanfactumConfig()` instead
    of directly SOPS-decrypting `kube_vault/secrets.yaml`.
  references:
  - type: internal-commit
    summary: moved `vault_token` to `region.secrets.yaml`
    link: 829ad02cd9296a82c8918338fdefbdafd5ca2fae
  - type: internal-docs
    summary: Bootstrapping guide for Vault setup
    link: /docs/main/guides/bootstrapping/vault
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Vault root token is now stored as `vault_token` in `region.secrets.yaml` and read through the merged
      `getPanfactumConfig()` result instead of per-step `sopsDecrypt` calls.
  - type: cli
    component: config get
    summary: >-
      `vault_token` is now a recognized field in the Panfactum config schema and appears in `pf config get` output.
  description: |
    Previously, each `pf cluster add` setup step (autoscaling, certificates, cluster extensions, inbound networking, Linkerd, Vault) independently called `sopsDecrypt` on `kube_vault/secrets.yaml` to obtain the Vault root token. This was fragile because every step had to know the exact file path and field name (`root_token`), creating tight coupling between unrelated setup stages.

    The token is now stored as `vault_token` in `region.secrets.yaml` and surfaced through the standard `getPanfactumConfig()` merge, so all steps read it from the shared `config` object. Key changes:

    1. The Vault initialization step writes `vault_token` to `region.secrets.yaml` instead of `kube_vault/secrets.yaml`.
    2. A `refreshConfig()` helper re-hydrates the config object after Vault initialization writes the token, ensuring downstream steps see the new value without a full restart.
    3. All six setup steps that previously called `sopsDecrypt` now read `config.vault_token` directly.
    4. The `config` object is passed through `InstallClusterStepOptions`, eliminating redundant file reads.
