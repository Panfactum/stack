- id: 7b3cc166-af27-4203-b9ef-627fe7ddd329
  type: fix
  summary: >-
    Fixes `kube_ingress_nginx` to allow multiple nginx replicas to be scheduled on the same host when `sla_target`
    is set to 1.
  description: >-
    Previously, `host_anti_affinity_required` was unconditionally set to `true` in the `kube_ingress_nginx` module,
    which prevented the Kubernetes scheduler from placing more than one nginx pod per node. For `sla_target` 1
    deployments -- which do not guarantee high availability -- this made it impossible to run multiple replicas
    on a single-node or small cluster. The fix conditionally sets `host_anti_affinity_required` to `false` when
    `sla_target` is 1, allowing replicas to colocate on the same host while preserving the anti-affinity
    requirement for higher SLA tiers.
  references:
  - type: internal-commit
    summary: 'fix: allow multiple nginx instances on one host for sla 1'
    link: de4a60f36ef43cf341131d3fbd80765c66d95693
  - type: external-docs
    summary: Ingress NGINX Controller documentation
    link: https://kubernetes.github.io/ingress-nginx/
  - type: internal-docs
    summary: '`kube_ingress_nginx` module reference'
    link: /docs/main/reference/infrastructure-modules/direct/kubernetes/kube_ingress_nginx
  impacts:
  - type: iac-module
    component: kube_ingress_nginx
    summary: >-
      `host_anti_affinity_required` is now set to `false` when `sla_target` is 1, allowing multiple replicas
      on the same node
- id: 79122405-3b24-4696-8d75-75edcc780808
