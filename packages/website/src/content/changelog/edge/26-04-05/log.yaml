- id: 1a75a888-209c-487d-8683-8c62f4fcdb2c
  type: fix
  summary: >-
    Improves `pf cluster add` Vault ingress verification with real-time polling status, a DNS propagation
    warning, and a longer timeout.
  description: |
    The Vault ingress health check during `pf cluster add` previously provided unclear feedback while waiting for
    DNS propagation, making it difficult for users to understand what was happening. This change addresses three
    issues:

    1. The task title now updates in real time to show the current polling attempt count and whether it is waiting
       for DNS propagation or for Vault readiness.
    2. A warning message is displayed indicating that DNS propagation may take 10-30 minutes.
    3. The polling timeout has been increased from 10 minutes (60 attempts) to 30 minutes (180 attempts) to
       accommodate slower DNS propagation without false failures.
