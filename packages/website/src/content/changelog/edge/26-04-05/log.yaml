- id: ccdda923-a0f8-4d56-b9ce-d0830ba8c06f
  type: improvement
  summary: >-
    `pf cluster add` now fully automates end-to-end cluster installation with fine-grained resumable
    steps.
  description: |
    The `pf cluster add` command now automates every phase of cluster installation. Each phase and its
    sub-steps are individually checkpointed, so interrupted installs resume from the exact failing step
    rather than restarting the entire phase.

    New automated phases:

    1. **Vault** -- deploys `kube_vault`, runs `vault operator init`, unseals with recovery keys, and deploys `vault_core_resources` via a dynamically-selected port-forward proxy.
    2. **Certificate management** -- deploys `kube_cert_manager` and `kube_cert_issuers` (now `kube_certificates`) with resumable sub-steps for each; prompts for alert email.
    3. **Linkerd** -- deploys `kube_linkerd` and verifies control plane health.
    4. **Autoscaling** -- deploys metrics server, VPA, Karpenter, node pools, scheduler, and KEDA as independently-resumable sub-steps.
    5. **Inbound Networking** -- deploys ExternalDNS, AWS LB Controller, nginx ingress, Vault ingress, and bastion.
    6. **Maintenance controllers** -- deploys Reloader, node image caches, PVC Autoresizer, Descheduler, External Snapshotter, and Velero.
