- id: 921dbe39-4f2b-4838-9380-c5e85a0e496f
  type: breaking_change
  summary: >-
    The `aws.secondary` provider alias and cross-region DynamoDB replica have been removed from
    `tf_bootstrap_resources`.
  action_items:
  - Remove the `aws.secondary` provider alias from your `tf_bootstrap_resources` Terragrunt configuration if present.
  - Run `terragrunt apply` on `tf_bootstrap_resources` to remove the cross-region DynamoDB replica from your state lock table.
  references:
  - type: internal-commit
    summary: 'feat: opensearch alpha state'
    link: 265d0a3fa27c15364fd814fd44d66aac4396bb88
  - type: internal-docs
    summary: '`tf_bootstrap_resources` module reference'
    link: /docs/main/reference/infrastructure-modules/direct/aws/tf_bootstrap_resources
  impacts:
  - type: iac-module
    component: tf_bootstrap_resources
    summary: >-
      Removed the `aws.secondary` provider `configuration_aliases` entry, the `aws_region.secondary`
      data source, the `pf_aws_tags.seondary_tags` data source, and the DynamoDB `replica` block
      for cross-region replication.
  description: |
    The `tf_bootstrap_resources` module previously required an `aws.secondary` provider alias and used it to create a cross-region DynamoDB Global Table replica of the Terraform state lock table. This cross-region replica added operational complexity without providing meaningful benefit, since the state lock table is only accessed from a single region during normal Terraform operations.

    This change simplifies the module by:

    1. Removing the `configuration_aliases` entry for `aws.secondary` from the provider block
    2. Removing the `aws_region.secondary` and `pf_aws_tags.seondary_tags` data sources
    3. Removing the DynamoDB `replica` block that created the cross-region table copy

    Users who have the secondary provider alias configured in their Terragrunt `generate` or `provider` blocks must remove it before applying, or Terraform will fail with an unknown provider error.
- id: b66747b4-6e58-44ed-b722-f2b278b79420
  type: update
  summary: >-
    Updates `kube_logging` to Loki 6.29.0 with tuned caching and query parallelism, and drops high-cardinality
    labels in `kube_alloy`.
  references:
  - type: internal-commit
    summary: 'feat: opensearch alpha state'
    link: 265d0a3fa27c15364fd814fd44d66aac4396bb88
  - type: external-docs
    summary: Loki Helm chart 6.29.0 on Artifact Hub
    link: https://artifacthub.io/packages/helm/grafana/loki/6.29.0
  - type: external-docs
    summary: Grafana Loki GitHub repository
    link: https://github.com/grafana/loki
  - type: internal-docs
    summary: '`kube_logging` module reference'
    link: /docs/main/reference/infrastructure-modules/direct/kubernetes/kube_logging
  - type: internal-docs
    summary: '`kube_alloy` module reference'
    link: /docs/main/reference/infrastructure-modules/direct/kubernetes/kube_alloy
  impacts:
  - type: iac-module
    component: kube_logging
    summary: Loki chart updated from 6.6.2 to 6.29.0; default `log_level` changed to `info`; Redis cache TTLs extended to 12 h; query parallelism and compaction interval tuned
  - type: iac-module
    component: kube_node_settings
    summary: '`max-locked-memory` OCI resource limit set to `unlimited` for OpenSearch and other `mlock` workloads'
  - type: iac-module
    component: kube_alloy
    summary: High-cardinality labels (`filename`, `job`, `pod`) dropped from log streams before forwarding to Loki
  description: |
    Three observability and infrastructure improvements bundled in the same commit:

    1. **`kube_logging`** -- Loki Helm chart upgraded from 6.6.2 to 6.29.0. Default log level changed from `warn` to `info`. Redis cache TTLs extended from 1 h to 12 h across all cache layers (chunks, results, index stats, volume, instant metrics, series, labels, and index queries). Query parallelism capped at 4, ingestion rate raised to 50 MB/s with 100 MB burst, compaction interval widened from 20 m to 75 m, and TSDB shipper resync interval set to 60 m. Redis connection pool sizes increased to 100 with explicit timeouts and connection age limits.
    2. **`kube_node_settings`** -- `max-locked-memory` set to `unlimited` in node OCI defaults, required for OpenSearch and other memory-intensive workloads that use `mlock` to prevent critical data from being swapped to disk.
    3. **`kube_alloy`** -- Alloy log pipeline now drops the `filename`, `job`, and `pod` labels from log streams before forwarding to Loki. These labels generated excessive cardinality, inflating storage costs and slowing queries without providing proportional value.
