  description: |
    Two related `pf config get` changes from the same commit:

    1. The config file load order was inverted — module-level files were loaded before global-level files, causing global values to incorrectly override module-level values. The order is now correct: `global.yaml`, `environment.yaml`, `region.yaml`, `module.yaml` (with `*.user.yaml` and `*.secrets.yaml` variants at each level). SOPS-encrypted `*.secrets.yaml` files are now decrypted on-demand via `sopsDecrypt` and merged in the same precedence order.

    2. Multiple `pf cluster add` steps (Autoscaling, Certificates, Cluster Extensions, Inbound Networking, Linkerd, VPC/ECR, Vault) would crash with a destructuring error when `secrets.yaml` did not yet exist. The `sopsDecrypt` utility now returns `null` instead of throwing for missing files, and each step handles `null` gracefully.
- id: 71c55c5e-6cbf-4adb-a20b-590d07af0595
  type: fix
  summary: >-
