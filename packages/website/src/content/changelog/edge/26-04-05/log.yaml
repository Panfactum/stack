  - type: iac-module
    component: authentik_vault_sso
    summary: Deployed automatically by `pf cluster add` when Authentik is present
  - type: iac-module
    component: vault_auth_oidc
    summary: Deployed automatically by `pf cluster add` when Authentik is present
  description: |
    After the cluster extensions phase completes, `pf cluster add` now searches all environments for a deployed
    `kube_authentik` module. If one is found, it automatically deploys `authentik_vault_sso` and `vault_auth_oidc`,
    then revokes the static Vault root token. If no Authentik deployment is detected, the step is silently skipped.

    This removes the need to run `pf sso add` separately for Vault SSO when Authentik is already available,
    streamlining the cluster bootstrap process.
- id: 4571ca06-9c7f-4f47-b1cc-c508f22d7ed8
  type: addition
  summary: >-
    Adds `pf cluster enable` command for activating optional cluster features and a `--cwd` flag to all `pf` CLI commands.
  description: |
    Two additions from the same commit:

    1. `pf cluster enable` introduces a guided wizard for activating opt-in cluster features. The first supported feature is `ecr-pull-through-cache`, which prompts for Docker Hub and GitHub credentials, stores them via SOPS, deploys the `aws_ecr_pull_through_cache` module, and re-deploys `kube_policies` with `pull_through_cache_enabled` set to `true`. This automates a multi-step manual process that previously required users to scaffold the module directory, write a `terragrunt.hcl`, encrypt secrets, and run multiple `terragrunt apply` commands by hand.
    2. All `pf` CLI commands now accept a `--cwd` flag (also readable from the `CWD` environment variable) to override the working directory used for repository root detection. This enables running `pf` from CI pipelines, editor integrations, and other contexts outside the repository tree.
  references:
  - type: internal-commit
    summary: 'feat: implement cluster enable command with ECR pull-through cache support'
    link: 654a4ad80408b2347cdd87aed1623d28bb5c3725
  - type: internal-docs
    summary: '`aws_ecr_pull_through_cache` module overview'
    link: /docs/main/modules/aws_ecr_pull_through_cache/overview
  - type: internal-docs
    summary: Kubernetes cluster bootstrapping guide covering ECR pull-through cache setup
    link: /docs/main/guides/bootstrapping/kubernetes-cluster
  impacts:
  - type: cli
    component: cluster enable
    summary: New command providing a guided wizard for activating opt-in cluster features such as `ecr-pull-through-cache`
  - type: cli
    component: cluster add
    summary: Now respects `--cwd` for repository root resolution
  - type: cli
    component: config get
    summary: Now respects `--cwd` for repository root resolution
  - type: iac-module
    component: aws_ecr_pull_through_cache
    summary: Deployed automatically by `pf cluster enable` when activating the `ecr-pull-through-cache` feature
  - type: iac-module
