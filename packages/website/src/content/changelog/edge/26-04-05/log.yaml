- id: cb255949-d8c2-48bb-b1f9-f58d0b139164
  type: fix
  summary: >-
    Fixes `pf cluster add` `kubectl` commands that were missing the `--context` flag, causing them to operate against
    the wrong cluster.
  references:
  - type: internal-commit
    summary: 'fix: pass kube context to kubectl commands'
    link: 3637fac4ac001ddacf2bd48cc9897ae5543cd173
  description: >-
    When multiple Kubernetes contexts are present in the `kubeconfig`, `kubectl` commands without an explicit
    `--context` flag default to whichever context is currently active. During `pf cluster add`, the Vault operator
    init and unseal steps used bare `kubectl exec` calls, which could silently target the wrong cluster. The
    `kube_config_context` value is now read from the Panfactum config and passed as `--context` to all `kubectl`
    invocations during cluster installation.
  impacts:
  - type: cli
    component: cluster add
    summary: All `kubectl` commands now include the `--context` flag to target the correct cluster
- id: 8ba600f8-89f4-4765-951b-770fbb499c3c
  type: fix
  summary: >-
    Fixes `kube_certificates` to issue TLS certificates for subdomains of the cluster domain by adding `kube_domain`
    to the certificate `dnsNames`.
  description: >-
    The ingress TLS certificate in `kube_cert_issuers` only included domains from the `route53_zones` input, omitting
    the cluster's own `kube_domain`. Internal services running on subdomains of that domain (e.g., Vault, bastion)
    could not obtain valid TLS certificates because the cert-manager `Certificate` resource did not list
    `kube_domain` or `*.kube_domain` in its `dnsNames`. This fix adds a new `kube_domain` variable and appends both
    the bare domain and its wildcard to the certificate's `dnsNames` list, ensuring all cluster utility subdomains
    receive valid certificates.
  references:
  - type: internal-commit
    summary: 'fix: provider cert-issuers the ability to create certs for subdomains of the cluster domain'
    link: 8aa22456510df9d9cc7a85730a810079e75ed424
  - type: internal-docs
    summary: '`kube_cert_issuers` module documentation'
    link: /docs/main/reference/infrastructure-modules/kubernetes/kube_cert_issuers
  - type: internal-docs
    summary: '`kube_certificates` module documentation'
    link: /docs/main/reference/infrastructure-modules/kubernetes/kube_certificates
  impacts:
  - type: iac-module
    component: kube_cert_issuers
    summary: >-
      Adds the `kube_domain` input variable and appends `kube_domain` and `*.kube_domain` to the ingress TLS
      certificate `dnsNames`, enabling certificate issuance for cluster utility subdomains.
  - type: iac-module
    component: kube_certificates
    summary: >-
      Inherits the subdomain certificate fix from `kube_cert_issuers`, which was consolidated into this module.
- id: feb40709-17f8-4e6e-a591-76cd9b08a9b9
  type: improvement
