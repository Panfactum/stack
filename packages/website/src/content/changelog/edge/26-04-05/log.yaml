  - type: internal-docs
    summary: Terragrunt variables configuration reference
    link: /docs/main/reference/configuration/terragrunt-variables
  description: |
    Three fixes related to the `panfactum.hcl` Terragrunt configuration and the `pf` CLI:

    1. Updated `panfactum.hcl` to invoke `pf` CLI commands with the flags and arguments expected by the new CLI interface, replacing the old `pf-get-repo-variables` shell script with `pf config get`.
    2. Removed `--terragrunt-global-cache` from the `pf config get` call. The global cache caused Terragrunt to reuse the first result for all modules in a `run-all` session, returning stale per-module configuration.
    3. Fixed `CLIError` cause chaining so the original root cause is correctly propagated through multi-level error wrapping.
  impacts:
