    1. `panfactum.hcl` now calls `pf iac update-module-status` in before/after/error hooks for both `init` and `apply` phases, writing `initStatus` and `deployStatus` to each module's `.pf.yaml` file.
    2. The `pf cluster add` checkpointing mechanism now reads `deployStatus: success` from each module's `.pf.yaml` instead of testing for directory presence, so a partially-completed or failed apply is no longer treated as complete.

    Additionally, the `Certificate Management` and `Certificate Issuers` steps are consolidated into a single `Certificates` step with independently-skippable sub-tasks.
  references:
