- id: 8b11685e-04b3-4744-b86e-d92cadac01c4
  type: fix
  summary: >-
    `aws_account` now skips service quota increases when the current value already meets the target, preventing
    spurious `apply` failures.
  description: >-
    Previously, `aws_account` unconditionally submitted AWS service quota increase requests for CloudFront and EC2
    quotas. If the current quota already met or exceeded the requested value, AWS would reject the request with an
    error, causing `terraform apply` to fail. This was especially problematic on accounts where quotas had been raised
    manually or by a previous apply. The fix reads each quota's current value via data sources and gates the increase
    resource behind a count check so requests are only submitted when the existing quota is actually below the desired
    threshold.
  references:
  - type: internal-commit
    summary: 'fix(aws_account): skip quota increases already at target value'
    link: 838357f4a1cca6a118c1f67b71f7920e54170c79
  - type: issue-report
    summary: 'Upstream bug: aws_servicequotas_service_quota submits increase even when quota is above requested amount'
    link: https://github.com/hashicorp/terraform-provider-aws/issues/27797
  - type: internal-docs
    summary: '`aws_account` module reference'
    link: /docs/main/reference/infrastructure-modules/direct/aws/aws_account
  impacts:
  - type: iac-module
    component: aws_account
    summary: >-
      Quota increase resources for CloudFront and EC2 are now gated behind a count check using data source lookups,
      so requests are only submitted when the current value is below the target.
