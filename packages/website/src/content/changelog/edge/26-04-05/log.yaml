- id: f28262fc-f2db-41f7-9b42-c0a7391bdedf
  type: fix
  summary: >-
    Fixes `panfactum.hcl` for new `pf` CLI interface and removes stale `--terragrunt-global-cache` from `pf config get`.
  references:
  - type: internal-commit
    summary: 'fix: panfactum.hcl for new cli'
    link: 778dac2c2e3e7cbb9141666e0eac0afefedabea1
  - type: internal-commit
    summary: 'fix: misc cli installer bugfixes'
