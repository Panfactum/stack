- id: 3e6859b1-5a32-42f6-889b-97e1166ffb94
  type: fix
  summary: >-
    Fixes multiple `pf` CLI bugs affecting checkpoint resumption, SOPS directory creation, spinner cleanup, and subprocess hangs.
  description: |
    Five reliability fixes for the `pf` CLI, primarily affecting `pf cluster add` and `pf aws vpc-network-test`. These issues caused unnecessary re-work on resumed installations, hard failures on first-time setups, and intermittent hangs during subprocess execution.

    1. The `pf cluster add` VPC setup checkpoint was tracked under the wrong ID (`kyvernoIaCSetup` instead of `setupVPCIaC`), causing resumed installs to re-run the VPC deployment unnecessarily.
    2. The vault secrets step in `pf cluster add` failed if the target SOPS directory did not exist; the CLI now auto-creates the full directory path before writing.
    3. `pf aws vpc-network-test` progress spinners were left open on error, cluttering terminal output. They now close correctly in all code paths.
    4. SSM command polling retries in `pf aws vpc-network-test` increased from 20 to 60 to reduce spurious timeouts on slow instances.
    5. CLI subprocess execution could hang because `stdout`/`stderr` streams were consumed sequentially and line-callback promises were not awaited. Streams are now read concurrently via `Promise.all`.
  references:
  - type: internal-commit
    summary: 'fix: cli updates'
    link: 8d47487d857f75f57f6b1265beb51266e41c56f8
  - type: internal-docs
    summary: VPC networking bootstrapping guide
    link: /docs/main/guides/bootstrapping/aws-networking
  impacts:
  - type: cli
    component: cluster add
    summary: VPC setup checkpoint now uses the correct ID (`setupVPCIaC`); vault secrets step auto-creates missing SOPS directories
  - type: cli
    component: aws vpc-network-test
    summary: Progress spinners now close correctly on error; SSM command polling retries increased from 20 to 60
- id: 256ec569-15b5-43bd-8d03-ed1bf8bdf6a8
  type: fix
  summary: >-
    Fixes `pf cluster add` SLA target prompt repeating on resume by persisting the selection via the checkpointer.
  references:
  - type: internal-commit
    summary: "fix: only ask for SLA confirmation once"
    link: eb2069598796850a9a9eb985614e69c6124d5525
  description: >-
    Previously, resuming an interrupted `pf cluster add` session would re-display the SLA target
    selection prompt even though the user had already chosen a value. This happened because the SLA
    confirmation ran before the checkpointer was initialized, so the selection was never saved. This
    fix moves SLA confirmation after checkpointer initialization and adds `slaTarget` to the
    checkpointer's saved-inputs schema. On resume, the previously selected SLA target is loaded from
    the checkpoint file and the prompt is skipped entirely.
  impacts:
  - type: cli
    component: cluster add
    summary: SLA target prompt shown only once per session; selection persisted via checkpointer
