      and `KNOWN_HOSTS_FILE` variables inline
- id: b0f99908-394d-446c-86fc-dceeef9b4eb6
  type: breaking_change
  summary: >-
    `kube_opensearch` now enforces a minimum of 1000 MB for `minimum_memory_mb` and raises the default from 25 MB to
    4000 MB.
  references:
  - type: internal-commit
    summary: 'feat: improve OpenSearch memory configuration'
    link: d044ca03b10987eb7c93d42fc77f561641201a85
  - type: internal-docs
    summary: '`kube_opensearch` module reference'
    link: /docs/main/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch
  action_items:
  - >-
    If you previously set `minimum_memory_mb` to a value below 1000, update it to at least 1000 or remove the
    override to accept the new default of 4000.
  - >-
    If you relied on the previous default of 25 MB, be aware that the new default of 4000 MB will significantly
    increase the memory request for each OpenSearch pod. Review your node capacity and adjust
    `minimum_memory_mb` explicitly if needed.
  - >-
    Run `terragrunt apply` on your `kube_opensearch` deployment to apply the new memory configuration.
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: >-
      `minimum_memory_mb` is now wired into the container spec (previously ignored, hardcoded at 1000 MB), the
      validation minimum is raised from 25 MB to 1000 MB, and the default is raised from 25 MB to 4000 MB
  description: |
    The `minimum_memory_mb` variable in `kube_opensearch` was not previously connected to the container spec -- the container always requested a hardcoded 1000 MB regardless of the variable's value. This change wires `minimum_memory_mb` through to the `kube_stateful_set` container spec so the setting actually takes effect.

    In addition, the default and validation constraints are updated:

    1. The validation minimum is raised from 25 MB to 1000 MB, reflecting the minimum memory OpenSearch needs to start reliably.
    2. The default is raised from 25 MB to 4000 MB, matching the minimum viable memory for stable OpenSearch operation under typical workloads.
    3. The variable description is corrected to reference OpenSearch instead of Redis (a copy-paste artifact from the original module).
- id: b162cbb7-0677-4181-a1bf-3d7b17cfd9bf
  type: fix
  summary: >-
    `pf cluster add` now passes the correct `aws_region` code to all AWS API calls instead of the directory slug.
  references:
  - type: internal-commit
    summary: 'fix: standardize AWS region parameter handling and improve SSO flexibility'
    link: 67143b00110420fe0253a47e18988b072350f8a0
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      VPC lookup, EKS addon management, EC2 instance termination, and Service Quotas calls now receive `aws_region`
      instead of the logical `region` directory slug
  - type: cli
    component: sso add
    summary: >-
      `setupVaultSSO` now accepts an explicit `regionPath` parameter instead of using `process.cwd()`
  description: |
    Several AWS CLI and SDK calls in `pf cluster add` were receiving the Panfactum logical `region` directory slug
    instead of the actual `aws_region` configuration value. Affected operations:

    1. VPC name uniqueness check via `aws ec2 describe-vpcs`
    2. EKS addon listing and deletion via `aws eks list-addons` / `delete-addon`
    3. EC2 node termination via `aws ec2 describe-instances` / `terminate-instances`
    4. Service Quotas vCPU check via `GetServiceQuotaCommand`

    All four now read `aws_region` from the Panfactum config and pass it to the AWS client. In addition,
    `setupVaultSSO` was calling `getPanfactumConfig` with `process.cwd()` instead of the selected region path,
    which could load the wrong configuration when the working directory did not match the target region. It now
    accepts an explicit `regionPath` parameter.
