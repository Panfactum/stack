    Fixes `pf devshell sync` incorrectly requiring `.pf.yaml` in the environments `.gitignore`.
  description: >-
    The `EXPECTED_GITIGNORE_CONTENTS` for the environments directory previously included
    `MODULE_STATUS_FILE` (which resolved to `.pf.yaml`). Since module status tracking has
    been moved out of the environments directory, this entry was no longer valid and caused
    `pf devshell sync` to flag the environments `.gitignore` as out of date even when it
