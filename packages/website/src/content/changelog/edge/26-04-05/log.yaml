    component: enter-shell-local
    summary: >-
      `AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY` are now unset on shell entry to prevent host credentials
      from leaking into the DevShell.
  description: >-
    When users had `AWS_ACCESS_KEY_ID` or `AWS_SECRET_ACCESS_KEY` set in their host environment, those static
    credentials would leak into the Panfactum DevShell and take precedence over the DevShell's own profile-based
    credential configuration via `AWS_CONFIG_FILE` and `AWS_SHARED_CREDENTIALS_FILE`. The boot script
    (`enter-shell-local.sh`) now explicitly unsets both variables on shell entry, ensuring the DevShell always
    uses its managed credential workflow.
