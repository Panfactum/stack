- id: 7e185f6c-060c-4c31-aec6-59e33f4a8c91
  type: breaking_change
  summary: >-
    `pull_through_cache_enabled` now defaults to `true` for several workload and data modules.
  description: >-
    ECR pull-through caching reduces image pull latency and avoids upstream rate limits by routing
    container image pulls through a regional ECR cache. Enabling it by default ensures new
    deployments benefit automatically, but environments without an ECR pull-through cache
    configured will experience image pull failures on these modules.
  action_items:
  - >-
    If ECR pull-through caching is not configured in your environment, set
    `pull_through_cache_enabled = false` on `kube_nats`, `kube_pg_cluster`,
    `kube_redis_sentinel`, `kube_stateful_set`, and `kube_deployment` modules.
  - >-
    Alternatively, deploy the `aws_ecr_pull_through_cache` module to enable pull-through
    caching before re-applying these modules.
  references:
  - type: internal-commit
    summary: Change `pull_through_cache_enabled` default from `false` to `true` across workload modules
    link: dafb4d5782ba675eb6a0c4eff407ea59ab6f815e
  - type: external-docs
    summary: AWS ECR pull-through cache documentation
    link: https://docs.aws.amazon.com/AmazonECR/latest/userguide/pull-through-cache-creating-rule.html
  impacts:
  - type: iac-module
    component: kube_nats
    summary: "`pull_through_cache_enabled` now defaults to `true`"
  - type: iac-module
    component: kube_pg_cluster
    summary: "`pull_through_cache_enabled` now defaults to `true`"
  - type: iac-module
    component: kube_redis_sentinel
    summary: "`pull_through_cache_enabled` now defaults to `true`"
  - type: iac-module
