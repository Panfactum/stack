- id: 15b34ceb-1658-4b63-9766-3e7f9eb727ea
  type: fix
  summary: >-
    `pf aws vpc-network-test` inbound blocking check now uses TCP instead of ICMP ping for reliable
    verification.
  description: >-
    The previous inbound blocking check used `ping` (ICMP echo) to verify that NAT IPs were not reachable.
    However, ICMP traffic can be blocked by security groups or NACLs independently of TCP, making the check
    unreliable — a NAT IP could accept TCP connections while still blocking pings, causing the test to pass
    incorrectly. The new implementation uses a TCP socket connection attempt on port 80 via a dedicated
    `checkConnection` utility, which directly tests the protocol that matters for real-world inbound traffic.
  references:
  - type: internal-commit
    summary: Replace ICMP ping with TCP connection check for inbound blocking test
    link: 9bb03e5270ef399bf42d603795e2c8698394e588
  - type: internal-docs
    summary: AWS networking bootstrapping guide covering `pf aws vpc-network-test` usage
    link: /docs/main/guides/bootstrapping/aws-networking
  impacts:
  - type: cli
    component: aws vpc-network-test
    summary: Inbound blocking check now uses a TCP socket connection on port 80 instead of ICMP ping
- id: aa44b0b2-6c6d-4a05-8dd0-def391b9a452
  type: fix
  summary: >-
    Fixes multiple `pf cluster add` Inbound Networking bugs including phase ordering, missing Vault env vars, SLA
    bootstrapping, and deployment concurrency.
  description: |
    The Inbound Networking phase of `pf cluster add` had five interrelated bugs that could cause cluster installation to fail:

    1. The Inbound Networking phase was executing after Autoscaling, requiring each autoscaling module to receive Vault credentials before Vault had an ingress. The phase ordering has been corrected so Inbound Networking runs before Autoscaling as intended.
    2. `kube_external_dns` was not receiving the `VAULT_ADDR` environment variable, causing it to fail Vault authentication. It is now passed alongside `VAULT_TOKEN`.
    3. `kube_ingress_nginx` was deployed with the full final `sla_level` before Vault ingress was available, causing failures. It is now bootstrapped with `sla_level: 1` and cleaned up via a post-deploy update.
    4. The post-deploy cleanup Zod schema for `sla_level` used `z.undefined()` instead of `z.number().optional()`, causing the cleanup step to fail validation. The schema has been corrected.
    5. The `kube_aws_lb_controller` and `kube_external_dns` modules were deployed concurrently, causing race conditions. They are now deployed sequentially.
  references:
  - type: internal-commit
    summary: 'fix: move inbound networking before autoscaling in cluster auto install'
    link: 92da33ac2a718d02d99cd0471e4c653d2426f9ef
  - type: internal-commit
    summary: 'fix: nginx post deploy input update'
    link: 63497c19c9b6cc1faf01c137f7be019fa77ee583
  - type: internal-commit
    summary: 'fix: remove concurrency'
    link: 4f42f9ba484e2b9275588c3522858327b1b17c33
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Inbound Networking phase now runs before Autoscaling, modules deploy sequentially instead of concurrently,
      and all Vault environment variables are correctly passed to each module deployment.
  - type: iac-module
    component: kube_ingress_nginx
    summary: >-
      Bootstrapped with `sla_level: 1` during cluster install and post-deploy input update Zod schema corrected
      from `z.undefined()` to `z.number().optional()`.
  - type: iac-module
    component: kube_external_dns
    summary: Now receives `VAULT_ADDR` environment variable during `pf cluster add` deployment.
  - type: iac-module
    component: kube_aws_lb_controller
    summary: No longer deployed concurrently with `kube_external_dns` to avoid race conditions.
- id: 83531ff4-6c7a-4c3d-b0f2-f4b28822c2d8
  type: fix
  summary: >-
    `pf cluster add` now passes `VAULT_TOKEN` to autoscaling and inbound networking deployments,
    fixing Vault authentication failures.
  description: >-
    The `VAULT_TOKEN` environment variable was not being passed when deploying Metrics Server, VPA, Karpenter,
    and `vault_core_resources` during the autoscaling and inbound networking steps of `pf cluster add`. This
    caused Terragrunt deployments to fail Vault authentication. The fix decrypts the Vault root token from the
    `kube_vault` secrets and injects it into the environment for all affected module deployments.
  references:
