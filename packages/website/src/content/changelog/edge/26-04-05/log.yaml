    summary: Federated auth bootstrapping guide
    link: /docs/main/guides/bootstrapping/federated-auth
  impacts:
  - type: cli
    component: sso add
    summary: >-
      Corrects skip conditions for SCIM setup, user sync, Vault SSO OIDC output parsing, and federated
      auth detection so completed steps no longer re-run on subsequent invocations.
  description: |
    Three categories of skip-logic bugs in `pf sso add` caused already-completed steps to re-run on every invocation:

    1. Two `skip` callbacks in `setupFederatedAuth` had inverted boolean conditions. "Get SCIM User Configuration" returned `!token || !url` instead of `!!token && !!url`, and "Sync Users and Groups" returned `!userSyncComplete` instead of `!!userSyncComplete`, causing both steps to always re-execute after successful completion.
    2. The "Get Vault OIDC configuration" task called `terragruntOutput` against the wrong module (`vault_auth_oidc` instead of the `authentik_vault_sso` deployment) and used a flat `z.string()` Zod schema instead of the correct `z.object({ value: z.string() })` shape, causing output parsing failures.
    3. The "Setup AWS Federated SSO" skip callback read `federated_auth_enabled` (snake_case) from the `.pf.yaml` file instead of `federatedAuthEnabled` (camelCase), so the step never detected that it had already completed.
- id: f968f24a-dee2-4baf-a8c4-5a665a4310de
  type: improvement
  summary: >-
    `kube_policies` now injects `NODE_OPTIONS=--max-old-space-size` into all containers and init
    containers proportional to the container's memory request.
  description: |
    `kube_policies` now automatically sets `NODE_OPTIONS=--max-old-space-size=<MB>` on every container and init container, configuring the Node.js V8 heap limit to match the container's memory request. This prevents OOM crashes that occur when Node.js defaults to a 512 MB heap regardless of the container's actual memory allocation.

    Two changes were made:

    1. A new `patchStrategicMerge` rule injects the `NODE_OPTIONS` environment variable into both containers and init containers, with the value derived from the container's memory request. The `patchStrategicMerge` approach ensures the variable is correctly re-applied after VPA mutations adjust resource requests.
    2. A follow-on fix corrected the `add-environment-variables-init-containers` Kyverno rule, which was incorrectly iterating `spec.containers` instead of `spec.initContainers`, causing init containers to never receive the injected environment variables.
  references:
  - type: internal-commit
    summary: 'feat: adds opensearch dashboards, remote storage, and v3'
    link: 55a2cd5eea66664a7994f5841abda062d982fe1e
  - type: internal-commit
