- id: dd36f105-484b-4ec2-b0fc-fc63c235dcd7
  type: fix
  summary: >-
    The Panfactum DevShell now unsets the `CI` environment variable instead of setting it to `"false"`.
  references:
  - type: internal-commit
    summary: 'fix(devshell): unset CI instead of setting it to "false"'
    link: 9bdb249fe7b0b7d439d1601737fe8336f785fa58
