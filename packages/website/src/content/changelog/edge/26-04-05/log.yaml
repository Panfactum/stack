  description: |
    OpenTofu 1.9 introduces two headline features:

    1. **Provider `for_each`** — allows a single provider block to be instantiated multiple times (e.g., one AWS provider per account) without repetitive configuration.
    2. **The `-exclude` flag** — lets you skip specific resources during `plan` or `apply` without modifying your configuration files.

    The nixpkgs pin was previously from December 2024; moving to `nixos-25.05` reduces the accumulated upgrade cost and keeps DevShell tooling closer to current upstream releases. The `terraform_version_constraint` in `panfactum.hcl` has been updated from `~> 1.8` to `~> 1.9` to match.
