# Changelog entry for edge release 24-11-13.
# Migrated from edge.24-11-13.mdx.
summary: "Introduces Kyverno policy engine as a core component, replaces Fledged and Reflector with Kyverno-based alternatives, improves PostgreSQL autoscaling capabilities, and enhances pod scheduling with automatic ARM64 and spot instance tolerations."
upgrade_instructions: upgrade.mdx
highlights:
  - "Kyverno policy engine added as a core Panfactum component — **must install before other modules work**"
  - "`kube_fledged` and `kube_reflector` deprecated — must remove before upgrading to next version"
  - "`pg_memory_mb` and `pg_cpu_millicores` replaced with min/max VPA inputs in `kube_pg_cluster`"
  - "All pods now automatically tolerate arm64 and spot node taints cluster-wide"
changes:
  - id: 97c417bd-e9f3-4bbf-ab62-2be9d5d50cc7
    type: breaking_change
    summary: >-
