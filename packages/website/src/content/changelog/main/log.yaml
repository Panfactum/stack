      event
  description: The `pf` CLI now fires a `cli-start` telemetry event to PostHog on each invocation when a `user_id` is present
    in the Panfactum repo variables. The `user_id` is a UUID generated by `pf welcome` on first DevShell setup and stored
    in the new `panfactum.user.yaml` user-specific config file. All telemetry is anonymous and tied only to the generated
    `user_id`; no personally identifiable information is collected.
- type: addition
  summary: Introduces `panfactum.user.yaml` as a per-user config file that overrides `panfactum.yaml` and is gitignored by
    default.
  references:
  - type: internal-commit
    summary: 'feat: add anonymous usage tracing'
    link: 5d6c7ee80a7966988687ca691f5080b28599c772
  impacts:
