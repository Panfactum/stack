  - id: 8460ed65-2f32-445b-a92e-d466ce321c15
    type: addition
    summary: "`cluster add` now validates EC2 vCPU quota headroom before deployment and auto-submits increase requests when
      insufficient."
    description: New AWS accounts and regions often have EC2 vCPU quotas too low to support the EKS controller node group
      plus Karpenter workloads, causing opaque mid-deployment failures. The new `ensureEC2QuotaHeadroom` function checks
      both the On-Demand Standard vCPU quota (`L-1216C47A`) and the Spot Standard vCPU quota (`L-34B43A08`), using
      CloudWatch usage metrics to calculate real headroom. Required headroom is 16 vCPUs for SLA-1 clusters and 32 vCPUs
      for SLA-2/3 clusters, with automatic reductions applied when the `aws_vpc` or `aws_eks` modules are already
      deployed (since those instances are already reflected in current usage). When headroom is insufficient, the check
      detects any pending quota increase requests to avoid duplicates, then either warns the user to retry after
      approval or automatically submits a new increase request. Running this check early in the workflow gives AWS time
      to approve the increase before the EKS deployment step runs.
    references:
      - type: internal-commit
        summary: "feat(cluster/add): add EC2 vCPU quota headroom check before cluster deploy"
