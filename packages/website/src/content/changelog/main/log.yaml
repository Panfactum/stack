  description: 'Five fixes from the same commit: (1) The `pf cluster add` VPC setup checkpoint was tracked under the wrong
    ID (`kyvernoIaCSetup` instead of `setupVPCIaC`), causing resumed installs to re-run the VPC deployment unnecessarily.
    (2) The vault secrets step failed if the target SOPS directory did not exist; the CLI now auto-creates the full path before
    writing. (3) `pf aws vpc-network-test` spinners were left open on error; they now close correctly. (4) SSM command polling
    retries increased from 20 to 60 to reduce spurious timeouts on slow instances. (5) CLI subprocess execution had a hang
    caused by stdout/stderr streams being consumed sequentially and line-callback promises not being awaited; streams are
    now read concurrently.'
