  description: Two `skip` callbacks in the `setupFederatedAuth` task list had their boolean conditions inverted. The "Get
    SCIM User Configuration" step was returning `!token || !url` (skip when either is missing) instead of `!!token && !!url`
    (skip when both are present). The "Sync Users and Groups" step was returning `!userSyncComplete` (skip when not complete)
    instead of `!!userSyncComplete` (skip when complete). Both bugs caused the steps to skip when they should run and run
    when they should skip, making `pf sso add` re-prompt for SCIM credentials and re-run the user sync on every invocation
