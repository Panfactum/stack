- id: 809a061f-5602-45f2-8ccc-a143b0d2ca60
  type: fix
  summary: Fixes multiple `pf cluster add` bugs — Vault secret paths, pod readiness scoping, EKS API server URL, and EC2 termination.
  references:
  - type: internal-commit
    summary: 'fix(cli): cluster install fixes and improvements'
    link: 5de4d4dd0d508552d06d46cf763af56302d80721
  impacts:
  - type: cli
    component: cluster add
    summary: Vault secret path corrected for ingress/Linkerd steps; Vault pod check scoped to vault namespace with 60 retries;
      kube_api_server written from module output; EC2 termination fixed to split on all whitespace; background processes killed
      on step failure
  description: 'Five fixes from the same commit: (1) Inbound networking and Linkerd steps were reading Vault `secrets.yaml`
    from their own module directories instead of `kube_vault`, causing resumability failures. (2) The Vault pod readiness
    check was querying all namespaces instead of `vault`, and the retry limit was increased from 20 to 60. (3) The EKS setup
    step was writing `kube_api_server` as an empty string instead of reading the cluster URL from module output. (4) The cluster
    reset step split instance IDs only on newlines and checked the wrong variable length, silently skipping EC2 termination.
    (5) `pf cluster add` now kills all background processes (e.g., the Vault proxy) when any step throws an error.'
- id: c25f4353-e3c7-488e-8d62-b3b15e1f42f5
  type: improvement
  summary: '`pf cluster add` now streams real-time rolling output during the Linkerd control plane check step. The terminal
    displays a scrolling'
  description: 'Previously, subprocess output was only surfaced to the Listr task renderer once after the subprocess finished.
    This made long-running checks like `linkerd check` appear to stall with no feedback. The `execute` utility now updates
    the task output on each line received, and the Linkerd check step uses `rendererOptions.outputBar: 5` so users can see
    live progress.'
  references:
  - type: internal-commit
    summary: 'fix(cluster install): stream linkerd check output line by line'
    link: 989fcf567fb8e3868435b678dd76609ee40b4fff
  impacts:
  - type: cli
    component: cluster add
    summary: Streams real-time rolling output during the Linkerd control plane check step
- id: 3ec606b8-32d6-4c70-b92d-8f0d75940c64
  type: fix
  summary: Fixes `pf cluster add` Vault domain key path, hardcoded Terragrunt templates, and snapshotter/Velero deploy order.
  references:
  - type: internal-commit
    summary: 'fix(cli): inbound networking and support services fixes'
    link: 5440599fd7a771ef230de32ee6557731d7a14338
  impacts:
  - type: cli
    component: cluster add
    summary: Vault domain read from extra_inputs.vault_domain; hardcoded subnet and ingress fields removed from lb-controller
      and nginx templates; kube_external_snapshotter and kube_velero now deployed before descheduler
  description: 'Three `pf cluster add` fixes: (1) The inbound networking step was reading the Vault domain from `vault_addr`
    at the YAML top level, but it is stored under `extra_inputs.vault_domain`, causing DNS propagation checks to use an undefined
    value. (2) The `kube_aws_lb_controller` Terragrunt template hardcoded `subnets = ["PUBLIC_A", "PUBLIC_B"]` and the `kube_ingress_nginx`
    template hardcoded `ingress_domains` and `sla_level`, causing failures on real clusters; these are now omitted or set
    programmatically. (3) `kube_external_snapshotter` and `kube_velero` were deployed after the descheduler; they are now
    deployed together as a concurrent sub-group earlier in the maintenance controllers sequence.'
- id: b48bbcc7-5f30-4aa8-9d46-7d4ce8bb9a5d
