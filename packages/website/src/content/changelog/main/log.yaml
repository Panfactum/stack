    summary: 'feat: adds the ability to run opensearch in single-node mode'
    link: 14cb9e692705dfa5b13f113d9699abb6df58b97c
  impacts:
  - type: iac-module
    component: kube_aws_creds
    summary: aws_iam_user_policy now always created using coalesce(var.iam_policy_json, "{}") instead of conditionally omitted
