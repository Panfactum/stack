    summary: "The \"Certificate Management\" and \"Certificate Issuers\" steps in `pf cluster add` have been consolidated
      into a single \"Certificates\" step. The"
    description: "Previously, certificate management was split across two separate top-level install steps
      (`setupCertManagement` and `setupCertIssuers`), each with their own checkpoint ID. This commit merges them into
      `setupCertificates`, which handles the full certificate lifecycle in one step. Individual sub-tasks within the
      step remain independently skippable via `skipIfAlreadyApplied`, so interrupted runs still resume from the correct
      point."
    references:
      - type: "internal-commit"
        summary: "feat: better resumability (#351)"
        link: "70421c38fa9eb6f3238b5f1e7dfa9101f8a84f7e"
