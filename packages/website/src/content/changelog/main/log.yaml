- id: a48ee49b-823c-494f-980d-de0bf75bba7d
  type: breaking_change
  summary: >-
    The `kube_node_image_cache` and `kube_node_image_cache_controller` modules have been removed and all related input
    variables must be removed from module configurations.
  description: >-
    The node image cache system pre-pulled container images onto nodes to reduce pod startup latency. In practice, the
    Kyverno-based implementation caused Kyverno to consume excessive resources in production clusters, producing real stability
    issues that outweighed the startup latency benefit. The feature has been removed entirely. All related input variables
    (`node_image_cached_enabled`, `node_image_cache_enabled`, `image_prepull_enabled`, `image_pin_enabled`,
    `panfactum_node_image_cache_enabled`) must be removed from Terragrunt configurations before upgrading.
  action_items:
  - Destroy any active `kube_node_image_cache` module deployments before upgrading.
  - Destroy any active `kube_node_image_cache_controller` module deployments before upgrading.
  - Remove the module directories for `kube_node_image_cache` and `kube_node_image_cache_controller` from your Terragrunt
    configuration.
  - Remove `node_image_cached_enabled` from any module configurations that set it (affected modules include `kube_airbyte`,
    `kube_alloy`, `kube_argo_event_bus`, `kube_authentik`, `kube_aws_ebs_csi`, `kube_cloudnative_pg`, `kube_gha_runners`,
    `kube_ingress_nginx`, `kube_linkerd`, `kube_monitoring`, `kube_nats`, `kube_opensearch`, `kube_pg_cluster`, `kube_redis_sentinel`,
    `kube_vault`).
  - Remove `node_image_cache_enabled` from any module configurations that set it.
  - Remove `image_prepull_enabled` and `image_pin_enabled` from all container spec blocks in `kube_pod`, `kube_deployment`,
    `kube_daemon_set`, `kube_stateful_set`, `kube_cron_job`, and `kube_job` module configurations.
  - Remove `panfactum_node_image_cache_enabled` from any `kube_policies` module configuration.
  references:
