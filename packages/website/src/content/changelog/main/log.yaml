- id: 4c58208b-e9a1-48e0-8da4-f0f1d312fe27
  type: fix
  summary: Fixes `pf cluster add` EKS step to exclude SSO ARNs from `extra_superuser_principal_arns` and Vault pod readiness
    check to pass `--context`.
  references:
  - type: internal-commit
    summary: Fix sso cluster add (#357)
    link: ebbc5fa198626b320fcc6ef02d5f18a6d72932a5
  impacts:
  - type: cli
    component: cluster add
    summary: EKS setup excludes transient SSO assumed-role ARNs from superuser principals; Vault pod readiness check now passes
      --context to kubectl
  description: 'Two fixes for SSO-authenticated `pf cluster add` runs: (1) The EKS setup step was including the caller''s
    SSO assumed-role ARN in `extra_superuser_principal_arns`. These ARNs contain "AWSReservedSSO" and are transient, so they
    cannot be used as persistent EKS access entry principals — they are now excluded. (2) The `kubectl get pods` command used
    to check Vault pod readiness was missing the `--context` flag, causing it to target the wrong cluster. The step now validates
    `kubeConfigContext` is present and passes it explicitly.'
- id: e214742c-32e8-4a9a-a08f-5124a525ba8a
  type: addition
  summary: '`pf config get` now supports SOPS-encrypted secret config files, fixes load order, and handles missing secrets.yaml
    in `pf cluster add`.'
  references:
  - type: internal-commit
    summary: 'fix:cli: config file precedence and secret config files'
    link: 474c4b6ddd5d82f1bcacf43fe564cff67c9cd890
  impacts:
  - type: cli
    component: config get
    summary: Load order corrected (global → env → region → module); SOPS-encrypted *.secrets.yaml files now decrypted and
      merged
  - type: cli
    component: cluster add
    summary: Steps that read the Vault root token now handle a missing secrets.yaml gracefully instead of crashing
  - type: configuration
    component: global.secrets.yaml
    summary: New SOPS-encrypted config file read by pf config get at the global level
  - type: configuration
    component: environment.secrets.yaml
    summary: New SOPS-encrypted config file read by pf config get at the environment level
  - type: configuration
    component: region.secrets.yaml
    summary: New SOPS-encrypted config file read by pf config get at the region level
  - type: configuration
    component: module.secrets.yaml
    summary: New SOPS-encrypted config file read by pf config get at the module level
  description: 'Two related `pf config get` changes from the same commit: (1) The config file load order was inverted — module-level
    files were loaded before global-level files, causing global values to incorrectly override module-level values. The order
    is now correct: global → environment → region → module. SOPS-encrypted `*.secrets.yaml` files at each level are now also
    decrypted on-demand and merged in the same precedence order. (2) Multiple `pf cluster add` steps (Autoscaling, Certificates,
    Cluster Extensions, Inbound Networking, Linkerd, VPC/ECR, Vault) would crash with a destructuring error when `secrets.yaml`
    did not yet exist. The `sopsDecrypt` utility now returns `null` instead of throwing for missing files, and each step handles
    `null` gracefully.'
- id: 71c55c5e-6cbf-4adb-a20b-590d07af0595
