  - type: "improvement"
    summary: >-
      `pf env add` now suggests an environment-specific IAM username (e.g., `management-superuser`)
      instead of the hardcoded `pf-bootstrap-user` name.
    references:
      - type: "internal-commit"
        summary: "fix:cli:env add: default username"
        link: "0886f756c32dabcfb9ee647b991a3cb4e247d225"
    impacts:
      - type: "cli"
        component: "env add"
        summary: "Bootstrap IAM username suggestion is now derived from the environment name"
    description: >-
      Previously, `pf env add` always suggested `pf-bootstrap-user` as the IAM username when walking
      users through creating a new AWS account. The suggested name is now derived from the environment
      being created (e.g., `management-superuser`), making it consistent with Panfactum's AWS profile
      naming convention and easier to identify in the IAM console.
  - type: "fix"
    summary: >-
      Fixes `pf env add` credential validation where the `AdministratorAccess` error was misplaced
      and unknown errors escaped the retry loop.
    references:
      - type: "internal-commit"
        summary: "fix:cli:env add: default username"
        link: "0886f756c32dabcfb9ee647b991a3cb4e247d225"
    impacts:
      - type: "cli"
        component: "env add"
        summary: "AdministratorAccess error shown correctly; unknown errors now loop back to re-prompt"
    description: >-
      The `AdministratorAccess` policy check in `pf env add` had two issues: the error message was
      emitted after the `catch` block rather than inside the `if (!hasAdminAccess)` branch, and a
      `break` on unknown errors caused the outer credentials loop to exit without re-prompting. Both
      are now fixed. An informational message ("Removing existing credentials and requesting new ones")
      is also shown when the user chooses not to retry with the same credentials.
  - type: "fix"
    summary: >-
      Fixes `sopsUpsert` failing to overwrite an existing SOPS-encrypted file when merging new values
      into it.
    references:
      - type: "internal-commit"
        summary: "fix: set overwrite to true for sopsUpsert"
        link: "f33f0f128c2b05ca31e10fecf2d0be3dd05d1ac2"
    description: >-
      The `sopsUpsert` utility merges new key/value pairs into an existing SOPS-encrypted file by
      decrypting the current contents, spreading in the new values, and re-writing the file. However,
      the final `sopsWrite` call was missing `overwrite: true`, so writing to an already-existing file
      would fail. The fix passes `overwrite: true` in the existing-file branch, ensuring the merged
      result is written back correctly on every call.
  - type: "fix"
    summary: >-
      Fixes `pf cluster add` Vault setup step to read recovery keys from `kube_vault/recovery.yaml`
      instead of `kube_vault/secrets.yaml`.
    references:
      - type: "internal-commit"
        summary: "fix: reading from recovery.yaml"
        link: "3d7608ca62c6a10f0216f6bc4c9c2eb514fcf414"
    impacts:
      - type: "cli"
        component: "cluster add"
        summary: "Vault setup step now reads recovery keys from kube_vault/recovery.yaml and vault token from region.secrets.yaml via config"
    description: >-
      After the prior split that writes the root token and recovery keys to separate files, the read-side
      code was not updated to match. The Vault setup step still expected both `root_token` and
      `recovery_keys` in `kube_vault/secrets.yaml`, which would fail on any cluster where keys had
      already been split. The fix introduces separate reads: recovery keys from `kube_vault/recovery.yaml`
      and the root token from `region.secrets.yaml` via `getPanfactumConfig()` as `vault_token`.
  - type: "improvement"
    summary: >-
      `panfactum.hcl` now automatically passes `route53_zones` and `kube_domain` as default module
      inputs, simplifying `kube_certificates` migration.
