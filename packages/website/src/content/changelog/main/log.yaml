  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: Dashboard superuser password is now restricted to alphanumeric characters (special = false)
- id: 0e3171d0-37ab-48ba-97c2-43cb030eeb2f
  type: improvement
  summary: Simplifies Panfactum docs URLs by removing `/docs/` prefix and updates release scripts to use the structured changelog.
  references:
  - type: internal-commit
    summary: 'feat: make docs the top-level entity for the website'
    link: f0e4193c37b4950ef5e83e72303663033e3c80e9
  - type: internal-commit
    summary: 'feat(changelog): add structured YAML schema and validation tooling'
