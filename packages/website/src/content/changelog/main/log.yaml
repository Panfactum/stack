  - id: 5a60bf64-f9bb-474c-a9bf-4e93fdd6518e
    type: fix
    summary: Fixed `cluster add` and `sso add` commands crashing when resuming a partially completed installation.
    description: "When resuming a partially completed cluster or SSO install, setup commands read `module.yaml` files to
      check prior state. If the install never reached a given step, its `module.yaml` does not exist yet, causing an
      unhandled crash. The fix passes `throwOnMissing: false` to all `readYAMLFile` calls across the affected setup
      steps — `setupCertificates`, `setupEKS`, `setupClusterExtensions`, `setupAuthentik`, and `setupFederatedAuth` — so
      that a missing file is treated as a clean slate rather than a fatal error."
