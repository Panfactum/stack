- id: 9804e09d-d374-45d2-b543-a41d684e5417
  type: improvement
  summary: Improves `pf cluster add` resumability by using `.pf.yaml` status files and consolidating certificate steps.
  description: 'Two related `pf cluster add` resumability improvements: (1) The checkpointing mechanism now reads each module''s
    `.pf.yaml` status file (`deployStatus: success` set by Panfactum terragrunt hooks on successful apply) rather than testing
    for directory presence. A partially-completed or failed apply is no longer treated as complete, making resume behaviour
    more accurate. The `getLocalModuleStatus` utility also returns environment, region, and module existence flags for defensive
    error handling. (2) The "Certificate Management" and "Certificate Issuers" steps have been consolidated into a single
    "Certificates" step (`setupCertificates`). Individual sub-tasks remain independently skippable via `skipIfAlreadyApplied`,
    so interrupted runs still resume from the correct point.'
  references:
  - type: internal-commit
    summary: 'feat: better resumability (#351)'
    link: 70421c38fa9eb6f3238b5f1e7dfa9101f8a84f7e
