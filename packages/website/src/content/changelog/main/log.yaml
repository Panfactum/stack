summary: Launches the new `pf` CLI with guided wizards for environment, cluster, domain, and SSO setup, upgrades Kubernetes
  to 1.33, migrates legacy devshell scripts to TypeScript, and consolidates several IaC modules.
upgrade_instructions: upgrade.mdx
highlights:
- New `pf` CLI tool with guided installers — `pf env add`, `pf cluster add`, `pf domain add`, and `pf sso add` automate end-to-end
  infrastructure provisioning
- '`kube_cert_manager` and `kube_cert_issuers` consolidated into `kube_certificates` — state migration required'
- Kubernetes default upgraded to 1.33 — review the [K8s 1.33 changelog](https://kubernetes.io/blog/2025/04/23/kubernetes-v1-33-release/)
  for deprecated APIs
- Node image cache modules (`kube_node_image_cache`, `kube_node_image_cache_controller`) removed — destroy existing deployments
  before upgrading
- Legacy bash devshell scripts migrated to `pf` subcommands — IaC modules now call `pf buildkit`, `pf wf`, and `pf kube` commands
- OpenTofu upgraded to 1.9.1 and AWS provider to 6.x — re-apply all modules after upgrading
- KEDA added to base cluster — deploy [`kube_keda`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_keda)
  before applying other modules
