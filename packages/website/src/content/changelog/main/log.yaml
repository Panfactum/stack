- type: improvement
  summary: '[`kube_policies`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_policies) now restricts
    write access to security-sensitive resources for the `pf:admins` role.'
  references:
  - type: internal-commit
    summary: 'feat: upgrades kubernetes to 1.31'
    link: 33d887c36fae56bc624511e72a8ac7f939db47f3
  impacts:
  - type: iac-module
    component: kube_policies
    summary: pf:admins ClusterRole now limits write access to RBAC roles, webhooks, CRDs, flow control, and Kyverno policies
      to prevent privilege escalation and cluster instability
  description: The `pf:admins` ClusterRole previously granted full write access to all non-secret resources, including RBAC
    roles/bindings, admission webhooks, CRDs, and Kyverno policies. Unintended mutations to these resources can escalate privileges,
    bypass policy enforcement, or destabilize the cluster. The role now separates resources into a `sensitive_resources` list
    — covering cluster roles, role bindings, API services, webhook configurations, flow control objects, CRDs, and Kyverno
    policies — and grants only `get/list/watch` access to them. Full write access is retained for all other non-secret resources.
