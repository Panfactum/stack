- type: fix
  summary: Fixes `pf cluster add` EKS setup where the default cluster name was not pre-formatted, allowing invalid characters.
  references:
  - type: internal-commit
    summary: 'fix: improve cluster name handling in EKS setup'
    link: 1aed9737fed298a33b7dbfae6cb4370a8f2b472d
  impacts:
  - type: cli
    component: cluster add
    summary: EKS setup default cluster name is now pre-formatted to lowercase with hyphens
  description: The EKS cluster name prompt already applied `clusterNameFormatter` as a real-time transformer while the user
    typed, but the `default` value passed to the prompt was the raw `${environment}-${region}` string. If a user accepted
    the default without modification, the formatter was not applied to the default, so the saved cluster name could contain
    uppercase letters or underscores that violate EKS naming constraints. The default is now passed through `clusterNameFormatter`
    before being shown, ensuring the pre-filled value is always a valid, formatted cluster name.
- type: addition
