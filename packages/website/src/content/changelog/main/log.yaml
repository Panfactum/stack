    description: >-
      The `aws_organization` module now manages the IAM account alias for the management AWS account via a new
      required `alias` variable. Previously the alias was only set through `aws_account` (for non-management
      environments); this change brings the management account into alignment. Existing deployments must add the
      `alias` input before the next `terragrunt apply`.
  - type: "fix"
    summary: >-
      Fixes `pf env add` where the AWS account alias was not passed to `aws_organization` during management
      environment bootstrap.
    references:
      - type: "internal-commit"
