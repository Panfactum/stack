- id: 132df601-d683-459d-803e-ea45e5498a39
  type: fix
  summary: Fixes `pf env add` resume where the state bucket name was not loaded into task context, breaking downstream steps.
  references:
  - type: internal-commit
    summary: 'fix: bootstrap env resume'
    link: 6a17572cde08a016348a43d09b3e9c1ba014aabc
  impacts:
  - type: cli
    component: env add
    summary: State bucket and lock table names are now populated in context even when resuming an interrupted setup
  description: The "Generate unique state bucket name" task previously used a `skip` condition to bypass execution entirely
    when `tf_state_bucket` was already set in the Panfactum config. While this avoided re-generating a new bucket name on
    resume, it also meant that `ctx.bucketName` and `ctx.locktableName` were never assigned, causing downstream tasks (such
    as deploying `tf_bootstrap_resources`) to receive `undefined` resource IDs and fail. The fix removes the `skip` and instead
    populates the context values from the existing config at the start of the task body, so the bucket name flows correctly
    to all subsequent steps whether this is a fresh run or a resumed one.
- id: 06b8e872-fa6c-4e9b-b571-416f37bc5e0f
  type: breaking_change
  summary: '`aws_organization` now requires a new `alias` input variable for setting the AWS account alias on the management
    account.'
  action_items:
  - Add an `alias` input to your `aws_organization` module configuration with a human-readable string for the management account
    (e.g., `"my-org-management"`).
  references:
  - type: internal-commit
    summary: 'fix: set account alias in aws_organization module'
    link: fd8d7b26d3cffcebc0b3d37491cb92a76dc7d016
  impacts:
  - type: iac-module
    component: aws_organization
    summary: New required `alias` string input — management account alias is now managed by this module
  description: The `aws_organization` module now manages the IAM account alias for the management AWS account via a new required
    `alias` variable. Previously the alias was only set through `aws_account` (for non-management environments); this change
    brings the management account into alignment. Existing deployments must add the `alias` input before the next `terragrunt
    apply`.
- id: 6385d041-f64c-4a40-ab98-70e6a10d34dd
  type: fix
  summary: Fixes `pf env add` where the AWS account alias was not passed to `aws_organization` during management environment
    bootstrap.
  references:
  - type: internal-commit
    summary: 'fix: set account alias in aws_organization module'
    link: fd8d7b26d3cffcebc0b3d37491cb92a76dc7d016
  impacts:
  - type: cli
    component: env add
    summary: Account alias is now correctly forwarded as an input to the aws_organization module
  description: When bootstrapping the management environment, `pf env add` collects an account alias from the user but previously
    did not pass it to the `aws_organization` module's `alias` input. The alias was therefore never persisted for the management
    account. The fix wires the collected alias through `defineInputUpdate` into the `aws_organization` deployment step, mirroring
    the existing behavior for non-management environments that use `aws_account`.
- id: 680b6e2a-958c-4379-b2b2-6a3b120178ca
  type: improvement
  summary: '`pf env add` now supports resumability and fixes phone number formatting from the AWS Account API.'
  references:
