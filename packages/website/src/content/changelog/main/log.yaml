  impacts:
  - type: cli
    component: sso add
    summary: The 'Updating EKS to use AWS SSO' sub-step now writes a federatedAuthEnabled checkpoint and is skipped on re-run
  description: 'The "Setup AWS Federated SSO" step in `pf sso add` previously had no checkpoint for the final "Updating EKS
    to use AWS SSO" task, meaning the command would re-apply that task on every re-run even if it had already completed. This
    commit adds a `skip` callback that reads `federatedAuthEnabled` from the `aws_eks` module''s `.pf.yaml` file. After the
