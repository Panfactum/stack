  description: 'Six fixes from the same commit: (1) `pf env add` contact info was written with the wrong key (`account_access_configuration`
    instead of `primary_contact`) and mismatched field names, so it was silently discarded. (2) Optional contact info prompts
    for Organization Name and Street Address 2 incorrectly required non-empty input. (3) The IAM Identity Center update step
    ran unconditionally even when the permissions module was not deployed; it now checks for the module directory first. (4)
    `pf devshell sync` did not overwrite existing HCL files, and the `.envrc` update subtask was silently dropped due to a
    syntax error. (5) `panfactum.hcl` failed when `authentik_url` was absent; the value is now read with `lookup()` and a
    sentinel fallback. (6) `aws_organization` had a race condition where IAM Organizations features could be enabled before
