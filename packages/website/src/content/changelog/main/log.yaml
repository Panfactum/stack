- type: fix
  summary: Fixes `pf wf git-checkout` and `pf wf sops-set-profile` failing in CI/CD containers where no git repository exists
    at startup.
  references:
  - type: internal-commit
    summary: 'fix(cli): allow wf commands to run without a devshell'
    link: e45d7351a4736a7142100f63a8a23e19cc71d1c6
  impacts:
  - type: cli
    component: wf git-checkout
    summary: Now runs successfully in CI/CD containers before a git repository is checked out
  - type: cli
    component: wf sops-set-profile
    summary: Now runs successfully in CI/CD containers before a git repository is checked out
  description: These two workflow commands are designed to run inside CI/CD containers, often before a git repository even
    exists on disk. However, the CLI's context initialization called `git rev-parse --show-toplevel` to load devshell config,
    which fails in that environment. The fix introduces a `PanfactumBaseContext` (a lighter context without devshell config)
    and a `requiresDevshell = false` flag that commands can set to opt out of devshell initialization. `pf wf git-checkout`
    and `pf wf sops-set-profile` now use this lighter context, allowing them to work correctly in any container environment.
