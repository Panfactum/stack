    had sufficient EC2 vCPU quota, which could result in cryptic failures mid-install. The installer now queries the AWS Service
    Quotas API for the running on-demand standard instance quota (L-1216C47A) and emits a clear warning (including the current
    quota value) if the value is below 16. If the environment was created with `pf env add`, the quota increase has already
    been requested automatically — users simply need to wait for the request to be approved before re-running the installer.
