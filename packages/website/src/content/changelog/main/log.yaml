summary: Adds Temporal workflow orchestration, per-schema Vault roles for PostgreSQL clusters, AWS Service Quotas
  Automatic Management, and a new cluster reset command, alongside extensive reliability improvements to cluster and SSO
  installation flows.
upgrade_instructions: upgrade.mdx
highlights:
  - New `kube_temporal` module — deploy Temporal workflow orchestration with full Panfactum operational guarantees
  - New `pf cluster reset` command — safely reset EKS clusters by removing default AWS resources
  - "`aws_account` now enables AWS Service Quotas Automatic Management for proactive quota monitoring and increase
    requests"
  - "`kube_pg_cluster` gains per-schema Vault roles and automatic schema initialization — re-apply to enable new
    capabilities"
  - "`authentik_vault_sso` now filters regex redirect URIs Vault cannot accept — re-apply `authentik_vault_sso` and
    `vault_auth_oidc` modules"
  - "`kube_cilium` operator now runs 2 replicas on all clusters regardless of SLA target — re-apply `kube_cilium` to
    apply"
  - "`kube_aws_ebs_csi` PodDisruptionBudget switched to server-side apply to fix Helm race condition — re-apply
    `kube_aws_ebs_csi`"
  - Authentik default login session extended from 8 hours to 30 days — matches industry norms while MFA remains enforced
  - "`pf cluster add` and `pf sso add` receive major reliability improvements including bootstrap anti-affinity bypass,
    idempotent re-runs, and pre-flight checks"
