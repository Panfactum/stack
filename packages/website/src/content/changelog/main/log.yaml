        component: "env add"
        summary: "State bucket and lock table names are now populated in context even when resuming an interrupted setup"
    description: >-
      The "Generate unique state bucket name" task previously used a `skip` condition to bypass execution
      entirely when `tf_state_bucket` was already set in the Panfactum config. While this avoided re-generating
      a new bucket name on resume, it also meant that `ctx.bucketName` and `ctx.locktableName` were never
      assigned, causing downstream tasks (such as deploying `tf_bootstrap_resources`) to receive `undefined`
      resource IDs and fail. The fix removes the `skip` and instead populates the context values from the
      existing config at the start of the task body, so the bucket name flows correctly to all subsequent steps
      whether this is a fresh run or a resumed one.
  - type: "breaking_change"
    summary: >-
      `aws_organization` now requires a new `alias` input variable for setting the AWS account alias on the
      management account.
    action_items:
      - "Add an `alias` input to your `aws_organization` module configuration with a human-readable string for the management account (e.g., `\"my-org-management\"`)."
    references:
