- type: improvement
  summary: '[`kube_opensearch`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch) now sizes
    the JVM heap dynamically to 50% of the container memory request instead of a hardcoded 512 MB.'
  references:
  - type: internal-commit
    summary: 'feat: adds opensearch dashboards, remote storage, and v3'
    link: 55a2cd5eea66664a7994f5841abda062d982fe1e
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: JVM heap size is now calculated as 50% of CONTAINER_MEMORY_REQUEST at pod startup
  description: Previously the OpenSearch JVM heap was hardcoded to `-Xmx512M -Xms512M`, which could cause out-of-memory errors
    or waste resources when the VPA adjusted the pod's memory request. The entrypoint script now reads the `CONTAINER_MEMORY_REQUEST`
    environment variable (injected by `kube_policies`) and sets the heap to half the request in megabytes, keeping JVM memory
    proportional to the pod allocation.
- type: improvement
  summary: '[`kube_policies`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_policies) now automatically
    injects a `NODE_OPTIONS` environment variable into every container, setting `--max-old-space-size` to the container''s
    memory request.'
  references:
  - type: internal-commit
    summary: 'feat: adds opensearch dashboards, remote storage, and v3'
    link: 55a2cd5eea66664a7994f5841abda062d982fe1e
  impacts:
  - type: iac-module
    component: kube_policies
    summary: NODE_OPTIONS --max-old-space-size is now injected into all containers and init-containers proportional to memory
      request
  description: Node.js processes default to a fixed V8 heap limit (typically 512 MB regardless of available memory) which
    can cause unexpected OOM crashes. `kube_policies` now injects `NODE_OPTIONS=--max-old-space-size=<MB>` into every container
    and init-container, setting the V8 heap to match the container's memory request. This is applied via a `patchStrategicMerge`
    so that VPA mutations (which happen after the initial Kyverno webhook) are handled correctly without double-applying or
    overriding an explicitly set value.
- type: fix
  summary: Fixes `pf cluster add` Vault unseal step to validate `vault status` JSON output with a Zod schema before reading
    `sealed`.
  references:
  - type: internal-commit
    summary: 'lint: added schema validation on vault status'
    link: 0c1e3abe3ebb11f8985a37394060017c83e812ad
  impacts:
  - type: cli
    component: cluster add
    summary: Vault unseal skip-check now uses parseJson with a Zod schema instead of bare JSON.parse
  description: 'Previously, the `skip` callback for the Vault unseal step called `JSON.parse()` directly on the output of
    `vault status -format=json` and read `.sealed` without validation. If the command produced unexpected output (e.g., an
    error message or a differently-shaped JSON object), the property access would silently yield `undefined` and the step
    would skip unsealing incorrectly. The fix introduces a `parseJson` utility that combines `JSON.parse` with a Zod `z.object({
    sealed: z.boolean() })` schema, ensuring that any malformed output throws a clear validation error instead of silently
    producing wrong behavior.'
- type: improvement
  summary: '`pf sso add` federated auth EKS update step now writes a checkpoint so re-runs skip completed work.'
