  - id: 506abc4d-c071-4be7-9a4f-ebfdc48c042d
    type: fix
    summary: Fixed `cluster add` extension setup to prevent Terragrunt provider cache corruption during concurrent module
      initialization.
    description: "Previously, concurrent `terragrunt init` calls during `cluster add` extension setup would each spawn their
      own provider cache server (or none), causing filesystem corruption in the shared plugin cache directory when 8
      extension modules initialized in parallel. This is a known upstream limitation: Terraform's `plugin_cache_dir` is
      not concurrency-safe when multiple `init` processes write to it simultaneously. The fix adds a dedicated
      pre-initialization phase that runs `terragrunt init --all` scoped to only the new extension modules, ensuring a
      single Terragrunt process coordinates all provider downloads through one in-process cache server. Concurrent apply
      tasks then skip initialization (via `init_status=success`) to avoid re-triggering the race condition."
    references:
      - type: internal-commit
        summary: "feat(cluster): pre-init extension modules to prevent cache corruption"
        link: 734cabbde022dba65ca5b255406fcfd3aa7b30e1
      - type: issue-report
        summary: Allow multiple Terraform instances to write to plugin_cache_dir concurrently
        link: https://github.com/hashicorp/terraform/issues/31964
      - type: issue-report
        summary: Terragrunt run-all init concurrency/parallelism issues with shared plugin cache
        link: https://github.com/gruntwork-io/terragrunt/issues/2542
    impacts:
      - type: cli
        component: cluster add
        summary: Extension module setup now runs a pre-initialization phase to prevent provider cache corruption during
          concurrent `terragrunt apply` operations
      - type: devshell
        component: terragrunt
        summary: "`terragruntInitAll` now accepts an optional `modules` parameter to scope initialization to specific module
          directories using `--queue-include-dir` and `--queue-strict-include` flags"
  - id: 32d92099-e42d-4ebd-8d49-18b42efd284a
    type: fix
    summary: Fixed EC2 vCPU quota check to be aware of existing deployments and avoid false failures on `cluster add` re-runs
    description: The quota check previously required 32 vCPUs of headroom unconditionally, causing false failures when
      re-running `pf cluster add` after `aws_vpc` and/or `aws_eks` were already deployed. Those modules' instances are
      already reflected in current usage metrics, so they should reduce the required headroom rather than count against
      it. The fix skips quota checks entirely when `kube_karpenter` is already deployed, subtracts `aws_vpc` vCPUs (6
      for SLA 2/3, 2 for SLA 1) from required headroom when `aws_vpc` is deployed, subtracts `aws_eks` vCPUs (6) when
      `aws_eks` is deployed, and lowers baseline requirements for SLA 1 clusters (16 vCPUs vs 32) since they run in a
      single AZ with fewer managed nodes.
    references:
      - type: internal-commit
        summary: "fix(cluster/add): make vCPU quota check aware of existing deployments"
        link: b3b91a48ce6eff18e40c5ab64d7d8e75ce17d991
      - type: external-docs
        summary: Amazon EC2 service quotas — vCPU-based On-Demand Instance limits
        link: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-resource-limits.html
    impacts:
      - type: cli
        component: cluster add
        summary: EC2 vCPU quota check now accounts for existing `aws_vpc`, `aws_eks`, and `kube_karpenter` deployment status to
          prevent unnecessary quota increase requests on re-runs
  - id: 7258c043-8680-4df0-9f05-d958534eadff
    type: fix
    summary: Fixed Vault setup to be idempotent on re-runs by checking initialization status and reading tokens from proper
      file locations
    description: "`pf cluster add` is designed to be resumable — interrupted installations can be re-run and completed steps
      are skipped. However, the Vault setup phase had several bugs that caused it to fail on re-runs: it attempted to
      re-initialize an already-initialized Vault (which fails by design), looked for recovery keys in the wrong file
      (`secrets.yaml` instead of `recovery.yaml`), and never read the vault root token from `region.secrets.yaml` on
      subsequent runs. Additionally, step completion detection for the `vault_core_resources` module was unreliable
      because that module is deployed multiple times — the fix now also treats a non-local `vault_addr` as a completion
      signal. Together these fixes ensure that resuming an interrupted cluster installation does not require manual
      intervention to recover Vault state."
    references:
      - type: internal-commit
        summary: "fix(cluster/vault): make vault setup idempotent on re-runs"
        link: 8084b20fbe5a6174adf836a019ec8f69e12f7dd7
      - type: internal-docs
