    summary: >-
      Recovery keys written to kube_vault/recovery.yaml and root token to region.secrets.yaml immediately after
      vault operator init; read paths updated to match;
  description: >-
    Three Vault-related `pf cluster add` fixes: (1) Recovery keys and the root token are now saved immediately after
    `vault operator init` completes, before the unseal step, so a CLI crash cannot lose the recovery material. The root
    token is written to `region.secrets.yaml` (as `vault_token`) and recovery keys to `kube_vault/recovery.yaml`. A follow-on
    fix updated the read-side code to match — previously the setup step still read both from `kube_vault/secrets.yaml`, failing
    on any cluster where the split had already occurred. (2) The Vault `kubectl port-forward` proxy now passes `--context` to
    target the correct cluster when multiple Kubernetes contexts are present. (3) The "Deploy Vault Core Resources" step now
    runs at the start of the autoscaling phase, ensuring the Vault ingress is healthy before the step executes.
