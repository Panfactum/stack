        link: https://docs.goauthentik.io/integrations/services/github-organization/
    impacts:
      - type: iac-module
        component: authentik_github_sso
        summary: The `sso_post_url` output now returns the correct SAML HTTP-POST binding URL instead of the HTTP-Redirect URL,
          enabling successful GitHub SAML SSO configuration
  - id: 380c8281-a2a3-474e-8aa5-545b5c0c3f98
    type: fix
    summary: Fixed `pf sso add` crashing on first-time AWS SSO setup when the `authentik_aws_sso` module has not yet been
      deployed
    description: Running `pf sso add` for the first time fails before displaying any prompts because the
      `authentik_aws_sso/module.yaml` file does not exist until the module has been deployed at least once. The
      `setupFederatedAuth` function read this file via `readYAMLFile` without tolerating a missing file, causing the
