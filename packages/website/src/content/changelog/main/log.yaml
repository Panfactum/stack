  description: Fixes `pf domain add` to show context-appropriate instructions during the manual DNS zone setup step. For apex
    domains, users are now directed to update nameservers at their domain registrar; for non-apex subdomains, users are directed
    to add NS records at their existing DNS host. Previously, all domains received the registrar-targeted nameserver instructions
