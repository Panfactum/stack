  - type: "improvement"
    summary: "Stable releases are now open to all users. The stable release format has been updated to
      `stable.<YY-MM>.<patch>` (e.g., `stable.25-04.0`), the"
    description: "Previously, stable releases were only available to stack subscribers. Stable releases are now publicly
      available to all users of the Panfactum framework. The release naming convention has also changed: stable releases
      now use the format `stable.<YY-MM>.<patch>` instead of the previous `<YY-MM>.<patch>`. The support window has been
      updated to six months from the initial release date (previously twelve months). New stable release channels will
      be created roughly three times per year, aligned with new Kubernetes releases."
    references:
      - type: "internal-commit"
        summary: "Open stable releases to all users and update release format, cadence, and support policy"
        link: "70491731293c2383488a1ca9bd68f93f6bcc8c27"
      - type: "internal-docs"
        summary: "Versioning and releases documentation"
        link: "/docs/main/guides/versioning/releases"
  - type: "addition"
    summary: "Adds a new `install.sh` bootstrapper script under `packages/installer` that automates the full initial setup
      of a Panfactum infrastructure repository: platform"
    description: "New users can run this installer script to go from zero to a fully operational Panfactum DevShell in one
      step. The script validates prerequisites (Git >= 2.39, Nix >= 2.23, direnv >= 2.32), installs missing dependencies
      where possible, creates `flake.nix` and `panfactum.yaml` with interactive prompts, builds the Panfactum DevShell
      via `pf-update`, and activates direnv. The script is idempotent — re-running it safely skips steps that are
      already complete. Repository URLs are validated to require HTTPS format, and SSH remote URLs are automatically
      converted to HTTPS."
    references:
      - type: "internal-commit"
        summary: "chore: creates initial panfactum installer"
        link: "74bc98bf931abfee89143015332bd3261cefcb59"
      - type: "internal-commit"
        summary: "feat(installer): complete end-to-end install flow with flake.nix, pf-update, and direnv allow"
        link: "e7ade5824f74f7dc6a778514a23c7da891c3a4fb"
  - type: "improvement"
    summary: "The `enter-shell-local` devshell script now respects the `PF_SKIP_CHECK_REPO_SETUP=1` environment variable,
      allowing users to bypass the `pf-check-repo-setup` validation step when entering"
    description: "Setting `PF_SKIP_CHECK_REPO_SETUP=1` before entering the devshell skips the repository setup check, which
      is useful during initial bootstrapping (e.g., when using the new installer script) before a fully configured
      repository is in place."
    references:
      - type: "internal-commit"
        summary: "chore: creates initial panfactum installer"
        link: "74bc98bf931abfee89143015332bd3261cefcb59"
    impacts:
      - type: "devshell"
        component: "enter-shell-local"
        summary: "Supports PF_SKIP_CHECK_REPO_SETUP=1 to bypass repo setup validation on shell entry"
  - type: "fix"
    summary: "Fixes user input prompts in `install.sh` when the script is run via a pipe (e.g., `curl … | sh`). The"
    description: "Previously, the `create_panfactum_yaml` prompts for repository URL, repository name, and primary branch
      would hang or fail silently when stdin was not attached to a terminal (e.g., when the installer was invoked via
      `curl … | sh`). The fix redirects each `read` call to use `/dev/tty` directly (`read -r … </dev/tty`), which
      reliably captures keyboard input regardless of how the script's stdin stream is connected. User-facing prompts are
      now rendered in yellow for improved readability."
    references:
      - type: "internal-commit"
        summary: "fix: installer user input via pipe"
        link: "dd6a76203cec41092a81ea963b513732159f5a70"
      - type: "internal-commit"
        summary: "fix: installer user input via pipe - take 2"
        link: "ab63aee9dfda4b84b936583c229ff68d3d14a204"
  - type: "fix"
    summary: "Corrects the environment variable name used to skip repository setup validation in `enter-shell-local` from
      `PF_SKIP_REPO_CHECK` to `PF_SKIP_CHECK_REPO_SETUP`. Users who set"
