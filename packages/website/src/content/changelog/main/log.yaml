    summary: 'fix: AdministratorAccess credential validation loop'
    link: 1c7d2dd454ef5fa216abe3fabb12aa1bcdf76bfb
  impacts:
  - type: cli
    component: env add
    summary: Fixed infinite loop in AdministratorAccess policy validation; root account credentials are now rejected with
      a clear error
  description: Fixes a loop bug in `pf env add` where the `AdministratorAccess` credential validation step could not re-prompt
    for new credentials after failing the policy check. Previously, if the provided IAM user lacked `AdministratorAccess`,
    the retry prompt would loop without allowing the user to enter different credentials. The fix restructures the validation
    into nested loops that properly support both retrying with the same credentials and entering new ones. Also adds root-user
    detection so credentials belonging to the AWS root account are rejected with a clear error message.
