  - id: 1c8dbffd-3d29-47bf-a582-608e0eb3ca89
    type: fix
    summary: Fixed `authentik_vault_sso` module passing regex redirect URIs to `vault_auth_oidc`, causing silent
      misconfigurations since Vault does not support regex patterns.
    description: "When `authentik_vault_sso` was updated to support regex redirect URIs for Authentik's pattern-matching, it
      began passing all URIs — including regex patterns — directly to `vault_auth_oidc`. Vault's `allowed_redirect_uris`
      requires exact string matches and does not support regex, so any regex pattern silently caused authentication
      failures. Two changes close this boundary: the `oidc_redirect_uris` output on `authentik_vault_sso` now returns
      only strict-mode URIs suitable for Vault, and a new `oidc_redirect_uris_including_regexes` output provides the
      full set for OIDC providers that do support regex matching (such as those used by ArgoCD or Grafana).
      Additionally, `vault_auth_oidc` now hardcodes `http://localhost:8250/oidc/callback` internally, since Vault
      handles port-agnostic localhost matching natively per RFC 8252 — callers no longer need to supply this URI
      manually."
    action_items:
      - Re-apply the `authentik_vault_sso` module to update redirect URI filtering
      - Re-apply the `vault_auth_oidc` module to get the built-in localhost callback URI
      - If you pass `authentik_vault_sso`'s `oidc_redirect_uris` output to any non-Vault OIDC provider (e.g. ArgoCD,
        Grafana), switch to `oidc_redirect_uris_including_regexes` to continue receiving the full URI set including
        regex patterns
    references:
      - type: internal-commit
        summary: "fix(oidc): prevent regex redirect URIs from reaching Vault OIDC"
        link: df00050879ea60803aca824155bde37fc8d19e2c
      - type: external-docs
        summary: "RFC 8252 - OAuth 2.0 for Native Apps: Loopback interface redirection"
        link: https://tools.ietf.org/html/rfc8252#section-7.3
      - type: external-docs
        summary: Vault JWT/OIDC Auth Method — Redirect URIs and allowed_redirect_uris configuration
        link: https://developer.hashicorp.com/vault/docs/auth/jwt#redirect-uris
