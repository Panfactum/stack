- id: 1e6bdd79-0818-4c38-a586-c716a8643e31
  type: addition
  summary: Adds `pf iac update-module-status` to track `init_status` and `deploy_status` in each module's `.pf.yaml`.
  description: 'Replaces the inline bash `echo` approach in `panfactum.hcl` hooks with a dedicated CLI command that records
    both in-progress and final status for `init` and `apply` phases. This enables accurate step resumability in workflows
    like `pf cluster add`. Three iterative fixes followed: (1) `panfactum.hcl` hooks were calling `pf update-module-status`
    instead of `pf iac update-module-status` — all six hook invocations corrected; (2) the command wrote camelCase keys (`initStatus`,
    `deployStatus`) instead of the required snake_case (`init_status`, `deploy_status`); (3) a broken object spread nested
    existing fields as a key instead of merging them, and a `terragrunt.hcl` presence check was added to prevent accidental
    writes to non-module directories.'
  references:
  - type: internal-commit
    summary: 'feat: enhances module status architecture'
    link: 00029f4e98aec9c1119bba2ff2a7fcb2d228620b
  - type: internal-commit
    summary: 'feat: misc cli improvements'
