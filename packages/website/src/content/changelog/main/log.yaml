- id: d25833a1-b552-4ae6-97bc-4c0332a59596
  type: fix
  summary: Fixes [`wf_tf_deploy`](/docs/edge/reference/infrastructure-modules/submodule/workflow/wf_tf_deploy) Terragrunt
    flags and `pf wf sops-set-profile` non-KMS SOPS schema crash.
  references:
  - type: internal-commit
    summary: 'fix(wf): migrate terragrunt flags to new CLI format'
    link: cfb4c739cf687095795a2e2a8a0439ef408858fc
  impacts:
  - type: iac-module
    component: wf_tf_deploy
    summary: deploy.sh now uses short-form Terragrunt flags (--download-dir, --non-interactive, etc.) instead of deprecated
      --terragrunt-* equivalents
  - type: cli
    component: wf sops-set-profile
    summary: Inner sops Zod schema now uses passthrough() to tolerate unknown fields from non-KMS SOPS configurations
  description: 'Two fixes from the same commit: (1) `wf_tf_deploy` `deploy.sh` was using deprecated `--terragrunt-*` flags
    that newer Terragrunt versions no longer accept. All flags updated to their short-form equivalents. Re-apply `wf_tf_deploy`
    to pick up the updated script. (2) `pf wf sops-set-profile` crashed on SOPS files encrypted with non-KMS backends (e.g.,
    age) because the Zod schema for the inner `sops` object was strict and rejected extra fields. Adding `.passthrough()`
    tolerates unknown fields.'
  action_items:
