      installer prompts for an alert email, configures the `kube_cert_issuers` module with the
      correct Route 53 zone data, deploys it via Vault proxy, and then re-applies `kube_cert_manager`
      with `self_generated_certs_enabled = false` to issue the first real certificate — all with
      fine-grained checkpointing so each sub-step can be resumed independently.
    references:
      - type: internal-commit
        summary: "cert issuers"
        link: 2ca29499f6d742ee64fe75d3671674e441291bb1
  - type: fix
