  description: Previously the CLI always resolved the repository root from `process.cwd()`, which required the terminal to
    be inside the repository when invoking any `pf` command. The new `--cwd` flag (also readable from the `CWD` environment
    variable) lets callers specify an explicit working directory, enabling automation scripts, editor integrations, and CI
    pipelines to invoke `pf` commands from outside the repo tree.
  references:
  - type: internal-commit
