  impacts:
  - type: cli
    component: sso add
    summary: Root email prompt pre-filled with authentik-root@sso.<domain>; admin email explainer improved
  description: Previously, the Authentik root user email prompt had no default value, requiring users to type a full email
    address. The prompt now pre-populates with `authentik-root@sso.<domain>` (using the selected SSO subdomain) so users can
    press Enter to accept a sensible default. The admin user email explainer has also been updated to clarify that the email
