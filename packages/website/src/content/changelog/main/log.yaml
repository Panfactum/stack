# Unreleased changes for the next edge release.
# Add new changes here as they are developed.
summary: "Introduces dedicated DNS zones for cluster management, consolidates certificate modules, adds KEDA for
  autoscaling, launches the new Panfactum CLI tool, and restructures several AWS modules for better configuration
  management."
upgrade_instructions: "upgrade.mdx"
highlights:
  - "New `pf` CLI tool — run `pf devshell sync` then `terragrunt run-all apply` to initialize"
  - "`kube_cert_manager` and `kube_cert_issuers` consolidated into new `kube_certificates` module — state migration
    required"
  - "KEDA added to base cluster — install via
    [`kube_keda`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_keda)"
  - "Kubernetes default version updated to 1.31"
  - "`burstable_nodes_enabled` now defaults to `true` for all modules"
changes:
  - type: "breaking_change"
    summary: "Every cluster now requires a dedicated DNS zone for hosting control-plane utilities. `kube_domain` is a new
      required configuration value in"
    action_items:
      - "Add a `kube_domain` field to `region.yaml` for every region that contains a Kubernetes cluster. The value must
        be a subdomain of a domain already available in the environment (e.g., `kube.example.com` if `example.com` is
        managed)."
      - "Deploy the corresponding DNS zone via `aws_dns_zones` before applying cluster modules."
    impacts:
      - type: "configuration"
        component: "region.yaml"
        summary: "New required kube_domain field for cluster DNS zones"
    description: "Every cluster now requires a dedicated DNS zone for hosting control-plane utilities. `kube_domain` is a
      new required configuration value in `region.yaml` for every region housing a Kubernetes cluster. It must be a
      subdomain of a domain available to the environment."
  - type: "breaking_change"
    summary: "We now create the Authentik email template in `kube_authentik`. The organization name is now a required input.
      Use the new"
    action_items:
      - "Add the `organization_name` variable to your `kube_authentik` module configuration."
      - "Wire the `organization_name` output from `kube_authentik` into the `authentik_core_resources` module as an
        input via a `dependency` block."
    impacts:
      - type: "iac-module"
        component: "kube_authentik"
        summary: "Organization name now required input; produces email template"
      - type: "iac-module"
        component: "authentik_core_resources"
        summary: "Must now consume organization_name output from kube_authentik"
    description: "We now create the Authentik email template in `kube_authentik`. The organization name is now a required
      input. Use the new `organization_name` output from `kube_authentik` as an input to `authentik_core_resources`."
  - type: "breaking_change"
    summary: "`kube_cert_manager` and `kube_cert_issuers` have been consolidated into a single `kube_certificates` module to
      address various race conditions on cluster installation. See"
    action_items:
      - "Create a new `kube_certificates` module deployment."
      - "Migrate the Terraform state from both `kube_cert_manager` and `kube_cert_issuers` into the new module."
      - "Remove the old module directories after confirming the migration succeeds."
      - "Follow the detailed state migration steps in the upgrade instructions."
    references:
      - type: "internal-commit"
        summary: "Merge certificates modules (#353)"
        link: "48d67a2721e3df5e482db5e975bc76722451dd2a"
    impacts:
      - type: "iac-module"
        component: "kube_cert_manager"
        summary: "Deprecated and consolidated into kube_certificates"
      - type: "iac-module"
        component: "kube_cert_issuers"
        summary: "Deprecated and consolidated into kube_certificates"
      - type: "iac-module"
        component: "kube_certificates"
        summary: "New module replacing kube_cert_manager and kube_cert_issuers"
    description: "`kube_cert_manager` and `kube_cert_issuers` have been consolidated into a single `kube_certificates`
      module to address various race conditions on cluster installation. See upgrade instructions for the state
      migration steps."
  - type: "breaking_change"
    summary: "KEDA is now included in the base Panfactum cluster and modules assume it is installed. See the installation
      instructions [here](/docs/edge/guides/bootstrapping/autoscaling/#deploy-keda)."
    action_items:
      - "Deploy the `kube_keda` module in every cluster following the [installation
        guide](/docs/edge/guides/bootstrapping/autoscaling/#deploy-keda). This must be done before applying other
        modules that now depend on KEDA being present."
    impacts:
      - type: "iac-module"
        component: "kube_keda"
        summary: "Now required as part of base cluster installation"
  - type: "breaking_change"
    summary: "`burstable_nodes_enabled` now defaults to `true` for all modules. This fixes the broken default introduced in
      `edge.25-03-26`."
    description: "If you explicitly set `burstable_nodes_enabled = false` in any module, no action is needed. Otherwise,
      review your workloads to confirm they are compatible with burstable (T-family) instances, which are now used by
      default."
  - type: "breaking_change"
    summary: "Contact information variables on
      [`aws_account`](/docs/edge/reference/infrastructure-modules/direct/aws/aws_account) and
      [`aws_registered_domains`](/docs/edge/reference/infrastructure-modules/direct/aws/aws_registered_domains) have
      been consolidated to single objects for each contact."
    action_items:
      - "Replace the individual contact field variables (e.g., `contact_first_name`, `contact_last_name`, etc.) with the
        new consolidated contact objects in your `aws_account` and `aws_registered_domains` module configurations."
      - "Refer to the updated module reference docs for the exact object structure."
    impacts:
      - type: "iac-module"
        component: "aws_account"
        summary: "Contact variables consolidated into single objects per contact"
      - type: "iac-module"
        component: "aws_registered_domains"
        summary: "Contact variables consolidated into single objects per contact"
  - type: "breaking_change"
    summary: "Inputs to [`aws_dns_zones`](/docs/edge/reference/infrastructure-modules/direct/aws/aws_dns_zones) have been
      consolidated to a single `domains` object for better per-domain granular configuration."
    action_items:
      - "Migrate your `aws_dns_zones` inputs from separate domain list variables to the new `domains` object. Each key
        in the object is a domain name, and the value contains per-domain configuration."
      - "See the [module reference](/docs/edge/reference/infrastructure-modules/direct/aws/aws_dns_zones) for the new
        input schema."
    impacts:
      - type: "iac-module"
        component: "aws_dns_zones"
        summary: "Inputs consolidated into single domains object"
  - type: "breaking_change"
    summary: "The backup vault name in
      [`tf_bootstrap_resources`](/docs/edge/reference/infrastructure-modules/direct/aws/tf_bootstrap_resources) now has
      a unique suffix. **Manually delete the existing `terraform-<env_name>` backup vault before applying"
    action_items:
      - "In the AWS console (or via CLI), manually delete the existing AWS Backup vault named `terraform-<env_name>` in
        each environment."
      - "Re-apply the `tf_bootstrap_resources` module, which will create the replacement vault with the new
        uniquely-suffixed name."
    references:
      - type: "internal-commit"
        summary: "fix:tf_bootstrap_resources: unique vault suffix"
        link: "d07955d5d1f1de54783cd8baf5c8777f5c9588ed"
    impacts:
      - type: "iac-module"
        component: "tf_bootstrap_resources"
        summary: "Backup vault name now includes unique suffix; manual deletion required"
    description: "The backup vault name in
      [`tf_bootstrap_resources`](/docs/edge/reference/infrastructure-modules/direct/aws/tf_bootstrap_resources) now has
      a unique suffix. **Manually delete the existing `terraform-<env_name>` backup vault before applying the updated
      module.**"
  - type: "breaking_change"
    summary: "This release adds the new `pf` CLI tool. After completing all other migration steps, run `pf devshell sync`
      and then"
    action_items:
      - "Run `pf devshell sync` to initialize the new CLI tool's local configuration."
      - "Run `terragrunt run-all apply` across all modules to propagate the changes introduced by the sync."
    impacts:
      - type: "cli"
        component: "devshell sync"
        summary: "New command to sync devshell configuration"
      - type: "devshell"
        component: "pf"
        summary: "New CLI tool added to the devshell"
    description: "This release adds the new `pf` CLI tool. After completing all other migration steps, run `pf devshell
      sync` and then `terragrunt apply` on all modules."
  - type: "breaking_change"
    summary: "The default Kubernetes version has been updated to 1.31 from 1.30."
    action_items:
      - "Review the [Kubernetes 1.31
        changelog](https://github.com/kubernetes/kubernetes/blob/master/CHANGELOG/CHANGELOG-1.31.md) for any deprecated
        APIs or behavior changes that affect your workloads."
      - "If you pin `kube_version` explicitly, update it to `1.31`. Otherwise, re-apply `aws_eks` to trigger the
        upgrade."
    impacts:
      - type: "iac-module"
        component: "aws_eks"
        summary: "Default Kubernetes version updated to 1.31"
  - type: "addition"
    summary: "Adds the [`kube_job`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_job) submodule for
      running one-off Jobs as part of module deployment processes (e.g., database migrations)."
    description: "No action required. The `kube_job` submodule is available for use in your custom modules when you need to
