  description: 'Two improvements from the same "make docs top-level" restructuring: (1) All internal cross-links in module
    documentation have been updated to remove the `/docs` prefix. Links previously formatted as `/docs/main/guides/...` now
    use `/main/guides/...`, resulting in cleaner URLs. (2) Release scripts updated for the structured changelog system: `make-new-edge-release`
    now copies `changelog/main/log.yaml` to a versioned directory and resets `main/log.yaml` to a blank template; `make-new-stable-release-channel`
    creates a `stable/<version>/log.yaml` entry directory.'
- id: 1d22007c-06c5-4c10-951e-9101a103676a
  type: fix
  summary: Fixes [`kube_opensearch`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch) security
    update job not respecting the `vpa_enabled` input variable.
