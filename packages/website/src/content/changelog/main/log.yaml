        summary: No longer crashes when resuming installation at a step whose `module.yaml` has not yet been written
  - id: 633b6630-0254-4328-932b-90b95028e54d
    type: fix
    summary: Fixed `default_file_strict` regex in `aws_s3_public_website` to correctly recognize paths with non-extension
      dots (e.g., date-suffixed paths like `edge.25-04-03`) as directories.
    description: The previous `default_file_strict` regex matched only paths with no dots at all, so paths like
      `edge.25-04-03` — where the last dot is followed by a hyphen and digits rather than a file extension — were
      incorrectly treated as file paths and never had `default_file` appended. The new regex defines a file extension as
      alphanumeric characters after a final dot, so only paths like `style.css` or `app.min.js` are treated as files;
      paths where the text after the last dot contains any non-alphanumeric character are treated as directory-like and
      get `default_file` appended as expected. The implementation uses alternation instead of lookaheads because
      CloudFront Functions (`cloudfront-js-2.0`) does not support them, and uses `[.]` instead of `\.` to avoid
      backslash escaping issues in the `jsonencode` to JS string to JSON evaluation chain. The `default_file_strict`
      variable description has also been updated to reflect the corrected semantics.
    references:
      - type: internal-commit
        summary: "fix(s3_public_website): fix strict mode regex to handle non-extension dots"
        link: 445862a20bccb8e9b1ef06dd985486aa4d5d389f
      - type: internal-docs
        summary: aws_s3_public_website module documentation
        link: /docs/main/modules/aws_s3_public_website/overview
    impacts:
      - type: iac-module
        component: aws_s3_public_website
        summary: "`default_file_strict` mode now correctly appends `default_file` to directory-like paths containing
          non-extension dots, not just dot-free paths"
  - id: 5c275c1d-dd9f-40b7-935e-51678ea74761
    type: breaking_change
    summary: "`aws_organization` upgrades to AWS provider v6, enables `SERVICE_CONTROL_POLICY`, `TAG_POLICY`, and greatly
      expands trusted service access principals by default."
    description: >-
      The `aws_organization` module now pins the `hashicorp/aws` provider to `v6.38.0`, a major version bump from 5.x.
      Upgrading requires running `terraform init -upgrade` to refresh lock files across all management environment
      modules. Review the v6 upgrade guide for removed resources and changed defaults (OpsWorks, SimpleDB, Worklink, and
      nullable boolean validation are notable removals).

      Beyond the provider bump, the default configuration has expanded substantially. `SERVICE_CONTROL_POLICY` and
      `TAG_POLICY` are now enabled by default, meaning existing organizations will have these policy types applied on
      the next `terraform apply`. Trusted access is enabled for a much broader set of AWS governance services:
      GuardDuty, Security Hub, AWS Backup, Inspector, CloudTrail, Access Analyzer, Audit Manager, IPAM, License Manager,
      Network Manager, and others. A new `aws_notifications_organizations_access` resource (available only in provider
      v6) enables AWS User Notifications trusted access by default.

      New opt-out variables (`disabled_aws_service_access_principals`, `disabled_enabled_policy_types`,
      `enable_notifications_access`, `enable_support_service_access`) allow consumers to selectively disable any default
      without forking the module.
    action_items:
      - Run `terraform init -upgrade` in all management environment module directories to update provider lock files to
        v6.
      - Review the AWS Provider v6 Upgrade Guide for breaking changes that may affect other modules in your stack.
      - Run `terraform plan` on `aws_organization` and review the diff — expect new policy types
        (`SERVICE_CONTROL_POLICY`, `TAG_POLICY`) and an `aws_notifications_organizations_access` resource to be created.
      - If any newly-enabled service access principals or policy types are unwanted, set
        `disabled_aws_service_access_principals` or `disabled_enabled_policy_types` before applying.
    references:
      - type: internal-commit
        summary: "feat(aws_organization): upgrade AWS provider to v6, expand org service access"
        link: b5cab6457e1c5ba504e14e063839827285694d9d
      - type: external-docs
        summary: AWS Provider v6 Upgrade Guide
        link: https://registry.terraform.io/providers/hashicorp/aws/latest/docs/guides/version-6-upgrade
      - type: external-docs
        summary: hashicorp/terraform-provider-aws v6.38.0 release notes
        link: https://github.com/hashicorp/terraform-provider-aws/releases/tag/v6.38.0
      - type: external-docs
        summary: AWS services that support trusted access with Organizations
        link: https://docs.aws.amazon.com/organizations/latest/userguide/orgs_integrate_services_list.html
      - type: internal-docs
        summary: "`aws_organization` module reference"
        link: /docs/main/modules/aws_organization/reference
    impacts:
      - type: iac-module
        component: aws_organization
        summary: Pins `hashicorp/aws` to v6.38.0; enables `SERVICE_CONTROL_POLICY` and `TAG_POLICY` by default; adds
          `aws_notifications_organizations_access` resource; greatly expands default trusted service access principals;
          adds opt-out variables for all new defaults
  - id: 1f143057-6331-4bbc-989a-a17c28035f27
    type: fix
    summary: Fixed Vault pods failing to start during cluster bootstrap due to instance-type anti-affinity constraints.
    description: During cluster bootstrap, only the EKS controller node group exists (single `t4g.large` instance type), but
      `sla_target = 3` clusters require Vault pods on 3 different instance types via anti-affinity rules. This left all
      3 Vault pods in `Pending` state indefinitely, blocking the entire bootstrap process. The fix adds a
      `bootstrap_mode_enabled` parameter to `kube_vault` to temporarily disable instance-type anti-affinity during
      initial deployment. The CLI sets `bootstrap_mode_enabled = true` in the `setupVault` phase, then re-applies with
      `bootstrap_mode_enabled = false` in `setupClusterExtensions` once Karpenter and diverse node pools are running.
      Skip logic ensures the re-apply is idempotent on subsequent runs.
    references:
      - type: internal-commit
        summary: "fix(kube_vault): add bootstrap mode to bypass instance-type anti-affinity"
        link: 4b2379c6d54f0f0d0b8d4c764427eaea7d7278eb
      - type: internal-docs
        summary: kube_vault module documentation
        link: /modules/kube_vault
    impacts:
