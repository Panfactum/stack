    link: https://github.com/opensearch-project/OpenSearch/issues/16523
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: S3 repository plugin now authenticates with static IAM credentials via kube_aws_creds instead of IRSA
  description: The OpenSearch S3 repository plugin cannot use the web identity token file required by IRSA (see opensearch-project/OpenSearch#16523).
