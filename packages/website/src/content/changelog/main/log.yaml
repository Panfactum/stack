  - type: cli
    component: devshell sync
    summary: '*.user.yaml files are now added to the root and environments gitignore entries'
  description: '`panfactum.user.yaml` is a new optional configuration file placed alongside `panfactum.yaml` in the repository
    root. Its values are merged on top of `panfactum.yaml` at read time, allowing individual contributors to maintain user-specific
    settings (such as `user_id` for telemetry) without committing them to the shared repository. The file is automatically
    gitignored by `pf devshell sync` via new `*.user.yaml` entries added to both the root and environments directory gitignore
    patterns.'
- type: fix
  summary: Fixes `pf` CLI usage telemetry to fire after command parsing so that command path and flags are captured.
  references:
  - type: internal-commit
    summary: 'fix: move usage tracking from context to command execution'
    link: d7e596c735284934c4000156cdce6ede26dedf5f
  description: The `cli-start` PostHog event was previously fired inside `createPanfactumContext`, before the command had
    been fully processed. At that point `proc.path`, `proc.help`, and other command-level properties were not yet available,
    so the event carried no useful context. The tracking call has been moved to the main entry point after `cli.process()`
    completes, and the event now records the command path, help flag, debug flag, and working directory alongside the `user_id`.
