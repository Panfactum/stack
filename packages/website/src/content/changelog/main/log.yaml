  - type: "improvement"
    summary: "`pf cluster add` now automates Vault deployment and initialization. After the CSI drivers step, the installer
      deploys `kube_vault`, waits for"
    description: "Previously, Vault setup required manual steps after running `pf cluster add`. These steps are now fully
      automated: the installer deploys the `kube_vault` module, polls until all pods are running, runs `vault operator
      init` to obtain recovery keys and the root token, unseals Vault with the recovery keys, and then deploys
      `vault_core_resources` (using a `kubectl port-forward` to Vault during the Terraform apply). Recovery keys and the
      root token are encrypted via SOPS and written to `region.secrets.yaml` as `vault_token`. Users should move these credentials to
      a secure location after the install completes — they should not remain accessible to all superusers in a shared
      secrets store."
