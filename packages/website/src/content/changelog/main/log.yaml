  - id: 290a2d7a-c3e7-4996-832e-ba0ec78cfec1
    type: fix
    summary: Fixed Cilium pods failing to start on nodes during Karpenter disruption by tolerating both
      `karpenter.sh/disruption` and `karpenter.sh/disrupted` taints.
    description: "Karpenter uses two distinct taints during node lifecycle management: `karpenter.sh/disruption` is applied
      early in the disruption process to signal that a node is being considered for removal, while
      `karpenter.sh/disrupted` is applied to nodes that are actively undergoing disruption and draining. `kube_cilium`
      already tolerated `karpenter.sh/disruption` but was missing the toleration for `karpenter.sh/disrupted`. Without
      it, Cilium pods could be evicted from actively draining nodes at exactly the moment cluster networking is needed
      to gracefully migrate workloads, causing a networking outage during node lifecycle events such as consolidation,
      drift, or expiration."
    references:
      - type: internal-commit
