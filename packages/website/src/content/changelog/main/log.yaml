    type: fix
    summary: Fixed `pf buildkit suspend` command crashing when running inside its Kubernetes pod due to git repository
      lookup failures
    description: >-
      The `pf buildkit suspend` command was failing when executing inside its Kubernetes pod environment because
      the CLI startup routine attempts to locate the git repository root via `git rev-parse --show-toplevel`, which
      fails in containerized environments where no git repository is present. This fix enables BuildKit scaling
      operations to function correctly in containerized contexts, ensuring proper cost optimization capabilities
      when BuildKit pods need to scale themselves down during periods of inactivity. The change aligns the command
      with its sibling `pf buildkit resume` which already handled this scenario correctly.
