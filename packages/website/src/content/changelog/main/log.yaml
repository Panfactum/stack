    component: kube_constants
    summary: Internal image tag updated (nix-image-builder with idempotent ECR check); later superseded by the terragrunt
      GIT_PASSWORD fix image
  description: A new `check-image` pre-flight DAG step resolves the target Git ref to a commit SHA and queries ECR for existing
    per-architecture images and the multi-arch manifest before any build work begins. The `build-and-push`, `build-and-push-arm`,
    and `merge-and-copy` tasks are now conditionally executed based on output flags from `check-image`. Re-triggering a workflow
    for a SHA that was already built results in a no-op instead of re-building identical layers, saving compute time and avoiding
    unnecessary ECR pushes.
