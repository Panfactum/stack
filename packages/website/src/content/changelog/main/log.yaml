- id: fb8ff96f-fe3f-43d3-b667-4246f073341b
  type: fix
  summary: The devshell `terragrunt` wrapper no longer runs the `GIT_PASSWORD` redaction pipeline in CI when `GIT_PASSWORD`
    is unset.
  description: Previously the custom `terragrunt` wrapper unconditionally piped all CI output through a `sed` substitution
    to redact `GIT_PASSWORD`. When `GIT_PASSWORD` was empty this produced an empty sed pattern, which is a no-op at best and
    can cause unexpected pipe behavior at worst. The wrapper now checks that `GIT_PASSWORD` is non-empty before activating
    the redaction pipeline, and falls through to a plain exec path in CI when no password is present.
  references:
  - type: internal-commit
    summary: 'fix(terragrunt): skip secret redaction when GIT_PASSWORD is unset'
    link: 9e8754ede8059150ab93bd2f9515e9df2dc61f12
  - type: internal-commit
    summary: 'refactor(changelog): pre-filter internal commits before review step'
    link: 305700a90679f14372a7aa60ff31c9750f7af14d
  impacts:
  - type: devshell
    component: terragrunt
    summary: No longer runs empty-pattern sed redaction when GIT_PASSWORD is unset in CI
  - type: iac-module
    component: kube_constants
    summary: Internal image tag updated to cfb4c739cf687095795a2e2a8a0439ef408858fc (CLI devshell-independence fix)
- id: 79c1408a-6c5d-4c30-a19f-d34d17bf1a9d
  type: fix
  summary: Several `pf` CLI commands were missing `requiresDevshell = false`, preventing them from running in CI/CD pipelines
    and other non-devshell contexts.
  references:
  - type: internal-commit
    summary: 'fix(cli): mark several commands as devshell-independent'
    link: 7b44c3a891a3c733bc752f74b13955af8d74b2c8
  impacts:
  - type: cli
    component: iac update-module-status
    summary: Now runs outside the DevShell; usable in CI for tracking module deploy status
  - type: cli
    component: kube disable-disruptions
    summary: Now runs outside the DevShell; usable in automation and maintenance workflows
  - type: cli
    component: kube enable-disruptions
    summary: Now runs outside the DevShell; usable in automation and maintenance workflows
  - type: cli
    component: kube get-token
    summary: Now runs outside the DevShell; kubectl exec credential plugins work in CI
  - type: cli
    component: k8s velero snapshot-gc
    summary: Now runs outside the DevShell; snapshot GC jobs work in non-devshell containers
  - type: cli
    component: util get-module-hash
    summary: Now runs outside the DevShell; usable in CI change-detection scripts
  description: Six CLI commands that are intended for use in automation contexts were incorrectly blocked by the devshell
    requirement check. `pf iac update-module-status` is called by terragrunt hooks to track module init and deploy state;
    `pf kube disable-disruptions`, `pf kube enable-disruptions`, and `pf kube get-token` are used by Kubernetes controllers
    and CI jobs; `pf k8s velero snapshot-gc` runs as a scheduled cron job; and `pf util get-module-hash` is used in CI change-detection
    scripts. Without `requiresDevshell = false`, all six would fail immediately when invoked outside the Panfactum DevShell,
    breaking CI/CD pipelines and automation workflows that depend on them.
