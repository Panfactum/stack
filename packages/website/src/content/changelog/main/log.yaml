    provider template passes both `url` and `token` to the Authentik provider automatically when `authentik_token` is present
    in the merged config.'
- id: 197c376f-a5b6-4d0e-b109-8d87ecc9065d
  type: breaking_change
  summary: The Authentik API token stored during `pf sso add` has been moved from `authentik_core_resources/secrets.yaml`
    to `region.secrets.yaml` under the key `authentik_token`.
  action_items:
  - If you have already run `pf sso add` and have an existing Authentik token stored in `<cluster-path>/authentik_core_resources/secrets.yaml`
    under the key `authentikUserToken`, copy it to `<region-path>/region.secrets.yaml` under the key `authentik_token` using
    SOPS (`sops --set '["authentik_token"] "your-token-here"' region.secrets.yaml`).
  - Ensure `authentik_token` is set in `region.secrets.yaml` (SOPS-encrypted) for the Authentik Terraform provider to authenticate
    via `getPanfactumConfig()`.
  references:
  - type: internal-commit
    summary: Federated auth (#360)
    link: daaa3b2f592d21ef0990170d7efd92bcc13c7d96
  - type: internal-commit
    summary: using config.authentik_token vs module output
    link: 27cdbcf16525e9989430f33ef211b5a3f9e17560
  impacts:
  - type: cli
    component: sso add
    summary: Authentik token is now stored as authentik_token in region.secrets.yaml rather than authentik_core_resources/secrets.yaml
  - type: configuration
    component: region.secrets.yaml
    summary: authentik_token is now expected here for the Authentik Terraform provider
  description: The `pf sso add` command previously stored the Authentik API token as `authentikUserToken` inside the module-level
    `authentik_core_resources/secrets.yaml` file. The token has been relocated to the region-level `region.secrets.yaml` under
    the standardized key `authentik_token`, aligning it with other region-scoped secrets such as `vault_token`. The `authentik_token`
    field has also been added to `PANFACTUM_CONFIG_SCHEMA` and is now passed directly to the Authentik Terraform provider
    via the bundled `panfactum.hcl`, so modules that use the Authentik provider will authenticate automatically without manual
    environment variable configuration.
- id: 7eb61140-4687-4f1a-a213-28fccda34cc0
  type: improvement
  summary: '`pf cluster add` now auto-loads `vault_token` from Panfactum config YAML via `panfactum.hcl`, removing manual
    token threading across cluster setup steps.'
  references:
  - type: internal-commit
    summary: moved vault_token to autoload in panfactum.hcl
    link: ed1a146dd4c4d3d92866ac369bb653ce9d9f0d19
  impacts:
  - type: cli
    component: cluster add
    summary: The vault root token is no longer passed explicitly through step options; it is read automatically by Terragrunt
      via panfactum.hcl once written to region.secrets.yaml
  description: Previously, `pf cluster add` read `vault_token` from the in-memory config object and injected it as a `VAULT_TOKEN`
    environment variable for every Terragrunt module deployment across all setup steps (autoscaling, certificates, cluster
    extensions, inbound networking, Linkerd, and Vault core resources). This required the CLI to carry a mutable config reference
    and refresh it after Vault initialization so later steps could access the freshly-written token. The `refreshConfig` helper
    and the `config` field on `InstallClusterStepOptions` have been removed. Instead, `panfactum.hcl` now checks `local.vars.vault_token`
    first before falling back to `pf-get-vault-token`, so once the token is persisted to `region.secrets.yaml` it is picked
    up automatically by all subsequent Terragrunt invocations without any explicit environment variable injection.
- id: 91352f22-fd00-4c98-988d-3a2388b9ac4a
  type: improvement
  summary: '`pf sso add` now automates Vault SSO setup, deploying `authentik_vault_sso` and `vault_auth_oidc` as resumable
    steps.'
  references:
  - type: internal-commit
    summary: Vault SSO (#361)
    link: cf2ef5abf90ba6c01e78276cdae63fd22bd54288
  impacts:
  - type: cli
    component: sso add
    summary: New 'Setup Vault SSO' step deploys authentik_vault_sso and vault_auth_oidc modules automatically
  - type: iac-module
    component: authentik_vault_sso
    summary: Now deployed automatically by pf sso add with vault_name and vault_domain wired from region config
  - type: iac-module
    component: vault_auth_oidc
    summary: Now deployed automatically by pf sso add with OIDC outputs wired from authentik_vault_sso
  description: '`pf sso add` now includes a "Setup Vault SSO" step that deploys both the `authentik_vault_sso` and `vault_auth_oidc`
    IaC modules automatically. The step reads `kube_config_context` and `vault_addr` from region config to populate module
    inputs, retrieves OIDC credentials from `authentik_vault_sso` outputs, stores the client secret in a SOPS-encrypted `secrets.yaml`,
    and wires the OIDC discovery URL, redirect URIs, and issuer into `vault_auth_oidc`. Once complete, the static `vault_addr`
    entry is removed from region config since the permanent address is now managed by the Vault module itself.'
- id: b25a29bb-a11e-4bc7-89ab-fe6aa0835a27
  type: fix
  summary: Fixes `panfactum.hcl` so that `pf-get-vault-token` no longer produces output when a local Vault token is already
    configured.
  description: Previously, the `pf-get-vault-token` subprocess ran and produced output even when `vault_token` was already
    set in the Panfactum config, causing unnecessary noise during Terragrunt runs. The token retrieval command is now invoked
    with `--noop` whenever a local token is present, silencing the output entirely.
  impacts:
  - type: configuration
    component: panfactum.hcl
    summary: Silences pf-get-vault-token output when a local token is already configured
  references:
  - type: internal-commit
    summary: silencing vault output
    link: 1ac42430c0dd1fc59d2f3b0aab851416fbe099dc
- id: 3b458a31-154c-4d8d-8ac0-2dccaf45534a
  type: improvement
  summary: '`pf sso add` now reads `authentik_token` from config rather than injecting `VAULT_TOKEN` manually; `panfactum.hcl`
    handles missing `vault_token` gracefully.'
  references:
  - type: internal-commit
    summary: using config.authentik_token vs module output
    link: 27cdbcf16525e9989430f33ef211b5a3f9e17560
  impacts:
  - type: cli
    component: sso add
    summary: VAULT_TOKEN no longer passed explicitly; authentik_token written to region.secrets.yaml once and read via getPanfactumConfig()
  description: 'Two related changes: (1) `pf sso add` now fetches the Authentik bootstrap token exactly once (during ingress
    verification) and writes it to `region.secrets.yaml` as `authentik_token`, then reads it through the standard `getPanfactumConfig()`
    merge. Manual `VAULT_TOKEN` injection into Terragrunt module deployments has been removed since `panfactum.hcl` picks
    it up automatically from region config. (2) The `use_local_vault_token` local in `panfactum.hcl` previously threw a Terragrunt
    error when `vault_token` was absent from config entirely; it is now wrapped in `try(...)` so a missing key gracefully
    falls back to `false`.'
- id: 4e8cc9f8-f5d2-41a6-a6e6-0fd345fc60ae
  type: fix
  summary: Fixes `panfactum.hcl` so that the Authentik provider token falls back to the `AUTHENTIK_TOKEN` environment variable
    when not set in config.
  references:
  - type: internal-commit
    summary: 'fix: proper fallback for authentik provider & better input instructions'
    link: 0e5d41b543b20f222ae7afa692e48d283216be37
  description: Previously, the Authentik Terraform provider in `panfactum.hcl` would receive the sentinel value `@@TERRAGRUNT_INVALID@@`
    for `authentik_token` when the key was absent from the merged Panfactum config. It now falls back to the `AUTHENTIK_TOKEN`
    environment variable before using the sentinel, allowing the provider to be configured in contexts where the token is
    injected via the environment rather than written to a SOPS-encrypted config file.
- id: 986baaa9-1a69-47da-8373-83f979281f8d
  type: improvement
  summary: '`pf sso add` federated auth environment selection prompt now uses clearer wording and an explainer describing
    access levels.'
  references:
  - type: internal-commit
    summary: 'fix: proper fallback for authentik provider & better input instructions'
    link: 0e5d41b543b20f222ae7afa692e48d283216be37
  impacts:
  - type: cli
    component: sso add
    summary: Checkbox prompt for selecting security-hardened environments now includes an explainer and clearer label
  description: 'The checkbox prompt that asks which environments to security-harden during federated auth setup has been relabeled
    from "Select your production environment(s)" to "Select the environment(s) you want to security harden:" with an explainer:
    "Users will have full access to all non-selected environments. This can be changed later." This makes the intent and consequence
    of the selection clearer for first-time users.'
- id: 57ec061f-0037-426e-9e06-6f04c4e714b4
  type: fix
  summary: Fixes `pf sso add` skip logic bugs for SCIM steps and Vault SSO OIDC output reading.
  references:
  - type: internal-commit
    summary: 'fix: skip logic and input schema'
    link: 1a8e4add783f1ba32bc55664b3ec154a22a51e7a
  impacts:
  - type: cli
    component: sso add
    summary: SCIM config and user sync steps now correctly skip when complete; Vault SSO OIDC output parsed from correct module
      with correct Zod schema
  description: 'Two related `pf sso add` fixes from the same commit: (1) Two `skip` callbacks in `setupFederatedAuth` had
    inverted boolean conditions — "Get SCIM User Configuration" returned `!token || !url` instead of `!!token && !!url`, and
    "Sync Users and Groups" returned `!userSyncComplete` instead of `!!userSyncComplete` — causing both steps to always re-run
    even after successful completion. (2) The "Get Vault OIDC configuration" task called `terragruntOutput` against `MODULES.VAULT_AUTH_OIDC`
    instead of the correct source module `MODULES.AUTHENTIK_VAULT_SSO + "_" + kubeConfigContext`, and its Zod schema used
    flat `z.string()` instead of the wrapped `z.object({ value: z.string() })` shape that `terragruntOutput` returns. Both
    issues are now corrected.'
- id: 173e7fea-3040-4449-b9dc-64153ffdc250
  type: improvement
  summary: '`pf sso add` Vault SSO step now auto-syncs AWS Identity Center and fixes `akadmin_email` using the root email.'
  references:
  - type: internal-commit
    summary: 'fix: various SSO fixes'
    link: f66cfb1a19fb8e5898b85a7c1a0993b265c3b2e4
  impacts:
  - type: cli
    component: sso add
    summary: Vault SSO setup appends an Identity Center sync step; akadmin_email now uses authentikRootEmail; startURL pre-populated
      from wizard context
  description: 'Three related SSO improvements from the same commit: (1) The `kube_authentik` deployment step was passing
    `ctx.authentikAdminEmail` as `akadmin_email` instead of `ctx.authentikRootEmail`, causing the Authentik root account to
    use the wrong email. (2) The Vault SSO task list now ends with a `buildSyncAWSIdentityCenterTask` step to keep AWS profile
    config in sync, and a spurious `upsertConfigValues` call that was clearing `vault_addr` has been removed. (3) `buildSyncAWSIdentityCenterTask`
    now accepts an optional `startURL` argument so callers can supply a known SSO start URL without an extra prompt.'
- id: 2ef013b0-6a96-402d-9ba5-c785ff309403
  type: improvement
  summary: '`pf sso add` now auto-revokes the Vault root token after SSO setup and checkpoints the federated auth EKS update
    step.'
  references:
  - type: internal-commit
    summary: 'feat: better resumability & revoke vault root token'
    link: 4f3e553b1425807c7dd84a7bc65d6b5e2c8d1e94
  - type: internal-commit
    summary: 'chore: disable vault credential removal task'
    link: c365437e5673edcb6c052cf78e94003c90a90407
  impacts:
  - type: cli
    component: sso add
    summary: Vault root token auto-revoked after SSO setup; EKS federated auth update step now writes federatedAuthEnabled
      checkpoint
  description: 'Two `pf sso add` resumability improvements from the same commit: (1) The "Removing static Vault credentials"
    step in `setupVaultSSO` was previously disabled. It is now fully implemented: when `vault_token` is present in the Panfactum
    config, `pf sso add` executes `kubectl exec vault-0 -n vault -- vault token revoke <token>` to revoke the root token,
    then removes `vault_token` from `region.secrets.yaml` via `sopsUpsert`. (2) The "Updating EKS to use AWS SSO" task previously
    had no checkpoint. After the task succeeds, a new task writes `federatedAuthEnabled: true` to `aws_eks/.pf.yaml`, so the
    step is skipped on subsequent re-runs.'
- id: f968f24a-dee2-4baf-a8c4-5a665a4310de
  type: improvement
  summary: '[`kube_policies`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_policies) now injects
    `NODE_OPTIONS=--max-old-space-size` into all containers and init containers proportional to memory request.'
  references:
  - type: internal-commit
    summary: 'feat: adds opensearch dashboards, remote storage, and v3'
    link: 55a2cd5eea66664a7994f5841abda062d982fe1e
  - type: internal-commit
    summary: fix init container policies
    link: c7178d3ab8a857594c8c79bce7a4411176ca2244
  impacts:
  - type: iac-module
    component: kube_policies
    summary: NODE_OPTIONS --max-old-space-size injected into all containers and init containers proportional to memory request;
      init-container Kyverno rule corrected to iterate spec.initContainers
  description: '`kube_policies` now injects `NODE_OPTIONS=--max-old-space-size=<MB>` into every container and init container,
    setting the Node.js V8 heap to match the container''s memory request (preventing OOM crashes from the default 512 MB limit).
    This is applied via `patchStrategicMerge` so VPA mutations are handled correctly. A follow-on fix corrected the `add-environment-variables-init-containers`
    Kyverno rule, which was incorrectly iterating `spec.containers` instead of `spec.initContainers`, so init containers previously
    never received the variable.'
- id: 457419da-6771-4cfc-9f2d-bb5fc1a77d36
  type: improvement
  summary: '`pf cluster add` no longer deploys ECR pull-through cache; setup moved to `pf cluster enable`.'
  description: Previously, `pf cluster add` bundled the `aws_ecr_pull_through_cache` deployment and DockerHub/GitHub credential
    collection into the initial VPC setup step. This required users to have those credentials ready at bootstrap time. ECR
    pull-through cache is now an optional post-install feature accessible via `pf cluster enable`, reducing the required inputs
    and complexity of the initial cluster bootstrapping flow. The `pull_through_cache_enabled` config value is now explicitly
    set to `false` during VPC setup to prevent image pull failures until the feature is intentionally enabled.
  references:
  - type: internal-commit
    summary: removed ecr setup as part of vpc setup
    link: acd5bfc8864fd1277504137996a536b8c72494eb
  impacts:
  - type: cli
    component: cluster add
    summary: ECR pull-through cache setup removed from VPC step; no longer deployed during initial cluster bootstrap
  - type: cli
    component: cluster enable
    summary: New command scaffolded for opt-in ECR pull-through cache setup (not yet implemented)
- id: 4a33cb69-8730-46d2-8df9-91ea05653389
  type: improvement
  summary: '`pf cluster add` now checks the EC2 vCPU quota and warns if it is below 16.'
  description: '`pf cluster add` now queries the AWS Service Quotas API for the running on-demand standard instance quota
    (L-1216C47A) before installing, emitting a clear warning with the current value if it is below 16. If the environment
    was created with `pf env add`, the quota increase was already requested automatically. A follow-on fix resolved credential
    failures in the quota check: the `ServiceQuotasClient` was being instantiated with a `profile` option, which triggers
    a known AWS SDK JS v3 bug (aws-sdk-js-v3#6872) that prevents credentials from being loaded from file. The client now uses
    a factory function that explicitly reads credentials from disk, bypassing the SDK bug.'
  references:
  - type: internal-commit
    summary: vCPU check (#363)
    link: 5cd779112382e803f6b4e20ce35f7f76788ebff0
  - type: internal-commit
    summary: refactor use factory function for ServiceQuotasClient instantiation
    link: 1dc45f74fb324cf0a8cd35be642b2ef3f1a244b5
  - type: issue-report
    summary: 'AWS SDK JS v3: profile option does not resolve credentials from file'
    link: https://github.com/aws/aws-sdk-js-v3/issues/6872
  impacts:
  - type: cli
    component: cluster add
    summary: Validates EC2 vCPU quota >= 16 before install; ServiceQuotasClient now uses credentials-from-file factory to
      avoid SDK credential bug
- id: 260c75a6-6052-4f91-bb0e-23f869282f2d
  type: fix
  summary: Fixes a namespace apply-order race condition in [`kube_certificates`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_certificates)
    where resources used `var.namespace` instead of `local.namespace`.
  references:
  - type: internal-commit
    summary: 'fix: namespace not existing race condition (#362)'
    link: 3903a9470f20e0be50e630af78cb0235304ff0ae
  impacts:
  - type: iac-module
    component: kube_certificates
    summary: All Kubernetes resources now reference local.namespace instead of var.namespace; the now-unused namespace and
      service_account input variables have been removed
  description: Multiple resources in `kube_certificates` (including `kubernetes_secret`, `kubernetes_service_account`, `kubernetes_role`,
    `kubernetes_role_binding`, `kubernetes_config_map`, and `kubectl_manifest`) were referencing `var.namespace` directly.
    Because Terraform evaluates variable references without creating an implicit dependency on the resource that creates the
    namespace, these resources could be scheduled before the namespace existed, causing intermittent apply failures. Switching
    to `local.namespace` creates the correct implicit dependency chain. The now-unused `namespace` and `service_account` input
    variables (which both defaulted to `"cert-manager"`) have been removed from the module interface.
- id: fd243f25-4841-4714-8556-d42d339253ec
  type: improvement
  summary: Fixes `pf sso add` wrong `vault_name` prefix for `authentik_vault_sso` and makes "Deploy Authentik AWS SSO" step
    resumable.
  references:
  - type: internal-commit
    summary: added skip and vault name
    link: 97cc08f087b13cfd822827ae645929ccc7fab738
  impacts:
  - type: cli
    component: sso add
    summary: vault_name prefixed with vault-; Authentik AWS SSO deploy step now skips if .pf.yaml first_applied is set
  - type: iac-module
    component: authentik_vault_sso
    summary: vault_name is now prefixed with vault- to match the expected Authentik application name
  description: 'Two `pf sso add` improvements from the same commit: (1) The `setupVaultSSO` task was passing `kube_config_context`
    directly as `vault_name` to `authentik_vault_sso`. The module expects a `vault-` prefix (e.g., `vault-production-us-east-1`)
    to match the Authentik application name. Without it, Vault OIDC configuration would be misaligned. The input is now `vault-${kube_config_context}`.
    (2) The "Deploy Authentik AWS SSO" task previously had no skip condition, causing unconditional re-apply on resume. It
    now reads `first_applied` from `authentik_aws_sso/.pf.yaml` and skips when already completed.'
- id: 214c7792-4629-4ddb-b895-0053a8674e13
  type: fix
  summary: Fixes `pf sso add` Vault token revocation to correctly pass `VAULT_TOKEN` inside `kubectl exec`.
  references:
  - type: internal-commit
    summary: 'fix: vault token revocation'
    link: 33160da3a8492a06323de484697f4e50a31210c6
  - type: internal-commit
    summary: providing token to destroy and using -self
    link: 1c45d231c3b1f8b8d1ddac4fba751a0490dcffe9
  impacts:
  - type: cli
    component: sso add
    summary: Vault root token revocation now uses `sh -c "VAULT_TOKEN=... vault token revoke -self"` so the env var is evaluated
      by the shell inside the container
  description: 'Two iterative fixes to the Vault root-token revocation step in `setupVaultSSO`: first, the token was changed
    from a positional argument (`vault token revoke <token>`) to the correct self-revocation approach using `VAULT_TOKEN`
    env var and `-self` flag; second, because `kubectl exec` does not invoke a shell and therefore cannot evaluate env var
    assignments, the command was wrapped in `sh -c "VAULT_TOKEN=... vault token revoke -self"` so the shell properly expands
    the variable before invoking vault. Together these ensure the Vault root token is reliably revoked after SSO setup completes.'
- id: d61e3e95-30ac-46d2-b8d2-4eb71222cf3f
  type: fix
  summary: Fixes `pf sso add` "Setup AWS Federated SSO" skip check reading `federated_auth_enabled` instead of the correct
    `federatedAuthEnabled` field from `aws_eks/.pf.yaml`.
  references:
  - type: internal-commit
    summary: 'fix: skip logic for federated auth'
    link: c9bac8f242beff2b5d28239a364665d4a43a2773
  impacts:
  - type: cli
    component: sso add
    summary: Skip check for AWS federated SSO now reads federatedAuthEnabled (camelCase) instead of federated_auth_enabled
  description: The skip callback for the "Setup AWS Federated SSO" task was reading `federated_auth_enabled` (snake_case)
    from the `aws_eks` module's `.pf.yaml` file. The checkpoint is written as `federatedAuthEnabled` (camelCase), so the skip
    check never matched and the federated auth step would re-run on every invocation of `pf sso add` even after it had already
    completed successfully. The field name in the skip callback has been corrected to `federatedAuthEnabled`.
- id: 3438a013-cd47-41cb-b13b-80070ca0bcee
  type: fix
  summary: Fixes primary region identification in the CLI to exclude the `global` region from being marked as primary.
  references:
  - type: internal-commit
    summary: 'fix:cli: primary region identification algo'
    link: 56d4c8c464f92fb4aa821bcedc0cb20e6568453e
  - type: internal-commit
    summary: 'fix: attempt 2 at fix primary region'
    link: edf631ddf4a14bff92aaea31b2a6ca08a55a7833
  description: The `getRegions` utility in the CLI identified the primary region by comparing `tf_state_region` from the Panfactum
    config against the `aws_region` value in each region directory. However, this logic incorrectly allowed the `global` pseudo-region
    to be flagged as primary when its `aws_region` value happened to match `tf_state_region`. An initial fix added a `region
    !== GLOBAL_REGION` exclusion, but `region` could be `undefined` when no `region` key is present in `region.yaml`, causing
    the comparison to incorrectly allow the region through. A second fix resolves this by extracting the resolved `name` value
    (`region ?? basename(regionPath)`) and using it in the exclusion check instead. CLI commands that rely on primary region
    detection (such as `pf cluster add` and `pf env add`) will now behave correctly in environments that include a `global`
    region directory whose `region.yaml` does not explicitly set the `region` key.
  impacts:
  - type: cli
    component: cluster add
    summary: Excludes `global` region from being marked as primary region
  - type: cli
    component: env add
    summary: Excludes `global` region from being marked as primary region
- id: fb4cb81f-02f6-4d5f-a64f-be12dacfeda1
  type: fix
  summary: Fixes `pf env add` state bucket generation failing on new AWS accounts where S3 is not yet active.
  description: 'On freshly created AWS accounts, the S3 service may not be immediately active, causing the `HeadBucketCommand`
    call during state bucket name generation to fail with a "not signed up" error. This fix introduces a dedicated "Activate
    S3 service" step that runs before bucket name generation: it attempts to create and delete a dummy bucket, retrying with
    exponential backoff up to 30 times until S3 becomes available. The bucket name generation step itself also gained a small
    retry loop (up to 3 attempts) around the `HeadBucketCommand` call to handle transient connectivity issues that are common
    immediately after account creation.'
  references:
  - type: internal-commit
    summary: 'fix:cli: check if s3 service is active before generating state bucket name'
    link: 389632ed207eb8bbb26e48dac85f4661b7e119c8
  impacts:
  - type: cli
    component: env add
    summary: Now activates and validates S3 service before attempting state bucket name generation
- id: 87a8a9dc-863e-4c99-8690-659fd2d79695
  type: fix
  summary: Fixes `pf sso add` Authentik setup to show the password reset link inline when the browser prompt appears.
  references:
  - type: internal-commit
    summary: added authentik recovery link to output
    link: a2141bfbfaebae9280252968bc89b084f40f5b3c
  impacts:
  - type: cli
    component: sso add
    summary: Password reset link is now shown inline in the browser-open prompt
  description: Previously, the Authentik password reset link was only accessible by opening the browser automatically. If
    the user declined the browser prompt or it failed to open, there was no visible copy of the link to use manually. The
    link is now embedded directly in the explainer text of the confirmation prompt so users can copy and paste it regardless
    of whether the browser opens successfully.
- id: a53dfdad-2e0b-404a-8b7d-81ad78dac036
  type: fix
  summary: Fixes `pf devshell sync` generating the `.aws` directory gitignore at the wrong path (`.aws/.aws` instead of `.aws/.gitignore`).
  references:
  - type: internal-commit
    summary: 'fix: .aws gitignore generation'
    link: e5edff11ae9c8e7251764f58b1e4357ba8ee3dc6
  impacts:
  - type: cli
    component: devshell sync
    summary: The .aws directory .gitignore file is now written to the correct path
  description: The `syncStandardFiles` task in `pf devshell sync` was calling `upsertGitIgnore` with a path of `join(aws_dir,
    ".aws")` instead of `join(aws_dir, ".gitignore")`. This caused the gitignore file for the `.aws` directory to be written
    to a file literally named `.aws` inside the `.aws` directory, rather than to the expected `.gitignore` file. AWS credentials
    and config files in the `.aws` directory were therefore not protected by the intended gitignore rules.
- id: 1953d9f8-29ef-46c8-b0f6-5e7031fb447f
  type: improvement
  summary: '`pf cluster add` now interactively prompts for environment and region, removing the need to run from the correct
    directory.'
  description: Previously, `pf cluster add` read configuration from the current working directory, requiring users to manually
    `cd` into the correct region folder before running the command. The command now presents interactive prompts to select
    the target environment (excluding management) and region (excluding global and regions that already have a cluster deployed),
    then derives all paths from the selection. This removes a common source of user error and makes the cluster installation
    workflow location-independent.
  references:
  - type: internal-commit
    summary: refactor add environment and region selection to cluster add command
    link: 4825a917123a4894df14c2fb41548c9d9227a79c
  impacts:
  - type: cli
    component: cluster add
    summary: Now prompts for environment and region at startup; no longer requires running from the region directory
- id: 7e84edc5-4af2-41b9-969a-bd40fa4f91ef
  type: improvement
  summary: Improves cluster-deployed detection accuracy and filters undeployed environments from `pf cluster add`/`pf sso
    add` prompts.
  references:
  - type: internal-commit
    summary: using kubeApiServer to mark clusterDeployed
    link: b4439e1bf5c8e329a58c8889fa8c29c58f4f25e7
  - type: internal-commit
    summary: 'refactor: improve cluster deployment detection to use actual deployment status'
    link: d34274c7b1d70d75c666734a4ca6cfb5cb9e7f0e
  impacts:
  - type: cli
    component: cluster add
    summary: Cluster-deployed detection now uses kube_reloader .pf.yaml status; selection prompts filtered to deployed environments
      only
  - type: cli
    component: sso add
    summary: Environment and region selection now filters to deployed environments only
  description: 'Two related improvements to cluster deployment detection: (1) The `getRegions` utility previously read `kube_domain`/`kube_api_server`
    from `region.yaml` to determine `clusterDeployed`. Both values can be set before the cluster is running, making the check
    unreliable. Detection now uses `getModuleStatus` to inspect the `.pf.yaml` deploy status of `kube_reloader` — a module
    only in `success` state after the full cluster stack has been applied. (2) `pf cluster add` and `pf sso add` selection
    prompts now pre-filter to only fully deployed environments, removing confusing "(not deployed)" labels and preventing
    accidental selection of undeployed environments.'
- id: 0c4a85be-4664-4785-91ac-cba41b8752e5
  type: improvement
  summary: '`pf env add` now provides IAM user creation instructions when importing an existing AWS organization.'
  references:
  - type: internal-commit
    summary: 'feat: provide instructions for creating a user if importing existing AWS org'
    link: d4da65931ff9bd8e12707f179430d5d107c31215
  impacts:
  - type: cli
    component: env add
    summary: Displays IAM user creation instructions and prompts for management account login when Panfactum is configured
      to manage an existing AWS organization
  description: Previously, when a user ran `pf env add` against an existing AWS organization and opted for Panfactum to manage
    it, the command called `getRootAccountAdminAccess` directly without guiding the user through the required IAM user setup
    steps. The flow now first confirms that the user has logged into the management account, then walks through creating a
    dedicated `management-superuser` IAM user with `AdministratorAccess`, creating access key credentials, and entering those
    credentials — exactly the same guided flow used for brand-new accounts. The AWS console URLs for user creation and access
    key creation are automatically opened in the browser via the new `failsafeOpen` utility, which silently ignores failures
    if the browser cannot be launched.
- id: 3790bfb5-27a1-4b58-8f23-0b076a264932
  type: improvement
  summary: '`pf env add` now displays optional billing console setup instructions after the AWS Organization management environment
    is bootstrapped.'
  references:
  - type: internal-commit
    summary: 'feat: adds instructions for enabling billing when organization setup is complete'
    link: d09ed80f4a3c9b5d7ba8a9fc46912f00f0bf8f39
  - type: external-docs
    summary: AWS IAM User Guide — Grant access to the billing console
    link: https://docs.aws.amazon.com/IAM/latest/UserGuide/getting-started-account-iam.html
  impacts:
  - type: cli
    component: env add
    summary: Post-org-bootstrap success message now includes optional billing visibility setup instructions
  description: After successfully bootstrapping the management environment, `pf env add` previously only mentioned that existing
    AWS accounts could be invited into the organization. The message now also surfaces the optional "Grant access to the billing
    console" step from the AWS IAM User Guide, directing users to complete those manual steps if they want IAM users to have
    visibility into billing information. Both the billing setup and the account invitation steps are now explicitly labeled
    as optional, and the wording clarifies that neither is required to proceed with adding a new standard environment.
- id: f3a76b33-4d71-4c82-a756-619f84b9b189
  type: improvement
  summary: '`pf` CLI prompts now display default answer values in italic gray, and `pf env add` suggests contextual environment
    name defaults.'
  references:
  - type: internal-commit
    summary: 'fix: default answer styles and adds ''pf env add'' default env name'
    link: c30b909eac165687992550d41c9987cbdfc95207
  impacts:
  - type: cli
    component: logging
    summary: Default answer values now displayed in italic gray for visual distinction
  - type: cli
    component: env add
    summary: Environment name prompt now pre-fills with a contextual default based on existing environments
  description: 'Two CLI UX improvements from the same commit: (1) The Inquirer theme now applies `pc.italic(pc.gray(...))`
    to default answer text in prompts, giving it a muted italic appearance consistent with standard CLI UX conventions. (2)
    The environment name input in `pf env add` now supplies a smart default: (a) the name of a partially-deployed environment
    if one exists (for resume), (b) `"production"` if no "prod" environment exists, (c) `"development"` if no "dev" environment
    exists, or (d) no default otherwise.'
- id: 2d32917d-0fac-4b7b-ada2-fae810431ee9
  type: breaking_change
  summary: '`pf sso add` now deploys Authentik at `sso.<domain>` instead of `authentik.<domain>`.'
  action_items:
  - Update the `authentik_url` value in `global.yaml` from `authentik.<domain>` to `sso.<domain>`.
  - Update DNS records to point `sso.<domain>` to the Authentik ingress (remove the old `authentik.<domain>` record after
    verifying the new one works).
  - Re-apply `kube_authentik` so the module picks up the new domain.
  references:
  - type: internal-commit
    summary: 'refactor: standardize SSO subdomain configuration and update domain references'
    link: 07d42f09a43b367e79433147d0e9c46a083e95b9
  impacts:
  - type: cli
    component: sso add
    summary: Authentik is now deployed at `sso.<domain>` instead of `authentik.<domain>`
  - type: configuration
    component: global.yaml
    summary: '`authentik_url` must be updated to use the new `sso.<domain>` subdomain'
  description: The Authentik subdomain used during `pf sso add` has been standardized from `authentik.<domain>` to `sso.<domain>`.
    A shared `SSO_SUBDOMAIN` constant now governs all domain construction within the SSO setup workflow, eliminating the inconsistency
    between the module `domain` input, the API base path, the `authentik_url` written to `global.yaml`, and the user-facing
    prompts. Users who previously deployed Authentik at `authentik.<domain>` must update their DNS records, `global.yaml`,
    and re-apply `kube_authentik` for the new domain to take effect.
- id: 64f226f5-9ae3-42fd-915e-35d37a824fe9
  type: improvement
  summary: '`pf cluster add` now configures the bastion domain dynamically as `bastion.<kube_domain>` instead of leaving `bastion_domains`
    empty.'
  references:
  - type: internal-commit
    summary: 'feat: configure bastion domain dynamically from kube_domain'
    link: cefc9900cb364e5056c1e5c73a4624e30d17f3bf
  impacts:
  - type: cli
    component: cluster add
    summary: Bastion domain is now automatically set to `bastion.<kube_domain>` during cluster setup
  - type: iac-module
    component: kube_bastion
    summary: Receives `bastion_domains` input populated from the cluster's `kube_domain` config value
  description: Previously, the `kube_bastion` Terragrunt template generated by `pf cluster add` hardcoded `bastion_domains
    = []`, leaving the bastion with no configured domain. The installer now reads `kube_domain` from the Panfactum config
    and passes `bastion.<kube_domain>` as the `bastion_domains` input when deploying the bastion module. This mirrors the
    pattern established for the SSO subdomain and removes a manual configuration step that previously had to be completed
    after cluster bootstrap.
- id: 3b7684da-36ba-4f66-b315-6a1fabe8e6cd
  type: fix
  summary: Fixes `pf-tunnel` and `pf-db-tunnel` by removing obsolete `pf-check-ssh` calls and defining missing SSH variables.
  references:
