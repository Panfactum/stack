- id: aa44b0b2-6c6d-4a05-8dd0-def391b9a452
  type: fix
  summary: >-
    Fixes `pf cluster add` Inbound Networking phase ordering, External DNS Vault env, `kube_ingress_nginx` SLA bootstrap,
    and concurrent module deployment.
  references:
  - type: internal-commit
    summary: 'fix: move inbound networking before autoscaling in cluster auto install'
    link: 92da33ac2a718d02d99cd0471e4c653d2426f9ef
  - type: internal-commit
    summary: 'fix: nginx post deploy input update'
    link: 63497c19c9b6cc1faf01c137f7be019fa77ee583
  - type: internal-commit
    summary: 'fix: remove concurrency'
    link: 4f42f9ba484e2b9275588c3522858327b1b17c33
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Inbound Networking runs before Autoscaling; External DNS receives VAULT_ADDR; kube_ingress_nginx bootstrapped
      with sla_level=1; AWS LB Controller and External DNS now
  - type: iac-module
    component: kube_ingress_nginx
    summary: Bootstrapped with sla_level=1 during cluster install and post-deploy input update schema corrected
  description: >-
    Four related Inbound Networking fixes: (1) The Inbound Networking phase was executing after Autoscaling, requiring each
    autoscaling module to receive Vault credentials before Vault had an ingress. Inbound Networking now runs first as intended.
    (2) External DNS was missing `VAULT_ADDR`; it is now passed alongside `VAULT_TOKEN`. (3) `kube_ingress_nginx` was deployed
    with the full final `sla_level` before Vault ingress was available; it is now bootstrapped with `sla_level: 1` and cleaned
    up via a post-deploy update. (4) A follow-on fix corrected the post-deploy cleanup Zod schema from `z.undefined()` to
    `z.number().optional()`. (5) The AWS Load Balancer Controller and External DNS modules were deployed concurrently, causing
    race conditions; they are now deployed sequentially.
