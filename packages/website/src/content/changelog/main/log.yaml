- type: improvement
  summary: '`pf wf sops-set-profile` now skips YAML parsing for non-SOPS files via a regex pre-check, reducing overhead in
    large directories.'
  references:
  - type: internal-commit
    summary: 'perf(sops-set-profile): skip YAML parsing for non-SOPS files early'
    link: 81808b61f0e73ac032b9f27700f2facbc18a9061
  impacts:
  - type: cli
    component: wf sops-set-profile
    summary: Regex pre-check added to skip full YAML parsing for files without a `sops:` key
  description: When scanning directories, most files are not SOPS-encrypted. Previously, each YAML file was fully parsed to
    detect the `sops:` key before determining whether to skip it. A `fileContains` regex check now runs first and bails out
    immediately when no `sops:` line is found, avoiding the expensive YAML parse for the majority of files. The observable
    improvement is faster execution of `pf wf sops-set-profile` on repositories with many non-encrypted YAML files.
- type: fix
  summary: '`pf buildkit scale up` can now run outside the Panfactum DevShell, enabling use in CI pipelines and automation
    environments.'
  references:
