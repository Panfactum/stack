  description: The `setupVaultSSO` utility previously called `getPanfactumConfig` with `process.cwd()` as the directory, which
    resolved configuration relative to wherever the CLI process was launched rather than the selected cluster region. The
    function now accepts an explicit `regionPath` parameter. Both `pf sso add` and the new Vault SSO step in `pf cluster add`
    pass the correct region path, ensuring config values such as `aws_profile`, `environment`, `region`, `kube_config_context`,
    and `vault_token` are always read from the intended region directory.
- type: improvement
  summary: '`pf cluster add` EKS deployment step now shows a 15-minute ETA warning in the task title during the apply phase.'
