  - id: 59736296-2c0f-4bac-b8c7-a849ad0a486e
    type: improvement
    summary: "`sso add` now automates Authentik user setup entirely via API, eliminating the two-browser-tab workflow and
      enabling fully headless deployment."
    description: >
      Previously, the `sso add` command required manual browser interaction at two points: opening a password-recovery

      link in one tab and copy-pasting an API token from the Authentik UI in another. This was fragile, difficult to

      reproduce, and completely incompatible with CI or headless environments.


      The rewrite replaces both manual steps with direct Authentik API calls:


      1. `coreUsersSetPasswordCreate` is called with a `crypto.randomBytes`-generated password, bypassing the
      recovery-link flow.

      2. `coreTokensCreate` creates a stable token under the identifier `local-pf-installer-token`, and
      `coreTokensViewKeyRetrieve`
         fetches the plaintext key automatically — no user paste required.
      3. The new token is verified via `coreUsersList` before the bootstrap token is deleted, preventing lockout if
         token creation fails partway through.
      4. The installer API token is now stored in `global.user.yaml` (gitignored, user-local) instead of the
         region-scoped `region.secrets.yaml`, keeping credentials out of environment state.
      5. A new `getAuthentikBootstrapToken()` utility deduplicates bootstrap-token retrieval across multiple tasks.


      The result is a fully automated SSO deployment path that works in CI pipelines and headless servers while

      maintaining the same security guarantees.
    references:
      - type: internal-commit
        summary: "feat(authentik): automate user setup without browser interaction"
        link: a4626526d92176e71713c13835045616c0efeb59
      - type: external-docs
        summary: Authentik API - Set password for user (coreUsersSetPasswordCreate)
        link: https://docs.goauthentik.io/docs/developer-docs/api/reference/core-users-set-password-create
