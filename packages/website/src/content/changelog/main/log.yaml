    summary: Now runs successfully in CI/CD containers before a git repository is checked out
  description: These two workflow commands are designed to run inside CI/CD containers, often before a git repository even
    exists on disk. However, the CLI's context initialization called `git rev-parse --show-toplevel` to load devshell config,
    which fails in that environment. The fix introduces a `PanfactumBaseContext` (a lighter context without devshell config)
    and a `requiresDevshell = false` flag that commands can set to opt out of devshell initialization. `pf wf git-checkout`
    and `pf wf sops-set-profile` now use this lighter context, allowing them to work correctly in any container environment.
- id: 87822b32-4951-44b0-ab9a-bdcd211fe844
  type: improvement
  summary: The nix image builder Argo workflow now skips redundant builds when the target image already exists in ECR.
  references:
  - type: internal-commit
    summary: 'feat(nix-image-builder): skip redundant builds if image already exists in ECR'
    link: 884e7e5056f7b72b8d07b94d8a7a3ca16cbc9efc
  impacts:
  - type: iac-module
    component: kube_constants
    summary: Internal image tag updated (nix-image-builder with idempotent ECR check); later superseded by the terragrunt
      GIT_PASSWORD fix image
  description: A new `check-image` pre-flight DAG step resolves the target Git ref to a commit SHA and queries ECR for existing
    per-architecture images and the multi-arch manifest before any build work begins. The `build-and-push`, `build-and-push-arm`,
    and `merge-and-copy` tasks are now conditionally executed based on output flags from `check-image`. Re-triggering a workflow
    for a SHA that was already built results in a no-op instead of re-building identical layers, saving compute time and avoiding
    unnecessary ECR pushes.
- id: 6ab2c7d7-57ca-446b-9212-13981bcf15bd
