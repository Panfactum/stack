- id: 1ccbab75-947d-48e7-99ce-1b8bff00b478
  type: addition
  summary: Adds `install.sh` to automate full Panfactum repository and DevShell setup from scratch.
  description: >-
    New users can run this installer to go from zero to a fully operational Panfactum DevShell in one step. The script
    validates Git >= 2.39, Nix >= 2.23, and direnv >= 2.32, installs missing tools where possible, prompts for repository
    URL/name/branch (reading from /dev/tty to support pipe invocation), builds the DevShell via `pf-update`, and activates
    direnv. It automatically detects the user's shell (bash or zsh) and appends the direnv hook to `~/.bashrc` or `~/.zshrc`
    if missing, then exits with restart instructions so the hook takes effect. Stage 1 calls `pf` CLI commands instead of
    legacy devshell equivalents, the `check_git_repo` validation runs before Nix installation, and the minimum required Git
    version is 2.39 (supporting Ubuntu 22.04 LTS users). SSH remote URLs are automatically converted to HTTPS.
  references:
