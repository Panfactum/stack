  - id: 970a1157-71b9-44cb-9845-693c4b11fa61
    type: improvement
    summary: >-
      Enhanced Terragrunt backend bootstrapping to be explicit and compatible with Terragrunt >= 0.87.0
    description: Previously, Terragrunt auto-provisioned S3 and DynamoDB during init, performing infrastructure side-effects
      during what appeared to be a read-only operation. This obscured the critical bootstrapping dependency in `pf env
      add` where the `tf_bootstrap_resources` module creates the state bucket but its own init relies on that bucket
      existing. Additionally, Terragrunt >= 0.87.0 disables auto-bootstrap by default, which would cause silent failures
      on version upgrades. The enhancement adds explicit backend bootstrap operations and fail-fast validation to make
      the dependency clear and prevent silent failures. This change ensures forward compatibility with newer Terragrunt
      versions while making infrastructure bootstrapping operations more transparent and predictable.
