  impacts:
  - type: cli
    component: cluster add
    summary: Success message uses improved whitespace formatting between numbered steps
- id: 9b7fcf1c-efab-4188-b5c1-b15ef7cc3f5f
  type: improvement
  summary: '`pf env add` now suggests an environment-specific IAM username (e.g., `management-superuser`) instead of the hardcoded
    `pf-bootstrap-user` name.'
  references:
  - type: internal-commit
    summary: 'fix:cli:env add: default username'
    link: 0886f756c32dabcfb9ee647b991a3cb4e247d225
  impacts:
  - type: cli
    component: env add
    summary: Bootstrap IAM username suggestion is now derived from the environment name
  description: Previously, `pf env add` always suggested `pf-bootstrap-user` as the IAM username when walking users through
    creating a new AWS account. The suggested name is now derived from the environment being created (e.g., `management-superuser`),
    making it consistent with Panfactum's AWS profile naming convention and easier to identify in the IAM console.
- id: 1da2711c-a0f8-4d5a-b607-8f85bbdeabe1
  type: fix
  summary: Fixes `pf env add` credential validation where the `AdministratorAccess` error was misplaced and unknown errors
    escaped the retry loop.
  references:
  - type: internal-commit
    summary: 'fix:cli:env add: default username'
    link: 0886f756c32dabcfb9ee647b991a3cb4e247d225
  impacts:
  - type: cli
    component: env add
    summary: AdministratorAccess error shown correctly; unknown errors now loop back to re-prompt
  description: 'The `AdministratorAccess` policy check in `pf env add` had two issues: the error message was emitted after
    the `catch` block rather than inside the `if (!hasAdminAccess)` branch, and a `break` on unknown errors caused the outer
    credentials loop to exit without re-prompting. Both are now fixed. An informational message ("Removing existing credentials
    and requesting new ones") is also shown when the user chooses not to retry with the same credentials.'
- id: 38bd713e-571d-4337-a656-a632de3b993d
  type: fix
  summary: Fixes `sopsUpsert` failing to overwrite an existing SOPS-encrypted file when merging new values into it.
  references:
  - type: internal-commit
    summary: 'fix: set overwrite to true for sopsUpsert'
    link: f33f0f128c2b05ca31e10fecf2d0be3dd05d1ac2
  description: 'The `sopsUpsert` utility merges new key/value pairs into an existing SOPS-encrypted file by decrypting the
    current contents, spreading in the new values, and re-writing the file. However, the final `sopsWrite` call was missing
    `overwrite: true`, so writing to an already-existing file would fail. The fix passes `overwrite: true` in the existing-file
    branch, ensuring the merged result is written back correctly on every call.'
- id: 815fbc87-b244-4c09-ad52-67c1009a0aa2
  type: improvement
  summary: Simplifies `kube_certificates` migration by auto-passing `route53_zones`/`kube_domain` in `panfactum.hcl` and defaulting
    `vault_internal_url`.
  references:
  - type: internal-commit
    summary: 'fix: kube_certificates migration guide'
    link: 8dddf6bf63532b62b4cf55e7b598421a645b1643
  impacts:
  - type: iac-module
    component: kube_certificates
    summary: vault_internal_url now defaults to the standard in-cluster Vault address; route53_zones and kube_domain auto-injected
      by panfactum.hcl
  - type: configuration
    component: panfactum.hcl
    summary: Now injects route53_zones and kube_domain as global default module inputs
  description: 'Two improvements that simplify migrating from `kube_cert_manager`/`kube_cert_issuers` to `kube_certificates`:
    (1) `panfactum.hcl` now injects `route53_zones` (from `local.vars.domains`) and `kube_domain` (from `local.vars.kube_domain`)
    as global default module inputs, so modules including `kube_certificates` receive them automatically without manual wiring.
    (2) `vault_internal_url` in `kube_certificates` now defaults to `http://vault-active.vault.svc.cluster.local:8200`, the
    standard in-cluster Vault address, making it optional to specify for standard Panfactum layouts.'
- id: 4285e484-36fe-4a55-acb7-454bcd6b45db
  type: improvement
  summary: '`kube_opensearch` adds Dashboards, new config inputs, re-enables S3 remote-store, switches to static IAM creds,
    and sizes JVM heap dynamically.'
  references:
  - type: internal-commit
    summary: 'feat: adds opensearch dashboards, remote storage, and v3'
    link: 55a2cd5eea66664a7994f5841abda062d982fe1e
  - type: issue-report
    summary: 'OpenSearch issue #15902 (segment replication remote store)'
    link: https://github.com/opensearch-project/OpenSearch/issues/15902
  - type: issue-report
    summary: 'OpenSearch issue #16523 (IRSA web identity token not usable with S3 plugin)'
    link: https://github.com/opensearch-project/OpenSearch/issues/16523
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: Opt-in Dashboards; S3 remote-store re-enabled; S3 plugin uses static IAM creds; JVM heap sized to 50% of memory
      request
  description: 'Four `kube_opensearch` improvements from the same commit: (1) OpenSearch Dashboards can now be deployed alongside
    the cluster. Opt-in via `dashboard_enabled` (default `false`); when enabled, `dashboard_domain` configures the ingress
    hostname. New inputs: `log_level`, `slow_request_log_thresholds`, and `extra_cluster_settings`. (2) `node.attr.remote_store.segment.repository`
    and `translog.repository` were disabled due to upstream bug OpenSearch#15902. Resolved in OpenSearch 3.x — both are now
    re-enabled for S3 remote replication and recovery. (3) The S3 repository plugin cannot use the web identity token required
    by IRSA (OpenSearch#16523). The module now uses `kube_aws_creds` to provision short-lived static IAM access keys (rotated
    every 14 days) injected via the OpenSearch keystore. (4) The JVM heap was hardcoded to `-Xmx512M -Xms512M`. The entrypoint
    script now reads `CONTAINER_MEMORY_REQUEST` and sets the heap to 50% of the request, keeping JVM memory proportional to
    the VPA-adjusted pod allocation.'
- id: 199bf197-f00e-4b79-ad0d-b4002f7eb14f
  type: fix
  summary: Fixes `panfactum.hcl` so `route53_zones` and `kube_domain` default safely when absent from the Panfactum config.
  references:
  - type: internal-commit
    summary: 'fix: kube_domain default input'
    link: d14a548a5cd98b7e2bfee632bbe118459be04b6a
  description: The bundled `panfactum.hcl` previously accessed `local.vars.domains` and `local.vars.kube_domain` directly.
    If either key was missing from the merged Panfactum config (e.g., in environments without a Kubernetes cluster), Terragrunt
    would fail with an attribute-not-found error. Both fields now use `lookup()` with safe defaults (`{}` for `route53_zones`,
    `null` for `kube_domain`), allowing the template to work in all environments regardless of whether those config keys are
    present.
- id: 07ae1274-c0e5-484f-be87-1b8ea0f4995b
  type: improvement
  summary: '`pf cluster add` and `pf sso add` now skip `terragrunt init` for already-initialized modules, reducing redundant
    work during installation.'
  references:
  - type: internal-commit
    summary: 'feat: intelligently skip init in deployModuleTask when possible'
    link: 084e5910a3bad7d214090c78cca30f8caf650036
  impacts:
  - type: cli
    component: cluster add
    summary: Module deploy tasks now skip terragrunt init when init_status is already success
  - type: cli
    component: sso add
    summary: Module deploy tasks now skip terragrunt init when init_status is already success
  description: Previously, every module deployment task in `pf cluster add` and `pf sso add` ran `terragrunt init` unconditionally
    before applying, even on resumed installs where the module had already been initialized. The `buildDeployModuleTask` utility
    now checks the module's `.pf.yaml` `init_status` field (written by the Panfactum terragrunt hooks) before deciding whether
    to run init. If `init_status` is `"success"` or `"running"`, the init step is skipped. A new `forceInitModule` option
    can be set to override this behavior when a re-init is explicitly needed.
- id: ec8f3272-b5cf-4657-a4e3-ff2a7082e712
  type: fix
  summary: >-
    Fixes `pf cluster add` Vault unseal skip logic to use `vault status` directly and validate with Zod.
  references:
  - type: internal-commit
    summary: 'fix: using vault status to check if unseal step should be skipped'
    link: a30fefc697ec9ecd01f72accdd2f83f6d3b7c413
  - type: internal-commit
    summary: 'lint: added schema validation on vault status'
    link: 0c1e3abe3ebb11f8985a37394060017c83e812ad
  impacts:
  - type: cli
    component: cluster add
    summary: >-
      Vault unseal skip-check now calls `vault status -format=json` directly (replacing stale module.yaml flag) and
      validates output with a Zod schema
  description: >-
    The `pf cluster add` Vault setup step previously decided whether to skip unsealing by reading the `extra_inputs.wait`
    flag from `kube_vault/module.yaml`, an indirect heuristic that could be stale. The check now calls `vault status -format=json`
    via `kubectl exec` and skips only when Vault reports `sealed: false`. A follow-on fix hardened the check further by wrapping
    the parse in a `parseJson` utility with a Zod schema, ensuring any malformed output throws a clear validation error
    instead of silently yielding `undefined` and skipping incorrectly.
- id: 4456efe7-31d2-4f59-bc75-604e61248dfc
  type: fix
  summary: Fixes `pf domain add` poll title showing `undefined` and `kube_vault` KMS unseal key race condition.
  references:
  - type: internal-commit
    summary: 'fix:cli: initial domain register poll title'
    link: ccecb3270b0384feeaeaf62cf47124942071b121
  - type: internal-commit
    summary: 'fix: kube_vault depends_on unseal_key to prevent deploy race condition'
    link: ccecb3270b0384feeaeaf62cf47124942071b121
  impacts:
  - type: cli
    component: domain add
    summary: Poll title no longer shows 'undefined' before the first status response is received
  - type: iac-module
    component: kube_vault
    summary: Vault Helm release now explicitly depends on module.unseal_key to prevent deploy race condition
  description: 'Two fixes from the same commit: (1) `pf domain add` registration poll title was showing `undefined` as the
    initial status label before the first status response was received. (2) The `helm_release.vault` resource only depended
    on `module.aws_permissions`, meaning Terraform could attempt to deploy Vault before the KMS unseal key (`module.unseal_key`)
    was ready. Adding `module.unseal_key` to `depends_on` prevents initialization failures caused by a missing key.'
- id: 775eb8af-ed0a-4cc8-bb5d-64cfc7477989
  type: improvement
  summary: '`pf cluster add` now reads the Vault root token from `region.secrets.yaml` via `getPanfactumConfig()` instead
    of directly SOPS-decrypting `kube_vault/secrets.yaml`.'
  references:
  - type: internal-commit
    summary: moved vault_token to region.secrets.yaml
    link: 829ad02cd9296a82c8918338fdefbdafd5ca2fae
  impacts:
  - type: cli
    component: cluster add
    summary: Vault root token is now stored as vault_token in region.secrets.yaml and read through the merged config
  - type: cli
    component: config get
    summary: vault_token is now a recognized field in the Panfactum config schema and will appear in pf config get output
  description: Previously, each `pf cluster add` setup step (autoscaling, certificates, cluster extensions, inbound networking,
    Linkerd, Vault) independently called `sopsDecrypt` on `kube_vault/secrets.yaml` to obtain the Vault root token. This was
    fragile because each step had to know the exact file path and field name (`root_token`). The token is now stored as `vault_token`
    in `region.secrets.yaml` and surfaced through the standard `getPanfactumConfig()` merge, so all steps read it from the
    shared `config` object. A `refreshConfig()` helper is also added to re-hydrate the config object after the Vault initialization
    step writes the token, ensuring downstream steps see the new value without a full restart.
- id: 73830a77-9505-4a9b-b0d6-eb852516a8e2
  type: addition
  summary: '`pf sso add` now automates federated auth with IAM Identity Center and adds `authentik_token` to the Panfactum
    config schema.'
  references:
  - type: internal-commit
    summary: Federated auth (#360)
    link: daaa3b2f592d21ef0990170d7efd92bcc13c7d96
  impacts:
  - type: cli
    component: sso add
    summary: Federated auth (AWS SSO SAML + SCIM) now automated as a resumable step within pf sso add
  - type: cli
    component: config get
    summary: authentik_token is now a recognized field in the Panfactum config schema
  description: 'Two related additions from the federated auth commit: (1) `pf sso add` now includes a "Setup Federated Auth"
    step that automates the full federated auth workflow with AWS IAM Identity Center — deploying `authentik_aws_sso`, collecting
    SCIM credentials, syncing users, deploying `aws_iam_identity_center_permissions`, and updating EKS. Each sub-step is resumable
