  - id: 95948c3b-48e2-43fb-9662-d2f86f22b263
    type: fix
    summary: Fixed `kube_ingress_nginx` replica count calculation during bootstrap mode to prevent pod scheduling failures
      on clusters with SLA target >= 2.
    description: "When `sla_target` is >= 2, `kube_ingress_nginx` previously set `replicaCount` to 6. During bootstrap,
      however, only the EKS controller node group is present — typically 3 nodes of a single instance type — so 6
      replicas could never all be scheduled, leaving the cluster stuck with Pending ingress pods and blocking the entire
      inbound networking setup. The fix introduces a check on `bootstrap_mode_enabled`: when bootstrap mode is active,
      `replicaCount` is forced to 3 regardless of `sla_target`, matching the node count actually available at that
      phase. Once bootstrap mode is disabled and Karpenter has provisioned diverse node pools, the module returns to the
      SLA-driven replica count."
    references:
      - type: internal-commit
        summary: "fix(kube_ingress_nginx): use 3 replicas in bootstrap mode regardless of SLA"
        link: 4f3f9e9c5c64e824747fea6f05d55efc1b93d716
