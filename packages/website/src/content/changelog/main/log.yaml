  - id: f93a6395-49e3-4e9b-b6ca-b646fa90d25f
    type: fix
    summary: >-
      Fixed EBS CSI controller `PodDisruptionBudget` failing to update during Helm upgrades due to race condition with
      other controllers
    description: >-
      Helm's atomic upgrade used optimistic concurrency (`resourceVersion`) when patching the `ebs-csi-controller`
      `PodDisruptionBudget`. If `Kyverno`, `VPA`, or any other controller mutated the `PDB` between Helm's read and write,
      Kubernetes rejected the update with a `409` conflict, rolling back the entire release intermittently. This caused EBS
      CSI driver upgrades to fail unpredictably when multiple controllers were active on the cluster. The fix replaces
      Helm's `PDB` management with a `kubectl_manifest` resource using server-side apply, which uses field ownership rather than
      `resourceVersion` and is immune to this race condition. This ensures reliable cluster storage upgrades in environments
      with active policy engines and resource controllers.
    action_items:
      - Re-apply the `kube_aws_ebs_csi` module to update the PDB management configuration
    references:
      - type: internal-commit
        summary: "fix(kube_aws_ebs_csi): use SSA for EBS CSI controller PDB to avoid 409s"
        link: be0b6ea7c643b3efd786a98c78a9eafac2e26aa3
      - type: external-docs
        summary: Kubernetes Server-Side Apply documentation
        link: https://kubernetes.io/docs/reference/using-api/server-side-apply/
      - type: issue-report
        summary: AWS EBS CSI driver race condition issue in volume creation
        link: https://github.com/kubernetes-sigs/aws-ebs-csi-driver/issues/1951
    impacts:
      - type: iac-module
        component: kube_aws_ebs_csi
        summary: Disabled Helm-managed `PodDisruptionBudget` and replaced with `kubectl_manifest` using server-side apply to prevent upgrade conflicts
