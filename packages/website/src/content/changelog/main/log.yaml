  summary: 'Adds a new `install.sh` bootstrapper script under `packages/installer` that automates the full initial setup of
    a Panfactum infrastructure repository: platform'
  description: New users can run this installer script to go from zero to a fully operational Panfactum DevShell in one step.
    The script validates prerequisites (Git >= 2.39, Nix >= 2.23, direnv >= 2.32), installs missing dependencies where possible,
    creates `flake.nix` and `panfactum.yaml` with interactive prompts, builds the Panfactum DevShell via `pf-update`, and
    activates direnv. The script is idempotent — re-running it safely skips steps that are already complete. Repository URLs
    are validated to require HTTPS format, and SSH remote URLs are automatically converted to HTTPS.
