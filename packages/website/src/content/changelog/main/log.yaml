        summary: "Vault unseal step now queries vault status -format=json to determine whether unsealing is needed"
    description: >-
      Previously, the `pf cluster add` Vault setup step decided whether to skip unsealing by reading the
      `extra_inputs.wait` flag from `kube_vault/module.yaml`. This was an indirect heuristic that could
      produce incorrect results if the config was out of sync with the actual Vault state. The fix
      replaces the config-file check with a direct call to `vault status -format=json` via `kubectl exec`,
      and skips unsealing only when Vault reports that it is already unsealed (`sealed: false`).

  - type: "fix"
    summary: "Fixes `pf domain add` registration poll title showing `undefined` as the initial status label."
    references:
      - type: "internal-commit"
        summary: "fix:cli: initial domain register poll title"
        link: "ccecb3270b0384feeaeaf62cf47124942071b121"
    impacts:
      - type: "cli"
        component: "domain add"
        summary: "Poll title no longer shows 'undefined' before the first status response is received"

  - type: "fix"
    summary: "Fixes `kube_vault` Helm release race condition by adding `module.unseal_key` as an explicit dependency."
    references:
      - type: "internal-commit"
        summary: "fix:cli: initial domain register poll title"
        link: "ccecb3270b0384feeaeaf62cf47124942071b121"
    impacts:
      - type: "iac-module"
        component: "kube_vault"
        summary: "Vault Helm release now waits for the KMS unseal key to be fully created before deploying"
    description: >-
      Previously, the `helm_release.vault` resource only depended on `module.aws_permissions`, which meant
      Terraform could attempt to deploy Vault before the KMS unseal key (`module.unseal_key`) was ready.
      Adding `module.unseal_key` to `depends_on` ensures the unseal key exists before Vault starts,
      preventing initialization failures caused by a missing key.
  - type: "improvement"
    summary: >-
      `pf cluster add` now reads the Vault root token from `region.secrets.yaml` via
      `getPanfactumConfig()` instead of directly SOPS-decrypting `kube_vault/secrets.yaml`.
    references:
      - type: "internal-commit"
        summary: "moved vault_token to region.secrets.yaml"
        link: "829ad02cd9296a82c8918338fdefbdafd5ca2fae"
    impacts:
      - type: "cli"
        component: "cluster add"
        summary: "Vault root token is now stored as vault_token in region.secrets.yaml and read through the merged config"
      - type: "cli"
        component: "config get"
        summary: "vault_token is now a recognized field in the Panfactum config schema and will appear in pf config get output"
    description: >-
      Previously, each `pf cluster add` setup step (autoscaling, certificates, cluster extensions,
      inbound networking, Linkerd, Vault) independently called `sopsDecrypt` on `kube_vault/secrets.yaml`
      to obtain the Vault root token. This was fragile because each step had to know the exact file path
      and field name (`root_token`). The token is now stored as `vault_token` in `region.secrets.yaml`
      and surfaced through the standard `getPanfactumConfig()` merge, so all steps read it from the
      shared `config` object. A `refreshConfig()` helper is also added to re-hydrate the config object
      after the Vault initialization step writes the token, ensuring downstream steps see the new value
      without a full restart.
  - type: "improvement"
    summary: >-
      `pf sso add` now automates federated authentication setup with AWS IAM Identity Center
      as a resumable step.
    references:
      - type: "internal-commit"
        summary: "Federated auth (#360)"
        link: "daaa3b2f592d21ef0990170d7efd92bcc13c7d96"
    impacts:
      - type: "cli"
        component: "sso add"
        summary: "Federated auth (AWS SSO SAML + SCIM) is now configured automatically as a resumable step within pf sso add"
    description: >-
      Previously, `pf sso add` only installed and configured Authentik itself. Setting up federated
      authentication — configuring AWS IAM Identity Center as a SAML identity provider, enabling SCIM
      provisioning, syncing users and groups, and deploying IAM Identity Center permission sets — had
      to be done separately. The command now includes a "Setup Federated Auth" step that automates
      the full federated auth workflow. Each sub-step (deploying `authentik_aws_sso`, collecting SCIM
      credentials, syncing users, deploying `aws_iam_identity_center_permissions`, and updating EKS)
      is resumable via `.pf.yaml` checkpoint files, so the command can be safely re-run after
      interruption without repeating completed work.
  - type: "breaking_change"
    summary: >-
      The Authentik API token stored during `pf sso add` has been moved from
      `authentik_core_resources/secrets.yaml` to `region.secrets.yaml` under the key `authentik_token`.
    action_items:
      - >-
        If you have already run `pf sso add` and have an existing Authentik token stored in
        `<cluster-path>/authentik_core_resources/secrets.yaml` under the key `authentikUserToken`,
        copy it to `<region-path>/region.secrets.yaml` under the key `authentik_token`
        using SOPS (`sops --set '["authentik_token"] "your-token-here"' region.secrets.yaml`).
      - >-
        Ensure `authentik_token` is set in `region.secrets.yaml` (SOPS-encrypted) for the
        Authentik Terraform provider to authenticate via `getPanfactumConfig()`.
    references:
      - type: "internal-commit"
        summary: "Federated auth (#360)"
        link: "daaa3b2f592d21ef0990170d7efd92bcc13c7d96"
      - type: "internal-commit"
        summary: "using config.authentik_token vs module output"
        link: "27cdbcf16525e9989430f33ef211b5a3f9e17560"
    impacts:
      - type: "cli"
        component: "sso add"
        summary: "Authentik token is now stored as authentik_token in region.secrets.yaml rather than authentik_core_resources/secrets.yaml"
      - type: "configuration"
        component: "region.secrets.yaml"
        summary: "authentik_token is now expected here for the Authentik Terraform provider"
    description: >-
      The `pf sso add` command previously stored the Authentik API token as `authentikUserToken`
      inside the module-level `authentik_core_resources/secrets.yaml` file. The token has been
      relocated to the region-level `region.secrets.yaml` under the standardized key
      `authentik_token`, aligning it with other region-scoped secrets such as `vault_token`.
      The `authentik_token` field has also been added to `PANFACTUM_CONFIG_SCHEMA` and is now
      passed directly to the Authentik Terraform provider via the bundled `panfactum.hcl`, so
      modules that use the Authentik provider will authenticate automatically without manual
      environment variable configuration.
  - type: "addition"
    summary: >-
      Adds `authentik_token` to the Panfactum config schema and the Authentik Terraform
      provider is now configured with both `url` and `token`.
    references:
      - type: "internal-commit"
        summary: "Federated auth (#360)"
        link: "daaa3b2f592d21ef0990170d7efd92bcc13c7d96"
    impacts:
      - type: "cli"
        component: "config get"
        summary: "authentik_token is now a recognized field in the Panfactum config schema and will appear in pf config get output"
    description: >-
      The `authentik_token` field is now part of `PANFACTUM_CONFIG_SCHEMA` and is surfaced
      through the standard `getPanfactumConfig()` merge. The bundled `authentik.tftpl` provider
      template has been updated to pass both `url` and `token` to the Authentik provider, so
      any IaC module that uses the Authentik provider will authenticate automatically when
      `authentik_token` is present in the merged Panfactum config (e.g., in `region.secrets.yaml`).
  - type: "improvement"
    summary: >-
      `pf cluster add` now auto-loads `vault_token` from Panfactum config YAML via `panfactum.hcl`,
      removing manual token threading across cluster setup steps.
    references:
      - type: "internal-commit"
        summary: "moved vault_token to autoload in panfactum.hcl"
        link: "ed1a146dd4c4d3d92866ac369bb653ce9d9f0d19"
    impacts:
      - type: "cli"
        component: "cluster add"
        summary: >-
          The vault root token is no longer passed explicitly through step options; it is read
          automatically by Terragrunt via panfactum.hcl once written to region.secrets.yaml
    description: >-
      Previously, `pf cluster add` read `vault_token` from the in-memory config object and
      injected it as a `VAULT_TOKEN` environment variable for every Terragrunt module deployment
      across all setup steps (autoscaling, certificates, cluster extensions, inbound networking,
      Linkerd, and Vault core resources). This required the CLI to carry a mutable config reference
      and refresh it after Vault initialization so later steps could access the freshly-written
      token. The `refreshConfig` helper and the `config` field on `InstallClusterStepOptions` have
      been removed. Instead, `panfactum.hcl` now checks `local.vars.vault_token` first before
      falling back to `pf-get-vault-token`, so once the token is persisted to `region.secrets.yaml`
      it is picked up automatically by all subsequent Terragrunt invocations without any explicit
      environment variable injection.
  - type: "improvement"
    summary: >-
      `pf sso add` now automates Vault SSO setup, deploying `authentik_vault_sso` and
      `vault_auth_oidc` as resumable steps.
    references:
      - type: "internal-commit"
        summary: "Vault SSO (#361)"
        link: "cf2ef5abf90ba6c01e78276cdae63fd22bd54288"
    impacts:
      - type: "cli"
        component: "sso add"
        summary: "New 'Setup Vault SSO' step deploys authentik_vault_sso and vault_auth_oidc modules automatically"
      - type: "iac-module"
        component: "authentik_vault_sso"
        summary: "Now deployed automatically by pf sso add with vault_name and vault_domain wired from region config"
      - type: "iac-module"
        component: "vault_auth_oidc"
        summary: "Now deployed automatically by pf sso add with OIDC outputs wired from authentik_vault_sso"
    description: >-
      `pf sso add` now includes a "Setup Vault SSO" step that deploys both the `authentik_vault_sso`
      and `vault_auth_oidc` IaC modules automatically. The step reads `kube_config_context` and
      `vault_addr` from region config to populate module inputs, retrieves OIDC credentials from
      `authentik_vault_sso` outputs, stores the client secret in a SOPS-encrypted `secrets.yaml`,
      and wires the OIDC discovery URL, redirect URIs, and issuer into `vault_auth_oidc`. Once
      complete, the static `vault_addr` entry is removed from region config since the permanent
      address is now managed by the Vault module itself.
  - type: "fix"
    summary: >-
      Fixes `panfactum.hcl` so that `pf-get-vault-token` no longer produces output when a local
      Vault token is already configured.
    description: >-
      Previously, the `pf-get-vault-token` subprocess ran and produced output even when
      `vault_token` was already set in the Panfactum config, causing unnecessary noise during
      Terragrunt runs. The token retrieval command is now invoked with `--noop` whenever a local
      token is present, silencing the output entirely.
    references:
      - type: "internal-commit"
        summary: "silencing vault output"
        link: "1ac42430c0dd1fc59d2f3b0aab851416fbe099dc"
  - type: "fix"
    summary: >-
      Fixes `panfactum.hcl` to handle a missing or null `vault_token` in config without error.
    references:
      - type: "internal-commit"
        summary: "using config.authentik_token vs module output"
        link: "27cdbcf16525e9989430f33ef211b5a3f9e17560"
    description: >-
      The `use_local_vault_token` local in `panfactum.hcl` previously evaluated
      `local.vars.vault_token != null && local.vars.vault_token != ""` directly, which would
      throw a Terragrunt error if `vault_token` was absent from the config entirely. The
      expression is now wrapped in `try(...)` so that a missing key gracefully falls back to
      `false`, preventing spurious errors in environments where Vault SSO has already been
      configured and `vault_token` is no longer stored in `region.secrets.yaml`.
  - type: "improvement"
    summary: >-
      `pf sso add` no longer requires manual `VAULT_TOKEN` injection and now reads
      `authentik_token` from `region.secrets.yaml` via the config system.
    references:
      - type: "internal-commit"
        summary: "using config.authentik_token vs module output"
        link: "27cdbcf16525e9989430f33ef211b5a3f9e17560"
    impacts:
      - type: "cli"
        component: "sso add"
        summary: >-
          VAULT_TOKEN is no longer passed explicitly to Terragrunt invocations within pf sso add;
          authentik_token is now read from region.secrets.yaml via getPanfactumConfig()
    description: >-
      Previously, `pf sso add` read the Vault root token from a SOPS-encrypted
      `kube_vault/secrets.yaml` file at startup and injected it as a `VAULT_TOKEN` environment
      variable for every Terragrunt module deployment in the Authentik and federated auth
      workflows. The Authentik bootstrap token was also fetched redundantly from Terragrunt
      outputs multiple times across different task steps. The command now fetches the bootstrap
      token exactly once (during the ingress verification step) and writes it to
      `region.secrets.yaml` as `authentik_token`, where it is subsequently read through the
      standard `getPanfactumConfig()` merge. Vault tokens are no longer threaded manually
      through module deployments in the SSO workflow, since `panfactum.hcl` picks them up
      automatically from region config. The "Setup Vault SSO" step now also clears `vault_token`
      from `region.secrets.yaml` upon completion, since static Vault credentials are no longer
      needed after Vault OIDC is configured.
  - type: "fix"
    summary: >-
      Fixes `panfactum.hcl` so that the Authentik provider token falls back to the
      `AUTHENTIK_TOKEN` environment variable when not set in config.
    references:
      - type: "internal-commit"
        summary: "fix: proper fallback for authentik provider & better input instructions"
        link: "0e5d41b543b20f222ae7afa692e48d283216be37"
    description: >-
      Previously, the Authentik Terraform provider in `panfactum.hcl` would receive the sentinel
      value `@@TERRAGRUNT_INVALID@@` for `authentik_token` when the key was absent from the
      merged Panfactum config. It now falls back to the `AUTHENTIK_TOKEN` environment variable
      before using the sentinel, allowing the provider to be configured in contexts where the
      token is injected via the environment rather than written to a SOPS-encrypted config file.
