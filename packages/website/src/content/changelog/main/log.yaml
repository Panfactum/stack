  - id: ab5cffb1-c309-4caa-b7da-fd3403ddd67b
    type: addition
    summary: "`pf cluster add` gains a CloudFront account verification pre-flight check, preventing 30+ minutes of wasted
      deployment on unverified AWS accounts."
    description: "New AWS accounts are subject to a fraud-prevention hold that blocks all CloudFront resource creation until
      the user opens an AWS Support case. Without this check, `pf cluster add` would silently waste ~30 minutes
      deploying EC2, EKS, and Vault before failing deep in the install when modules like `kube_vault`, `kube_authentik`,
      `kube_grist`, `kube_nocodb`, and `kube_opensearch` attempt to create distributions. The check probes by creating
      (and immediately deleting) a CloudFront Origin Access Identity — gated by the same verification check as
      `CreateDistribution` but free and fast. If the account already has any distribution, the probe is skipped entirely
      as a verified signal. Errors are classified into three actionable buckets: account not yet verified (with
      step-by-step AWS Support case instructions), missing IAM permissions (with required actions listed), or
      non-actionable transient failures (debug-logged, install continues)."
    references:
      - type: internal-commit
        summary: "feat(cluster): add CloudFront account verification pre-flight check"
        link: 895d099dcf643dce2fbd9ef5dbb4c58c4a5a8546
      - type: issue-report
        summary: AWS CloudFront account verification requirement preventing resource creation
        link: https://repost.aws/questions/QUHAzHD_-nSjiaAxMw7toQ3A/unable-to-create-cloudfront-distribution-account-must-be-verified
    impacts:
      - type: cli
        component: cluster add
        summary: New pre-flight check verifies the AWS account is permitted to create CloudFront distributions before any
          infrastructure is deployed, providing actionable guidance when the account is unverified or IAM permissions
          are insufficient
