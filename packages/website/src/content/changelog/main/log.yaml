  - id: 8b00b2b7-cb1a-4d2f-b637-e74182e07e7c
    type: fix
    summary: Fixed `pf wf git-checkout` command failing on private repositories due to incorrect authentication handling
    description: "When using `pf wf git-checkout` to check out a private repository in a CI/CD workflow, the command would
      fail during git reference resolution even when valid credentials were supplied. The TypeScript rewrite of this
      command had inadvertently diverged from the original bash implementation: git reference resolution was running in
      the caller's working directory rather than inside the cloned repository, so the credential configuration set up
      during cloning was not visible. This caused authentication to fail at the hash resolution step. The fix ensures
      reference resolution runs inside the cloned repository where credentials are properly configured, matching the
      behavior of the original bash script."
    references:
