- type: improvement
  summary: The `pf cluster add` command now supports fine-grained step resumability, configuration caching, and improved error
    handling. Interrupted installs can resume
  description: Previously, if `pf cluster add` failed partway through a phase (e.g., autoscaling), the entire phase would
