      generating a shell-specific command."
  - type: "fix"
    summary: "Fixes `install.sh` so that the repository name default prompt is correctly derived from the entered repository
      URL. Previously, the wrong"
    references:
      - type: "internal-commit"
        summary: "fix: default repo name for installer"
