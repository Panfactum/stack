    summary: Now deployed automatically by pf cluster add when Authentik is present
  - type: iac-module
    component: vault_auth_oidc
    summary: Now deployed automatically by pf cluster add when Authentik is present
  description: After the cluster extensions phase completes, `pf cluster add` now attempts to configure Vault Federated SSO
    by searching all environments for a deployed `kube_authentik` module. If one is found, the installer automatically deploys
    `authentik_vault_sso` and `vault_auth_oidc` and revokes the static Vault root token. If no Authentik deployment is found
    the step is silently skipped. This means users who run `pf cluster add` after `pf sso add` no longer need a separate step
    to wire Vault into their identity provider.
- type: addition
  summary: Adds the `pf cluster enable` command for enabling optional cluster features such as ECR pull-through cache.
  description: '`pf cluster enable` provides a guided wizard for activating opt-in cluster features. The first supported feature
    is `ecr-pull-through-cache`, which prompts for Docker Hub and GitHub credentials, stores them encrypted via SOPS, deploys
    the `aws_ecr_pull_through_cache` IaC module, and re-deploys `kube_policies` with pull-through cache enabled. More features
    will be added over time using the same extensible pattern.'
