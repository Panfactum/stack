    description: >-
      When bootstrapping the management environment, `pf env add` collects an account alias from the user but
      previously did not pass it to the `aws_organization` module's `alias` input. The alias was therefore
      never persisted for the management account. The fix wires the collected alias through `defineInputUpdate`
      into the `aws_organization` deployment step, mirroring the existing behavior for non-management
      environments that use `aws_account`.
  - type: "improvement"
    summary: >-
      `pf env add` now supports resumability — interrupted installations detect partial state and skip
      completed steps on re-run.
    references:
      - type: "internal-commit"
        summary: "feat:cli: env add resumability"
        link: "e463425f6558d3105371d21787b3a1884414109e"
    impacts:
      - type: "cli"
        component: "env add"
        summary: >-
          Detects partially-deployed environments, skips completed provisioning steps, and restores
          previously-selected regions on resume
    description: >-
      `pf env add` can now resume an interrupted installation without repeating steps that already
      completed. The command detects whether an AWS account was already provisioned (by checking existing
      AWS profiles and module status), restores previously-selected primary and secondary regions from
      config, and offers to copy region configuration from another existing environment to speed up setup.
      AWS account creation is now performed directly via the AWS SDK before the IaC module is applied,
      which also enables retrying with a different email address when a duplicate-email error is returned
      by AWS Organizations.
  - type: "fix"
