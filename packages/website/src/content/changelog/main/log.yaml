  description: The `syncStandardFiles` task in `pf devshell sync` was calling `upsertGitIgnore` with a path of `join(aws_dir,
    ".aws")` instead of `join(aws_dir, ".gitignore")`. This caused the gitignore file for the `.aws` directory to be written
    to a file literally named `.aws` inside the `.aws` directory, rather than to the expected `.gitignore` file. AWS credentials
    and config files in the `.aws` directory were therefore not protected by the intended gitignore rules.
- type: fix
  summary: Fixes `pf cluster add` failing to authenticate with the AWS Service Quotas API when using file-based credentials.
  description: The AWS SDK JS v3 has a known bug (https://github.com/aws/aws-sdk-js-v3/issues/6872) where passing a `profile`
    option to certain SDK clients does not correctly resolve credentials from the credentials file. `pf cluster add` was directly
    instantiating `ServiceQuotasClient` with a `profile` option, which triggered this bug and caused quota checks to fail
    with credential errors in environments that rely on file-based AWS credentials. The fix introduces a `getServiceQuotasClient`
    factory function (consistent with other AWS client factories in the CLI) that explicitly resolves credentials from the
    credentials file before constructing the client, bypassing the SDK bug.
  references:
  - type: internal-commit
    summary: refactor use factory function for ServiceQuotasClient instantiation
    link: 1dc45f74fb324cf0a8cd35be642b2ef3f1a244b5
  - type: issue-report
    summary: 'AWS SDK JS v3: profile option does not resolve credentials from file'
    link: https://github.com/aws/aws-sdk-js-v3/issues/6872
  impacts:
  - type: cli
    component: cluster add
    summary: EC2 vCPU quota check now correctly authenticates using file-based AWS credentials
- type: improvement
