  - type: improvement
    summary: >-
      The `pf devshell sync` command's internal sync logic has been refactored into reusable Listr task
      builders for Kubernetes cluster credentials, SSH bastion connection info, and AWS Identity Center
      profiles. The command now also syncs AWS Identity Center configuration as part of the standard
