    entry-point and `loadEnv.sh` now export the new `TG_*` names; `pf-tf-init` calls `terragrunt init --all` and `terragrunt
    run --all -- providers lock`; and `wf_tf_deploy`''s `deploy.sh` calls `terragrunt apply --all --queue-exclude-external`.
    Re-apply `wf_tf_deploy` and re-run `pf-tf-init` to pick up the updated scripts.'
