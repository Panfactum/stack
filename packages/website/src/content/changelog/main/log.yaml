    use a stale (or missing) credential cache. The fix centralizes client construction into dedicated factory functions (`getAccountClient`,
    `getIAMClient`, `getS3Client`, `getRoute53DomainsClient`, `getOrganizationsClient`, `getSTSClient`) that each read credentials
    from disk when available, bypassing the provider cache. This resolves credential failures across the `pf env add` and
    `pf domain add` workflows.
