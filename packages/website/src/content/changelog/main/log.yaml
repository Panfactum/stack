- id: 369b598b-9974-4693-b2e1-5a7f730c8452
  type: fix
  summary: Fixes `kube_policies` read-only roles granting full write access and restricts `pf:admins` security-sensitive resource
    writes.
  references:
  - type: internal-commit
    summary: 'feat: upgrades kubernetes to 1.31'
    link: 33d887c36fae56bc624511e72a8ac7f939db47f3
  impacts:
  - type: iac-module
    component: kube_policies
    summary: read_verbs corrected to get/list/watch; pf:admins restricted from writing RBAC, webhooks, CRDs, and Kyverno policies
  description: 'Two `kube_policies` RBAC security fixes from the same commit: (1) The `read_verbs` local variable was accidentally
    set to the same value as `all_verbs`, giving `reader` and `restricted_reader` ClusterRoles full write access to non-secret
    resources. `read_verbs` is now corrected to `["get", "list", "watch"]`. (2) The `pf:admins` ClusterRole previously granted
    full write access to all non-secret resources including RBAC roles/bindings, admission webhooks, CRDs, and Kyverno policies.
    The role now separates `sensitive_resources` (cluster roles, role bindings, API services, webhook configs, flow control
    objects, CRDs, Kyverno policies) and grants only `get/list/watch` access to them.'
  action_items:
  - Re-apply `kube_policies` to receive the corrected RBAC permissions.
