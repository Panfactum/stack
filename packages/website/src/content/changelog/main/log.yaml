- id: e240c03b-1971-40bc-b9c8-49a3a9a85332
  type: fix
  summary: Fixes `getDomains` path resolution and CLI config loading to handle missing files gracefully.
  references:
  - type: internal-commit
    summary: 'feat: adds first CLI unit tests'
    link: b7b790dd661af18039021d3352666f3ba3fc41c9
  impacts:
  - type: cli
    component: domain add
    summary: Domain environment path was a short name rather than an absolute path, causing downstream steps to fail when
      resolving environment files.
  description: 'Two small CLI infrastructure fixes: (1) `getDomains` was using a short directory name instead of the full
    absolute filesystem path for the environment, causing downstream file resolution to fail; (2) the config file loader was
    throwing on missing files instead of returning null, causing unexpected errors when optional config files were absent.'
- id: 884600c0-ec49-400e-8b07-3a7372c379cc
  type: fix
  summary: Fixes CLI subprocess execution where merged stdout/stderr output was silently dropped due to an incorrect `concatStreams`
    call.
  references:
  - type: internal-commit
    summary: 'feat: adds unit tests to the CLI'
    link: dd36035b968faeb3c4f64406aea69e47353f968a
  description: 'The `execute` subprocess utility called `concatStreams` with a raw array instead of the expected `{ streams:
    [...] }` object. This caused the merged output stream (used for logging and retry diagnostics) to be empty on every subprocess
    invocation. CLI commands that depend on capturing combined stdout/stderr output — such as error messages from terragrunt
    or kubectl — would silently lose that output. The call site has been corrected to use the proper API signature.'
- id: f09ebec3-500f-4b45-8988-96daa670be82
  type: addition
  summary: '[`kube_karpenter_node_pools`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_karpenter_node_pools)
    now creates dedicated workflow-only Karpenter node pools for each existing pool type (burstable, burstable-arm, spot,
    spot-arm, on-demand, on-demand-arm).'
  references:
  - type: internal-commit
    summary: 'feat: adds workflow-only node pools'
    link: 2702b0c70a3f8aed03ea6606ba291b6e2b380885
  impacts:
  - type: iac-module
    component: kube_karpenter_node_pools
    summary: Six new workflow-only NodePool resources added; each mirrors an existing pool but carries a `workflow=true:NoSchedule`
      taint and a `panfactum.com/workflow-only=true` label
  description: 'Each existing Karpenter node pool now has a parallel workflow-only counterpart (prefixed with `wf-`). The
    workflow pools carry a `workflow: "true"` taint with `NoSchedule` effect and label nodes with `panfactum.com/workflow-only:
    "true"`. This isolates Argo Workflow pods (which tolerate the `workflow` taint) onto their own nodes, preventing long-running
    workflows from displacing regular workloads. A new `default_termination_grace_period` variable (default `"1h0m0s"`) has
    also been introduced to control the termination grace period for on-demand node pools, replacing the previously hardcoded
    value.'
- id: 4c93824e-83eb-469d-86ed-2e99252b05a9
  type: addition
  summary: Adds `workflow_nodes_required` input to `wf_spec` and `kube_workload_utility` to schedule workflow pods exclusively
    on workflow-only nodes.
  description: When `workflow_nodes_required = true`, pods are constrained to nodes labeled `panfactum.com/workflow-only=true`
    (the workflow-only Karpenter pools introduced alongside this change) and are granted the `workflow=true:NoSchedule` taint
    toleration. This allows long-running, non-resumable Argo Workflows to run on dedicated nodes that regular workloads cannot
    be scheduled onto, preventing workflow disruption caused by bin-packing pressure from other services.
  references:
  - type: internal-commit
    summary: 'feat: adds workflow-only node support to wf_spec'
    link: 30f40bd6c4414685d5923bfe6b0029557acab1d3
  impacts:
  - type: iac-module
    component: wf_spec
    summary: New `workflow_nodes_required` input (default false) pins workflow pods to workflow-only nodes
  - type: iac-module
    component: kube_workload_utility
    summary: New `workflow_nodes_required` input and corresponding node selector and taint toleration
- id: 9bb6797e-2a5f-4cbc-9bcf-82320833fa67
  type: improvement
  summary: '[`kube_opensearch`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch) now supports
    single-node deployments via `replica_count=1`.'
  references:
  - type: internal-commit
    summary: 'feat: adds the ability to run opensearch in single-node mode'
    link: 14cb9e692705dfa5b13f113d9699abb6df58b97c
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: replica_count minimum of 3 removed; setting replica_count=1 now configures discovery.type=single-node and omits
      multi-node seed hosts configuration
  description: 'Previously, `kube_opensearch` required at least three replicas and would fail validation for smaller deployments.
    This change allows single-node deployments by removing the validation constraint and automatically applying the correct
    OpenSearch cluster discovery configuration: when `replica_count` is set to 1, `discovery.type` is set to `"single-node"`
    and the `discovery.seed_hosts` / `cluster.initial_cluster_manager_nodes` settings are omitted. This is useful for development
    environments and smaller workloads where high availability is not required.'
- id: 7f0e874c-d9de-4b0a-81b0-a3119383d7a5
  type: fix
  summary: Fixes [`kube_aws_creds`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_aws_creds) always
    creating the IAM user policy even when `iam_policy_json` is null.
  references:
