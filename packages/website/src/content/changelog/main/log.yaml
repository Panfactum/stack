  - id: 93102dd3-1bfe-4610-9004-ac0527798158
    type: fix
    summary: Fixes Terragrunt CLI flag compatibility with `v0.85.0`+ by replacing removed `--terragrunt-*` prefixed flags
      with their modern equivalents.
    description: Terragrunt `v0.85.0` removed all legacy `--terragrunt-*` prefixed flags as part of its CLI redesign
      roadmap. Before this fix, the Panfactum CLI passed flags like `--terragrunt-non-interactive`,
      `--terragrunt-no-color`, and `--terragrunt-provider-cache` which Terragrunt silently ignored on `v0.85.0`+,
      allowing interactive prompts and colorized output to leak into automated contexts. This fix updates all internal
      Terragrunt utility functions to use the modern equivalents (`--non-interactive`, `--no-color`, `--provider-cache`)
