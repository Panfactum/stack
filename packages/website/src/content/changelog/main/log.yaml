summary: Introduces dedicated DNS zones for cluster management, consolidates certificate modules, adds KEDA for autoscaling,
  launches the new Panfactum CLI tool, and restructures several AWS modules for better configuration management.
upgrade_instructions: upgrade.mdx
highlights:
- New `pf` CLI tool — run `pf devshell sync` then `terragrunt run-all apply` to initialize
- '`kube_cert_manager` and `kube_cert_issuers` consolidated into new `kube_certificates` module — state migration required'
- KEDA added to base cluster — install via [`kube_keda`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_keda)
- Kubernetes default version updated to 1.31
- '`burstable_nodes_enabled` now defaults to `true` for all modules'
changes:
- type: breaking_change
  summary: Every cluster now requires a dedicated DNS zone for hosting control-plane utilities. `kube_domain` is a new required
    configuration value in
  action_items:
  - Add a `kube_domain` field to `region.yaml` for every region that contains a Kubernetes cluster. The value must be a subdomain
    of a domain already available in the environment (e.g., `kube.example.com` if `example.com` is managed).
  - Deploy the corresponding DNS zone via `aws_dns_zones` before applying cluster modules.
  impacts:
  - type: configuration
    component: region.yaml
    summary: New required kube_domain field for cluster DNS zones
  description: Every cluster now requires a dedicated DNS zone for hosting control-plane utilities. `kube_domain` is a new
    required configuration value in `region.yaml` for every region housing a Kubernetes cluster. It must be a subdomain of
    a domain available to the environment.
- type: breaking_change
  summary: We now create the Authentik email template in `kube_authentik`. The organization name is now a required input.
    Use the new
  action_items:
  - Add the `organization_name` variable to your `kube_authentik` module configuration.
  - Wire the `organization_name` output from `kube_authentik` into the `authentik_core_resources` module as an input via a
    `dependency` block.
  impacts:
  - type: iac-module
    component: kube_authentik
    summary: Organization name now required input; produces email template
  - type: iac-module
    component: authentik_core_resources
    summary: Must now consume organization_name output from kube_authentik
  description: We now create the Authentik email template in `kube_authentik`. The organization name is now a required input.
    Use the new `organization_name` output from `kube_authentik` as an input to `authentik_core_resources`.
- type: breaking_change
  summary: '`kube_cert_manager` and `kube_cert_issuers` have been consolidated into a single `kube_certificates` module to
    address various race conditions on cluster installation. See'
  action_items:
  - Create a new `kube_certificates` module deployment.
  - Migrate the Terraform state from both `kube_cert_manager` and `kube_cert_issuers` into the new module.
  - Remove the old module directories after confirming the migration succeeds.
  - Follow the detailed state migration steps in the upgrade instructions.
  references:
  - type: internal-commit
    summary: Merge certificates modules (#353)
    link: 48d67a2721e3df5e482db5e975bc76722451dd2a
  impacts:
  - type: iac-module
    component: kube_cert_manager
    summary: Deprecated and consolidated into kube_certificates
  - type: iac-module
    component: kube_cert_issuers
    summary: Deprecated and consolidated into kube_certificates
  - type: iac-module
    component: kube_certificates
    summary: New module replacing kube_cert_manager and kube_cert_issuers
  description: '`kube_cert_manager` and `kube_cert_issuers` have been consolidated into a single `kube_certificates` module
    to address various race conditions on cluster installation. See upgrade instructions for the state migration steps.'
- type: breaking_change
  summary: KEDA is now included in the base Panfactum cluster and modules assume it is installed. See the installation instructions
    [here](/docs/edge/guides/bootstrapping/autoscaling/#deploy-keda).
  action_items:
  - Deploy the `kube_keda` module in every cluster following the [installation guide](/docs/edge/guides/bootstrapping/autoscaling/#deploy-keda).
    This must be done before applying other modules that now depend on KEDA being present.
  impacts:
  - type: iac-module
    component: kube_keda
    summary: Now required as part of base cluster installation
- type: breaking_change
  summary: '`burstable_nodes_enabled` now defaults to `true` for all modules. This fixes the broken default introduced in
    `edge.25-03-26`.'
  description: If you explicitly set `burstable_nodes_enabled = false` in any module, no action is needed. Otherwise, review
    your workloads to confirm they are compatible with burstable (T-family) instances, which are now used by default.
- type: breaking_change
