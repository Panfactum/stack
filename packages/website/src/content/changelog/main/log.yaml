  - id: bf22b964-8004-4622-ae6f-40e7776c8255
    type: fix
    summary: Fixed `wf_dockerfile_build` `scale-buildkit` steps crashing with "Devshell configuration file does not exist"
      inside CI containers without a `panfactum.yaml`.
    description: 'Several CLI commands that do not require devshell configuration were incorrectly typed as
      `PanfactumCommand<PanfactumContext>`, which exposes `devshellConfig` on `this.context`. TypeScript therefore
      accepted accesses to `devshellConfig` inside these commands without complaint. The production failure surfaced in
      `wf_dockerfile_build`: the `scale-buildkit` Argo Workflows step called `devshellConfig.repo_root` at runtime
      inside a CI container where no `panfactum.yaml` exists. Argo reported the step as successful, leaving the
      subsequent `build` step to fail with a confusing "Devshell configuration file does not exist" error that was
      difficult to trace back to its root cause. The fix splits `PanfactumCommand` into two base classes:
      `PanfactumLightCommand<PanfactumBaseContext>` for commands that do not need devshell config, and
      `PanfactumCommand<PanfactumContext>` for commands that do. Utility functions that previously read
      `context.devshellConfig.repo_root` now receive an explicit `workingDirectory` parameter instead. Any future access
      to `devshellConfig` from a light command is now a compile-time error rather than a silent runtime crash.'
    references:
      - type: internal-commit
        summary: "refactor(cli): encode devshell requirement in command type hierarchy"
        link: e61269a70c071f8c41f16647f735c90bd372d6de
      - type: internal-docs
