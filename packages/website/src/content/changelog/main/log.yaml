  - id: e9c20b14-8e10-441b-9745-b7a81361e4bd
    type: addition
    summary: >-
      Added AWS Service Quotas Automatic Management to `aws_account` module for proactive quota monitoring and
      automatic increase requests
    description: >-
      AWS Service Quotas are one of the most common causes of unexpected production incidents. The previous
      approach was purely reactive: operators only learned a quota mattered after a failed Terraform apply, EKS
      scale-out, or workload error. This enhancement opts every account into AWS Service Quotas Automatic Management
      with `NotifyAndAdjust` as the default, so AWS proactively monitors utilization and submits increase requests before
      limits become an incident. When `operations_contact` is set, a User Notifications pipeline routes `SERVICEQUOTAS`
      threshold events to the ops email address. Auto-management still runs without a contact configured --
      notifications are additive.
    action_items:
      - "Review new module inputs: `quota_auto_management_opt_in_type`, `quota_auto_management_regions`, and `quota_auto_management_exclusion_list`"
      - "Configure `operations_contact` if you want quota threshold notifications sent to your operations team"
      - "Optionally customize the `quota_auto_management_regions` list to target specific AWS regions"
    references:
