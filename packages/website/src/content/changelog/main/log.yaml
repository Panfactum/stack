- id: 3294ce58-1fbd-49d0-be3c-7fca2a3c5d15
  type: improvement
  summary: '`ds-generate-changelog-schemas` no longer generates `metadata.schema.json`; that responsibility has moved to `ds-validate-iac-metadata`.'
  references:
  - type: internal-commit
    summary: 'refactor(changelog): remove metadata schema gen; add contributor docs'
    link: d0166798440a5eea576ef2e986ea7c875e82b519
  description: Previously `ds-generate-changelog-schemas` generated both `log.schema.json` and `metadata.schema.json`. The
    metadata schema is static — it has no dynamic enum values derived from the filesystem — so generating it programmatically
