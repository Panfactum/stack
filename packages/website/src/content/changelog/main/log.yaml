  summary: Stable releases are now open to all users. The stable release format has been updated to `stable.<YY-MM>.<patch>`
    (e.g., `stable.25-04.0`), the
  description: 'Previously, stable releases were only available to stack subscribers. Stable releases are now publicly available
    to all users of the Panfactum framework. The release naming convention has also changed: stable releases now use the format
    `stable.<YY-MM>.<patch>` instead of the previous `<YY-MM>.<patch>`. The support window has been updated to six months
    from the initial release date (previously twelve months). New stable release channels will be created roughly three times
    per year, aligned with new Kubernetes releases.'
