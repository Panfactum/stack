- id: 3513552e-192b-4c06-8584-6ce87c9a8df2
  type: addition
  summary: '[`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster) adds `pg_recovery_target_immediate`
    input for `targetImmediate` CNPG recovery mode.'
  references:
  - type: internal-commit
    summary: 'feat(kube_pg_cluster): support targetImmediate recovery (#375)'
    link: aaa63ac02ce6adee3e990bc8c45c49a1ca2089c0
  impacts:
  - type: iac-module
    component: kube_pg_cluster
    summary: New optional pg_recovery_target_immediate input enables targetImmediate CNPG recovery mode
  description: 'The new `pg_recovery_target_immediate` input (default `null`) configures the CNPG cluster bootstrap recovery
    to use `targetImmediate: true`, stopping recovery at the earliest consistent point after the base backup completed. When
    set, the input is used as the `backupID` in the CNPG `recoveryTarget` block. This is an alternative to `pg_recovery_target_time`
    — the two cannot be used simultaneously. Existing deployments are unaffected since the input defaults to `null`.'
- id: 672b8c19-8304-489d-bd14-12ac39527c6a
  type: addition
  summary: '[`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster) adds `pg_custom_image`
    input to support custom PostgreSQL container images with extensions.'
  references:
  - type: internal-commit
    summary: 'feat(kube_pg_cluster): support custom_image (#376)'
    link: 5809f908864efcc93847361fabefc7abfa764d61
  - type: external-docs
    summary: 'CloudNativePG blog: building custom PostgreSQL images with Docker Bake'
    link: https://cloudnative-pg.io/blog/building-images-bake/
  impacts:
  - type: iac-module
    component: kube_pg_cluster
    summary: New optional pg_custom_image input overrides pg_version for image selection when set
  description: The new `pg_custom_image` input (default `null`) allows deploying a custom PostgreSQL container image instead
    of the default CNPG image selected by `pg_version`. This enables use of PostgreSQL extension images such as `ghcr.io/cloudnative-pg/postgis:17`
    for PostGIS support, or images built with arbitrary Debian-packaged extensions (e.g., pgvector, pg_cron, TimescaleDB)
    via Docker Bake. When `pg_custom_image` is set, `pg_version` is ignored for image selection. Note that custom images bypass
    the ECR pull-through cache, so the cluster must have direct registry access and any required image pull secrets configured.
- id: 782bf2e9-c7d9-4dd5-a6b6-2ea1c03ae1f4
  type: fix
  summary: Fixes [`kube_pg_cluster`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_pg_cluster) cross-account
    recovery — missing IAM permissions on remote bucket and manifest schema validation error.
  references:
  - type: internal-commit
    summary: 'fix: kube pg cluster recover from remote backups (#377)'
    link: b1168e61fb424a8e66a542c5c232721195300cfc
  - type: issue-report
    summary: Cross-account PG cluster recovery — missing IAM permissions on remote S3 bucket
    link: https://github.com/Panfactum/stack/issues/378
  - type: external-docs
    summary: CloudNativePG backup and recovery documentation
    link: https://cloudnative-pg.io/documentation/1.20/backup/
  impacts:
  - type: iac-module
    component: kube_pg_cluster
    summary: IAM policy grants s3:* on pg_recovery_bucket when set; recoveryTarget block uses merge() with all fields declared;
      backendID corrected to backupID
  description: 'Two recovery fixes from the same commit: (1) When using `pg_recovery_bucket` to restore from a remote S3 bucket,
    the cluster''s IAM role lacked `s3:*` on that bucket, causing authentication failures. The IAM policy now includes the
    remote bucket and its objects when `pg_recovery_bucket` is set. (2) The `recoveryTarget` block conditionally set only
    some fields, triggering a "Manifest configuration incompatible with resource schema" planning error because the Terraform
    kubernetes provider requires all nested object fields to be explicitly declared (even as `null`). The fix uses `merge()`
    to provide all `recoveryTarget` fields, and corrects `backendID` to `backupID` to match the actual CNPG CRD field name.'
- id: 35fd07ac-6319-4f91-9c30-f72bb76e3aee
  type: addition
  summary: '[`aws_ecr_repos`](/docs/edge/reference/infrastructure-modules/direct/aws/aws_ecr_repos) now accepts a `lifecycle_policy_json`
    input to override the default ECR lifecycle policy per repository.'
  references:
  - type: internal-commit
    summary: 'feat(aws_ecr_repos): support custom lifecycle policies (#379)'
    link: 292b996bfdc0aef6c102493da0dbe4221548d0e3
  - type: issue-report
    summary: Support custom ECR lifecycle policies in aws_ecr_repos
    link: https://github.com/Panfactum/stack/issues/381
  impacts:
  - type: iac-module
    component: aws_ecr_repos
    summary: New optional `lifecycle_policy_json` field on each repository object; overrides built-in expiration rules when
      set
  description: The built-in expiration rules in `aws_ecr_repos` (`expire_all_images` and `expiration_rules`) cover common
    cases but are too rigid for teams that need fine-grained control — for example, keeping a minimum number of tagged images
    regardless of age, or applying complex multi-rule policies. The new `lifecycle_policy_json` field accepts a raw JSON string
    (matching the AWS ECR lifecycle policy format) and, when set, replaces the module-generated policy entirely. Existing
    repositories that do not set this field continue to behave exactly as before.
