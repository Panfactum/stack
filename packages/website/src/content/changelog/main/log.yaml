  - id: d4693f4f-f543-4ba7-8601-b72c1aa390a2
    type: improvement
    summary: >-
      Enhanced `kube_pg_cluster` module with per-schema Vault roles, automatic schema initialization, and PgBouncer
      `search_path` support
    description: >-
      CNPG's `postInitApplicationSQL` only runs at cluster bootstrap, so schemas added to `extra_schemas` after initial
      setup were silently ignored. The module now runs idempotent schema SQL on every apply via a Kubernetes Job,
      creating schemas and per-schema base roles (`reader_<schema>`, `writer_<schema>`) with appropriate grants.
      PgBouncer cannot set `search_path` per-connection in transaction/session pooling mode, so per-schema Vault roles
      now use `ALTER ROLE SET search_path` to pre-configure the correct schema, removing the need for clients to set it
      at connection time. Added `pgbouncer_ignore_startup_parameters` variable to prevent PgBouncer from rejecting
      connections from JDBC drivers and other clients that automatically send `search_path` as a startup parameter.
    references:
      - type: internal-commit
        summary: "feat(kube_pg_cluster): add per-schema roles, schema init job, PgBouncer fix"
        link: 9053ab836b67d438d2d1587c7624f63c53adf45b
      - type: external-docs
        summary: CloudNativePG PostgreSQL Operator
        link: https://github.com/cloudnative-pg/cloudnative-pg
      - type: external-docs
        summary: PgBouncer Configuration Documentation - ignore_startup_parameters
        link: https://github.com/pgbouncer/pgbouncer/blob/master/doc/config.md
      - type: external-docs
        summary: Vault PostgreSQL Database Secrets Engine
        link: https://developer.hashicorp.com/vault/docs/secrets/databases/postgresql
      - type: internal-docs
        summary: kube_pg_cluster Module Documentation
        link: /docs/main/modules/kube_pg_cluster/overview
    impacts:
      - type: iac-module
        component: kube_pg_cluster
        summary: >-
          Added per-schema Vault roles with pre-configured `search_path`, schema initialization Job for existing
          clusters, and `pgbouncer_ignore_startup_parameters` variable for JDBC compatibility
