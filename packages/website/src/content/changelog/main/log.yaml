- id: df8a13fd-ae3f-4493-8bef-440e4f2c72be
  type: update
  summary: OpenTofu provider versions upgraded across all IaC modules, including major-version bumps for the AWS (5.x→6.x)
    and Helm (2.x→3.x) providers.
  references:
  - type: internal-commit
    summary: 'chore(infrastructure): upgrade OpenTofu provider versions across all modules'
    link: 18d7371cab0ca2d4f0543e21c6484b6980120ce2
  - type: internal-commit
    summary: 'chore(terraform): bump AWS provider 5.x→6.x across all environments'
    link: 43989c48de224cccb1665bbf2eced22fd4166499
  - type: external-docs
    summary: AWS Provider v6.0.0 release notes
    link: https://github.com/hashicorp/terraform-provider-aws/releases/tag/v6.0.0
  - type: external-docs
    summary: Helm Provider v3.0.0 upgrade guide
    link: https://registry.terraform.io/providers/hashicorp/helm/latest/docs/guides/v3-upgrade-guide
  description: 'Provider versions across all Panfactum infrastructure modules were stale, accumulating security and compatibility
    debt. This upgrade brings all modules to current releases: the AWS provider jumps from 5.80.0 to 6.38.0 (major), the Helm
    provider from 2.12.1 to 3.1.1 (major — `set_string` removed, automatic state migration from SDKv2 to Plugin Framework
    included), the Vault provider from 4.5.0 to 4.8.0 (held at 4.x because 5.x drops support for Vault ≤1.14.x), the Kubernetes
    provider from 2.34.0 to 2.35.0 (held at 2.x because 3.x renames every resource type with a `_v1` suffix), and minor/patch
    bumps for tls, random, time, and archive. The boolean-string literals in the `aws_eks` launch template were also corrected
    to satisfy the AWS provider 6.x strict type requirements. No user action is required — provider pins are managed internally
    by Panfactum and will be picked up automatically on the next `terragrunt init`. Running `ds-generate-changelog-schemas`
    will no longer regenerate `metadata.schema.json`.'
- id: a6765460-0030-4d71-8213-68380f9f42ec
  type: addition
  summary: Adds optional `seccomp_profile_type` to container specs in all `kube_*` workload modules, enabling per-container
    seccomp profile overrides.
  references:
  - type: internal-commit
    summary: 'feat(infrastructure): add seccomp_profile_type to container specs'
    link: c6e79ec355572f2d89ada7ceaac8b1aab481cc23
  - type: external-docs
    summary: Kubernetes seccomp profiles documentation
    link: https://kubernetes.io/docs/tutorials/security/seccomp/
  impacts:
  - type: iac-module
    component: kube_pod
    summary: New optional `seccomp_profile_type` field (default null) on each container object; when set, applies a container-level
      seccompProfile override
  - type: iac-module
    component: kube_deployment
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_daemon_set
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_stateful_set
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_cron_job
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_job
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_buildkit
    summary: BuildKit container now sets `seccomp_profile_type = "Unconfined"` to satisfy its elevated syscall requirements
  description: Previously there was no way to override the cluster-level seccomp policy on a per-container basis. Workloads
    such as BuildKit require an `Unconfined` seccomp profile because their syscall surface (e.g., `rootlesskit` with `SYS_ADMIN`)
    exceeds what `RuntimeDefault` allows, causing silent failures or permission-denied errors at runtime. The new `seccomp_profile_type`
    field (defaulting to `null`, meaning no explicit profile override is set) allows callers to specify any valid Kubernetes
    seccomp profile type string. `kube_buildkit` uses this to set `Unconfined`, matching the existing AppArmor `unconfined`
    annotation already applied to its pod. No changes are required for existing modules that do not need a custom seccomp
    profile.
