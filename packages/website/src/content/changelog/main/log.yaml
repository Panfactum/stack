      Switched to the proper Docker registry token flow (GET auth.docker.io/token with Basic Auth), which is the same
      authentication flow that ECR pull-through cache uses internally. This eliminates false validation failures and
      ensures the ECR setup works reliably with current Docker Hub token formats.
