  - type: improvement
    summary: >-
      `pf cluster install` now automates Vault deployment and initialization. After the CSI
      drivers step, the installer deploys `kube_vault`, waits for all Vault pods to become
      ready, initializes Vault, unseals it, and then deploys `vault_core_resources`. Recovery
      keys and the root token are encrypted and saved to `kube_vault/secrets.yaml`.
    description: >-
      Previously, Vault setup required manual steps after running `pf cluster install`. These
      steps are now fully automated: the installer deploys the `kube_vault` module, polls until
      all pods are running, runs `vault operator init` to obtain recovery keys and the root token,
      unseals Vault with the recovery keys, and then deploys `vault_core_resources` (using a
      `kubectl port-forward` to Vault during the Terraform apply). Recovery keys and the root
      token are encrypted via SOPS and written to `kube_vault/secrets.yaml`. Users should
      move these credentials to a secure location after the install completes — they should not
      remain accessible to all superusers in a shared secrets store.
    references:
      - type: internal-commit
        summary: "chore: vault updates"
        link: 6519c292ef148081c10a2aa089a295d63827af27
    impacts:
      - type: iac-module
        component: kube_vault
        summary: Now deployed and initialized automatically by pf cluster install
      - type: iac-module
        component: vault_core_resources
        summary: Now deployed automatically by pf cluster install after Vault initialization
  - type: fix
    summary: >-
      Fixes a duplicate step ID in `pf cluster install` where the Base EKS Cluster step
      incorrectly shared the `csiDrivers` checkpoint ID with the CSI Drivers step. The EKS
      step is now tracked under the `setupEKS` ID. Users with an existing checkpoint that
      marked `csiDrivers` as the EKS step will see the EKS step re-run once.
    references:
      - type: internal-commit
        summary: "chore: vault updates"
        link: 6519c292ef148081c10a2aa089a295d63827af27
  - type: improvement
    summary: >-
      `pf cluster install` now dynamically selects an available port for the Vault kubectl
      port-forward proxy instead of hardcoding port 8200, preventing installation failures
      when port 8200 is already in use on the local machine.
    description: >-
      Previously, the Vault proxy used during `vault_core_resources` deployment always bound
      to port 8200. If another process was using that port, the install step would fail. The
      proxy now scans ports starting at 8200 and picks the first available one, making the
      install process more resilient in shared or busy development environments.
    references:
