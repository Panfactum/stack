      factory functions (`getAccountClient`, `getIAMClient`, `getS3Client`, `getRoute53DomainsClient`,
      `getOrganizationsClient`, `getSTSClient`) that each read credentials from disk when available, bypassing the
      provider cache. This resolves credential failures across the `pf env add` and `pf domain add` workflows."
    references:
      - type: "internal-commit"
        summary: "fix:cli: aws client fixes + welcome screen + org create success section"
        link: "572dddd507d8318b9ebd48dedc47f4351f73626d"
      - type: "issue-report"
        summary: "AWS SDK JS v3 issue: credentials not reloaded from disk within the same process"
        link: "https://github.com/aws/aws-sdk-js-v3/issues/6872"
    impacts:
      - type: "cli"
        component: "env add"
        summary: "All AWS SDK clients now use a shared factory that reads credentials from disk, fixing failures when
          credentials are written during the install process"
      - type: "cli"
