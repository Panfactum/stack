- id: ccdda923-a0f8-4d56-b9ce-d0830ba8c06f
  type: improvement
  summary: The `pf cluster add` command now supports fine-grained step resumability, configuration caching, and improved error
    handling. Interrupted installs can resume
  description: Previously, if `pf cluster add` failed partway through a phase (e.g., autoscaling), the entire phase would
    restart from scratch on the next run. The command now tracks each sub-step individually (e.g., metrics server setup, VPA
    setup, Karpenter setup) and skips steps that already completed. Errors are also written to a debug file for easier troubleshooting.
    This makes the cluster installation process significantly more resilient to transient failures.
  references:
  - type: internal-commit
    summary: CLI improvements (#330)
    link: 733c3c8cf4b9c33e17adc99f6527108c58713144
  impacts:
  - type: cli
    component: cluster add
    summary: Supports fine-grained step resumability, configuration caching, and improved error handling for interrupted installs
