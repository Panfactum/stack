    summary: 'feat:cli: env add resumability'
    link: e463425f6558d3105371d21787b3a1884414109e
  impacts:
  - type: cli
    component: env add
    summary: Detects partially-deployed environments, skips completed provisioning steps, restores previously-selected regions;
