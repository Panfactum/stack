        link: "00029f4e98aec9c1119bba2ff2a7fcb2d228620b"
  - type: "improvement"
    summary: "`pf cluster add` now uses the `.pf.yaml` status file written by terragrunt to determine whether each module
      deployment step was"
    description: "The checkpointing mechanism in `pf cluster add` has been upgraded to read each module's `.pf.yaml` status
      file (with `deployStatus: success` set by the Panfactum terragrunt hooks on successful apply) rather than testing
      for directory presence. This means a partially-completed or failed apply is no longer treated as complete, making
      resume behaviour more accurate across all install phases. The `getLocalModuleStatus` utility reads these files
      from the environments directory and also returns environment, region, and module existence flags for defensive
      error handling."
    references:
      - type: "internal-commit"
        summary: "feat: better resumability (#351)"
        link: "70421c38fa9eb6f3238b5f1e7dfa9101f8a84f7e"
