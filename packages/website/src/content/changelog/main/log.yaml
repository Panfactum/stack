- id: 74cb8a25-0018-4325-8390-0fcf62e31f0a
  type: breaking_change
  summary: >-
    The default Kubernetes version has been upgraded to 1.33 from 1.30. Re-apply `aws_eks` and review the K8s 1.33 changelog.
  action_items:
  - Review the [Kubernetes 1.33 changelog](https://kubernetes.io/blog/2025/04/23/kubernetes-v1-33-release/) for any deprecated
    APIs or behavior changes that affect your workloads.
  - If you pin `kube_version` explicitly in `aws_eks`, update it to `1.33`. Otherwise, re-apply `aws_eks` to trigger the upgrade.
  references:
  - type: internal-commit
    summary: 'feat(infrastructure): upgrade EKS default version to 1.33 with addon updates'
    link: b5455f09eb40dd2fac7a7fafc40fc6bbfbac5121
  - type: external-docs
    summary: 'Kubernetes v1.33: Octarine release announcement'
    link: https://kubernetes.io/blog/2025/04/23/kubernetes-v1-33-release/
  - type: external-docs
    summary: Amazon EKS Kubernetes 1.33 release notes
    link: https://docs.aws.amazon.com/eks/latest/userguide/kubernetes-versions-standard.html
  - type: issue-report
    summary: Helm chart v2.46.0 cannot be installed on a default k8s 1.33 cluster
    link: https://github.com/kubernetes-sigs/aws-ebs-csi-driver/issues/2574
  - type: external-docs
    summary: Descheduler v0.35.0 release — adds PodProtections for DefaultEvictorArgs
    link: https://github.com/kubernetes-sigs/descheduler/releases/tag/v0.35.0
  - type: issue-report
    summary: 'After upgrade to 4.12 version there is strange error appeared: annotation group StreamSnippet contains risky
      annotation'
    link: https://github.com/kubernetes/ingress-nginx/issues/12656
  impacts:
  - type: iac-module
    component: aws_eks
    summary: Default Kubernetes version upgraded to 1.33; Bottlerocket AMI and addon Helm charts updated to compatible releases
  - type: iac-module
    component: kube_aws_ebs_csi
    summary: EBS CSI driver Helm chart pinned to v2.45.1 — v2.46.0 is incompatible with K8s 1.33
  - type: iac-module
    component: kube_descheduler
    summary: DefaultEvictor config migrated from flat flags to podProtections.defaultDisabled array for descheduler v0.35.x
  - type: iac-module
    component: kube_ingress_nginx
    summary: annotations-risk-level explicitly set to Critical to restore snippet annotation support after ingress-nginx 4.12.x
  description: >-
    The default Kubernetes version has been upgraded to 1.33 (from 1.30, incrementing through 1.31 and 1.32 in this release).
    Bottlerocket AMI, all addon Helm chart versions, and the `kubectl` Terraform provider have been updated to compatible releases.
    Three compatibility fixes are bundled: (1) `aws-ebs-csi-driver` v2.46.0 cannot be installed on K8s 1.33; the chart is
    pinned to v2.45.1. (2) Descheduler v0.35.x changed the `DefaultEvictor` API — flat boolean flags were consolidated into
    a `podProtections.defaultDisabled` array. (3) Ingress-nginx v4.12.x lowered the default `annotations-risk-level` from
    `Critical` to `High`, blocking `configuration-snippet` annotations; the setting is now explicitly pinned to `Critical`.
    No user action is required for the compatibility fixes.
