    description: "Corrects the environment variable name used to skip repository setup validation in `enter-shell-local`
      from `PF_SKIP_REPO_CHECK` to `PF_SKIP_CHECK_REPO_SETUP`. Users who set `PF_SKIP_REPO_CHECK=1` must update to
      `PF_SKIP_CHECK_REPO_SETUP=1`."
  - type: "fix"
    summary: "Fixes version detection in `install.sh` for Git and Nix. Git version parsing now uses field position (`$3`)
      instead of last"
    references:
      - type: "internal-commit"
        summary: "fix: installer git checks and ignore nix warnings"
        link: "9aa5de525f498086e3f0a9f95f24cf292de8056e"
    description: "Fixes version detection in `install.sh` for Git and Nix. Git version parsing now uses field position
      (`$3`) instead of last field (`$NF`) to handle platforms where `git --version` appends extra output. Nix version
      checks now suppress stderr to prevent warning noise from interfering with version comparisons."
  - type: "fix"
    summary: "Fixes `install.sh` so that `nix` is available immediately after installation without requiring a shell
      restart. The installer now sources the"
    references:
      - type: "internal-commit"
        summary: "fix: source nix in installer"
        link: "0b66035e3ed76459ad2e1faa5150a52e509d467d"
    description: "Fixes `install.sh` so that `nix` is available immediately after installation without requiring a shell
      restart. The installer now sources the Nix daemon profile script in-process after installing Nix."
  - type: "fix"
    summary: "Fixes `install.sh` to use `nix profile install nixpkgs#direnv` instead of the deprecated `nix-env -iA
      nixpkgs.direnv` command, which is incompatible with"
    references:
      - type: "internal-commit"
        summary: "fix: repo url input for installer"
        link: "6ff1dbd263c3082b52743eba81be1edd9b42aed7"
      - type: "external-docs"
        summary: "direnv hook installation documentation"
