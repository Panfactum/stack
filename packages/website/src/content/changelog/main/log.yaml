        component: vault get-token
        summary: OIDC authentication now properly respects `--silent` mode and the browser-based login flow works correctly in
          interactive terminal sessions
      - type: devshell
        component: pf
        summary: Terragrunt config loading via `getPanfactumConfig` no longer suppresses interactive Vault OIDC login when
          running in a developer shell
  - id: 7d567255-dc1c-4cc9-b2cd-15d3cc85c070
    type: fix
    summary: Fixed `kube get-token` command to properly require the devshell environment
    description: "`pf kube get-token` is invoked by `kubectl` as an exec-plugin credential provider and depends on the `aws`
      CLI to generate EKS authentication tokens. The command was incorrectly flagged as not requiring the devshell, so
