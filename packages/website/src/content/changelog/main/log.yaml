- type: addition
  summary: Adds optional `seccomp_profile_type` to container specs in all `kube_*` workload modules, enabling per-container
    seccomp profile overrides.
  references:
  - type: internal-commit
    summary: 'feat(infrastructure): add seccomp_profile_type to container specs'
    link: c6e79ec355572f2d89ada7ceaac8b1aab481cc23
  - type: external-docs
    summary: Kubernetes seccomp profiles documentation
    link: https://kubernetes.io/docs/tutorials/security/seccomp/
  impacts:
  - type: iac-module
    component: kube_pod
    summary: New optional `seccomp_profile_type` field (default null) on each container object; when set, applies a container-level
      seccompProfile override
  - type: iac-module
    component: kube_deployment
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_daemon_set
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_stateful_set
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_cron_job
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_job
    summary: New optional `seccomp_profile_type` field on each container object
  - type: iac-module
    component: kube_buildkit
    summary: BuildKit container now sets `seccomp_profile_type = "Unconfined"` to satisfy its elevated syscall requirements
  description: Previously there was no way to override the cluster-level seccomp policy on a per-container basis. Workloads
    such as BuildKit require an `Unconfined` seccomp profile because their syscall surface (e.g., `rootlesskit` with `SYS_ADMIN`)
    exceeds what `RuntimeDefault` allows, causing silent failures or permission-denied errors at runtime. The new `seccomp_profile_type`
    field (defaulting to `null`, meaning no explicit profile override is set) allows callers to specify any valid Kubernetes
    seccomp profile type string. `kube_buildkit` uses this to set `Unconfined`, matching the existing AppArmor `unconfined`
    annotation already applied to its pod. No changes are required for existing modules that do not need a custom seccomp
    profile.
