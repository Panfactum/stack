  - type: internal-commit
    summary: 'fix: skip logic and input schema'
    link: 1a8e4add783f1ba32bc55664b3ec154a22a51e7a
  impacts:
  - type: cli
    component: sso add
    summary: Vault SSO OIDC output parsing now reads from the correct module with the correct schema
  description: 'The "Get Vault OIDC configuration" task in `setupVaultSSO` was calling `terragruntOutput` against `MODULES.VAULT_AUTH_OIDC`
    — the module being deployed — instead of the correct source module `MODULES.AUTHENTIK_VAULT_SSO + "_" + kubeConfigContext`.
    Additionally, the Zod validation schema expected flat string values (e.g., `client_id: z.string()`) when `terragruntOutput`
    returns wrapped objects (e.g., `client_id: z.object({ value: z.string() })`). Both bugs caused the Vault SSO setup step
