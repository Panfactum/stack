- id: de994766-1a79-4a61-b9cf-7a614666eef3
  type: fix
  summary: Fixes `pf` CLI exit code, `wf_dockerfile_build` scale command, and `wf_tf_deploy` sops-set-profile flags.
  references:
  - type: internal-commit
    summary: 'fix: correct error handling and CI workflow gaps'
    link: ddd7657e87f776df75cb102ec19447a732fff553
  description: 'Three fixes from the same commit: (1) The `pf` CLI now exits with code 1 on errors so callers and CI pipelines
    can detect failures reliably. (2) `wf_dockerfile_build` `scale-buildkit.sh` now calls `pf buildkit scale up` instead of
    the removed `pf buildkit resume` subcommand. (3) `wf_tf_deploy` `deploy.sh` updated to call `pf wf sops-set-profile` with
    positional arguments instead of the removed `--directory` and `--profile` flags.'
  impacts:
  - type: iac-module
    component: wf_dockerfile_build
    summary: scale-buildkit.sh now calls `pf buildkit scale up` instead of the removed `pf buildkit resume`
  - type: iac-module
    component: wf_tf_deploy
    summary: deploy.sh sops-set-profile call updated to positional argument syntax (removed --directory and --profile flags)
- id: 3ddac59b-8f07-4b08-80c3-3d1366d1e6b9
  type: improvement
  summary: '`pf wf sops-set-profile` now skips YAML parsing for non-SOPS files via a regex pre-check, reducing overhead in
    large directories.'
  references:
  - type: internal-commit
    summary: 'perf(sops-set-profile): skip YAML parsing for non-SOPS files early'
    link: 81808b61f0e73ac032b9f27700f2facbc18a9061
  impacts:
  - type: cli
    component: wf sops-set-profile
    summary: Regex pre-check added to skip full YAML parsing for files without a `sops:` key
  description: When scanning directories, most files are not SOPS-encrypted. Previously, each YAML file was fully parsed to
    detect the `sops:` key before determining whether to skip it. A `fileContains` regex check now runs first and bails out
    immediately when no `sops:` line is found, avoiding the expensive YAML parse for the majority of files. The observable
    improvement is faster execution of `pf wf sops-set-profile` on repositories with many non-encrypted YAML files.
