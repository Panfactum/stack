- id: b0f99908-394d-446c-86fc-dceeef9b4eb6
  type: improvement
  summary: '[`kube_opensearch`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch) `minimum_memory_mb`
    is now wired through to the container spec; default increased from 25 MB to 4000 MB.'
  references:
  - type: internal-commit
    summary: 'feat: improve OpenSearch memory configuration'
    link: d044ca03b10987eb7c93d42fc77f561641201a85
  - type: internal-commit
    summary: bring back website in code
    link: 6001eed85f76a8aaf53597846df50d66992e53d7
  impacts:
  - type: iac-module
    component: kube_opensearch
    summary: minimum_memory_mb now applied to container spec; default raised from 25 MB to 4000 MB to reflect real-world OpenSearch
      requirements
  description: 'Two iterative improvements to `kube_opensearch` memory configuration: first, `var.minimum_memory_mb` was wired
    into the `kube_stateful_set` container spec (it was previously ignored, with the container always using 1000 MB); the
    default and validation minimum were updated from 25 MB to 1000 MB and the variable description corrected to reference
    OpenSearch instead of Redis. In a subsequent change, the default was further raised from 1000 MB to 4000 MB to match minimum
    viable memory for stable OpenSearch operation. If you need to preserve a lower value, set `minimum_memory_mb` explicitly.'
- id: b162cbb7-0677-4181-a1bf-3d7b17cfd9bf
  type: improvement
  summary: Fixes `pf cluster add` AWS region handling and `setupVaultSSO` path, and auto-deploys Vault Federated SSO when
    Authentik is present.
  references:
  - type: internal-commit
    summary: 'fix: standardize AWS region parameter handling and improve SSO flexibility'
    link: 67143b00110420fe0253a47e18988b072350f8a0
  impacts:
  - type: cli
    component: cluster add
    summary: AWS API calls now use aws_region; Vault SSO setup uses explicit regionPath; auto-deploys Vault Federated SSO
      if Authentik present
  - type: cli
    component: sso add
    summary: Vault SSO setup now reads region config from the selected region path
  - type: iac-module
    component: authentik_vault_sso
    summary: Now deployed automatically by pf cluster add when Authentik is present
  - type: iac-module
    component: vault_auth_oidc
    summary: Now deployed automatically by pf cluster add when Authentik is present
  description: 'Two changes from the same commit: (1) Several AWS CLI and SDK calls in `pf cluster add` were receiving the
    Panfactum logical `region` directory slug instead of the actual `aws_region` code (VPC lookup, EKS addon management, EC2
    termination). All now use `aws_region`. `setupVaultSSO` was also calling `getPanfactumConfig` with `process.cwd()` instead
    of the selected region path; it now accepts an explicit `regionPath` parameter. (2) After the cluster extensions phase,
    `pf cluster add` now searches all environments for a deployed `kube_authentik` module. If found, it automatically deploys
    `authentik_vault_sso` and `vault_auth_oidc` and revokes the static Vault root token. If no Authentik deployment is found,
    the step is silently skipped.'
- id: 4571ca06-9c7f-4f47-b1cc-c508f22d7ed8
  type: addition
  summary: Adds `pf cluster enable` for enabling optional cluster features and `--cwd` flag to all `pf` CLI commands.
  description: 'Two additions from the same commit: (1) `pf cluster enable` provides a guided wizard for activating opt-in
    cluster features. The first supported feature is `ecr-pull-through-cache`, which prompts for Docker Hub and GitHub credentials,
    stores them via SOPS, deploys `aws_ecr_pull_through_cache`, and re-deploys `kube_policies` with pull-through cache enabled.
    (2) All `pf` CLI commands now accept a `--cwd` flag (also readable from the `CWD` environment variable) to override the
    working directory for repository root detection, enabling use from CI pipelines and editor integrations outside the repo
    tree.'
  references:
  - type: internal-commit
    summary: 'feat: implement cluster enable command with ECR pull-through cache support'
    link: 654a4ad80408b2347cdd87aed1623d28bb5c3725
  impacts:
  - type: cli
    component: cluster enable
    summary: New command enabling optional cluster features via a guided wizard
  - type: cli
    component: cluster add
    summary: Now respects --cwd for repository root resolution
  - type: cli
    component: config get
    summary: Now respects --cwd for repository root resolution
  - type: iac-module
    component: aws_ecr_pull_through_cache
    summary: Deployed automatically when enabling the ecr-pull-through-cache feature
  - type: iac-module
    component: kube_policies
    summary: Re-deployed with pull_through_cache_enabled set to true after ECR setup
- id: bd4ca5e9-2d13-4a87-a6d7-dfe48ba14a24
  type: improvement
  summary: '`pf cluster add` EKS deployment step now shows a 15-minute ETA warning in the task title during the apply phase.'
  references:
  - type: internal-commit
    summary: added eks time warning message
    link: 5e4d6524bb7f8d283e86f3775fdd4067f0b1d7ac
  impacts:
  - type: cli
    component: cluster add
    summary: EKS deploy step now displays a time estimate warning in the task title during planning
  description: The `buildDeployModuleTask` utility now accepts an optional `etaWarningMessage` parameter. When provided, the
    warning is appended to the "Applying - Planning changes" task title so users see a time estimate while waiting for the
    EKS module to deploy. The EKS setup step passes `'This may take up to 15 minutes.'`, improving UX for a step that can
    be unexpectedly slow.
- id: 4b30f388-7287-4c39-ac21-d50ab21fd0c8
  type: improvement
  summary: '`pf cluster enable` ECR setup now runs `terragrunt run-all apply` after enabling pull-through cache.'
  references:
  - type: internal-commit
    summary: added apply all after ecr pull through cache enable
    link: 34ee420cad0fd8bc0c5fd72674bf734b02771ca7
  impacts:
  - type: cli
    component: cluster enable
    summary: ECR setup now runs a full region-wide apply after enabling pull-through cache
  description: 'Previously the ECR enable step only re-deployed `kube_policies` after setting `pull_through_cache_enabled:
    true` in the region config. This was insufficient because many other modules reference that flag. The step now runs `terragrunt
    run-all apply` across the entire region directory, ensuring every module that depends on pull-through cache settings is
    updated in a single operation.'
- id: 6ff7eec5-54f9-4fdc-9138-d43ae085ec39
  type: improvement
  summary: '`pf sso add` now automatically opens the browser to the Authentik token settings page after creating the API token.'
  references:
  - type: internal-commit
    summary: 'feat: add automatic browser opening to Authentik token page'
    link: ce9783a125f31347aa835d2885816d0abae57807
  impacts:
  - type: cli
    component: sso add
    summary: Browser is now automatically opened to the Authentik token settings page during API token setup
  description: Previously, the `pf sso add` Authentik setup step instructed users to manually navigate to the Authentik user
    token settings page (`/if/user/#/settings;{"page":"page-tokens"}`) to copy the newly created API token. The browser is
    now opened automatically to that URL immediately after the token is created, reducing the steps required and making the
    token retrieval flow consistent with the earlier password-reset browser-open step.
- id: 748b9ad4-52f4-432c-8db2-f794b8177964
  type: improvement
  summary: '`pf sso add` Authentik root email defaults to `authentik-root@sso.<domain>`; admin email must not be the AWS root
    email.'
  references:
  - type: internal-commit
    summary: 'feat: improve Authentik setup with default root email and better instructions'
    link: f9903b9bdafe6dd44f8aeea43a75ca9b0a0a1419
  impacts:
  - type: cli
    component: sso add
    summary: Root email prompt pre-filled with authentik-root@sso.<domain>; admin email explainer improved
  description: Previously, the Authentik root user email prompt had no default value, requiring users to type a full email
    address. The prompt now pre-populates with `authentik-root@sso.<domain>` (using the selected SSO subdomain) so users can
    press Enter to accept a sensible default. The admin user email explainer has also been updated to clarify that the email
    must be unique and must not be the AWS root account email address, preventing a common setup error where users accidentally
    reuse the account root email.
- id: 66a9facf-1f8d-4fb8-be04-5f39dfc86ae9
  type: fix
  summary: Fixes `pf cluster add` EKS setup where the default cluster name was not pre-formatted, allowing invalid characters.
  references:
  - type: internal-commit
    summary: 'fix: improve cluster name handling in EKS setup'
    link: 1aed9737fed298a33b7dbfae6cb4370a8f2b472d
  impacts:
  - type: cli
    component: cluster add
    summary: EKS setup default cluster name is now pre-formatted to lowercase with hyphens
  description: The EKS cluster name prompt already applied `clusterNameFormatter` as a real-time transformer while the user
    typed, but the `default` value passed to the prompt was the raw `${environment}-${region}` string. If a user accepted
    the default without modification, the formatter was not applied to the default, so the saved cluster name could contain
    uppercase letters or underscores that violate EKS naming constraints. The default is now passed through `clusterNameFormatter`
    before being shown, ensuring the pre-filled value is always a valid, formatted cluster name.
- id: 32294577-c16f-49c5-90c1-0b2fb09f9145
  type: addition
  summary: Adds anonymous CLI usage telemetry via PostHog and a new `panfactum.user.yaml` per-user config file.
  references:
  - type: internal-commit
    summary: 'feat: add anonymous usage tracing'
    link: 5d6c7ee80a7966988687ca691f5080b28599c772
  impacts:
  - type: cli
    component: welcome
    summary: Now generates a UUID user_id on first run and stores it in panfactum.user.yaml; fires a PostHog installation
      event
  - type: configuration
    component: panfactum.user.yaml
    summary: New optional per-user config file; values merged on top of panfactum.yaml and gitignored automatically
  - type: cli
    component: devshell sync
    summary: '*.user.yaml files are now added to the root and environments gitignore entries'
  description: 'Two related additions for user-specific configuration and telemetry: (1) `pf` CLI now fires a `cli-start`
    PostHog telemetry event on each invocation when a `user_id` is present in the Panfactum repo variables. The `user_id`
    is a UUID generated by `pf welcome` on first DevShell setup. All telemetry is anonymous; no personally identifiable information
    is collected. (2) `panfactum.user.yaml` is a new optional per-user configuration file alongside `panfactum.yaml`. Its
    values are merged on top of `panfactum.yaml` at read time for user-specific settings. The file is automatically gitignored
    by `pf devshell sync`.'
- id: d3e867c6-a220-4d8a-be29-789893991087
  type: fix
  summary: Fixes `pf` CLI usage telemetry to fire after command parsing so that command path and flags are captured.
  references:
  - type: internal-commit
    summary: 'fix: move usage tracking from context to command execution'
    link: d7e596c735284934c4000156cdce6ede26dedf5f
  description: The `cli-start` PostHog event was previously fired inside `createPanfactumContext`, before the command had
    been fully processed. At that point `proc.path`, `proc.help`, and other command-level properties were not yet available,
    so the event carried no useful context. The tracking call has been moved to the main entry point after `cli.process()`
    completes, and the event now records the command path, help flag, debug flag, and working directory alongside the `user_id`.
- id: c71df44a-91c3-4459-8077-9671352133b8
  type: fix
  summary: Fixes [`kube_opensearch`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch) dashboard
