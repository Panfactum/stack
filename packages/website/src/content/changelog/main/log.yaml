  description: 'Two `pf env add` improvements from the same commit: (1) `pf env add` can now resume an interrupted installation
    without repeating completed steps. The command detects whether an AWS account was already provisioned, restores previously-selected
    primary and secondary regions from config, and offers to copy region configuration from another existing environment.
    AWS account creation is now performed directly via the AWS SDK before the IaC module is applied, enabling retry with a
    different email on duplicate-email errors from AWS Organizations. (2) The phone number pre-fill fetched from the AWS Account
    API is now formatted with dashes (e.g., 555-555-5555) instead of dots.'
- id: b40deacb-6f87-4522-8f9f-03fc413c7346
