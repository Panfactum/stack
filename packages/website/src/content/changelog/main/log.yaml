  description: The `read_verbs` local variable in `kube_policies/rbac.tf` was accidentally set to the same value as `all_verbs`,
    giving the `reader` and `restricted_reader` ClusterRoles full write access to non-secret resources. This fix corrects
    `read_verbs` to `["get", "list", "watch"]` so that read-only roles can no longer create, delete, patch, or update cluster
    resources. Re-apply `kube_policies` to receive the corrected RBAC permissions.
  action_items:
