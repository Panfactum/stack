  - id: 822ad2a1-f271-4cdd-b7bf-09b772132c55
    type: fix
    summary: Fixed concurrent Vault OIDC authentication failures when multiple processes attempt login simultaneously
    description: Previously, `vault login -method=oidc` bound its OAuth2 callback listener to a fixed port (`8250`), causing
      resource contention when multiple processes attempted OIDC authentication in parallel, such as during concurrent
      Terragrunt runs. This resulted in all authentication attempts except the first one failing with port binding
      conflicts. The fix allocates a dynamic ephemeral port for each authentication session, eliminating the conflict
      entirely and allowing parallel authentication flows to succeed.
    references:
      - type: internal-commit
        summary: "fix(vault): use dynamic port for OIDC login callback listener"
        link: 5b0a4cc9a59c841bd558a42f016727b1d74bfa50
      - type: issue-report
        summary: Vault OIDC authentication fails when used simultaneously by multiple users on shared machine (port 8250
          conflict)
        link: https://github.com/hashicorp/vault/issues/15421
      - type: external-docs
        summary: Vault JWT/OIDC auth method — OIDC login CLI port parameter documentation
        link: https://developer.hashicorp.com/vault/docs/auth/jwt
    impacts:
      - type: cli
        component: vault get-token
        summary: Now supports concurrent OIDC authentication sessions without port binding conflicts
  - id: 58d69c0a-50c3-4a45-9754-7d666844378d
    type: fix
    summary: Fixed `authentik_github_sso` `sso_post_url` output returning the wrong SAML binding URL, breaking GitHub SSO
      configuration.
    description: The `sso_post_url` output was incorrectly returning `url_sso_redirect` (the HTTP-Redirect binding URL)
      instead of `url_sso_post` (the HTTP-POST binding URL). GitHub's SAML SSO configuration requires the HTTP-POST
      binding and uses the `sso_post_url` value as the "Sign on URL" in the Authentication security settings. Supplying
      the redirect URL in this field causes SAML authentication to fail, and the error is not always obvious because the
      URL format looks superficially correct. This fix ensures the output returns the POST binding URL, which is what
      GitHub actually validates and uses.
    references:
      - type: internal-commit
        summary: "fix(authentik_github_sso): had the wrong output which caused confusion during setup"
        link: bfc83fb51c7a1eac473533c10120ba0cee78cbc9
