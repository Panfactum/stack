    into dedicated factory functions (`getAccountClient`, `getIAMClient`, `getS3Client`, `getRoute53DomainsClient`, `getOrganizationsClient`,
    `getSTSClient`) that each read credentials from disk when available, bypassing the provider cache and resolving credential
    failures across `pf env add` and `pf domain add` workflows. (2) `pf welcome` no longer displays onboarding content when
    invoked from `install.sh` before an `.envrc` file is present. Previously the command only checked for a missing `installation_id`;
    the screen is now suppressed when `.envrc` does not yet exist.'
