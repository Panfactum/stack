  - id: 7f98e554-9a85-4211-acf1-f78651b091c9
    type: fix
    summary: Fixed Authentik restart process in `sso add` command to wait for deployment rollout completion before
      proceeding to user setup.
    description: Previously the restart task triggered a rollout but returned immediately, allowing subsequent setup steps
      to run against pods that were still cycling. This could cause flaky failures when the next steps tried to interact
      with Authentik before it was healthy. Added `kubectl rollout status` with a 10m timeout to block until the
      deployment is confirmed ready, and added per-substep task title updates so operators can see which phase of the
      restart is active.
