  - type: "fix"
    summary: "Fixes a logic bug in `install.sh` where the direnv hook condition used the wrong boolean operator. The
      condition now correctly"
    references:
      - type: "internal-commit"
        summary: "fix: direnv installer"
        link: "fd8126dddc92d163f8080babaf07558568606fee"
      - type: "internal-commit"
        summary: "fix: direnv hook check"
        link: "7b1091c71ab8443e201aa32e95bd7a609ad29e43"
    description: "Fixes a logic bug in `install.sh` where the direnv hook condition used the wrong boolean operator. The
      condition now correctly uses `&&` so the hook is only appended when the shell config path is identified AND the
      config file exists, preventing attempts to write to a non-existent path."
  - type: "improvement"
    summary: "Improves UX in `install.sh` during direnv installation and DevShell build. Direnv installation now shows
      colored success and error output with"
    references:
      - type: "internal-commit"
        summary: "fix: direnv installer"
        link: "fd8126dddc92d163f8080babaf07558568606fee"
    description: "Improves UX in `install.sh` during direnv installation and DevShell build. Direnv installation now shows
      colored success and error output with captured logs on failure. The `pf-update` build step now prints a \"Still
      building...\" progress indicator every 10 seconds so users know the process has not stalled."
  - type: "fix"
    summary: "Fixes `install.sh` to automatically detect the user's shell (bash or zsh), append the direnv hook to the
      appropriate shell config"
    references:
      - type: "internal-commit"
        summary: "fix: auto-append direnv hook to shell config in install.sh"
        link: "eb60e19e23fe6b4013d109d35121ac875c472618"
    description: "Fixes `install.sh` to automatically detect the user's shell (bash or zsh), append the direnv hook to the
      appropriate shell config file (`~/.bashrc` or `~/.zshrc`) if it is missing, and exit with instructions to restart
      the shell before continuing."
  - type: "fix"
    summary: "Fixes shell config file detection in `install.sh` for direnv hook installation. The installer now detects
      which shell config file (`~/.zshrc`"
    references:
      - type: "internal-commit"
        summary: "fix: direnv hook installer"
        link: "486c6c56ce10edc26253d6a52f789859230978ab"
    description: "Fixes shell config file detection in `install.sh` for direnv hook installation. The installer now detects
      which shell config file (`~/.zshrc` or `~/.bashrc`) exists on disk rather than inspecting
      `$ZSH_VERSION`/`$BASH_VERSION` shell variables, which could fail when the script is run from a shell other than
      the user's primary one. Zsh is preferred when both config files are present. Also tightens the hook-append guard
      to skip the write when no config file was found, preventing attempts to append to an unresolved path."
  - type: "improvement"
    summary: "The `pf cluster add` command now supports fine-grained step resumability, configuration caching, and improved
