    type: improvement
    summary: Extended default authentication session duration from 8 hours to 30 days in `authentik_core_resources`, keeping
      recovery flow sessions at 8 hours.
    description: Users were being logged out every 8 hours, requiring multiple daily re-authentications. The 30-day session
