  - id: 27feafcb-30f5-4bc4-9517-83ceefbd695f
    type: fix
    summary: Fixed Vault OIDC browser login silently suppressed and `--silent` not blocking interactive prompts in `pf vault
      get-token`
    description: "There were two distinct bugs. First, `getPanfactumConfig` called `getVaultToken` with `silent=true`, which
      caused the OIDC browser login to be suppressed whenever Terragrunt loaded region config — even in interactive
      developer sessions where authentication should be permitted. Second, `performOIDCLogin` did not pass `stdin:
      'inherit'` to the `vault login -method=oidc` subprocess, preventing the interactive browser flow from working
      correctly in terminals. Both are now fixed: `getPanfactumConfig` passes `silent=false`, and `performOIDCLogin`
      inherits `stdin` and streams `stderr` through the logger. An early `throw` was also added in `getVaultToken` so
      that callers that explicitly request `silent=true` get a clean `CLIError` instead of falling through to the
      interactive OIDC prompt."
    references:
      - type: internal-commit
        summary: "fix(vault): fix interactive OIDC login and silent mode behavior"
        link: 68eb0373a2032ee75a41aa01daa8df140cc9d676
    impacts:
