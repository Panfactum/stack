      `pf cluster install` now tracks the cert manager deployment (`certManagerDeployment`)
      as its own resumable checkpoint and deploys `kube_cert_manager` via a Vault proxy
      connection, consistent with how other modules are deployed during cluster installation.
    description: >-
      The cert management install step has been refactored to use the same `deployModule`
      abstraction as other steps (e.g., Vault). This means the cert manager deployment
      now has its own fine-grained checkpoint so that if the step fails partway through,
      subsequent runs will skip directly to the cert manager step rather than restarting
      the full cert management phase from scratch.
