    component: enter-shell-local
    summary: TERRAGRUNT_DOWNLOAD, TERRAGRUNT_FETCH_DEPENDENCY_OUTPUT_FROM_STATE, and TERRAGRUNT_FORWARD_TF_STDOUT renamed
