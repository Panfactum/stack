  - id: a74b231a-9dbe-4fcc-a8dc-9c01a2297e35
    type: fix
    summary: Fixed `prek` hook installation and autofix detection in multi-worktree Git setups and switched Nix formatter to
      `nixfmt`
    description: |
      Three related issues with the development environment were corrected:

      1. `prek` exits non-zero on both autofixes and real errors, making it impossible to tell them apart. The
         `hook-stop-lint.sh` script now hashes all changed files before running `prek`; if the files are unchanged
         after a failure it is a real error, and if they changed an autofix occurred and `prek` re-runs to confirm
         resolution.

      2. `prek install -c <abs-path>` baked the installing worktree's config path into the shared bare-repo hook,
         so commits from other worktrees silently used the wrong `.pre-commit-config.yaml`. The `-c` flag was
         dropped so `prek` resolves the config from the active worktree at hook-execution time. `core.hooksPath`
         is also unset to prevent stale local overrides from interfering.

      3. The Nix formatter was switched from `nixfmt-rfc-style` to `nixfmt`, and `bun.nix` (a generated file) is
         now excluded from formatting to avoid noisy spurious reformats on every commit.
    references:
      - type: internal-commit
        summary: "fix(dev-tooling): fix prek hooks and worktree install behavior"
        link: 7d52bf149064f1f8348420a2db8ae77331d48ac4
      - type: external-docs
        summary: prek — faster pre-commit alternative used for Panfactum's git hooks
        link: https://github.com/j178/prek
    impacts:
      - type: devshell
        component: git
        summary: "`prek` hooks now work correctly across multiple Git worktrees and reliably distinguish autofix runs from real
          errors"
      - type: devshell
        component: enter-shell-local
        summary: Drops `-c` from `prek install` and unsets `core.hooksPath` so each worktree uses its own
          `.pre-commit-config.yaml`
  - id: 42092845-9963-48ed-83d1-2de41c294c14
    type: fix
    summary: Fixed `kube_ingress_nginx` pods failing to start during cluster bootstrap due to instance-type anti-affinity
      constraints
    description: During cluster bootstrap, the autoscaler isn't running yet and only the EKS controller node group exists
      (single `t4g.large` instance type), but SLA-3 clusters require NGINX ingress pods on 3 different instance types
      via anti-affinity rules. This left ingress pods in `Pending` state indefinitely, blocking the entire inbound
      networking bootstrap process. The fix adds a `bootstrap_mode_enabled` parameter to `kube_ingress_nginx` to
      temporarily disable instance-type anti-affinity during initial deployment; the `cluster add` command automatically
      re-enables it once the cluster is fully operational and diverse node pools are available.
    references:
      - type: internal-commit
        summary: "feat(kube_ingress_nginx): add bootstrap mode to skip instance anti-affinity"
        link: e6966a7265c57c351bf4bff88fa8b56cd6e1ce53
