# Unreleased changes for the next edge release.
# Add new changes here as they are developed.
summary: "Introduces dedicated DNS zones for cluster management, consolidates certificate modules, adds KEDA for autoscaling, launches the new Panfactum CLI tool, and restructures several AWS modules for better configuration management."
upgrade_instructions: upgrade.mdx
highlights:
  - "New `pf` CLI tool — run `pf devshell sync` then `terragrunt run-all apply` to initialize"
  - "`kube_cert_manager` and `kube_cert_issuers` consolidated into new `kube_certificates` module — state migration required"
  - "KEDA added to base cluster — install via [`kube_keda`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_keda)"
  - "Kubernetes default version updated to 1.31"
  - "`burstable_nodes_enabled` now defaults to `true` for all modules"
changes:
  - type: breaking_change
    summary: >-
      Every cluster now requires a dedicated DNS zone for hosting control-plane utilities. `kube_domain` is a
      new required configuration value in `region.yaml` for every region housing a Kubernetes cluster. It must
      be a subdomain of a domain available to the environment.
    action_items:
      - "Add a `kube_domain` field to `region.yaml` for every region that contains a Kubernetes cluster. The value must be a subdomain of a domain already available in the environment (e.g., `kube.example.com` if `example.com` is managed)."
      - "Deploy the corresponding DNS zone via `aws_dns_zones` before applying cluster modules."
    impacts:
      - type: configuration
        component: region.yaml
        summary: New required kube_domain field for cluster DNS zones
  - type: breaking_change
    summary: >-
      We now create the Authentik email template in `kube_authentik`. The organization name is now a required input.
      Use the new `organization_name` output from `kube_authentik` as an input to `authentik_core_resources`.
    action_items:
      - "Add the `organization_name` variable to your `kube_authentik` module configuration."
      - "Wire the `organization_name` output from `kube_authentik` into the `authentik_core_resources` module as an input via a `dependency` block."
    impacts:
      - type: iac-module
        component: kube_authentik
        summary: Organization name now required input; produces email template
      - type: iac-module
        component: authentik_core_resources
        summary: Must now consume organization_name output from kube_authentik
  - type: breaking_change
    summary: >-
      `kube_cert_manager` and `kube_cert_issuers` have been consolidated into a single `kube_certificates` module
      to address various race conditions on cluster installation. See upgrade instructions for the state migration
      steps.
    action_items:
      - "Create a new `kube_certificates` module deployment."
      - "Migrate the Terraform state from both `kube_cert_manager` and `kube_cert_issuers` into the new module."
      - "Remove the old module directories after confirming the migration succeeds."
      - "Follow the detailed state migration steps in the upgrade instructions."
    impacts:
      - type: iac-module
        component: kube_cert_manager
        summary: Deprecated and consolidated into kube_certificates
      - type: iac-module
        component: kube_cert_issuers
        summary: Deprecated and consolidated into kube_certificates
      - type: iac-module
        component: kube_certificates
        summary: New module replacing kube_cert_manager and kube_cert_issuers
  - type: breaking_change
    summary: >-
      KEDA is now included in the base Panfactum cluster and modules assume it is installed.
      See the installation instructions [here](/docs/edge/guides/bootstrapping/autoscaling/#deploy-keda).
    action_items:
      - "Deploy the `kube_keda` module in every cluster following the [installation guide](/docs/edge/guides/bootstrapping/autoscaling/#deploy-keda). This must be done before applying other modules that now depend on KEDA being present."
    impacts:
      - type: iac-module
        component: kube_keda
        summary: Now required as part of base cluster installation
  - type: breaking_change
    summary: >-
      `burstable_nodes_enabled` now defaults to `true` for all modules. This fixes the broken default introduced
      in `edge.25-03-26`.
    description: >-
      If you explicitly set `burstable_nodes_enabled = false` in any module, no action is needed. Otherwise,
      review your workloads to confirm they are compatible with burstable (T-family) instances, which are now
      used by default.
  - type: breaking_change
    summary: >-
      Contact information variables on
      [`aws_account`](/docs/edge/reference/infrastructure-modules/direct/aws/aws_account) and
      [`aws_registered_domains`](/docs/edge/reference/infrastructure-modules/direct/aws/aws_registered_domains)
      have been consolidated to single objects for each contact.
    action_items:
      - "Replace the individual contact field variables (e.g., `contact_first_name`, `contact_last_name`, etc.) with the new consolidated contact objects in your `aws_account` and `aws_registered_domains` module configurations."
      - "Refer to the updated module reference docs for the exact object structure."
    impacts:
      - type: iac-module
        component: aws_account
        summary: Contact variables consolidated into single objects per contact
      - type: iac-module
        component: aws_registered_domains
        summary: Contact variables consolidated into single objects per contact
  - type: breaking_change
    summary: >-
      Inputs to [`aws_dns_zones`](/docs/edge/reference/infrastructure-modules/direct/aws/aws_dns_zones) have been
      consolidated to a single `domains` object for better per-domain granular configuration.
    action_items:
      - "Migrate your `aws_dns_zones` inputs from separate domain list variables to the new `domains` object. Each key in the object is a domain name, and the value contains per-domain configuration."
      - "See the [module reference](/docs/edge/reference/infrastructure-modules/direct/aws/aws_dns_zones) for the new input schema."
    impacts:
      - type: iac-module
        component: aws_dns_zones
        summary: Inputs consolidated into single domains object
  - type: breaking_change
    summary: >-
      The backup vault name in
      [`tf_bootstrap_resources`](/docs/edge/reference/infrastructure-modules/direct/aws/tf_bootstrap_resources)
      now has a unique suffix. **Manually delete the existing `terraform-<env_name>` backup vault before applying
      the updated module.**
    action_items:
      - "In the AWS console (or via CLI), manually delete the existing AWS Backup vault named `terraform-<env_name>` in each environment."
      - "Re-apply the `tf_bootstrap_resources` module, which will create the replacement vault with the new uniquely-suffixed name."
    impacts:
      - type: iac-module
        component: tf_bootstrap_resources
        summary: Backup vault name now includes unique suffix; manual deletion required
  - type: breaking_change
    summary: >-
      This release adds the new `pf` CLI tool. After completing all other migration steps, run `pf devshell sync`
      and then `terragrunt apply` on all modules.
    action_items:
      - "Run `pf devshell sync` to initialize the new CLI tool's local configuration."
      - "Run `terragrunt run-all apply` across all modules to propagate the changes introduced by the sync."
    impacts:
      - type: cli
        component: devshell sync
        summary: New command to sync devshell configuration
      - type: devshell
        component: pf
        summary: New CLI tool added to the devshell
  - type: breaking_change
    summary: >-
      The default Kubernetes version has been updated to 1.31 from 1.30.
    action_items:
      - "Review the [Kubernetes 1.31 changelog](https://github.com/kubernetes/kubernetes/blob/master/CHANGELOG/CHANGELOG-1.31.md) for any deprecated APIs or behavior changes that affect your workloads."
      - "If you pin `kube_version` explicitly, update it to `1.31`. Otherwise, re-apply `aws_eks` to trigger the upgrade."
    impacts:
      - type: iac-module
        component: aws_eks
        summary: Default Kubernetes version updated to 1.31
  - type: addition
    summary: >-
      Adds the [`kube_job`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_job) submodule
      for running one-off Jobs as part of module deployment processes (e.g., database migrations).
    description: >-
      No action required. The `kube_job` submodule is available for use in your custom modules when you need to
      run one-off tasks during deployments.
    impacts:
      - type: iac-module
        component: kube_job
        summary: New submodule for running one-off Kubernetes Jobs
  - type: addition
    summary: >-
      Adds [KEDA](https://keda.sh/) to the base cluster installation via the
      [`kube_keda`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_keda) module.
    action_items:
      - "Deploy the `kube_keda` module as part of your cluster bootstrap process. See the related breaking change entry for installation order details."
    impacts:
      - type: iac-module
        component: kube_keda
        summary: New module for deploying KEDA autoscaler
  - type: addition
    summary: >-
      Adds `sub_paths` to `config_map_mounts` and `secret_mounts` inputs in all applicable Panfactum submodules
      for more granular control over mounted files.
    description: >-
      No action required. If you need to mount individual files from a ConfigMap or Secret rather than the entire
      volume, you can now specify `sub_paths` in the mount configuration.
  - type: addition
    summary: >-
      Adds `backup:TagResource` to
      [`tf_bootstrap_resources`](/docs/edge/reference/infrastructure-modules/direct/aws/tf_bootstrap_resources)
      to address [AWS Notification](https://github.com/Panfactum/stack/issues/291).
    action_items:
      - "Re-apply `tf_bootstrap_resources` to receive the updated IAM policy."
    impacts:
      - type: iac-module
        component: tf_bootstrap_resources
        summary: Added backup:TagResource permission to IAM policy
  - type: fix
    summary: >-
      Fixed Kubernetes RBAC issues: addressed problems with EKS access entries preventing proper permission grants
      and updated RBAC policies to incorporate new CRDs added since the last stable release.
    action_items:
      - "Re-apply `aws_eks` to receive the corrected access entry permissions and updated RBAC policies."
    references:
      - type: issue-report
        summary: "EKS access entries preventing proper RBAC permission grants"
        link: https://github.com/Panfactum/stack/issues/311
    impacts:
      - type: iac-module
        component: aws_eks
        summary: Fixed access entry permissions and updated RBAC for new CRDs
  - type: fix
    summary: >-
      Fixed issue where AWS SSO sessions would not automatically sync across profiles, resulting in unnecessary
      SSO login prompts. Now only one SSO login is required for all AWS profiles.
    action_items:
      - "Run `pf devshell sync` to regenerate your AWS config files with the corrected SSO session handling."
    references:
      - type: issue-report
        summary: "AWS SSO sessions not syncing across profiles"
        link: https://github.com/Panfactum/stack/issues/221
  - type: fix
    summary: >-
      Fixes the default value for `min_node_cpu` of
      [`kube_karpenter_node_pools`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_karpenter_node_pools).
    action_items:
      - "Re-apply `kube_karpenter_node_pools` to pick up the corrected default."
      - "If you previously set `min_node_cpu` explicitly to work around this issue, you can remove the override."
    impacts:
      - type: iac-module
        component: kube_karpenter_node_pools
        summary: Fixed incorrect default value for min_node_cpu
  - type: fix
    summary: >-
      Addressed an issue that slowed down node bootstrapping due to self-imposed rate-limits on image pulling.
    description: >-
      No action required. Nodes will bootstrap faster automatically after upgrading.
  - type: fix
    summary: >-
      Fixes private repo authentication in
      [`wf_dockerfile_build`](/docs/edge/reference/infrastructure-modules/submodule/workflow/wf_dockerfile_build).
    action_items:
      - "Re-apply any modules that use `wf_dockerfile_build` with private repositories to receive the fix."
    references:
      - type: internal-commit
        summary: "fix: wf_dockerfile_build private repo auth"
        link: 36018714e101bc216537a8eb6dfc1854c60cfe01
      - type: internal-commit
        summary: "fix: wf_dockerfile_build private repo auth (correct variable names)"
        link: 8fe2e40a5f3174679470209208133a32698a2f66
    impacts:
      - type: iac-module
        component: wf_dockerfile_build
        summary: Fixed private repository authentication
  - type: fix
    summary: >-
      Adds missing `lifetime_evictions_enabled` input to
      [`kube_stateful_set`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_stateful_set).
    description: >-
      No action required. If you need to control lifetime evictions for StatefulSets, you can now set the
      `lifetime_evictions_enabled` input on `kube_stateful_set`.
    impacts:
      - type: iac-module
        component: kube_stateful_set
        summary: Added missing lifetime_evictions_enabled input
  - type: fix
    summary: >-
      Adds additional AAAA record for IPv6 support for
      [`aws_cdn`](/docs/edge/reference/infrastructure-modules/submodule/aws/aws_cdn).
    action_items:
      - "Re-apply any modules that use `aws_cdn` to create the AAAA record."
    references:
      - type: internal-commit
        summary: "Adds additional AAAA record for IPv6 support for aws_cdn"
        link: 5a39ffe25bc2abac97a76b802195f4935acd1126
    impacts:
      - type: iac-module
        component: aws_cdn
        summary: Added AAAA record for IPv6 support
  - type: fix
    summary: >-
      Addresses invalid policy document format for the DNSSEC KMS keys in
      [`aws_dnssec`](/docs/edge/reference/infrastructure-modules/submodule/aws/aws_dnssec).
    action_items:
      - "Re-apply any modules that use `aws_dnssec` to receive the corrected KMS key policy."
    impacts:
      - type: iac-module
        component: aws_dnssec
        summary: Fixed invalid DNSSEC KMS key policy document format
  - type: improvement
    summary: >-
      Stable releases are now open to all users. The stable release format has been updated to
      `stable.<YY-MM>.<patch>` (e.g., `stable.25-04.0`), the support window is six months from initial release,
      and new stable channels will align with Kubernetes releases (~three per year).
    description: >-
      Previously, stable releases were only available to stack subscribers. Stable releases are now publicly available
      to all users of the Panfactum framework. The release naming convention has also changed: stable releases
      now use the format `stable.<YY-MM>.<patch>` instead of the previous `<YY-MM>.<patch>`. The support window
      has been updated to six months from the initial release date (previously twelve months). New stable release
      channels will be created roughly three times per year, aligned with new Kubernetes releases.
    references:
      - type: internal-commit
        summary: "Open stable releases to all users and update release format, cadence, and support policy"
        link: 70491731293c2383488a1ca9bd68f93f6bcc8c27
      - type: internal-docs
        summary: "Versioning and releases documentation"
        link: /docs/main/guides/versioning/releases
  - type: addition
    summary: >-
      Adds a new `install.sh` bootstrapper script under `packages/installer` that automates the full initial setup
      of a Panfactum infrastructure repository: platform and prerequisite checks, Nix and direnv installation,
      `flake.nix` and `panfactum.yaml` generation, DevShell build, and `direnv allow` — all in a single command.
    description: >-
      New users can run this installer script to go from zero to a fully operational Panfactum DevShell in one step.
      The script validates prerequisites (Git >= 2.40, Nix >= 2.23, direnv >= 2.32), installs missing dependencies
      where possible, creates `flake.nix` and `panfactum.yaml` with interactive prompts, builds the Panfactum DevShell
      via `pf-update`, and activates direnv. The script is idempotent — re-running it safely skips steps that are
      already complete. Repository URLs are validated to require HTTPS format, and SSH remote URLs are automatically
      converted to HTTPS.
    references:
      - type: internal-commit
        summary: "chore: creates initial panfactum installer"
        link: 74bc98bf931abfee89143015332bd3261cefcb59
      - type: internal-commit
        summary: "feat(installer): complete end-to-end install flow with flake.nix, pf-update, and direnv allow"
        link: e7ade5824f74f7dc6a778514a23c7da891c3a4fb
  - type: improvement
    summary: >-
      The `enter-shell-local` devshell script now respects the `PF_SKIP_CHECK_REPO_SETUP=1` environment variable,
      allowing users to bypass the `pf-check-repo-setup` validation step when entering a local devshell.
    description: >-
      Setting `PF_SKIP_CHECK_REPO_SETUP=1` before entering the devshell skips the repository setup check, which is
      useful during initial bootstrapping (e.g., when using the new installer script) before a fully configured
      repository is in place.
    references:
      - type: internal-commit
        summary: "chore: creates initial panfactum installer"
        link: 74bc98bf931abfee89143015332bd3261cefcb59
    impacts:
      - type: devshell
        component: enter-shell-local
        summary: Supports PF_SKIP_CHECK_REPO_SETUP=1 to bypass repo setup validation on shell entry
  - type: fix
    summary: >-
      Fixes user input prompts in `install.sh` when the script is run via a pipe (e.g., `curl … | sh`).
      The installer now reads input directly from `/dev/tty` so interactive prompts work correctly
      regardless of how stdin is connected. Prompts are also highlighted in yellow for better visibility.
    description: >-
      Previously, the `create_panfactum_yaml` prompts for repository URL, repository name, and primary
      branch would hang or fail silently when stdin was not attached to a terminal (e.g., when the
      installer was invoked via `curl … | sh`). The fix redirects each `read` call to use `/dev/tty`
      directly (`read -r … </dev/tty`), which reliably captures keyboard input regardless of how the
      script's stdin stream is connected. User-facing prompts are now rendered in yellow for improved
      readability.
    references:
      - type: internal-commit
        summary: "fix: installer user input via pipe"
        link: dd6a76203cec41092a81ea963b513732159f5a70
      - type: internal-commit
        summary: "fix: installer user input via pipe - take 2"
        link: ab63aee9dfda4b84b936583c229ff68d3d14a204
  - type: fix
    summary: >-
      Corrects the environment variable name used to skip repository setup validation in `enter-shell-local`
      from `PF_SKIP_REPO_CHECK` to `PF_SKIP_CHECK_REPO_SETUP`. Users who set `PF_SKIP_REPO_CHECK=1` must
      update to `PF_SKIP_CHECK_REPO_SETUP=1`.
    action_items:
      - "If you previously set `PF_SKIP_REPO_CHECK=1` to skip the repo setup check, update your environment to use `PF_SKIP_CHECK_REPO_SETUP=1` instead."
    references:
      - type: internal-commit
        summary: "fix: PF_SKIP_CHECK_REPO_SETUP"
        link: a9b39c8b808f69cf147c83342fecf49404bad8f3
    impacts:
      - type: devshell
        component: enter-shell-local
        summary: Renamed PF_SKIP_REPO_CHECK to PF_SKIP_CHECK_REPO_SETUP
  - type: fix
    summary: >-
      Fixes version detection in `install.sh` for Git and Nix. Git version parsing now uses field position
      (`$3`) instead of last field (`$NF`) to handle platforms where `git --version` appends extra output.
      Nix version checks now suppress stderr to prevent warning noise from interfering with version comparisons.
    references:
      - type: internal-commit
        summary: "fix: installer git checks and ignore nix warnings"
        link: 9aa5de525f498086e3f0a9f95f24cf292de8056e
  - type: fix
    summary: >-
      Fixes `install.sh` so that `nix` is available immediately after installation without requiring
      a shell restart. The installer now sources the Nix daemon profile script in-process after installing Nix.
    references:
      - type: internal-commit
        summary: "fix: source nix in installer"
        link: 0b66035e3ed76459ad2e1faa5150a52e509d467d
  - type: fix
    summary: >-
      Fixes `install.sh` to use `nix profile install nixpkgs#direnv` instead of the deprecated
      `nix-env -iA nixpkgs.direnv` command, which is incompatible with the flake-enabled Nix installed
      by the Determinate Systems installer. Also updates the direnv hook error message to link to the
      official direnv hook documentation instead of generating a shell-specific command.
    references:
      - type: internal-commit
        summary: "fix: repo url input for installer"
        link: 6ff1dbd263c3082b52743eba81be1edd9b42aed7
      - type: external-docs
        summary: "direnv hook installation documentation"
        link: https://direnv.net/docs/hook.html
  - type: fix
    summary: >-
      Fixes `install.sh` so that the repository name default prompt is correctly derived from the
      entered repository URL. Previously, the wrong variable (`$default_repo_url`) was used, causing
      the default name to always be empty.
    references:
      - type: internal-commit
        summary: "fix: default repo name for installer"
        link: 7be27a540ce6a3c7ca1fd52f65d4962ade472045
  - type: fix
    summary: >-
      Fixes a logic bug in `install.sh` where the direnv hook condition used the wrong boolean
      operator. The condition now correctly uses `&&` so the hook is only appended when the shell
      config path is identified AND the config file exists, preventing attempts to write to a
      non-existent path.
    references:
      - type: internal-commit
        summary: "fix: direnv installer"
        link: fd8126dddc92d163f8080babaf07558568606fee
      - type: internal-commit
        summary: "fix: direnv hook check"
        link: 7b1091c71ab8443e201aa32e95bd7a609ad29e43
  - type: improvement
    summary: >-
      Improves UX in `install.sh` during direnv installation and DevShell build. Direnv installation
      now shows colored success and error output with captured logs on failure. The `pf-update` build
      step now prints a "Still building..." progress indicator every 10 seconds so users know the
      process has not stalled.
    references:
      - type: internal-commit
        summary: "fix: direnv installer"
        link: fd8126dddc92d163f8080babaf07558568606fee
  - type: fix
    summary: >-
      Fixes `install.sh` to automatically detect the user's shell (bash or zsh), append the direnv
      hook to the appropriate shell config file (`~/.bashrc` or `~/.zshrc`) if it is missing, and
      exit with instructions to restart the shell before continuing.
    references:
      - type: internal-commit
        summary: "fix: auto-append direnv hook to shell config in install.sh"
        link: eb60e19e23fe6b4013d109d35121ac875c472618
  - type: fix
    summary: >-
      Fixes shell config file detection in `install.sh` for direnv hook installation. The installer
      now detects which shell config file (`~/.zshrc` or `~/.bashrc`) exists on disk rather than
      inspecting `$ZSH_VERSION`/`$BASH_VERSION` shell variables, which could fail when the script
      is run from a shell other than the user's primary one. Zsh is preferred when both config files
      are present. Also tightens the hook-append guard to skip the write when no config file was
      found, preventing attempts to append to an unresolved path.
    references:
      - type: internal-commit
        summary: "fix: direnv hook installer"
        link: 486c6c56ce10edc26253d6a52f789859230978ab
  - type: improvement
    summary: >-
      The `pf cluster install` command now supports fine-grained step resumability, configuration
      caching, and improved error handling. Interrupted installs can resume from the last completed
      sub-step rather than restarting the entire phase, and user-provided inputs (VPC name, cluster
      name, domains, etc.) are persisted to the config file so they are not re-prompted on retry.
    description: >-
      Previously, if `pf cluster install` failed partway through a phase (e.g., autoscaling), the
      entire phase would restart from scratch on the next run. The command now tracks each sub-step
      individually (e.g., metrics server setup, VPA setup, Karpenter setup) and skips steps that
      already completed. Errors are also written to a debug file for easier troubleshooting. This
      makes the cluster installation process significantly more resilient to transient failures.
    references:
      - type: internal-commit
        summary: "CLI improvements (#330)"
        link: 733c3c8cf4b9c33e17adc99f6527108c58713144
  - type: breaking_change
    summary: >-
      The `pf install-cluster` CLI command has been renamed to `pf cluster install`. Any scripts
      or documentation referencing the old command must be updated.
    action_items:
      - "Replace all invocations of `pf install-cluster` with `pf cluster install` in your scripts, CI pipelines, and runbooks."
    references:
      - type: internal-commit
        summary: "refactor: rename install-cluster to cluster install"
        link: 8c03b01043302de2bced3649ebf6e7cc112be3b1
  - type: addition
    summary: >-
      Adds the `pf config get` CLI command, which reads and merges Panfactum configuration
      from all applicable `global.yaml`, `environment.yaml`, `region.yaml`, and `module.yaml`
      files for the current directory and outputs the resolved configuration as JSON.
    description: >-
      This command is useful for debugging configuration issues: it shows exactly which
      settings are active by merging all configuration sources in precedence order.
      It also exposes derived values such as `environment_domain` and `kube_domain` that
      are computed from the raw config fields.
    references:
      - type: internal-commit
        summary: "chore: cli refactor"
        link: 6a380d2664c6020bf7fe5e60d7df289fb1b3486a
    impacts:
      - type: cli
        component: config get
        summary: New command to retrieve and display the merged Panfactum configuration for a directory
  - type: addition
    summary: >-
      Adds the `pf aws vpc-network-test` CLI command, which verifies network connectivity for
      each subnet in a deployed `aws_vpc` module by spinning up a temporary test instance via
      AWS Systems Manager and confirming that egress traffic is correctly routed through the NAT gateway.
    description: >-
      Previously this functionality existed only as an internal helper script. It is now exposed as
      a first-class `pf` CLI command, making it easier for operators to validate VPC network
      configuration after deploying or modifying an `aws_vpc` module.
    references:
      - type: internal-commit
        summary: "feat: cli refactor"
        link: 31fd6940342ea29532080d6ff2a3a835bbb55995
    impacts:
      - type: cli
        component: aws vpc-network-test
        summary: New command to test VPC egress network connectivity after deploying aws_vpc
  - type: improvement
    summary: >-
      The `pf` CLI now uses a structured `Logger` class and a `PanfactumCommand` base class,
