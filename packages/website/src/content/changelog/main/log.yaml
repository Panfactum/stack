  description: 'Previously the ECR enable step only re-deployed `kube_policies` after setting `pull_through_cache_enabled:
    true` in the region config. This was insufficient because many other modules reference that flag. The step now runs `terragrunt
    run-all apply` across the entire region directory, ensuring every module that depends on pull-through cache settings is
    updated in a single operation.'
- type: improvement
  summary: '`pf sso add` now automatically opens the browser to the Authentik token settings page after creating the API token.'
