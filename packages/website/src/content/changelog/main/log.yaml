      regions on resume
  description: '`pf env add` can now resume an interrupted installation without repeating steps that already completed. The
    command detects whether an AWS account was already provisioned (by checking existing AWS profiles and module status),
    restores previously-selected primary and secondary regions from config, and offers to copy region configuration from another
    existing environment to speed up setup. AWS account creation is now performed directly via the AWS SDK before the IaC
    module is applied, which also enables retrying with a different email address when a duplicate-email error is returned
    by AWS Organizations.'
