- id: 12680513-be16-472f-a739-9e2be042b887
  type: fix
  summary: Fixes `panfactum.hcl` stale `pf config get` cache in `run-all` sessions and `CLIError` cause chaining.
  references:
  - type: internal-commit
    summary: 'fix: misc cli installer bugfixes'
    link: c71b2b32a1f58286448afdf1419443e0f7c5f9f9
  description: 'Two fixes from the same commit: (1) `panfactum.hcl` no longer invokes `pf config get` with the `--terragrunt-global-cache`
    flag. The global cache caused Terragrunt to reuse the first result of `pf config get` for all subsequent modules in the
    same `run-all` session, returning stale or incorrect per-module configuration. (2) `CLIError` cause chaining is fixed
    so that when a nested error is wrapped, the original root cause is correctly propagated. Previously the wrapped error
    itself was used as the cause even when it already had a deeper cause, making multi-level error chains appear truncated
    in debug output.'
- id: 8ba600f8-89f4-4765-951b-770fbb499c3c
  type: fix
  summary: Fixes `kube_cert_issuers` (now `kube_certificates`) to allow certificate issuance for subdomains of the cluster
