        summary: Hardcodes `http://localhost:8250/oidc/callback` internally so callers no longer need to supply it
  - id: ec222c16-7774-4890-ac5e-22d2894643be
    type: fix
    summary: Fixed Cilium operator only running 1 replica on SLA-1 clusters, causing networking failures during pod disruptions
    description: The Cilium operator is responsible for cluster-wide IPAM — it allocates IP addresses to new nodes as they
      join. Previously, the operator replica count was gated on `sla_target`, so SLA-1 clusters ran only a single
      operator pod. Because the operator is a single point of failure for node networking, a routine pod disruption
      (node eviction, rolling update, spot interruption) could take it offline and prevent new nodes from receiving IP
      addresses, stalling scale-out and causing networking instability across the cluster. The operator now always runs
      2 replicas with Kubernetes leader election so that one replica can take over immediately if the other is
      disrupted, regardless of the cluster's SLA target.
    action_items:
      - Re-apply the `kube_cilium` module to update the operator deployment configuration
    references:
      - type: internal-commit
        summary: "fix: ensure cilium operator HA and fix website TS types"
        link: c64d99d027fb6c53b366a22cdfd6e10420f14076
      - type: external-docs
        summary: Cilium operator proper rolling update support (enables safe HA upgrades)
        link: https://github.com/cilium/cilium/pull/23589
      - type: external-docs
        summary: Cilium operator HA mode internals documentation
        link: https://github.com/cilium/cilium/blob/master/Documentation/internals/cilium_operator.rst
      - type: internal-docs
        summary: kube_cilium module reference
        link: /modules/kube_cilium
    impacts:
      - type: iac-module
        component: kube_cilium
        summary: Operator replica count hardcoded to 2 for all clusters; SLA-1 clusters now run a highly available operator
          instead of a single replica
  - id: a62d8777-1ab6-4015-b3ba-3946c02bf134
    type: fix
    summary: Fixed `cluster add` command failing to detect partially deployed cluster regions, making automated recovery
      impossible
    description: When the `setupClusterExtensions` step failed partway through its concurrent module deployments, `pf
      cluster add` would incorrectly treat the region as fully deployed on subsequent runs and skip it entirely — making
      automated recovery impossible without manual intervention. The root cause was that `isClusterDeployed` checked
      only `kube_reloader` as a proxy for cluster completion. Because all extension modules deploy concurrently,
      `kube_reloader` could reach `deploy_status=success` while sibling modules were still failing. The fix requires all
      8 extension modules to have `deploy_status=success` AND all 5 anti-affinity modules to have
      `bootstrap_mode_enabled !== true` in their `module.yaml` before a region is considered fully deployed, enabling
      `pf cluster add` to correctly resume interrupted installations.
    references:
      - type: internal-commit
        summary: "fix(cluster): detect partial setupClusterExtensions deployments"
        link: 55a4bca301fe41b8851b7a4c784af0e530ae8439
    impacts:
      - type: cli
        component: cluster add
        summary: Enhanced cluster deployment detection to prevent skipping partially-installed regions
  - id: cdd46545-6a59-483c-87b2-df8e25aef3ef
    type: fix
    summary: Fixed `cluster add` command Vault address becoming permanently stuck on localhost after DNS timeout during
      ingress setup
    description: When switching Vault to ingress mode, DNS propagation can exceed the health-check timeout, causing the
      Vault address update step to fail after `KUBE_INGRESS_NGINX` is already deployed. On retry, the
      `setupInboundNetworking` step would be skipped entirely because the NGINX module showed `deploy_status=success`,
      leaving `vault_addr` permanently pointing to a local address and preventing cluster setup completion. The fix
      ensures `setupInboundNetworking` completion requires both NGINX deployment success AND `vault_addr` resolving to a
      non-local URL, mirroring the existing `setupVault` pattern.
    references:
      - type: internal-commit
        summary: "fix(cluster/add): prevent vault_addr stuck on local after DNS timeout"
        link: db90bc63ddedd76053a16a8df49fa2f51418f258
      - type: internal-docs
        summary: "Bootstrapping guide: Inbound Networking"
        link: /docs/main/guides/bootstrapping/inbound-networking
    impacts:
      - type: cli
        component: cluster add
        summary: Fixed Vault address remaining on localhost after DNS propagation timeout during setup
  - id: 2b08774c-8df4-4687-8181-704021b8bf8b
    type: fix
    summary: Fixed `pf` CLI Nix build failing with `EPERM` errors when `bun` hardlinks read-only files from the Nix store.
    description: |
      The CLI package build was experiencing `EPERM` failures when `bun` attempted to hardlink packages
      during installation. Two separate root causes were identified and fixed:

      1. The `bun-cache` derivation is a `symlinkJoin` whose entries point to read-only Nix store paths.
         The `bun2nix` hook copied these with `cp -r`, which preserves symlinks, so `chmod -R u+rwx`
         never reached the underlying read-only files. The fix switches to `cp -rL` to dereference
         symlinks into real files before applying `chmod`, making the cache writable.
      2. After the first fix, a subsequent `EPERM` emerged from the `bun2nix` build hook itself copying
         pre-fetched packages directly from the read-only Nix store (mode `444`). The fix adds a
         `postBunSetInstallCacheDirPhase` that runs `chmod -R u+rwx` after the hook's copy, restoring
         write permissions before `bun install` attempts hardlinking.

      Additionally fixed a `nixpkgs` hash mismatch caused by GNU `parallel` re-releasing their tarball
      with different content — a known recurring practice. A `nixpkgs` overlay in `flake.nix` now pins
      the correct `sha256` hash.
    references:
      - type: internal-commit
        summary: "fix(build): fix bun EPERM and parallel hash in nix builds"
        link: 7b4fe36705dbfdadc48b159772815758e2a450f9
      - type: internal-commit
        summary: "fix(cli): chmod bun cache after copy from read-only nix store"
        link: a689ba3e921f95c0deb7af061a7864fd3e9c5524
      - type: issue-report
        summary: bun2nix copies read-only files causing EPERM on hardlink
        link: https://github.com/nix-community/bun2nix/issues/73
      - type: external-docs
        summary: bun2nix — Nix build tool for bun packages
        link: https://github.com/nix-community/bun2nix
    impacts:
      - type: devshell
        component: pf
        summary: Fixed `EPERM` errors during Nix build caused by read-only `bun` cache files — both the symlink-dereference
          issue and the `bun2nix` hook copy issue are resolved
      - type: devshell
        component: parallel
        summary: Fixed `nixpkgs` overlay hash for `parallel` after GNU re-released the tarball with different content
  - id: a38e4b81-8d72-4ba6-b329-3beafb8be19c
    type: fix
    summary: Fixed Vault OIDC authentication failing when CLI uses dynamic ports by switching Authentik redirect URI from
      strict to regex matching.
    description: The CLI was recently changed to use a random ephemeral port for the OIDC callback listener instead of the
      fixed port `8250` to avoid port conflicts on developer machines. However, the `authentik_vault_sso` module still
      enforced strict matching against `http://localhost:8250/oidc/callback`, causing every local login attempt to be
      rejected by Authentik. The localhost redirect URI entry now uses regex matching with the pattern
      `http://localhost:[0-9]+/oidc/callback` so any dynamically assigned port is accepted, bringing the Authentik
      config back in sync with the CLI's port selection behavior.
    references:
      - type: internal-commit
        summary: "fix(authentik_vault_sso): allow dynamic ports in Vault SSO OIDC callback URI"
        link: 9fc490ccb99c5a9a56580187e83b47bd628f08b4
      - type: external-docs
        summary: OAuth 2.0 provider redirect URI configuration with regex matching
        link: https://docs.goauthentik.io/docs/add-secure-apps/providers/oauth2
      - type: issue-report
        summary: "Authentik upstream: wildcard regex in port part of redirect URI causes ValueError"
        link: https://github.com/goauthentik/authentik/issues/13023
      - type: internal-docs
        summary: authentik_vault_sso module reference
        link: /modules/authentik_vault_sso
    impacts:
      - type: iac-module
        component: authentik_vault_sso
        summary: Changed localhost redirect URI from strict to regex matching for dynamic port support
  - id: 141f48cb-8d69-4332-a4b4-f9b85141f855
    type: improvement
    summary: Replaced `bun` workspace architecture with per-package lockfiles to eliminate Docker build failures and
      simplify dependency management.
    description: The shared `bun` workspace caused recurring Docker build failures (`--filter` requires all workspace
      `package.json` files to be present), corrupt shared `node_modules` hoisting and cache, and required a fragile
      `sed+jq` hack in the CLI Nix build to extract a standalone lockfile from the root `bun.lock`. Since `cli`,
      `scraper`, and `website` have no cross-package dependencies, the workspace added complexity with zero benefit.
      Each package now has its own `bun.lock` and `bunfig.toml` with a local `.bun` cache dir, eliminating these failure
      modes and simplifying builds across Docker, Nix, and devshell environments.
    references:
      - type: internal-commit
        summary: "refactor(bun): replace workspace with per-package lockfiles"
        link: 6127695e8ea9a5135419804986b9d6359a1b762b
      - type: external-docs
        summary: "`bun install --frozen-lockfile --filter` fails in Docker when `bun.lock` was generated from the full
          workspace"
        link: https://github.com/oven-sh/bun/issues/28402
    impacts:
      - type: devshell
        component: pf
        summary: CLI Nix build simplified by removing `sed+jq` lockfile transformation hack; devshell now runs `bun install`
          once per package directory instead of a single root-level install
  - id: e2f3c822-d7aa-4200-951d-8871325beb71
    type: addition
    summary: Added `kube_temporal` module for deploying Temporal workflow orchestration with full Panfactum operational
      guarantees
    description: Provides a self-hosted Temporal workflow orchestration server on Kubernetes following all Panfactum
      conventions for high availability, vertical pod autoscaling, pod disruption budgets, Linkerd mTLS, and monitoring.
      Implements 4 separate Deployments (frontend on port 7233, history on port 7234, matching on port 7235, worker on
      port 7239) for independent scaling and disruption, uses a single `kube_pg_cluster` with dual PostgreSQL schemas
      (`temporal` and `temporal_visibility`) for persistence and visibility storage, secures the Web UI with Vault OIDC
      authentication, and ensures correct initialization ordering via schema and namespace setup Jobs. The
      `num_history_shards` variable is set once at schema initialization and cannot be changed afterward without a full
      data migration. Teams using Panfactum now have production-grade durable workflow orchestration without manual
      Temporal setup.
    references:
      - type: internal-commit
        summary: "feat(kube_temporal): add Temporal workflow orchestration module"
        link: 95d846afa1014c48bdbe6a031b1048bb3b49608b
