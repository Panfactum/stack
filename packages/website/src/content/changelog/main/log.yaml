    description: >-
      The bundled `panfactum.hcl` now injects `route53_zones` (from `local.vars.domains`) and
      `kube_domain` (from `local.vars.kube_domain`) as global default module inputs. Modules that accept
      these variables — including `kube_certificates` — will now receive them automatically, eliminating
      the need to wire those values in manually during migration.
  - type: "improvement"
    summary: >-
      `vault_internal_url` in [`kube_certificates`](/docs/edge/reference/infrastructure-modules/direct/kubernetes/kube_certificates)
      now has a default value, making it optional to specify explicitly.
    references:
      - type: "internal-commit"
        summary: "fix: kube_certificates migration guide"
        link: "8dddf6bf63532b62b4cf55e7b598421a645b1643"
    impacts:
      - type: "iac-module"
        component: "kube_certificates"
        summary: "vault_internal_url now defaults to http://vault-active.vault.svc.cluster.local:8200"
    description: >-
      The `vault_internal_url` input in `kube_certificates` now defaults to
      `http://vault-active.vault.svc.cluster.local:8200`, the standard in-cluster Vault address.
      Users following the standard Panfactum cluster layout no longer need to specify this variable
      explicitly, reducing the friction of migrating from the old `kube_cert_manager` and
      `kube_cert_issuers` modules.
  - type: "improvement"
    summary: >-
      [`kube_opensearch`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch)
      adds OpenSearch Dashboards with ingress and new `log_level`, `slow_request_log_thresholds`, and
      `extra_cluster_settings` inputs.
    references:
      - type: "internal-commit"
        summary: "fix: kube_certificates migration guide"
        link: "8dddf6bf63532b62b4cf55e7b598421a645b1643"
    impacts:
      - type: "iac-module"
        component: "kube_opensearch"
        summary: >-
          Added OpenSearch Dashboards Helm deployment with ingress; new log_level,
          slow_request_log_thresholds, and extra_cluster_settings inputs
    description: >-
      `kube_opensearch` now deploys OpenSearch Dashboards alongside the OpenSearch cluster using the
      upstream Helm chart, with a `kube_ingress` resource for external access. The module also adds three
      new optional inputs: `log_level` (default `WARN`) controls cluster log verbosity;
      `slow_request_log_thresholds` configures per-level slow-search log thresholds; and
      `extra_cluster_settings` allows arbitrary `opensearch.yml` settings to be injected or overridden
      without forking the module. These additions make it easier to operate and observe OpenSearch in
      production.
  - type: "fix"
    summary: >-
      Fixes [`kube_opensearch`](/docs/edge/reference/infrastructure-modules/submodule/kubernetes/kube_opensearch)
      S3 segment replication by enabling remote-store repositories for segments and translogs that were
      previously disabled.
    references:
      - type: "internal-commit"
        summary: "fix: kube_certificates migration guide"
        link: "8dddf6bf63532b62b4cf55e7b598421a645b1643"
      - type: "external-commit"
        summary: "OpenSearch issue #15902 (segment replication remote store)"
        link: "https://github.com/opensearch-project/OpenSearch/issues/15902"
    impacts:
      - type: "iac-module"
        component: "kube_opensearch"
        summary: "node.attr.remote_store.segment.repository and node.attr.remote_store.translog.repository re-enabled"
    description: >-
      The `node.attr.remote_store.segment.repository` and `node.attr.remote_store.translog.repository`
      settings had been commented out in the OpenSearch configuration with a reference to a known upstream
      bug (opensearch-project/OpenSearch#15902). With the resolution of that issue in OpenSearch 3.x,
      both settings are now enabled, allowing segments and translogs to be stored in S3 for remote
      replication and recovery.
  - type: "fix"
    summary: >-
      Fixes `panfactum.hcl` so `route53_zones` and `kube_domain` default safely when absent from
      the Panfactum config.
    references:
      - type: "internal-commit"
        summary: "fix: kube_domain default input"
        link: "d14a548a5cd98b7e2bfee632bbe118459be04b6a"
    description: >-
      The bundled `panfactum.hcl` previously accessed `local.vars.domains` and `local.vars.kube_domain`
      directly. If either key was missing from the merged Panfactum config (e.g., in environments without
      a Kubernetes cluster), Terragrunt would fail with an attribute-not-found error. Both fields now use
      `lookup()` with safe defaults (`{}` for `route53_zones`, `null` for `kube_domain`), allowing the
      template to work in all environments regardless of whether those config keys are present.
  - type: "improvement"
    summary: >-
      `pf cluster add` and `pf sso add` now skip `terragrunt init` for already-initialized modules,
      reducing redundant work during installation.
    references:
      - type: "internal-commit"
        summary: "feat: intelligently skip init in deployModuleTask when possible"
        link: "084e5910a3bad7d214090c78cca30f8caf650036"
    impacts:
      - type: "cli"
        component: "cluster add"
        summary: "Module deploy tasks now skip terragrunt init when init_status is already success"
      - type: "cli"
        component: "sso add"
        summary: "Module deploy tasks now skip terragrunt init when init_status is already success"
    description: >-
      Previously, every module deployment task in `pf cluster add` and `pf sso add` ran
      `terragrunt init` unconditionally before applying, even on resumed installs where the module had
      already been initialized. The `buildDeployModuleTask` utility now checks the module's `.pf.yaml`
      `init_status` field (written by the Panfactum terragrunt hooks) before deciding whether to run
      init. If `init_status` is `"success"` or `"running"`, the init step is skipped. A new
      `forceInitModule` option can be set to override this behavior when a re-init is explicitly needed.

  - type: "fix"
    summary: "Fixes `pf cluster add` Vault unseal step incorrectly skipping due to a stale `module.yaml` flag."
    references:
      - type: "internal-commit"
        summary: "fix: using vault status to check if unseal step should be skipped"
        link: "a30fefc697ec9ecd01f72accdd2f83f6d3b7c413"
    impacts:
      - type: "cli"
