    step, the installer deploys `kube_vault`, polls until all pods are running, runs `vault operator init`, unseals Vault
    with recovery keys, then deploys `vault_core_resources` via `kubectl port-forward`. Recovery keys and the root token are
    SOPS-encrypted and written to `region.secrets.yaml` as `vault_token`. (2) Fixes a duplicate step ID where the Base EKS
    Cluster step incorrectly shared the `csiDrivers` checkpoint ID with the CSI Drivers step. The EKS step is now tracked
    under `setupEKS`. Users with an existing checkpoint that marked `csiDrivers` as the EKS step will see the EKS step re-run
