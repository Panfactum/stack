    description: "The node image cache system pre-pulled container images onto nodes to reduce pod startup latency. In
      practice, the Kyverno-based implementation caused Kyverno to consume excessive resources in production clusters,
      producing real stability issues that outweighed the startup latency benefit. The feature has been removed entirely
      to improve cluster reliability."
