      restart from scratch on the next run. The command now tracks each sub-step individually (e.g., metrics server
      setup, VPA setup, Karpenter setup) and skips steps that already completed. Errors are also written to a debug file
      for easier troubleshooting. This makes the cluster installation process significantly more resilient to transient
      failures."
