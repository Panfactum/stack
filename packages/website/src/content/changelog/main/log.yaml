    type: fix
    summary: Fixed `kube_aws_lb_controller` webhooks to prevent an unrecoverable bootstrap deadlock by restricting
      `serviceMutatorWebhook` and `ingressValidationWebhook` scope to `loadbalancer/enabled` namespaces only.
    description: "Previously, the `serviceMutatorWebhook` and `ingressValidationWebhook` applied cluster-wide with
